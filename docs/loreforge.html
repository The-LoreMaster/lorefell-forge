<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The LoreForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a0e1a; --panel:#10162a; --panel2:#0d1322;
  --silver:#dce8ef; --ice:#b8ccd8; --gold:#c9a84c; --muted:#7e8a99;
  --ember:#c96a5a; --line:rgba(184,204,216,.16); --goldline:rgba(201,168,76,.4);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--navy); color:var(--silver); font-family:'Crimson Pro',serif; }
button{ font:inherit; color:inherit; background:none; border:none; cursor:pointer; }

.wrap{ max-width:980px; margin:0 auto; padding:14px 14px 40px; }
body.pen{ --gold:#c96a5a; --goldline:rgba(201,106,90,.5); }
.mast, .sub, .chip, .badge, .v-btn, .hall-seg button, .c-kick, .open-btn{ transition:color .35s ease, border-color .35s ease, background .35s ease; }
.grid{ transition:opacity .28s ease; }
body.hall-x .grid{ opacity:0; }
.hall-seg{ display:flex; gap:6px; margin:0 0 12px; }
.hall-seg button{ flex:1; font-family:'Cinzel',serif; font-size:.66rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); border:1px solid var(--line); border-radius:9px; padding:10px 0; }
.hall-seg button.on{ color:var(--gold); border-color:var(--goldline); background:rgba(201,168,76,.07); }
body.pen .hall-seg button.on{ background:rgba(201,106,90,.08); }
.mast{ font-family:'Cinzel Decorative',serif; font-size:1.45rem; letter-spacing:.05em; }
.mast .lf{ color:var(--gold); }
.sub{ color:var(--ice); font-size:.95rem; margin:2px 0 14px; }

.ctl{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:6px; }
.ctl-l{ font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.16em; text-transform:uppercase; color:var(--ice); margin-right:2px; }
.chip{ font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--silver);
  border:1px solid var(--line); border-radius:999px; padding:7px 13px; }
.chip.on{ color:var(--gold); border-color:var(--goldline); background:rgba(201,168,76,.08); }

.grid{ display:grid; grid-template-columns:1fr; gap:12px; margin-top:12px; }
@media (min-width:700px){ .grid{ grid-template-columns:1fr 1fr; } }

.card{ display:flex; flex-direction:column; text-align:left; overflow:hidden;
  background:linear-gradient(180deg, var(--panel), var(--panel2));
  border:1px solid var(--line); border-radius:12px; }
.card .plate{ height:130px; background-size:cover; background-position:center; border-bottom:1px solid var(--goldline); }
.c-main{ display:flex; flex-direction:column; flex:1; min-width:0; }
@media (min-width:700px){
  .card{ flex-direction:row; }
  .card .plate{ width:150px; height:auto; min-height:100%; flex:none; border-bottom:none; border-right:1px solid var(--goldline); }
}
.c-body{ padding:11px 13px 12px; flex:1; display:flex; flex-direction:column; }
.c-kick{ font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); }
.c-name{ font-family:'Cinzel',serif; font-weight:600; font-size:1.05rem; margin:2px 0 1px; }
.c-by{ font-size:.82rem; color:var(--muted); }
.c-flavor{ font-size:.9rem; color:var(--ice); line-height:1.4; margin-top:6px; flex:1;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.c-foot{ display:flex; align-items:center; gap:10px; border-top:1px solid var(--line); padding:9px 13px; }
.badge{ font-family:'Cinzel',serif; font-size:.56rem; letter-spacing:.12em; text-transform:uppercase; border-radius:999px; padding:3px 10px; border:1px solid; }
.badge.canon{ color:#e6c965; border-color:rgba(201,168,76,.55); }
.badge.vote{ color:var(--ice); border-color:rgba(184,204,216,.4); }
.v-count{ margin-left:auto; font-size:.86rem; color:var(--ice); }
.v-btn{ font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.12em; text-transform:uppercase;
  color:var(--gold); border:1px solid var(--goldline); border-radius:8px; padding:6px 13px; }
.v-btn:disabled{ opacity:.5; cursor:default; }
.v-btn.done{ color:#9ec98f; border-color:rgba(158,201,143,.4); }
.open-btn{ font-size:.8rem; color:var(--muted); }

.empty{ color:var(--muted); font-style:italic; padding:26px 4px; text-align:center; }
.ping{ position:fixed; left:50%; bottom:18px; transform:translateX(-50%);
  background:rgba(10,14,26,.95); border:1px solid var(--goldline); color:var(--silver);
  border-radius:9px; padding:9px 16px; font-size:.9rem; display:none; z-index:50; max-width:90vw; text-align:center; }
.ping.show{ display:block; }

.modal{ position:absolute; inset:0; min-height:100%; background:rgba(6,9,17,.88); display:none; z-index:40; }
.modal.open{ display:block; }
.m-card{ position:absolute; left:50%; transform:translateX(-50%); width:calc(100% - 32px); max-width:560px; max-height:82vh; overflow:auto;
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--goldline); border-radius:13px; padding:16px 16px 14px; }
.m-full{ white-space:pre-wrap; color:var(--ice); font-size:.94rem; line-height:1.5; margin-top:10px; }
.m-close{ display:block; margin:14px auto 0; font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ice); border:1px solid var(--line); border-radius:8px; padding:8px 18px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="mast" id="mast">The <span class="lf">LoreForge</span></div>
  <div class="sub" id="sub">Every forge, one hall. The community votes, the dev team decides what enters canon.</div>
  <div class="hall-seg">
    <button id="hallLore" class="on" onclick="setHall('lore')">The LoreForge</button>
    <button id="hallPen" onclick="setHall('pentifax')">The Pentifax</button>
  </div>
  <div class="ctl" id="forgeChips"></div>
  <div class="ctl">
    <span class="ctl-l">Show</span>
    <button class="chip" data-status="submitted">In the vote</button>
    <button class="chip" data-status="canon">Canon</button>
    <button class="chip on" data-status="">All</button>
    <span class="ctl-l" style="margin-left:10px">Order</span>
    <button class="chip on" data-sort="votes">Most voted</button>
    <button class="chip" data-sort="new">Newest</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">Nothing forged here yet. The halls wait.</div>
</div>
<div class="modal" id="modal" onclick="closeModal()"></div>
<div class="ping" id="ping"></div>

<script>
var ROWS = [];
var F = { hall:"lore", forgeKey:"", status:"", sort:"votes" };
var VOTED = {};

var FORGE_NAMES = {
  sigilforge:"SigilForge", shardforge:"ShardForge", foeforge:"FoeForge",
  bondforge:"BondForge", brandforge:"BrandForge", relicforge:"RelicForge",
  fellforge:"FellForge", echoforge:"EchoForge", sagaforge:"SagaForge"
};
function forgeName(k){ return FORGE_NAMES[k] || (k ? (k.charAt(0).toUpperCase()+k.slice(1)) : "Forge"); }
function kindLabel(k){ if(!k) return ""; if(String(k).toLowerCase()==="character") return ""; return k; }

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }
function post(m){ try{ if(window.parent && window.parent!==window) window.parent.postMessage(m,"*"); }catch(e){} }
function reportHeight(){ post({ type:"FORGE_HEIGHT", height:document.body.scrollHeight }); }

function ping(t){
  var p=document.getElementById("ping");
  p.textContent=t; p.classList.add("show");
  clearTimeout(window._pt); window._pt=setTimeout(function(){ p.classList.remove("show"); }, 2600);
}

function request(){
  var pay = { canonStatus:F.status, sort:F.sort };
  if(F.hall === "pentifax"){ pay.forgeKey = "foeforge"; }
  else { pay.forgeKey = F.forgeKey; pay.excludeForgeKey = "foeforge"; }
  post({ type:"LOREFORGE_GALLERY", payload:pay });
}
function setHall(h){
  F.hall = h; F.forgeKey = "";
  document.body.classList.add("hall-x");
  document.body.classList.toggle("pen", h === "pentifax");
  document.getElementById("hallLore").classList.toggle("on", h === "lore");
  document.getElementById("hallPen").classList.toggle("on", h === "pentifax");
  document.getElementById("mast").innerHTML = (h === "pentifax") ? 'The <span class="lf">Pentifax</span>' : 'The <span class="lf">LoreForge</span>';
  document.getElementById("sub").textContent = (h === "pentifax")
    ? "The foe hall. Canon and submitted adversaries, voted by the table."
    : "Every forge, one hall. The community votes, the dev team decides what enters canon.";
  request();
}

function card(r){
  var canon = r.canonStatus === "canon";
  var voted = !!VOTED[r.creationId];
  var line = r.flavorText || r.shorthand || "";
  return '<div class="card">'
    + (r.imageUrl ? '<div class="plate" style="background-image:url(\''+esc(r.imageUrl)+'\')"></div>' : '')
    + '<div class="c-main"><div class="c-body">'
    + '<span class="c-kick">'+esc(forgeName(r.forgeKey))+(kindLabel(r.kind)?(' \u00b7 '+esc(kindLabel(r.kind))):'')+'</span>'
    + '<span class="c-name">'+esc(r.creationName||"Unnamed")+'</span>'
    + (r.creatorName?('<span class="c-by">by '+esc(r.creatorName)+'</span>'):'')
    + (line?('<div class="c-flavor">'+esc(line)+'</div>'):'')
    + (r.fullText?('<button class="open-btn" onclick="openModal(event,\''+r.creationId+'\')">Read the full record</button>'):'')
    + '</div>'
    + '<div class="c-foot">'
    + '<span class="badge '+(canon?'canon':'vote')+'">'+(canon?'Canon':'In the vote')+'</span>'
    + '<span class="v-count" id="vc-'+r.creationId+'">'+(r.voteCount||0)+' vote'+((r.voteCount||0)===1?'':'s')+'</span>'
    + (canon ? '' : '<button class="v-btn'+(voted?' done':'')+'" id="vb-'+r.creationId+'" '+(voted?'disabled':'')+' onclick="vote(\''+esc(r.forgeKey)+'\',\''+r.creationId+'\')">'+(voted?'Voted':'Vote')+'</button>')
    + '</div></div></div>';
}

function render(){
  var g=document.getElementById("grid"), e=document.getElementById("empty");
  var h=''; ROWS.forEach(function(r){ h+=card(r); });
  g.innerHTML=h;
  e.style.display = ROWS.length ? "none" : "";
  renderForgeChips();
  reportHeight();
}

function renderForgeChips(){
  var host=document.getElementById("forgeChips");
  if(F.hall === "pentifax"){ host.innerHTML=""; return; }
  var keys={}; ROWS.forEach(function(r){ if(r.forgeKey) keys[r.forgeKey]=1; });
  var h='<span class="ctl-l">Forge</span>'
    + '<button class="chip'+(F.forgeKey===""?" on":"")+'" onclick="setForge(\'\')">All</button>';
  Object.keys(keys).sort().forEach(function(k){
    h+='<button class="chip'+(F.forgeKey===k?" on":"")+'" onclick="setForge(\''+esc(k)+'\')">'+esc(forgeName(k))+'</button>';
  });
  if(F.forgeKey && !keys[F.forgeKey]) h+='<button class="chip on" onclick="setForge(\'\')">'+esc(forgeName(F.forgeKey))+' \u00d7</button>';
  host.innerHTML=h;
}

function setForge(k){ F.forgeKey=k; request(); }
function vote(forgeKey, id){
  var b=document.getElementById("vb-"+id); if(b) b.disabled=true;
  post({ type:"LOREFORGE_VOTE", payload:{ forgeKey:forgeKey, creationId:id } });
}

function openModal(ev, id){
  var r=null; ROWS.forEach(function(x){ if(x.creationId===id) r=x; }); if(!r) return;
  var m=document.getElementById("modal");
  var y=(ev && (ev.pageY || ev.clientY)) || 120;
  var top=Math.max(16, y - 90);
  m.innerHTML='<div class="m-card" style="top:'+top+'px" onclick="event.stopPropagation()">'
    + '<span class="c-kick">'+esc(forgeName(r.forgeKey))+(kindLabel(r.kind)?(' \u00b7 '+esc(kindLabel(r.kind))):'')+'</span>'
    + '<div class="c-name" style="font-size:1.2rem">'+esc(r.creationName||"Unnamed")+'</div>'
    + (r.creatorName?('<span class="c-by">by '+esc(r.creatorName)+'</span>'):'')
    + '<div class="m-full">'+esc(r.fullText||r.flavorText||"")+'</div>'
    + '<button class="m-close" onclick="closeModal()">Close</button>'
    + '</div>';
  m.classList.add("open");
}
function closeModal(){ var m=document.getElementById("modal"); m.classList.remove("open"); m.innerHTML=""; }

document.querySelectorAll("[data-status]").forEach(function(b){
  b.addEventListener("click", function(){
    document.querySelectorAll("[data-status]").forEach(function(x){ x.classList.remove("on"); });
    b.classList.add("on"); F.status=b.getAttribute("data-status"); request();
  });
});
document.querySelectorAll("[data-sort]").forEach(function(b){
  b.addEventListener("click", function(){
    document.querySelectorAll("[data-sort]").forEach(function(x){ x.classList.remove("on"); });
    b.classList.add("on"); F.sort=b.getAttribute("data-sort"); request();
  });
});

window.onmessage = function(ev){
  var m = ev && ev.data; if(!m || !m.type) return;
  if(m.type === "LOREFORGE_ROWS"){
    ROWS = m.rows || [];
    render();
    requestAnimationFrame(function(){ document.body.classList.remove("hall-x"); });
    return;
  }
  if(m.type === "LOREFORGE_VOTE_RESULT"){
    var id=m.creationId;
    if(m.signin){ ping("Sign in on lorefell.com to cast your vote."); var b0=document.getElementById("vb-"+id); if(b0) b0.disabled=false; return; }
    if(!m.ok){ ping(m.error || "The vote could not be saved."); var b1=document.getElementById("vb-"+id); if(b1) b1.disabled=false; return; }
    VOTED[id]=1;
    var vc=document.getElementById("vc-"+id);
    if(vc) vc.textContent=(m.voteCount||0)+" vote"+((m.voteCount||0)===1?"":"s");
    var vb=document.getElementById("vb-"+id);
    if(vb){ vb.textContent = m.already ? "Voted" : "Voted"; vb.classList.add("done"); vb.disabled=true; }
    ping(m.already ? "You already stood for this one." : "Your vote is cast.");
    return;
  }
};

if(window.parent && window.parent!==window){ request(); }
else {
  document.getElementById("empty").style.display="";
  document.getElementById("empty").textContent="The LoreForge lives on lorefell.com, where the halls are open and votes count.";
}
reportHeight();
</script>
</body>
</html>
