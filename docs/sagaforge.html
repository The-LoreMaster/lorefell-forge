<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SagaForge</title>
<style>
:root{
  --navy:#0a0e1a; --panel:#10162a; --panel2:#0d1322;
  --silver:#dce8ef; --silver-dim:#93a3b1; --ice:#b8ccd8; --gold:#c9a84c;
  --muted:#7e8a99; --line:rgba(184,204,216,.16); --goldline:rgba(201,168,76,.4);
  --error:#c96a5a; --valid:#7fb58a;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--navy); color:var(--silver); font-family:'Crimson Pro',serif; }
body{ padding:14px 12px 60px; max-width:760px; margin:0 auto; }
h1,h2,h3{ font-family:'Cinzel',serif; font-weight:600; }
.crest{ text-align:center; margin:8px 0 18px; }
.crest h1{ font-family:'Cinzel Decorative',serif; font-size:1.5rem; letter-spacing:.08em; }
.crest .sub{ color:var(--muted); font-size:.92rem; margin-top:4px; }
.crest-rule{ width:120px; height:1px; margin:10px auto 0; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; margin:0 0 14px; }
.fld{ display:block; font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.16em; text-transform:uppercase; color:var(--ice); margin:12px 0 5px; }
textarea,input[type=text]{ width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:9px 11px; color:var(--silver); font-family:'Crimson Pro',serif; font-size:.98rem; }
textarea{ min-height:84px; resize:vertical; }
textarea:focus,input:focus{ outline:none; border-color:var(--goldline); }
.btn{ font-family:'Cinzel',serif; font-size:.66rem; letter-spacing:.12em; text-transform:uppercase; color:var(--silver); background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:9px 16px; cursor:pointer; }
.btn.gold{ border-color:var(--goldline); color:var(--gold); }
.btn.ghost{ background:none; }
.btn:disabled{ opacity:.4; cursor:default; }
.btnrow{ display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
.steps{ display:flex; gap:6px; justify-content:center; margin:0 0 16px; flex-wrap:wrap; }
.step{ font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); padding:5px 10px; border:1px solid var(--line); border-radius:99px; }
.step.on{ color:var(--gold); border-color:var(--goldline); }
.step.done{ color:var(--ice); }
.tcard{ border:1px solid var(--line); border-radius:10px; padding:12px; margin:8px 0; cursor:pointer; background:var(--panel2); }
.tcard:hover{ border-color:var(--goldline); }
.tcard.on{ border-color:var(--gold); }
.tcard h3{ font-size:.95rem; letter-spacing:.06em; }
.tcard .len{ font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin:3px 0 5px; }
.tcard p{ color:var(--silver-dim); font-size:.92rem; line-height:1.4; }
.hint{ color:var(--muted); font-size:.88rem; line-height:1.4; margin-top:6px; }
.err{ color:var(--error); font-size:.92rem; margin-top:8px; }
.spin{ display:inline-block; width:14px; height:14px; border:2px solid var(--goldline); border-top-color:var(--gold); border-radius:50%; animation:sp 1s linear infinite; vertical-align:middle; margin-right:8px; }
@keyframes sp{ to{ transform:rotate(360deg); } }
.wait{ color:var(--ice); font-size:.94rem; padding:10px 0; }

/* skeleton outline */
.sk-act{ border-left:2px solid var(--goldline); padding-left:10px; margin:12px 0; }
.sk-act>.sk-name{ font-family:'Cinzel',serif; font-size:.92rem; color:var(--gold); }
.sk-sess{ margin:10px 0 10px 8px; border-left:1px solid var(--line); padding-left:10px; }
.sk-sess>.sk-name{ font-family:'Cinzel',serif; font-size:.86rem; color:var(--ice); }
.sk-scene{ margin:6px 0 6px 8px; }
.sk-scene>.sk-name{ font-size:.92rem; color:var(--silver); }
.sk-purpose{ color:var(--silver-dim); font-size:.88rem; line-height:1.35; }
.sk-name[contenteditable],.sk-purpose[contenteditable]{ border-bottom:1px dashed var(--line); outline:none; }
.sk-name[contenteditable]:focus,.sk-purpose[contenteditable]:focus{ border-bottom-color:var(--goldline); }

/* draft blocks */
.blk{ border:1px solid var(--line); border-radius:9px; margin:8px 0; overflow:hidden; }
.blk-h{ display:flex; align-items:center; gap:8px; padding:7px 10px; background:var(--panel2); }
.blk-t{ font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); white-space:nowrap; }
.blk-title{ font-family:'Cinzel',serif; font-size:.82rem; color:var(--silver); }
.blk-b{ padding:9px 11px; font-size:.95rem; line-height:1.45; color:var(--silver); white-space:pre-wrap; }
.blk-sp{ color:var(--ice); font-style:italic; }
.scene-h{ font-family:'Cinzel',serif; font-size:.9rem; color:var(--ice); margin:16px 0 4px; }
.sess-nav{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px; }
.sess-nav .where{ font-family:'Cinzel',serif; font-size:.8rem; color:var(--gold); }
.flag{ border:1px solid var(--error); border-radius:8px; background:rgba(201,106,90,.1); color:var(--error); padding:8px 10px; font-size:.9rem; margin:8px 0; }
.oklist{ color:var(--valid); font-size:.9rem; margin:8px 0; }

/* export */
.exp-note{ color:var(--silver-dim); font-size:.92rem; line-height:1.45; }
@media print{
  body{ background:#fff; color:#1a2540; max-width:none; padding:0; }
  .noprint,.steps,.btnrow,.sess-nav{ display:none !important; }
  .card{ border:none; padding:0; }
  .blk{ border:1px solid #c9a84c55; page-break-inside:avoid; }
  .blk-h{ background:#f4f1e8; }
  .blk-t{ color:#8a7222; }
  .blk-b,.blk-title,.sk-purpose{ color:#1a2540; }
  .scene-h,.sk-name{ color:#1a2540; }
  h1,h2,h3{ color:#1a2540; }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

<div id="topAnchor"></div>
<div class="crest noprint">
  <h1>SagaForge</h1>
  <div class="sub">Forge an adventure, one approval at a time. It exports straight into FateWell.</div>
  <div class="crest-rule"></div>
</div>

<div class="steps noprint" id="steps"></div>
<div id="stage"></div>

<script>
"use strict";
/* ============ state ============ */
var STEPS=["pitch","scope","premise","skeleton","draft","export"];
var STEP_LABELS={pitch:"Pitch",scope:"Scope",premise:"Premise",skeleton:"Skeleton",draft:"Sessions",export:"Export"};
var ADV_TYPES={
  tale:{label:"Tale",len:"recommended one session",blurb:"A single sitting. One deed or rumor, complete on its own.",acts:false,oneSession:true},
  story:{label:"Story",len:"recommended 3 to 6 sessions",blurb:"A short, focused arc for a chosen few Fell. It burns bright, then closes.",acts:false},
  legacy:{label:"Legacy",len:"recommended 10 to 12 sessions",blurb:"The backbone saga. Characters endure, grow, and the ending marks the canon.",acts:true},
  chronicle:{label:"Chronicle",len:"recommended infinite sessions, open table",blurb:"A living, open table world that many hands shape across the year.",acts:true}
};
var BLOCK_TYPES=["readaloud","dialogue","crucible","lorecheck","clue","quest","secret","beat","reminder","general"];
var BLOCK_LABELS={readaloud:"Read-aloud",dialogue:"Dialogue",crucible:"Crucible",lorecheck:"Lore Check",clue:"Clue",quest:"Quest",secret:"Secret",beat:"Beat",reminder:"Reminder",general:"Note"};

var S=load()||{
  step:"pitch",
  pitch:"",
  type:"", world:"", tone:"", hook:"", canon:"", levels:"", sessTarget:"",
  premise:null,           /* {situation, intrusion, opposition, clock, cost} */
  skeleton:null,          /* {name, acts:[{name,purpose,sessions:[{name,purpose,scenes:[{name,purpose}]}]}]} */
  drafts:{},              /* "a-s" -> {scenes:[{name, entries:[{type,title,body,speaker}]}], npcs:[{name,desc}]} */
  approved:{},            /* "a-s" -> true */
  cursor:{a:0,s:0},
  npcs:{}                 /* name -> desc, gathered across sessions */
};

function save(){ try{ localStorage.setItem("SAGA_DRAFT", JSON.stringify(S)); }catch(e){} }
function load(){ try{ var s=localStorage.getItem("SAGA_DRAFT"); return s?JSON.parse(s):null; }catch(e){ return null; } }
function uid(){ return "sf"+Math.random().toString(36).slice(2,10); }
function esc(t){ return String(t==null?"":t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function $(id){ return document.getElementById(id); }

/* ============ AI bridge (postMessage relay, same rails as SigilForge) ============ */
var _aiReq=0, _aiPending={};
window.addEventListener("message",function(ev){
  var m=ev&&ev.data;
  if(!m||m.type!=="LOREFELL_AI_FORGE_RESULT")return;
  var p=_aiPending[m.reqId]; if(!p)return;
  delete _aiPending[m.reqId];
  if(m.status===429){ p.reject({rate:true}); return; }
  if(!m.ok){ p.reject(new Error("relay "+(m.status||"")+(m.error?(": "+m.error):""))); return; }
  p.resolve(m.text||"");
});
function aiCall(system,messages,maxTokens){
  /* The tool is hosted cross-origin from the Wix site, so a direct fetch is
     blocked by the browser. Everything goes through the page bridge, which runs
     on the site and calls the long-timeout http-function server side. */
  return new Promise(function(resolve,reject){
    if(!(window.parent&&window.parent!==window)){ reject(new Error("The forge answers on the live site.")); return; }
    var reqId=++_aiReq;
    _aiPending[reqId]={resolve:resolve,reject:reject};
    window.parent.postMessage({type:"LOREFELL_AI_FORGE",reqId:reqId,payload:{system:system,messages:messages,max_tokens:Math.min(maxTokens||700,1400)}},"*");
    setTimeout(function(){ if(_aiPending[reqId]){ delete _aiPending[reqId]; reject(new Error("The forge did not answer in time.")); } },120000);
  });
}
function parseAiJson(text){
  var t=text.replace(/```json/gi,"").replace(/```/g,"").trim();
  var a=t.indexOf("{"), b=t.lastIndexOf("}");
  if(a<0||b<0) throw new Error("The forge answered without a shape.");
  var raw=t.slice(a,b+1);
  try{ return JSON.parse(raw); }catch(e1){}
  /* repair the errors models actually make: smart quotes, trailing commas,
     and raw newlines or tabs sitting inside string values */
  var fixed=raw
    .replace(/[\u201c\u201d]/g,'\\"').replace(/[\u2018\u2019]/g,"'")
    .replace(/,\s*([}\]])/g,"$1");
  fixed=repairNewlinesInStrings(fixed);
  return JSON.parse(fixed);
}
/* walk the JSON and escape any literal control chars that fall inside a string */
function repairNewlinesInStrings(s){
  var out="", inStr=false, esc=false;
  for(var i=0;i<s.length;i++){
    var c=s[i];
    if(esc){ out+=c; esc=false; continue; }
    if(c==="\\"){ out+=c; esc=true; continue; }
    if(c==='"'){ inStr=!inStr; out+=c; continue; }
    if(inStr){
      if(c==="\n"){ out+="\\n"; continue; }
      if(c==="\r"){ out+="\\r"; continue; }
      if(c==="\t"){ out+="\\t"; continue; }
    }
    out+=c;
  }
  return out;
}

/* ============ voice guard ============ */
var BANNED=[["\u2014","an em dash"],["\u2013","an en dash"],["\u2026","an ellipsis"],["...","an ellipsis"],[";","a semicolon"],["--","a double hyphen"]];
function scrubHits(text){
  var hits=[];
  BANNED.forEach(function(b){ if(text.indexOf(b[0])!==-1) hits.push(b[1]); });
  return hits;
}
function scrubDraft(d){
  var hits={};
  (d.scenes||[]).forEach(function(sc){
    (sc.entries||[]).forEach(function(e){
      scrubHits((e.title||"")+" "+(e.body||"")).forEach(function(h){ hits[h]=1; });
    });
  });
  return Object.keys(hits);
}

/* ============ prompts ============ */
function voiceRules(){
  return "Write in the LoreFell house voice. Short declarative sentences, dark grounded register. "
    +"Never use em dashes, en dashes, ellipses, semicolons, comma splices, rhetorical triples, or the construction 'not X but Y'. "
    +"Never use D&D or Pathfinder terms. Combat is simultaneous and cinematic, never turn based. Use Act and React, never the bare word action. "
    +"Never invent hard canon facts about the world of LoreFell. Where a canon detail is uncertain, keep the text general.";
}
function skeletonSystem(){
  var t=ADV_TYPES[S.type];
  /* delimited lines, not JSON. Names and purposes are prose and break JSON. */
  return "You outline adventures for LoreFell, a dark and weird fantasy TTRPG. Conflict and story come first: an adventure is a struggle the Fell can lose, never a tour of discoveries. "+voiceRules()
    +" Output plain text only, no JSON, no code fences. Use this exact line format:\n"
    +"TITLE: <adventure name>\n"
    +"ACT: <act name> | <one line purpose>\n"
    +"THREAT: <who or what actively opposes the Fell in this act> | <what the Fell stand to lose here>\n"
    +"SESSION: <session name> | <one line purpose>\n"
    +"SCENE: <scene name> | <one line purpose>\n"
    +"Every ACT line is followed by its THREAT line. List each act, then its sessions under it, then each session's scenes under it, in order. Use the pipe character only to separate the two halves of a line. "
    +(t.acts?"Use 2 or 3 acts.":"Use exactly one act named Main.")
    +(t.oneSession?" Use exactly one session with 2 to 4 scenes.":" Respect the size guidance: "+t.len+".")
    +" Craft rules. Scene purposes take active verbs, the Fell decide, confront, sacrifice, defy, race, or break something, never merely witness, observe, or learn. At least one scene per session forces a choice that costs the party something and cannot be undone. The opposition acts on its own clock, name a pressure that visibly worsens while the Fell delay, and let scenes show that cost. Give the central antagonist a specific, defensible belief, stated plainly in the final act's purpose, never generic evil. The last scene of the adventure poses a hard choice with a real price, not a clean victory. Avoid generic fantasy compound names.";
}
/* parse the TITLE/ACT/SESSION/SCENE line format into the skeleton shape */
function parseSkeleton(text){
  var lines=text.split(/\r?\n/), sk={name:"",acts:[]}, act=null, sess=null;
  function split(rest){ var i=rest.indexOf("|"); return i<0?[rest.trim(),""]:[rest.slice(0,i).trim(),rest.slice(i+1).trim()]; }
  lines.forEach(function(ln){
    var m=ln.match(/^\s*(TITLE|ACT|THREAT|SESSION|SCENE)\s*:\s*(.*)$/i);
    if(!m) return;
    var tag=m[1].toUpperCase(), rest=m[2];
    if(tag==="TITLE"){ sk.name=rest.trim(); }
    else if(tag==="ACT"){ var a=split(rest); act={name:a[0],purpose:a[1],threat:"",cost:"",sessions:[]}; sk.acts.push(act); sess=null; }
    else if(tag==="THREAT"){ if(act){ var th=split(rest); act.threat=th[0]; act.cost=th[1]; } }
    else if(tag==="SESSION"){ if(!act){ act={name:"Main",purpose:"",sessions:[]}; sk.acts.push(act); } var ss=split(rest); sess={name:ss[0],purpose:ss[1],scenes:[]}; act.sessions.push(sess); }
    else if(tag==="SCENE"){ if(!sess){ if(!act){ act={name:"Main",purpose:"",sessions:[]}; sk.acts.push(act); } sess={name:"Session 1",purpose:"",scenes:[]}; act.sessions.push(sess); } var sc=split(rest); sess.scenes.push({name:sc[0],purpose:sc[1]}); }
  });
  return sk;
}
function skeletonUserMsg(){
  var lines=["Pitch: "+S.pitch];
  if(S.premise){
    lines.push("Build the whole adventure from this premise, honor every line:");
    if(S.premise.situation) lines.push("Situation: "+S.premise.situation);
    if(S.premise.intrusion) lines.push("Intrusion: "+S.premise.intrusion);
    if(S.premise.opposition) lines.push("Opposition, use this for the act threats and the antagonist: "+S.premise.opposition);
    if(S.premise.clock) lines.push("Clock, this is what worsens while they delay: "+S.premise.clock);
    if(S.premise.cost) lines.push("Cost, the ending must demand this: "+S.premise.cost);
  }
  if(S.world) lines.push("World or Stratum: "+S.world);
  if(S.tone) lines.push("Tone: "+S.tone);
  if(S.hook) lines.push("The hook: "+S.hook);
  if(S.canon) lines.push("Canon ties: "+S.canon);
  if(S.levels) lines.push("Level range: "+S.levels);
  if(S.sessTarget) lines.push("Session count target: "+S.sessTarget);
  lines.push("Size: "+ADV_TYPES[S.type].label+" ("+ADV_TYPES[S.type].len+")");
  return lines.join("\n");
}
function draftSystem(){
  /* Delimited text, never JSON. Prose is full of quotes, apostrophes, and
     newlines that break JSON string values no matter how it is escaped, so the
     model emits marked blocks and the tool parses text. Nothing to escape. */
  return "You draft one scene of a LoreFell adventure as typed blocks for the FateWell table runner. "+voiceRules()
    +" Output plain text in this exact block format, nothing else, no JSON, no code fences:\n"
    +"@@BLOCK\ntype: <one of readaloud|dialogue|crucible|lorecheck|clue|quest|secret|beat|reminder|general>\ntitle: <short descriptive title>\nspeaker: <NPC name, dialogue blocks only, otherwise leave blank>\nbody:\n<the block text, may run several lines>\n@@END\n"
    +"Repeat that block 3 to 6 times for the scene. After the last block, if any new NPC appeared, add lines in the form:\n@@NPC\nname: <NPC name>\ndesc: <one line for the LoreMaster>\n@@END\n"
    +"Rules: every block carries a descriptive title, never a bare speaker name. One speaker per dialogue block, split exchanges into separate blocks. "
    +"Read-aloud is verbatim box text. Crucible marks a fight or hard trial. Lore Check names what a successful check reveals. Clue is a discoverable pointer. Quest is a task the party can take. Secret is for the LoreMaster only. Beat is a structural turn. Reminder is a table nudge. Note is anything else. "
    +"Craft rules for the table. Every scene contains either a decision the players make or an opposing force pushing on them, information alone is never a scene. Read-alouds run three sentences or fewer, concrete and sensory, ending on motion or wrongness, never describing what the party feels. NPCs in dialogue want something from the Fell and fear something, let both show in their words. A clue costs something to obtain, name the cost in the block. A crucible states what is lost by fleeing or gained past the fight itself. A secret tells the LoreMaster the plain truth in one or two lines. The final block of the scene lands on a hook, a threat advancing, or a choice left open, never a tidy close. "
    +"Player characters never appear in the module, it runs cold for any LoreMaster. Never place questions, options, or notes to the author inside any block.";
}
/* parse the delimited block format into {entries, npcs} */
function parseBlocks(text){
  var entries=[], npcs=[];
  var chunks=text.split(/@@BLOCK|@@NPC/);
  var markers=text.match(/@@BLOCK|@@NPC/g)||[];
  for(var i=1;i<chunks.length;i++){
    var isNpc=(markers[i-1]==="@@NPC");
    var body=chunks[i].split("@@END")[0];
    var lines=body.split(/\r?\n/);
    var rec={}, key=null, bodyLines=[], inBody=false;
    for(var j=0;j<lines.length;j++){
      var ln=lines[j];
      if(inBody){ bodyLines.push(ln); continue; }
      var m=ln.match(/^(type|title|speaker|name|desc|body)\s*:\s*(.*)$/i);
      if(m){
        key=m[1].toLowerCase();
        if(key==="body"){ inBody=true; if(m[2]) bodyLines.push(m[2]); }
        else rec[key]=m[2].trim();
      }
    }
    rec.body=bodyLines.join("\n").trim();
    if(isNpc){ if(rec.name) npcs.push({name:rec.name,desc:rec.desc||""}); }
    else if(rec.type||rec.body){
      entries.push({ type:(rec.type||"general").toLowerCase(), title:rec.title||"", body:rec.body||"", speaker:rec.speaker||"" });
    }
  }
  return { entries:entries, npcs:npcs };
}
function sceneUserMsg(a,si,ci,redline){
  var act=S.skeleton.acts[a], sess=act.sessions[si], scene=sess.scenes[ci];
  var lines=["Adventure: "+S.skeleton.name,"Pitch: "+S.pitch,"Size: "+ADV_TYPES[S.type].label];
  if(S.world) lines.push("World or Stratum: "+S.world);
  if(S.tone) lines.push("Tone: "+S.tone);
  lines.push("Act: "+act.name+" ("+act.purpose+")");
  if(act.threat) lines.push("The opposition in this act: "+act.threat+(act.cost?(". At stake: "+act.cost):"")+". Keep it pressing on the Fell.");
  lines.push("Session: "+sess.name+" ("+sess.purpose+")");
  lines.push("Where this scene sits: scene "+(ci+1)+" of "+sess.scenes.length+".");
  lines.push("Draft only this scene: "+scene.name+" ("+scene.purpose+")");
  var known=Object.keys(S.npcs);
  if(known.length) lines.push("Known NPCs so far, reuse them where natural: "+known.join(", "));
  if(ci===0) lines.push("This opens the session, lead with a readaloud.");
  if(redline) lines.push("The LoreMaster's redline on the session, honor it fully: "+redline);
  lines.push("Give this scene 3 to 6 blocks.");
  return lines.join("\n");
}

/* ============ flow rendering ============ */
function renderSteps(){
  var idx=STEPS.indexOf(S.step), h="";
  STEPS.forEach(function(st,i){
    h+='<span class="step'+(i===idx?" on":i<idx?" done":"")+'">'+STEP_LABELS[st]+"</span>";
  });
  $("steps").innerHTML=h;
}
function scrollTop(){
  /* scroll every surface that might be the scroller: the iframe window, its
     document root, the body, and the parent page via the bridge. Also drop an
     anchor at the top of the stage and focus it so the browser jumps there even
     when the embed height is fixed by Wix. */
  try{ window.scrollTo(0,0); }catch(e){}
  try{ document.documentElement.scrollTop=0; document.body.scrollTop=0; }catch(e){}
  try{
    var top=document.getElementById("topAnchor");
    if(top&&top.scrollIntoView) top.scrollIntoView({block:"start"});
  }catch(e){}
  if(window.parent&&window.parent!==window){
    window.parent.postMessage({type:"SAGA_SCROLLTOP"},"*");
  }
}
function go(step){ S.step=step; save(); render(); scrollTop(); }
function render(){
  renderSteps();
  var st=$("stage");
  if(S.step==="pitch") st.innerHTML=vPitch();
  else if(S.step==="scope") st.innerHTML=vScope();
  else if(S.step==="premise") st.innerHTML=vPremise();
  else if(S.step==="skeleton") st.innerHTML=vSkeleton();
  else if(S.step==="draft") st.innerHTML=vDraft();
  else st.innerHTML=vExport();
}

/* ---- pitch ---- */
function vPitch(){
  return '<div class="card">'
    +'<label class="fld">The pitch</label>'
    +'<textarea id="pitch" placeholder="The idea in a sentence or a paragraph. A rumor, a wound in the world, a door that should have stayed shut.">'+esc(S.pitch)+'</textarea>'
    +'<div class="hint">One idea is enough. The forge asks for the rest.</div>'
    +'<div class="btnrow"><button class="btn gold" onclick="fromPitch()">Continue</button>'
    +(S.skeleton?'<button class="btn ghost" onclick="go(\'skeleton\')">Back to the skeleton</button>':'')
    +'<button class="btn ghost" onclick="resetAll()">Start over</button></div>'
    +'</div>';
}
function fromPitch(){

/* ---- premise: five lines that define the storyline before any structure ---- */
function premiseSystem(){
  return "You sharpen a LoreFell adventure premise into five lines. LoreFell is a dark and weird fantasy TTRPG. Conflict and story come first. "+voiceRules()
    +" Output plain text only, no JSON, no code fences, exactly these five lines:\n"
    +"SITUATION: <the world before the Fell arrive, one sentence, present tense, already wrong>\n"
    +"INTRUSION: <the specific event that pulls the Fell in, not the general problem>\n"
    +"OPPOSITION: <who wants the situation to continue and why they are right from where they stand>\n"
    +"CLOCK: <what visibly worsens while the Fell hesitate>\n"
    +"COST: <what winning will demand of the Fell>\n"
    +"Make the opposition defensible, never generic evil. Make the cost real, victory is never free. Be concrete and specific, name things.";
}
function premiseUserMsg(){
  var lines=["Pitch: "+S.pitch,"Size: "+ADV_TYPES[S.type].label];
  if(S.world) lines.push("World or Stratum: "+S.world);
  if(S.tone) lines.push("Tone: "+S.tone);
  if(S.hook) lines.push("The hook they gave: "+S.hook);
  if(S.canon) lines.push("Canon ties: "+S.canon);
  return lines.join("\n");
}
function parsePremise(text){
  var pr={situation:"",intrusion:"",opposition:"",clock:"",cost:""};
  text.split(/\r?\n/).forEach(function(ln){
    var m=ln.match(/^\s*(SITUATION|INTRUSION|OPPOSITION|CLOCK|COST)\s*:\s*(.*)$/i);
    if(m) pr[m[1].toLowerCase()]=m[2].trim();
  });
  return pr;
}
function sagaProbe(){
  $("stage").innerHTML='<div class="card wait"><span class="spin"></span>Testing the forge link.</div>';
  aiCall("Reply with the single word ready.",[{role:"user",content:"ping"}],20)
    .then(function(t){ $("stage").innerHTML='<div class="card"><div class="oklist">Link works. The forge replied: '+esc((t||"").slice(0,40))+'</div><div class="btnrow"><button class="btn gold" onclick="forgePremise()">Continue</button></div></div>'; })
    .catch(function(e){ $("stage").innerHTML='<div class="card"><div class="err">Even a tiny call failed: '+esc((e&&e.message)||String(e))+'</div><div class="btnrow"><button class="btn ghost" onclick="go(\'scope\')">Back</button></div></div>'; });
}
function forgePremise(){
  $("stage").innerHTML='<div class="card wait"><span class="spin"></span>Sharpening the premise. The storyline before the structure.</div>';
  var retried=false;
  function ask(extra){ return aiCall(premiseSystem(),[{role:"user",content:premiseUserMsg()+(extra||"")}],450); }
  function handle(text){
    var pr=parsePremise(text);
    var filled=pr.situation&&pr.opposition&&pr.cost;
    if(!filled){
      if(!retried){ retried=true; return ask("\nUse the exact SITUATION, INTRUSION, OPPOSITION, CLOCK, COST line format, all five present.").then(handle,fail); }
      throw new Error("The premise came back thin.");
    }
    S.premise=pr; save(); go("premise");
  }
  function fail(e){
    $("stage").innerHTML='<div class="card"><div class="err">'+esc((e&&e.message)||"The forge could not be reached.")+'</div>'
      +'<div class="btnrow"><button class="btn gold" onclick="forgePremise()">Try again</button>'
      +'<button class="btn ghost" onclick="go(\'scope\')">Back</button></div></div>';
  }
  ask("").then(handle,fail);
}

    +'<button class="btn gold" onclick="fromPremise()">Forge the skeleton</button>'
    +'<button class="btn ghost" onclick="forgePremise()">Sharpen it again</button>'

    +'</div>';
}

/* ---- skeleton ---- */
function forgeSkeleton(){
  // Two phases, each a small fast call that stays under the Wix web-method wall.
  // Phase 1: the act spine with threats. Phase 2: one call per act for its
  // sessions and scenes. This avoids the single large 3500-token call that 504s.
  $("stage").innerHTML='<div class="card wait"><span class="spin"></span>Forging the act spine.</div>';
  var t=ADV_TYPES[S.type];
  function spineSystem(){
    return "You outline the act spine of a LoreFell adventure, a dark and weird fantasy TTRPG. Conflict first, a struggle the Fell can lose. "+voiceRules()
      +" Output plain text only, this exact format:\n"
      +"TITLE: <adventure name>\n"
      +"ACT: <act name> | <one line purpose>\n"
      +"THREAT: <who or what opposes the Fell this act> | <what they stand to lose>\n"
      +"Every ACT is followed by its THREAT. "
      +(t.acts?"Use 2 or 3 acts.":"Use exactly one act named Main.")
      +" The antagonist holds a specific defensible belief, stated plainly in the final act. Avoid generic fantasy compound names. Do not write sessions or scenes yet.";
  }
  function actSystem(){
    return "You flesh out one act of a LoreFell adventure into sessions and scenes. Conflict first. "+voiceRules()
      +" Output plain text only, this exact format:\n"
      +"SESSION: <session name> | <one line purpose>\n"
      +"SCENE: <scene name> | <one line purpose>\n"
      +"List each session, then its scenes under it. "
      +(t.oneSession?"Use exactly one session with 2 to 4 scenes.":"Give this act 2 to 4 sessions, each with 2 to 4 scenes.")
      +" Scene purposes take active verbs, the Fell decide, confront, sacrifice, defy, race, or break something, never merely witness or learn. At least one scene per session forces an irreversible choice that costs the party. Show the act threat pressing on the Fell. Avoid generic fantasy compound names.";
  }
  function actUserMsg(a){
    var lines=[];
    if(S.premise){
      if(S.premise.situation) lines.push("Situation: "+S.premise.situation);
      if(S.premise.clock) lines.push("Clock: "+S.premise.clock);
      if(S.premise.cost) lines.push("Cost the ending must demand: "+S.premise.cost);
    }
    lines.push("Adventure: "+S.skeleton.name);
    lines.push("This act: "+a.name+" ("+a.purpose+")");
    if(a.threat) lines.push("Its threat: "+a.threat+(a.cost?(". At stake: "+a.cost):""));
    lines.push("Write only this act's sessions and scenes.");
    return lines.join("\n");
  }

  var spineRetried=false;
  function spineAsk(extra){ return aiCall(spineSystem(),[{role:"user",content:skeletonUserMsg()+(extra||"")}],600); }
  function spineHandle(text){
    var sk=parseSkeleton(text);
    if(!sk.acts.length){
      if(!spineRetried){ spineRetried=true; return spineAsk("\nUse the exact TITLE, ACT, THREAT format, at least one ACT.").then(spineHandle,skFail); }
      throw new Error("The spine came back hollow.");
    }
    S.skeleton=sk; S.drafts={}; S.approved={}; S.npcs={}; S.cursor={a:0,s:0};
    fleshAct(0);
  }
  function fleshAct(i){
    if(i>=S.skeleton.acts.length){
      // prune any trailing scene fragment with no end punctuation
      S.skeleton.acts.forEach(function(a){ a.sessions.forEach(function(ss){
        var last=ss.scenes[ss.scenes.length-1];
        if(last && last.purpose && !/[.!?)\]"]$/.test(last.purpose.trim()) && ss.scenes.length>1){ ss.scenes.pop(); }
      }); });
      save(); go("skeleton"); return;
    }
    var a=S.skeleton.acts[i];
    $("stage").innerHTML='<div class="card wait"><span class="spin"></span>Building '+esc(a.name)+', act '+(i+1)+' of '+S.skeleton.acts.length+'.</div>';
    var actRetried=false;
    function actAsk(extra){ return aiCall(actSystem(),[{role:"user",content:actUserMsg(a)+(extra||"")}],1200); }
    function actHandle(text){
      var parsed=parseSkeleton("ACT: "+a.name+" | "+a.purpose+"\n"+text);
      var built=parsed.acts[0];
      if(!built || !built.sessions.length){
        if(!actRetried){ actRetried=true; return actAsk("\nUse the exact SESSION and SCENE format, at least one SESSION with SCENEs.").then(actHandle,skFail); }
        throw new Error("An act came back without sessions.");
      }
      a.sessions=built.sessions;
      save();
      fleshAct(i+1);
    }
    actAsk("").then(actHandle,skFail);
  }
  function skFail(e){
    $("stage").innerHTML='<div class="card"><div class="err">'+esc(e&&e.rate?"The forge is catching its breath. Try again in a minute.":(e&&e.message)||"The forge could not be reached.")+'</div>'
      +'<div class="btnrow"><button class="btn gold" onclick="forgeSkeleton()">Try again</button>'
      +'<button class="btn ghost" onclick="go(\'scope\')">Back</button></div></div>';
  }
  spineAsk("").then(spineHandle,skFail);
}
function vSkeleton(){
  var sk=S.skeleton;
  if(!sk) return '<div class="card"><div class="err">No skeleton yet.</div><div class="btnrow"><button class="btn gold" onclick="go(\'scope\')">Back to scope</button></div></div>';
  var h='<div class="card">'
    +'<label class="fld">Adventure name</label>'
    +'<div class="sk-name" style="font-size:1.05rem" contenteditable data-path="name">'+esc(sk.name||"")+'</div>'
    +'<div class="hint">Tap any name or purpose to edit it. Nothing is drafted until this is approved.</div>';
  sk.acts.forEach(function(a,ai){
    h+='<div class="sk-act">'

      +'<div class="sk-purpose" contenteditable data-path="a'+ai+'p">'+esc(a.purpose||"")+'</div>'
      +'<div class="sk-purpose"><span style="color:var(--gold)">Threat</span> <span contenteditable data-path="a'+ai+'t">'+esc(a.threat||"")+'</span></div>'
      +'<div class="sk-purpose"><span style="color:var(--gold)">At stake</span> <span contenteditable data-path="a'+ai+'c">'+esc(a.cost||"")+'</span></div>';
    (a.sessions||[]).forEach(function(ss,si){
      h+='<div class="sk-sess">'
        +'<div class="sk-name" contenteditable data-path="a'+ai+'s'+si+'n">'+esc(ss.name)+'</div>'
        +'<div class="sk-purpose" contenteditable data-path="a'+ai+'s'+si+'p">'+esc(ss.purpose||"")+'</div>';
      (ss.scenes||[]).forEach(function(sc,ci){
        h+='<div class="sk-scene">'
          +'<div class="sk-name" contenteditable data-path="a'+ai+'s'+si+'c'+ci+'n">'+esc(sc.name)+'</div>'
          +'<div class="sk-purpose" contenteditable data-path="a'+ai+'s'+si+'c'+ci+'p">'+esc(sc.purpose||"")+'</div></div>';
      });
      h+='</div>';
    });
    h+='</div>';
  });
  h+='<div class="btnrow">'
    +'<button class="btn gold" onclick="approveSkeleton()">Approve, start drafting</button>'
    +'<button class="btn ghost" onclick="forgeSkeleton()">Forge it again</button>'
    +'<button class="btn ghost" onclick="go(\'scope\')">Back to scope</button></div>'
    +'</div>';
  return h;
}
function harvestSkeletonEdits(){
  document.querySelectorAll("[contenteditable][data-path]").forEach(function(el){
    var p=el.getAttribute("data-path"), v=el.textContent.trim();
    if(p==="name"){ S.skeleton.name=v; return; }
    var m=p.match(/^a(\d+)(?:s(\d+))?(?:c(\d+))?([nptc])$/); if(!m) return;
    var a=S.skeleton.acts[+m[1]]; if(!a) return;
    var node=a;
    if(m[2]!==undefined&&m[2]!==null&&m[2]!==""){ node=a.sessions[+m[2]]; if(!node) return; }
    if(m[3]!==undefined&&m[3]!==null&&m[3]!==""){ node=node.scenes[+m[3]]; if(!node) return; }
    if(m[4]==="n") node.name=v;
    else if(m[4]==="t") node.threat=v;
    else if(m[4]==="c") node.cost=v;
    else node.purpose=v;
  });
}
function approveSkeleton(){
  harvestSkeletonEdits();
  S.cursor={a:0,s:0};
  save();
  go("draft");
  draftCurrent();
}

/* ---- drafting ---- */
function curKey(){ return S.cursor.a+"-"+S.cursor.s; }
function totalSessions(){ var n=0; S.skeleton.acts.forEach(function(a){ n+=(a.sessions||[]).length; }); return n; }
function doneSessions(){ return Object.keys(S.approved).length; }
function nextUnapproved(){
  for(var a=0;a<S.skeleton.acts.length;a++){
    var ss=S.skeleton.acts[a].sessions||[];
    for(var s=0;s<ss.length;s++){ if(!S.approved[a+"-"+s]) return {a:a,s:s}; }
  }
  return null;
}
function draftCurrent(redline){
  /* Draft the session one scene at a time. Small sequential calls stay well under
     the Wix web module timeout, which a single large session call was blowing (504). */
  var a=S.cursor.a, si=S.cursor.s;
  var sess=S.skeleton.acts[a].sessions[si];
  var built={scenes:[], flags:[]};
  var total=sess.scenes.length;
  function drawScene(ci){
    if(ci>=total){
      S.drafts[curKey()]={scenes:built.scenes,flags:built.flags};
      save(); render(); scrollTop();
      return;
    }
    $("stage").innerHTML='<div class="card wait"><span class="spin"></span>Drafting '+esc(sess.name)+', scene '+(ci+1)+' of '+total+'. '+esc(sess.scenes[ci].name)+'.</div>';
    var jsonRetried=false;
    function ask(extra){
      var msg=sceneUserMsg(a,si,ci,redline)+(extra||"");
      return aiCall(draftSystem(),[{role:"user",content:msg}],1100);
    }
    function handle(text){
      var d=parseBlocks(text);
      if(!d.entries.length){
        if(!jsonRetried){ jsonRetried=true; return ask("\nUse the exact @@BLOCK format. Each block starts with @@BLOCK and ends with @@END.").then(handle,failScene); }
        throw new Error("The forge returned nothing readable for this scene.");
      }
      var entries=d.entries;
      var scene={name:sess.scenes[ci].name, entries:entries};
      var hits=[];
      entries.forEach(function(e){ scrubHits((e.title||"")+" "+(e.body||"")).forEach(function(h){ if(hits.indexOf(h)<0) hits.push(h); }); });
      scene.entries=entries;
      built.scenes.push(scene);
      hits.forEach(function(h){ if(built.flags.indexOf(h)<0) built.flags.push(h); });
      (d.npcs||[]).forEach(function(n){ if(n&&n.name&&!S.npcs[n.name]) S.npcs[n.name]=n.desc||""; });
      save();
      drawScene(ci+1);
    }
    function failScene(e){
      var msg=e&&e.rate?"The forge is catching its breath. Try again in a minute.":(e&&e.message)||"The forge could not be reached.";
      $("stage").innerHTML='<div class="card"><div class="err">Scene '+(ci+1)+' of '+total+': '+esc(msg)+'</div>'
        +'<div class="btnrow"><button class="btn gold" onclick="resumeDraft('+ci+')">Try this scene again</button>'
        +'<button class="btn ghost" onclick="go(\'skeleton\')">Back to the skeleton</button></div></div>';
      window._resume={a:a,si:si,built:built,redline:redline,drawScene:drawScene};
    }
    ask("").then(handle,failScene);
  }
  drawScene(0);
}
function resumeDraft(ci){
  var r=window._resume; if(!r){ draftCurrent(); return; }
  r.drawScene(ci);
}
function vDraft(){
  var a=S.cursor.a, si=S.cursor.s;
  var sess=S.skeleton.acts[a].sessions[si];
  var d=S.drafts[curKey()];
  var h='<div class="card">'
    +'<div class="sess-nav"><span class="where">'+esc(S.skeleton.acts[a].name)+' \u00b7 '+esc(sess.name)+'</span>'
    +'<span class="hint">'+doneSessions()+' of '+totalSessions()+' approved</span></div>';
  if(!d){
    h+='<div class="btnrow"><button class="btn gold" onclick="draftCurrent()">Draft this session</button>'
      +'<button class="btn ghost" onclick="go(\'skeleton\')">Back to the skeleton</button></div></div>';
    return h;
  }
  if(d.flags&&d.flags.length){
    h+='<div class="flag">This draft carries '+esc(d.flags.join(", "))+'. Redline to clear it, or approve with care.</div>';
  }
  d.scenes.forEach(function(sc){
    h+='<div class="scene-h">'+esc(sc.name)+'</div>';
    (sc.entries||[]).forEach(function(e){
      h+='<div class="blk"><div class="blk-h"><span class="blk-t">'+esc(BLOCK_LABELS[e.type]||"Note")+'</span>'
        +'<span class="blk-title">'+esc(e.title||"")+'</span></div>'
        +'<div class="blk-b">'+(e.speaker?'<span class="blk-sp">'+esc(e.speaker)+':</span> ':"")+esc(e.body||"")+'</div></div>';
    });
  });
  h+='<label class="fld">Redline (optional)</label>'
    +'<textarea id="redline" placeholder="What to change. The forge redrafts this session with your notes honored."></textarea>'
    +'<div class="btnrow">'
    +'<button class="btn gold" onclick="approveSession()">Approve this session</button>'
    +'<button class="btn" onclick="redraft()">Redraft with the redline</button>'
    +'<button class="btn ghost" onclick="go(\'skeleton\')">Back to the skeleton</button></div>'
    +'</div>';
  return h;
}
function redraft(){
  var r=($("redline")||{}).value||"";
  if(!r.trim()){ alert("Write the redline first."); return; }

}
function approveSession(){
  S.approved[curKey()]=true;

function buildPack(){
  var npcRows=Object.keys(S.npcs).map(function(n){
    return { id:uid(), type:"npc", name:n, desc:S.npcs[n]||"", notes:"", img:"" };
  });
  var npcByName={}; npcRows.forEach(function(r){ npcByName[r.name]=r.id; });
  function entryRow(e){
    var row={ id:uid(), title:e.title||"", type:(BLOCK_TYPES.indexOf(e.type)>=0?e.type:"general"), body:e.body||"", pinned:false, open:false };
    if(e.type==="dialogue"&&e.speaker&&npcByName[e.speaker]) row.speaker=npcByName[e.speaker];
    else if(e.speaker) row.body=e.speaker+": "+row.body;
    return row;
  }
  var acts=S.skeleton.acts.map(function(a,ai){
    return {
      id:uid(), name:a.name, notes:"", img:"", desc:a.purpose||"",
      implicit:!ADV_TYPES[S.type].acts,
      entries:[], manualRefs:[],
      sessions:(a.sessions||[]).map(function(ss,si){
        var d=S.drafts[ai+"-"+si]||{scenes:[]};
        return {
          id:uid(), name:ss.name, notes:"", img:"", desc:ss.purpose||"", entries:[], manualRefs:[],
          scenes:(ss.scenes||[]).map(function(sc,ci){
            var ds=(d.scenes||[])[ci]||{entries:[]};
            return { id:uid(), name:sc.name, notes:"", img:"", desc:sc.purpose||"",
              entries:(ds.entries||[]).map(entryRow), manualRefs:[] };
          })
        };
      })
    };
  });
  return {
    meta:{ format:"lorefell-adventure-pack-1", forge:"sagaforge" },
    npcs:npcRows,
    campaign:{
      id:uid(), name:S.skeleton.name||"Forged adventure", type:S.type||"story",
      notes:"", img:"", desc:S.pitch||"", entries:[], manualRefs:[], acts:acts
    }
  };
}
function downloadFile(name, text, mime){
  var b=new Blob([text],{type:mime||"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(b); a.download=name;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },500);
}
function slug(t){ return String(t||"adventure").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""); }
function downloadPack(){
  downloadFile(slug(S.skeleton.name)+".lorefell-pack.json", JSON.stringify(buildPack(),null,1), "application/json");
}
function downloadMarkdown(){
  var L=[];
  L.push("# "+(S.skeleton.name||"Forged adventure"));
  L.push("");
  L.push("Size: "+ADV_TYPES[S.type].label+(S.world?(". World: "+S.world):"")+(S.levels?(". Levels "+S.levels):""));
  L.push("");
  S.skeleton.acts.forEach(function(a,ai){
    if(ADV_TYPES[S.type].acts){ L.push("## "+a.name); if(a.purpose) L.push("_"+a.purpose+"_"); L.push(""); }
    (a.sessions||[]).forEach(function(ss,si){
      L.push("### "+ss.name); if(ss.purpose) L.push("_"+ss.purpose+"_"); L.push("");
      var d=S.drafts[ai+"-"+si]||{scenes:[]};
      (ss.scenes||[]).forEach(function(sc,ci){
        L.push("#### "+sc.name); L.push("");
        var ds=(d.scenes||[])[ci]||{entries:[]};
        (ds.entries||[]).forEach(function(e){
          L.push("**["+(BLOCK_LABELS[e.type]||"Note")+"] "+(e.title||"")+"**");
          L.push("");
          L.push((e.speaker?e.speaker+": ":"")+(e.body||""));
          L.push("");
        });
      });
    });
  });
  if(Object.keys(S.npcs).length){
    L.push("## The cast"); L.push("");
    Object.keys(S.npcs).forEach(function(n){ L.push("**"+n+"**. "+(S.npcs[n]||"")); L.push(""); });
  }
  downloadFile(slug(S.skeleton.name)+".md", L.join("\n"), "text/markdown");
}
function printModule(){
  var host=$("printBody"); if(!host) return;
  var h='<h1 style="font-family:\'Cinzel Decorative\',serif">'+esc(S.skeleton.name||"Forged adventure")+'</h1>';
  S.skeleton.acts.forEach(function(a,ai){
    if(ADV_TYPES[S.type].acts) h+='<h2>'+esc(a.name)+'</h2><div class="sk-purpose">'+esc(a.purpose||"")+'</div>';
    (a.sessions||[]).forEach(function(ss,si){
      h+='<h3>'+esc(ss.name)+'</h3><div class="sk-purpose">'+esc(ss.purpose||"")+'</div>';
      var d=S.drafts[ai+"-"+si]||{scenes:[]};
      (ss.scenes||[]).forEach(function(sc,ci){
        h+='<div class="scene-h">'+esc(sc.name)+'</div>';
        var ds=(d.scenes||[])[ci]||{entries:[]};
        (ds.entries||[]).forEach(function(e){
          h+='<div class="blk"><div class="blk-h"><span class="blk-t">'+esc(BLOCK_LABELS[e.type]||"Note")+'</span>'
            +'<span class="blk-title">'+esc(e.title||"")+'</span></div>'
            +'<div class="blk-b">'+(e.speaker?'<span class="blk-sp">'+esc(e.speaker)+':</span> ':"")+esc(e.body||"")+'</div></div>';
        });
      });
    });
  });
  host.innerHTML=h;
  window.print();
  setTimeout(function(){ host.innerHTML=""; },800);
}

/* ============ height bridge ============ */
function reportHeight(){
  if(window.parent&&window.parent!==window){
    window.parent.postMessage({type:"SAGA_HEIGHT",height:document.body.scrollHeight+40},"*");
  }
}
new MutationObserver(function(){ reportHeight(); }).observe(document.body,{childList:true,subtree:true});

render();
reportHeight();
</script>
</body>
</html>
