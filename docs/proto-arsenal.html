<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LoreFell Arsenal Cards, a prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a0e1a; --panel:#10162a; --panel2:#0d1322;
  --silver:#dce8ef; --ice:#b8ccd8; --gold:#c9a84c; --muted:#7e8a99;
  --ember:#c96a5a; --line:rgba(184,204,216,.16); --goldline:rgba(201,168,76,.4);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--navy); color:var(--silver); font-family:'Crimson Pro',serif; }
button{ font:inherit; color:inherit; background:none; border:none; cursor:pointer; }

.proto-tag{ text-align:center; font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); padding:10px 12px 0; }

/* ---- head: the player and the charge fixture ---- */
.hand-head{ padding:14px 16px 6px; max-width:960px; margin:0 auto; }
.hh-kick{ font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); }
.hh-name{ font-family:'Cinzel Decorative',serif; font-size:1.5rem; line-height:1.2; margin:2px 0 1px; }
.hh-sub{ color:var(--ice); font-size:.95rem; }
.charge-fix{ display:flex; align-items:center; gap:14px; margin:14px 0 4px; padding:10px 14px; border:1px solid var(--goldline); border-radius:10px; background:linear-gradient(180deg, rgba(201,168,76,.06), transparent); }
.cf-l{ font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; color:var(--ice); }
.cf-pips{ display:flex; gap:10px; }
.cf-pip{ width:26px; height:26px; border-radius:50%; border:1px solid var(--goldline); position:relative; transition:box-shadow .25s ease, background .25s ease; }
.cf-pip.on{ background:radial-gradient(circle at 40% 35%, #e8cf8a, var(--gold) 70%); box-shadow:0 0 12px rgba(201,168,76,.5); }
.cf-hint{ margin-left:auto; color:var(--muted); font-size:.85rem; font-style:italic; }

/* ---- rails ---- */
.rail{ max-width:960px; margin:0 auto; padding:10px 0 4px; }
.rail-h{ font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.2em; text-transform:uppercase; color:var(--ice); padding:0 16px 8px; display:flex; align-items:center; gap:10px; }
.rail-h::after{ content:''; flex:1; height:1px; background:var(--line); }
.rail-scroll{ display:flex; gap:12px; overflow-x:auto; padding:2px 16px 14px; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; }
.rail-scroll::-webkit-scrollbar{ height:6px; }
.rail-scroll::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }

/* ---- the card ---- */
.card{ position:relative; flex:0 0 238px; scroll-snap-align:start; text-align:left;
  background:linear-gradient(180deg, var(--panel), var(--panel2));
  border:1px solid var(--goldline); border-radius:12px; overflow:hidden;
  display:flex; transition:opacity .35s ease, filter .35s ease; }
.card .tier-rail{ width:22px; flex:none; display:flex; flex-direction:column; align-items:center; gap:7px; padding-top:12px;
  background:rgba(10,14,26,.55); border-right:1px solid var(--line); }
.tr-pip{ width:9px; height:9px; border-radius:50%; border:1px solid var(--goldline); transition:background .3s ease, box-shadow .3s ease; }
.tr-pip.on{ background:var(--gold); box-shadow:0 0 6px rgba(201,168,76,.55); }
.card-in{ flex:1; min-width:0; display:flex; flex-direction:column; }
.art{ height:86px; position:relative; display:grid; place-items:center; border-bottom:1px solid var(--goldline);
  background:radial-gradient(120px 70px at 50% 20%, rgba(184,204,216,.14), transparent), linear-gradient(180deg,#141c33,#0c1122); }
.art .glyph{ font-size:2rem; color:var(--ice); opacity:.85; text-shadow:0 0 14px rgba(184,204,216,.3); }
.art .src{ position:absolute; right:6px; bottom:5px; font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); border:1px solid var(--line); border-radius:5px; padding:2px 6px; background:rgba(10,14,26,.7); }
.c-kick{ font-family:'Cinzel',serif; font-size:.56rem; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); padding:9px 11px 0; }
.c-name{ font-family:'Cinzel',serif; font-weight:600; font-size:1.02rem; color:var(--silver); padding:2px 11px 0; }
.c-body{ padding:6px 11px 10px; font-size:.9rem; line-height:1.42; color:var(--ice); flex:1; }
.c-dmg{ padding:0 11px 8px; font-size:.82rem; color:var(--silver); }
.c-dmg b{ color:var(--gold); font-weight:600; }
.c-foot{ border-top:1px solid var(--line); padding:7px 11px 9px; font-size:.78rem; color:var(--muted); }
.c-foot .warm{ color:var(--ember); }
.c-foot .good{ color:#9ec98f; }

/* locked and special states */
.card.locked{ opacity:.42; filter:grayscale(.55); }
.card.locked .locknote{ position:absolute; inset:auto 0 0 22px; padding:6px 11px; background:rgba(10,14,26,.85);
  font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ember); border-top:1px solid var(--line); }
.card.active{ border-color:var(--gold); box-shadow:0 0 0 1px rgba(201,168,76,.35), 0 0 18px rgba(201,168,76,.18); }
.card.active .c-kick::after{ content:' \00b7 worn'; color:var(--ice); }
@media (prefers-reduced-motion: no-preference){
  .card.active{ animation:emberpulse 3.4s ease-in-out infinite; }
  @keyframes emberpulse{ 50%{ box-shadow:0 0 0 1px rgba(201,168,76,.5), 0 0 26px rgba(201,168,76,.28); } }
}

/* stance rows and aspect stages: pips continue the meter's language */
.stage{ display:flex; gap:8px; align-items:flex-start; padding:3px 0; color:var(--muted); transition:color .3s ease; }
.stage .sp{ width:9px; height:9px; border-radius:50%; border:1px solid var(--goldline); margin-top:5px; flex:none; transition:background .3s ease, box-shadow .3s ease; }
.stage.lit{ color:var(--ice); }
.stage.lit .sp{ background:var(--gold); box-shadow:0 0 6px rgba(201,168,76,.55); }
.stage .st-k{ font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:inherit; min-width:52px; padding-top:2px; }
.stage .st-t{ flex:1; font-size:.86rem; line-height:1.35; }
.stage.pick .st-k::after{ content:' \2713'; color:var(--gold); }

.switchbtn{ display:block; width:100%; text-align:center; font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ice);
  border-top:1px solid var(--goldline); padding:9px 0; background:rgba(201,168,76,.05); }
.switchbtn:hover{ color:var(--gold); }

.wide{ flex-basis:340px; }

/* ---- zoom overlay ---- */
.zoom{ position:fixed; inset:0; background:rgba(6,9,17,.86); display:none; place-items:center; padding:20px; z-index:40; }
.zoom.open{ display:grid; }
.zoom .z-card{ max-width:420px; width:100%; }
.zoom .z-card .card{ flex-basis:auto; width:100%; }
.z-src{ margin-top:10px; font-size:.84rem; color:var(--muted); line-height:1.45; text-align:center; }
.z-src b{ color:var(--ice); font-weight:600; }
.z-close{ display:block; margin:12px auto 0; font-family:'Cinzel',serif; font-size:.66rem; letter-spacing:.16em; text-transform:uppercase; color:var(--ice); border:1px solid var(--line); border-radius:8px; padding:8px 18px; }

.footnote{ max-width:960px; margin:0 auto; padding:6px 16px 30px; color:var(--muted); font-size:.84rem; line-height:1.5; }
</style>
</head>
<body>
<div class="proto-tag">Prototype. Not wired to FateWell.</div>
<div id="app"></div>
<div class="zoom" id="zoom" onclick="closeZoom()"></div>

<script>
var S = { charge:1, stance:'Stalwart' };

var WEAPON = { name:'Hatchet', stat:'Power', bonus:3 };
var ABILITIES = [
  { tier:0, name:'Basic Attack', glyph:'&#9876;', body:'Swing the hatchet. Precision against the target\u2019s Evasion.',
    dmg:'<b>Base</b> 1 + Power to Vitality \u00b7 <b>Bonus</b> 3 vs Durability', foot:'Lands to light Charge 1.', kind:'weapon' },
  { tier:1, name:'Riven Edge', glyph:'&#10022;', body:'A tearing follow-through. On a hit the wound stays open.',
    dmg:'<b>Base</b> 1 + Power to Vitality \u00b7 <b>Bonus</b> 4 vs Durability', foot:'<span class="warm">Fellmark lands Bleeding.</span> Lands to light Charge 2.', kind:'weapon' },
  { tier:2, name:'Skysplitter Arc', glyph:'&#9885;', body:'A full turning cut that catches everything in reach of the haft.',
    dmg:'<b>Base</b> 1 + Power to Vitality \u00b7 <b>Bonus</b> 5 vs Durability', foot:'<span class="warm">Fellmark lands Dislocated.</span> Lands to light Charge 3.', kind:'weapon' },
  { tier:3, name:'Last Cairn', glyph:'&#9762;', body:'Everything the meter holds, spent in one falling blow.',
    dmg:'<b>Base</b> 1 + Power to Vitality \u00b7 <b>Bonus</b> 8 vs Durability', foot:'<span class="warm">Resolves, then the meter falls to 0.</span>', kind:'weapon' },
  { tier:1, name:'Emberlash', glyph:'&#128293;', body:'A whip of coalfire. Magic skill against the Difficulty. No Evasion.',
    dmg:'<b>Base</b> 1 + Magic to Vitality \u00b7 <b>Bonus</b> 3 vs Resistance', foot:'<span class="warm">Fellmark lands Ignited.</span>', kind:'spell' }
];

var LOREBOUND = {
  name:'The Aerostrix', aspect:'Augury', glyph:'&#129413;',
  role:'Bends fortune so a Fell\u2019s strike lands true.',
  initial:'When a Fell makes an attack, that attack is a Lucky Roll.',
  branch:'The target\u2019s Evasion becomes 0 against that attack.',
  crown:'Add a second Lucky die to that attack.'
};

var STANCES = [
  { name:'Shrouded', attr:'Evasion', glyph:'&#127787;', t1:'+2 Evasion.', t2:'Incoming damage reduced by Evasion, base before bonus.', t3:'Immune to Fellstrikes.' },
  { name:'Stalwart', attr:'Durability', glyph:'&#128737;', t1:'+2 Durability.', t2:'Incoming damage reduced by Durability, base before bonus.', t3:'Immune to Fellmarks.' },
  { name:'Vestments', attr:'Resistance', glyph:'&#128367;', t1:'+2 Resistance.', t2:'Incoming damage reduced by Resistance, base before bonus.', t3:'Cannot be the target of a spell.' }
];

function tierRail(t){
  var h='<div class="tier-rail">';
  for(var i=1;i<=3;i++) h+='<span class="tr-pip'+(S.charge>=i?' on':'')+'"></span>';
  return h+'</div>';
}
function art(glyph, src){
  return '<div class="art"><span class="glyph">'+glyph+'</span><span class="src">'+src+'</span></div>';
}

function abilityCard(a, idx){
  var locked = a.tier>0 && a.tier>S.charge;
  var kick = (a.kind==='spell'?'Spell':'Weapon \u00b7 '+WEAPON.name)+' \u00b7 '+(a.tier===0?'Always ready':'Tier '+a.tier);
  return '<button class="card'+(locked?' locked':'')+'" onclick="openZoom(\'ab\','+idx+')">'
    + tierRail(a.tier)
    + '<span class="card-in">'
    + art(a.glyph, 'Creations \u00b7 img')
    + '<span class="c-kick">'+kick+'</span>'
    + '<span class="c-name">'+a.name+'</span>'
    + '<span class="c-body">'+a.body+'</span>'
    + '<span class="c-dmg">'+a.dmg+'</span>'
    + '<span class="c-foot">'+a.foot+'</span>'
    + '</span>'
    + (locked?'<span class="locknote">Needs Tier '+a.tier+' charge</span>':'')
    + '</button>';
}

function aspectStage(k, t, lit, picked){
  return '<span class="stage'+(lit?' lit':'')+(picked?' pick':'')+'"><span class="sp"></span><span class="st-k">'+k+'</span><span class="st-t">'+t+'</span></span>';
}
function loreboundCard(){
  var lb=LOREBOUND;
  return '<button class="card wide" onclick="openZoom(\'lb\',0)">'
    + tierRail(3)
    + '<span class="card-in">'
    + art(lb.glyph, 'CanonAspects \u00b7 art')
    + '<span class="c-kick">Lorebound \u00b7 React \u00b7 once per Round</span>'
    + '<span class="c-name">'+lb.name+' \u00b7 '+lb.aspect+'</span>'
    + '<span class="c-body">'+lb.role+' Charge sets how much of the Aspect resolves.'
    + '<span style="display:block;height:6px"></span>'
    + aspectStage('Initial', lb.initial, S.charge>=1, false)
    + aspectStage('Branch', lb.branch, S.charge>=2, true)
    + aspectStage('Crown', lb.crown, S.charge>=3, true)
    + '</span>'
    + '<span class="c-foot">Branch and Crown are committed leveling picks. Allies first, no self benefit before Corsair form.</span>'
    + '</span></button>';
}

function stanceCard(st, idx){
  var active = S.stance===st.name;
  return '<div class="card'+(active?' active':'')+'">'
    + tierRail(3)
    + '<span class="card-in">'
    + art(st.glyph, 'canon \u00b7 SiteAssets')
    + '<span class="c-kick">Armor Stance</span>'
    + '<span class="c-name">'+st.name+'</span>'
    + '<span class="c-body">'
    + aspectStage('Tier 1', st.t1, S.charge>=1, false)
    + aspectStage('Tier 2', st.t2, S.charge>=2, false)
    + aspectStage('Tier 3', st.t3, S.charge>=3, false)
    + '</span>'
    + (active
        ? '<span class="c-foot"><span class="good">Worn now.</span> Its lit tiers hold while the charge does.</span>'
        : '<button class="switchbtn" onclick="switchStance(\''+st.name+'\')">Switch \u00b7 spends your Act</button>')
    + '</span></div>';
}

function render(){
  var h='';
  h+='<header class="hand-head">'
    + '<div class="hh-kick">A Fell\u2019s Arsenal, dealt as cards</div>'
    + '<div class="hh-name">Billy Ravencairn</div>'
    + '<div class="hh-sub">'+WEAPON.name+' \u00b7 '+LOREBOUND.name+' \u00b7 Level 5</div>'
    + '<div class="charge-fix"><span class="cf-l">Charge</span><span class="cf-pips">';
  for(var i=1;i<=3;i++) h+='<button class="cf-pip'+(S.charge>=i?' on':'')+'" onclick="setCharge('+i+')" aria-label="Set charge '+i+'"></button>';
  h+='</span><span class="cf-hint">Tap the pips. The hand answers.</span></div></header>';

  h+='<section class="rail"><div class="rail-h">Weapon and Spell</div><div class="rail-scroll">';
  ABILITIES.forEach(function(a,i){ h+=abilityCard(a,i); });
  h+='</div></section>';

  h+='<section class="rail"><div class="rail-h">Lorebound React</div><div class="rail-scroll">'+loreboundCard()+'</div></section>';

  h+='<section class="rail"><div class="rail-h">Armor Stances</div><div class="rail-scroll">';
  STANCES.forEach(function(st,i){ h+=stanceCard(st,i); });
  h+='</div></section>';

  h+='<p class="footnote">Every plate\u2019s corner tag names the Wix collection and image field that feeds it in the real build: weapon and spell cards from SigilForge\u2019s Creations rows, the lorebound card from the CanonAspects pack, stances from canon with site art. Tap any weapon, spell, or lorebound card to raise it.</p>';

  document.getElementById('app').innerHTML=h;
}

function setCharge(n){ S.charge = (S.charge===n ? n-1 : n); render(); }
function switchStance(name){ S.stance=name; render(); }

function openZoom(kind, idx){
  var z=document.getElementById('zoom');
  var inner='', src='';
  if(kind==='ab'){
    inner=abilityCard(ABILITIES[idx], idx);
    src='In the build this card fills from a <b>Creations</b> row: creationName, tier, damage, affliction, and the row\u2019s <b>img</b> field for the plate.';
  } else {
    inner=loreboundCard();
    src='In the build this card fills from the <b>CanonAspects</b> pack: lorebound, aspect, initial, the committed branch and crown picks, and the pack\u2019s <b>art</b> field for the plate.';
  }
  z.innerHTML='<div class="z-card" onclick="event.stopPropagation()">'+inner+'<div class="z-src">'+src+'</div><button class="z-close" onclick="closeZoom()">Close</button></div>';
  z.classList.add('open');
}
function closeZoom(){ var z=document.getElementById('zoom'); z.classList.remove('open'); z.innerHTML=''; }

render();
</script>
</body>
</html>
