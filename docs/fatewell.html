function unresolvedCount(){
  var sc = curSc(), n = 0;
  sc.combatants.forEach(function(c){ if (c.act && !c.done && (c.maxVit<=0 || c.curVit > 0)) n++; });
  attendingPlayers().forEach(function(p){
    var st = pState(p.id);
    if (st.act && !st.actDone) n++;
    if (st.react && !st.reactDone) n++;
  });
  sc.battle.spots.forEach(function(s){ if(!s.done) n++; });
  return n;
}

function advanceRound(){
  var sc = curSc();
  var u = unresolvedCount();
  if (u > 0){
    askConfirm(u + ' unresolved item' + (u===1?'':'s') + ' remain. Advance the round anyway?', doAdvanceRound, 'Advance');
    return;
  }
  doAdvanceRound();
}
function doAdvanceRound(){
  var sc = curSc();
  var b = sc.battle;
  b.round++; b.phase = 'commit'; b.locked = false; b.pLocked = false; b.spots = []; b.manual = {}; b.order = [];
  sc.combatants.forEach(function(c){
    c.act = ''; c.target=''; c.done = false;
    /* afflictions persist across rounds; removed manually via Fellmark */
  });
  Object.keys(sc.ps).forEach(function(pid){
    var st = sc.ps[pid];
    st.act=''; st.react=''; st.target=''; st.actDone=false; st.reactDone=false;
    /* afflictions persist; cleared manually */
  });
  save(); render();
}

function resetBattle(){
  askConfirm('Reset the battle to round 1? Combatants stay, vitality refills, all commitments clear.', function(){
    var sc = curSc();
    sc.battle = { round:1, phase:'commit', locked:false, pLocked:false, spots:[], spotMode:sc.battle.spotMode, manual:{}, order:[] };
    sc.combatants.forEach(function(c){ c.act=''; c.target=''; c.done=false; c.affs=[]; c.curVit=c.maxVit; });
    Object.keys(sc.ps).forEach(function(pid){ sc.ps[pid] = { act:'', react:'', target:'', actDone:false, reactDone:false, affs:[] }; });
    save(); render();
  }, 'Reset');
}

function toggleLucky(pid){
  var L = curSc().loot;
  if (L.lucky[pid]) delete L.lucky[pid]; else L.lucky[pid] = true;
  save(); render();
}
function shardCap(){ return attendingPlayers().length * 2; }
function shardsFound(){
  var L = curSc().loot, t = 0;
  Object.keys(L.shards).forEach(function(k){ t += L.shards[k]; });
  return t;
}
function shardDelta(pid, d){
  var L = curSc().loot;
  var cur = L.shards[pid] || 0;
  if (d > 0 && shardsFound() >= shardCap()) return;
  L.shards[pid] = Math.max(0, cur + d);
  save(); render();
}
function rollLoot(pid){
  var L = curSc().loot;
  var die = 6;
  var a = 1 + Math.floor(Math.random()*die);
  if (L.lucky[pid]){
    var b = 1 + Math.floor(Math.random()*die);
    L.rolls[pid] = { a:a, b:b, final: Math.max(a,b) };
  } else {
    L.rolls[pid] = { a:a, b:null, final:a };
  }
  save(); render();
}
function setLootRoll(pid, val){
  var n = parseInt(val,10);
  if (isNaN(n)){ delete curSc().loot.rolls[pid]; }
  else { curSc().loot.rolls[pid] = { a:n, b:null, final:n, manual:true }; }

}

/* ---------- entity rollups ---------- */

function entitiesOfScene(sc){
  var ids = {}, extra = [];
  sc.refs.forEach(function(r){ ids[r]=true; });
  sc.combatants.forEach(function(c){
    if (c.libId && libGet(c.libId)) ids[c.libId]=true;
    else extra.push({ name:c.name, type:'monster' });
  });
  return { ids:ids, extra:extra };
}
function mergeEnt(a, b){
  Object.keys(b.ids).forEach(function(k){ a.ids[k]=true; });
  b.extra.forEach(function(x){ a.extra.push(x); });
  return a;
}
function entitiesOfSession(s){
  var acc = { ids:{}, extra:[] };
  s.scenes.forEach(function(sc){ mergeEnt(acc, entitiesOfScene(sc)); });
  return acc;
}
function entitiesOfAct(a){
  var acc = { ids:{}, extra:[] };
  a.sessions.forEach(function(s){ mergeEnt(acc, entitiesOfSession(s)); });
  return acc;
}
function entitiesOfCampaign(c){
  var acc = { ids:{}, extra:[] };
  (c.acts||[]).forEach(function(a){ mergeEnt(acc, entitiesOfAct(a)); });
  return acc;
}
/* Players who attended a given scene (by attendance map). */
function playersOfScene(sc){
  var out = {};
  Object.keys(sc.att||{}).forEach(function(pid){ if (sc.att[pid]) out[pid]=true; });
  return out;
}
function playersOfSession(s){ var o={}; s.scenes.forEach(function(sc){ var p=playersOfScene(sc); Object.keys(p).forEach(function(k){o[k]=true;}); }); return o; }
function playersOfAct(a){ var o={}; a.sessions.forEach(function(s){ var p=playersOfSession(s); Object.keys(p).forEach(function(k){o[k]=true;}); }); return o; }
function playersOfCampaign(c){ var o={}; (c.acts||[]).forEach(function(a){ var p=playersOfAct(a); Object.keys(p).forEach(function(k){o[k]=true;}); }); return o; }

/* Render attended-player chips for a level (read-only rollup). */
function playerRollupChips(idMap){
  var c = curC(); if (!c) return '<span class="muted">No players attended yet</span>';
  var list = c.players.filter(function(p){ return idMap[p.id]; });
  if (!list.length) return '<span class="muted">No players attended scenes here yet</span>';
  var h = '<div class="chips">';
  list.forEach(function(p){
    h += '<span class="chip t-player" onclick="mentionInfo(\''+p.name.replace(/\\/g,"\\\\").replace(/'/g,"\\'")+'\',\'c:'+c.id+'\')">'+esc(p.name)+' <span class="chip-lvl">Lvl '+p.level+'</span></span>';
  });
  return h + '</div>';
}
function entChips(acc){
  var list = [];
  Object.keys(acc.ids).forEach(function(id){
    var e = libGet(id);
    if (e) list.push(e);
  });
  var seen = {};
  acc.extra.forEach(function(x){
    var k = x.type + '|' + x.name.replace(/\s\d+$/,'');
    if (!seen[k]){ seen[k]=true; list.push({ name:x.name.replace(/\s\d+$/,''), type:x.type, _loose:true }); }
  });
  if (!list.length) return '<span class="muted">Nothing attached yet</span>';
  var h = '<div class="chips">';
  list.forEach(function(e){
    h += '<span class="chip t-'+e.type+'"'+(e.id?' onclick="chipInfo(\''+e.id+'\')"':'')+'>'+esc(e.name)+'</span>';
  });
  return h + '</div>';
}
function levelManualRefs(ref){
  var lv = levelByRef(ref);
  if (!lv) return null;
  if (!lv.manualRefs) lv.manualRefs = [];
  return lv;
}
function addManualRef(ref){
  var others = S.library;
  if (!others.length){ alert('No assets in the library yet. Create one first.'); return; }
  var h = '<h3 class="m-title">Add to roster</h3><p class="muted">Adds an asset to this level even if it is not used in a scene below.</p>';
  ['monster','npc','item'].forEach(function(t){
    var list = others.filter(function(e){ return e.type===t; });
    if (!list.length) return;
    h += '<div class="lbl">'+TYPE_LABEL[t]+'s</div>';
    list.forEach(function(e){
      h += '<button class="pick-row" onclick="confirmManualRef(\''+ref+'\',\''+e.id+'\')"><b>'+esc(e.name)+'</b>'
        + '<span class="muted">'+(e.sr?esc(e.sr):(e.role?esc(e.role):TYPE_LABEL[e.type]))+'</span></button>';
    });
  });
  h += '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button></div>';
  modal(h);
}
function confirmManualRef(ref, libId){
  var lv = levelManualRefs(ref);
  if (lv && lv.manualRefs.indexOf(libId)<0) lv.manualRefs.push(libId);
  closeModal(); save(); render();
}
function removeManualRef(ref, libId){
  var lv = levelManualRefs(ref);

/* Roster tab for an act or session: auto-collected (bottom-up) + manual additions. */
function entityRosterTab(ref){
  var lv = levelByRef(ref);
  var kind = ref.indexOf('c:')===0 ? 'campaign' : (ref.indexOf('a:')===0 ? 'act' : 'session');
  var acc = kind==='campaign' ? entitiesOfCampaign(lv) : (kind==='act' ? entitiesOfAct(lv) : entitiesOfSession(lv));
  var autoIds = {}; Object.keys(acc.ids).forEach(function(k){ autoIds[k]=true; });
  var manual = (lv.manualRefs||[]).filter(function(id){ return libGet(id) && !autoIds[id]; });

  var h = '';
  if (kind==='campaign'){
    h += playersBlock();
  } else {
    var pmap = kind==='act' ? playersOfAct(lv) : playersOfSession(lv);
    h += '<div class="sec-h">Players</div>';
    h += '<p class="muted small-note">Players who attended scenes in this '+kind+'.</p>';
    h += playerRollupChips(pmap);
  }
  h += '<div class="sec-h">'+(kind==='campaign'?'Assets collected below':'Collected from scenes below')+'</div>';
  h += '<p class="muted small-note">Auto-populated from every scene in this '+kind+'.</p>';
  h += rosterList(acc, null);

  h += '<div class="sec-h">Added directly</div>';
  if (!manual.length){
    h += '<p class="muted small-note">Nothing added by hand yet. Use this for assets relevant to the '+kind+' but not tied to a specific scene.</p>';
  } else {
    h += '<div class="chips">';
    manual.forEach(function(id){
      var e = libGet(id);
      h += '<span class="chip t-'+e.type+'" onclick="chipInfo(\''+id+'\')">'+esc(e.name)
        + '<button class="chip-x" onclick="event.stopPropagation();removeManualRef(\''+ref+'\',\''+id+'\')">&times;</button></span>';
    });
    h += '</div>';
  }
  h += '<button class="btn wide ghost" onclick="addManualRef(\''+ref+'\')">Add an asset to this roster</button>';
  return h;
}

              h += '</div>';
            }
            h += '</div>';
          });
          h += '</div>';
        }
        h += '</div>';
      });
      h += '</div>';
    }

  });

}

/* A visual card with an optional cover image. opts: { img, title, sub, openFn,
   coverFn, renameFn, delFn, badge }. Falls back to a clean row when no image. */
function cardItem(opts){
  var hasImg = opts.img && opts.img.length;
  var hasDesc = opts.desc && opts.desc.length;
  if (!window._cardMenus) window._cardMenus = {};
  var mid = 'm' + (window._cardMenuSeq = (window._cardMenuSeq||0) + 1);
  window._cardMenus[mid] = { coverFn:opts.coverFn||'', renameFn:opts.renameFn||'', descFn:opts.descFn||'', dupFn:opts.dupFn||'', delFn:opts.delFn||'', title:opts.title };

  var reorder = '';
  if (opts.upFn || opts.downFn){
    reorder = '<span class="card-reorder">'
      + '<button class="reorder-btn" title="Move up" onclick="event.stopPropagation();'+(opts.upFn||'')+'"'+(opts.upFn?'':' disabled')+'>&#8593;</button>'
      + '<button class="reorder-btn" title="Move down" onclick="event.stopPropagation();'+(opts.downFn||'')+'"'+(opts.downFn?'':' disabled')+'>&#8595;</button></span>';
  }
  var menuBtn = '';
  if (opts.coverFn || opts.renameFn || opts.descFn || opts.delFn){
    menuBtn = '<button class="card-menu-btn" title="Options" onclick="event.stopPropagation();cardMenu(\''+mid+'\')">&#8943;</button>';
  }
  /* plain card: arrows sit to the LEFT of the menu (one row).
     card with image or description: menu on top, arrows stacked BELOW it. */
  var rich = hasImg || hasDesc;
  var corner = '';
  if (reorder || menuBtn){
    corner = '<div class="vcard-corner'+(rich?' stacked':' inline')+'">'
      + (rich ? (menuBtn + reorder) : (reorder + menuBtn))
      + '</div>';
  }

  /* number: overlaid on the cover when there is an image, inline beside the title otherwise */
  var numOverlay = (opts.num && hasImg) ? '<span class="vcard-num">'+opts.num+'</span>' : '';
  var numInline  = (opts.num && !hasImg) ? '<span class="vcard-num inline">'+opts.num+'</span>' : '';

  return '<div class="vcard'+(hasImg?' has-cover':'')+'">'
    + '<button class="vcard-main" onclick="'+opts.openFn+'">'
    + (hasImg ? '<div class="vcard-cover">'+numOverlay+'<img src="'+esc(opts.img)+'" alt=""></div>' : '')
    + '<div class="vcard-body">'
    + '<div class="vcard-head">'
    + numInline
    + '<div class="vcard-headtext">'
    + (opts.badge ? '<div class="vcard-badge">'+opts.badge+'</div>' : '')
    + '<div class="vcard-title">'+esc(opts.title)+'</div>'
    + (opts.sub ? '<div class="vcard-sub">'+opts.sub+'</div>' : '')
    + '</div></div>'
    + (hasDesc ? '<div class="vcard-desc">'+esc(opts.desc)+'</div>' : '')
    + '</div></button>'
    + corner
    + '</div>';
}
function cardMenu(mid){
  var m = (window._cardMenus||{})[mid]; if (!m) return;
  var h = '<h3 class="m-title">'+esc(m.title)+'</h3><div class="menu-list">';
  if (m.coverFn) h += '<button class="menu-item" onclick="closeModal();'+m.coverFn+'">Cover image</button>';
  if (m.descFn) h += '<button class="menu-item" onclick="closeModal();'+m.descFn+'">Description</button>';
  if (m.renameFn) h += '<button class="menu-item" onclick="closeModal();'+m.renameFn+'">Rename</button>';
  if (m.dupFn) h += '<button class="menu-item" onclick="closeModal();'+m.dupFn+'">Duplicate</button>';
  if (m.delFn) h += '<button class="menu-item danger" onclick="closeModal();'+m.delFn+'">Delete</button>';
  h += '</div><div class="m-row"><button class="btn ghost" onclick="closeModal()">Cancel</button></div>';
  modal(h);
}

/* Cover image setter for a campaign/act/session/scene. kind: c|a|s|sc */
function setCover(kind, id){
  window._coverTarget = { kind:kind, id:id };
  var lv = coverLevel(kind, id);
  var cur = lv ? (lv.img||'') : '';
  modal('<h3 class="m-title">Cover image</h3>'
    + tokenField(cur)
    + '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Cancel</button>'
    + '<button class="btn" onclick="saveCover()">Save</button></div>');
}
function coverLevel(kind, id){
  var c = curC();
  if (kind==='c') return c;
  var found=null;
  if (!c) return null;
  c.acts.forEach(function(a){
    if (kind==='a' && a.id===id) found=a;
    a.sessions.forEach(function(s){
      if (kind==='s' && s.id===id) found=s;
      s.scenes.forEach(function(sc){ if (kind==='sc' && sc.id===id) found=sc; });
    });
  });
  return found;
}
function saveCover(){
  var t = window._coverTarget; if (!t) return;
  var lv = coverLevel(t.kind, t.id);
  var hid = document.getElementById('wImg');
  if (lv && hid) lv.img = hid.value || '';
  closeModal(); save(); render();
}

  return '<div class="empty"><p>'+text+'</p>'

    + '</div>';
}

/* small round thumbnail for combat rows: image if present, else a monogram */
function rowThumb(img, name){
  if (img) return '<span class="row-thumb"><img src="'+esc(img)+'" alt=""></span>';

  return '<span class="row-thumb mono">'+esc(ch)+'</span>';
}

function intentInput(key, holder, locked, isCombatant){
  var setFn = isCombatant ? 'setMonAct(\''+key.slice(2)+'\',this.value)' : 'setPAct(\''+key.slice(2)+'\',this.value)';
  var h = '<input class="inp" id="intent-'+key.replace(':','-')+'" value="'+esc(holder.act)+'" '+(locked?'disabled':'')
    + ' onchange="'+setFn+'" placeholder="Intent (Act)">';
  /* quick-fill from the combatant's own abilities; "Other" keeps free text. Sheet pull lands here later. */
  var abs = holder.abilities || [];
  if (abs.length && !locked){
    h += '<select class="inp slim mini-sel" onchange="fillIntent(\'' + key + '\',this.value,' + (isCombatant?'true':'false') + ');this.selectedIndex=0;">'
      + '<option value="">Quick fill...</option>';
    abs.forEach(function(a){ h += '<option value="'+esc(a.name)+'">'+esc(a.name)+' (T'+a.tier+', '+esc(a.use)+')</option>'; });
    h += '<option value="__other">Other...</option></select>';
  }
  return h;
}
function fillIntent(key, val, isCombatant){
  if (val==='__other' || val===''){ return; }  /* Other = leave free text as-is */
  var id = key.slice(2);
  if (isCombatant) setMonAct(id, val); else setPAct(id, val);
  render();
}

          + '<button class="icon-btn danger" onclick="event.stopPropagation();removeSpot(\''+it.event.id+'\')">&times;</button></div>';

/* ================= RECAP GENERATOR ================= */

/* Build a recap from a session: ticked beats and play-log lines per scene. */
function buildSessionRecap(s){
  var lines = [];
  s.scenes.forEach(function(sc){
    var bits = [];
    /* ticked beats first, they are the planned turns that actually happened */
    (sc.entries||[]).forEach(function(e){
      if (e.type==='beat' && sc.beatDone && sc.beatDone[e.id]){
        bits.push((e.title?e.title+': ':'') + (e.body||''));
      }
    });
    /* play log, oldest first */
    var log = (sc.log||[]).slice().reverse();
    log.forEach(function(n){ bits.push(n.text); });
    if (bits.length){
      lines.push({ scene:sc.name, bits:bits });
    }
  });
  return lines;
}
function buildCampaignRecap(c){
  var out = [];
  (c.acts||[]).forEach(function(a){
    a.sessions.forEach(function(s){
      var r = buildSessionRecap(s);
      if (r.length) out.push({ session:a.name+' / '+s.name, scenes:r });
    });
  });
  return out;
}
function recapText(blocks, isCampaign){
  var t = '';
  if (isCampaign){
    blocks.forEach(function(b){
      t += b.session + '\n';
      b.scenes.forEach(function(sc){
        t += '  ' + sc.scene + '\n';
        sc.bits.forEach(function(x){ t += '    - ' + x + '\n'; });
      });
      t += '\n';
    });
  } else {
    blocks.forEach(function(sc){
      t += sc.scene + '\n';
      sc.bits.forEach(function(x){ t += '  - ' + x + '\n'; });
      t += '\n';
    });
  }
  return t.trim();
}

function showRecap(){
  var s = curSe(); if (!s) return;
  var blocks = buildSessionRecap(s);
  var h = '<h3 class="m-title">Recap: '+esc(s.name)+'</h3>';
  if (!blocks.length){
    h += '<p class="muted">Nothing to recap yet. Recaps gather the beats you tick and the play-log notes you capture while running scenes.</p>'
      + '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button></div>';
    modal(h); return;
  }
  h += '<p class="muted small-note">From ticked beats and the play log across this session.</p>';
  h += '<div class="recap-body">';
  blocks.forEach(function(sc){
    h += '<div class="recap-scene">'+esc(sc.scene)+'</div><ul class="recap-list">';
    sc.bits.forEach(function(x){ h += '<li>'+esc(x)+'</li>'; });
    h += '</ul>';
  });
  h += '</div>';
  h += '<textarea class="inp ta recap-ta" id="recapTA" readonly>'+esc(recapText(blocks, false))+'</textarea>';
  h += '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button>'
    + '<button class="btn" id="recapCopy" onclick="copyRecap()">Copy recap</button></div>';
  modal(h);
}
function copyRecap(){
  var ta = document.getElementById('recapTA');
  ta.removeAttribute('readonly'); ta.select(); ta.setSelectionRange(0, 9999999);
  var ok=false; try { ok = document.execCommand('copy'); } catch(e){}
  ta.setAttribute('readonly','');
  var btn = document.getElementById('recapCopy');
  btn.textContent = ok ? 'Copied' : 'Select and copy';
  setTimeout(function(){ btn.textContent = 'Copy recap'; }, 2000);
}

/* ================= SESSION RUNNER (play mode) ================= */

function enterRunner(scId){
  if (scId) V.scId = scId;
  var sc = curSc(); if (!sc) return;
  if (!sc.beatDone) sc.beatDone = {};
  V.screen = 'runner';
  save(); render(); window.scrollTo(0,0);
}
function exitRunner(){ V.screen = 'scene'; V.tab = 'notes'; render(); window.scrollTo(0,0); }

/* mode + lifecycle */
function escalateScene(){
  var sc = curSc(); if (!sc) return;
  sc.mode = 'combat';
  save(); render();
}
function deEscalateScene(){
  var sc = curSc(); if (!sc) return;
  askConfirm('Return this scene to roleplay? The combat board stays saved, it is just set aside.', function(){
    curSc().mode = 'roleplay'; save(); render();
  }, 'Return to roleplay');
}
function completeScene(){
  var sc = curSc(); if (!sc) return;
  sc.status = 'done';
  save();
  /* auto-advance to the next scene in the session if there is one */
  var sibs = runnerSiblings();
  var i = sibs.map(function(x){ return x.id; }).indexOf(V.scId);
  if (i >= 0 && i < sibs.length-1){
    V.scId = sibs[i+1].id;
    var nx = curSc(); if (nx && !nx.beatDone) nx.beatDone = {};
  }
  render(); window.scrollTo(0,0);
}
function reopenScene(){
  var sc = curSc(); if (!sc) return;
  sc.status = 'active'; save(); render();
}

/* Generic LM d6 roll for the roleplay board. 6 is a Fellmark, 1 is a Fellstrike. */
function rollTag(n){ return n===6 ? 'Fellmark' : (n===1 ? 'Fellstrike' : ''); }
function lmRoll(){
  var n = Math.floor(Math.random() * 6) + 1;
  var tag = rollTag(n);
  window._lmRoll = { n:n, tag:tag };
  var d = new Date();
  var ts = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  curSc().log.unshift({ ts:ts, text:'LM roll: '+n+(tag?' ('+tag+')':'') });
  save(); render();
}

/* sibling scenes in the current session, for prev/next jumps */
function runnerSiblings(){
  var s = curSe(); if (!s) return [];
  return s.scenes;
}
function runnerStep(dir){
  var sibs = runnerSiblings(); if (!sibs.length) return;
  var i = sibs.map(function(x){ return x.id; }).indexOf(V.scId);
  var j = i + dir;
  if (j < 0 || j >= sibs.length) return;
  V.scId = sibs[j].id;
  var sc = curSc(); if (sc && !sc.beatDone) sc.beatDone = {};
  save(); render(); window.scrollTo(0,0);
}

function toggleBeat(eid){
  var sc = curSc(); if (!sc.beatDone) sc.beatDone = {};
  if (sc.beatDone[eid]) delete sc.beatDone[eid]; else sc.beatDone[eid] = true;
  save(); render();
}

/* inline log writer used inside the runner, no modal */
function runnerLog(){
  var el = document.getElementById('runLog'); if (!el) return;
  var t = (el.value||'').trim(); if (!t) return;
  var d = new Date();
  var ts = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  curSc().log.unshift({ ts:ts, text:t });
  el.value=''; save(); render();
  var e2 = document.getElementById('runLog'); if (e2) e2.focus();
}
function runnerLogKey(ev){ if (ev && (ev.key==='Enter'||ev.keyCode===13) && !ev.shiftKey){ ev.preventDefault && ev.preventDefault(); runnerLog(); } }

function entriesByType(sc, type){ return (sc.entries||[]).filter(function(e){ return e.type===type; }); }

/* LEFT: narration rail */
function runnerNarration(sc){
  var ref = 'sc:'+sc.id;

  var beats = entriesByType(sc, 'beat');
  var lore  = entriesByType(sc, 'lorecheck');
  var clues = entriesByType(sc, 'clue');
  var secs  = entriesByType(sc, 'secret');

  if (reads.length){
    h += '<div class="run-h">Read aloud</div>';
    reads.forEach(function(e){
      h += '<div class="run-read">'+(e.title?'<div class="run-read-t">'+esc(e.title)+'</div>':'')
        + '<div class="run-read-b">'+renderNoteBody(e.body||'', ref)+'</div></div>';
    });
  }
  if (descs.length){
    h += '<div class="run-h">Describe</div>';
    descs.forEach(function(e){
      h += '<div class="run-desc">'+(e.title?'<b>'+esc(e.title)+'</b><br>':'')+renderNoteBody(e.body||'', ref)+'</div>';
    });
  }
  if (dia.length){
    h += '<div class="run-h">Voices</div>';
    dia.forEach(function(e){
      h += '<div class="run-desc">'+(e.title?'<b>'+esc(e.title)+'</b><br>':'')+renderNoteBody(e.body||'', ref)+'</div>';
    });
  }
  if (beats.length){
    h += '<div class="run-h">Beats</div>';
    beats.forEach(function(e){
      var done = sc.beatDone && sc.beatDone[e.id];
      h += '<button class="run-beat'+(done?' done':'')+'" onclick="toggleBeat(\''+e.id+'\')">'
        + '<span class="check'+(done?' on':'')+'"></span>'
        + '<span class="run-beat-tx">'+(e.title?'<b>'+esc(e.title)+'</b> ':'')+esc(e.body||'')+'</span></button>';
    });
  }
  if (lore.length){
    h += '<div class="run-h">Lore checks</div>';
    lore.forEach(function(e){
      h += '<div class="run-desc">'+(e.title?'<b>'+esc(e.title)+'</b><br>':'')+renderNoteBody(e.body||'', ref)+'</div>';
    });
  }
  if (clues.length){
    h += '<details class="run-fold"><summary>Clues ('+clues.length+')</summary>';
    clues.forEach(function(e){ h += '<div class="run-desc">'+(e.title?'<b>'+esc(e.title)+'</b><br>':'')+renderNoteBody(e.body||'', ref)+'</div>'; });
    h += '</details>';
  }
  if (secs.length){
    h += '<details class="run-fold secret"><summary>Secrets ('+secs.length+') &middot; LM eyes only</summary>';
    secs.forEach(function(e){ h += '<div class="run-desc">'+(e.title?'<b>'+esc(e.title)+'</b><br>':'')+renderNoteBody(e.body||'', ref)+'</div>'; });
    h += '</details>';
  }
  if (!reads.length && !descs.length && !dia.length && !beats.length && !lore.length && !clues.length && !secs.length){
    h += '<p class="muted">No prep notes in this scene yet. Tap Edit scene to add read-aloud text, beats, and clues.</p>';
  }
  h += '</div>';
  return h;
}

/* RIGHT: live board */
/* roleplay board: players, loot, log, escalate */
function runnerRoleplay(sc){
  var h = '<div class="run-col run-board">';
  var players = attendingPlayers();
  h += '<div class="run-h">At the table</div>';
  if (!players.length){
    h += '<p class="muted small-note">No players marked attending. Set attendance in the scene Roster.</p>';
  } else {
    h += '<div class="chips">';
    players.forEach(function(p){ h += '<span class="chip t-player">'+esc(p.name)+' <span class="chip-lvl">Lvl '+p.level+'</span></span>'; });
    h += '</div>';
  }

  h += runnerLogBlock(sc);

  h += '<div class="run-h">Quick roll</div>';
  var lr = window._lmRoll;
  var lrOut = lr ? ('<span class="roll-n'+(lr.tag?' '+lr.tag.toLowerCase():'')+'">'+lr.n+'</span>'+(lr.tag?'<span class="roll-tag '+lr.tag.toLowerCase()+'">'+lr.tag+'</span>':'')) : '<span class="muted">tap to roll</span>';
  h += '<div class="lm-roll">'
    + '<button class="qd-b" onclick="lmRoll()">Roll d6</button>'
    + '<span class="lm-roll-out">'+lrOut+'</span>'
    + '</div>';

  h += '<details class="run-fold"><summary>Loot and rewards</summary>'+tabLoot(sc)+'</details>';

  h += '<div class="run-actions">'
    + '<button class="btn wide escalate" onclick="escalateScene()">&#9876; Escalate to combat</button>'
    + runnerCompleteBtn(sc)
    + '</div>';
  h += '</div>';
  return h;
}

/* combat board: full spotlight combat + disruptions + loot */
function runnerCombat(sc){
  var h = '<div class="run-combat">';
  h += '<details class="run-fold"><summary>Disruptions <span class="fold-meta">'+disBalance()+' / '+disBase()+' available</span></summary>'+tabDisruptions(sc)+'</details>';
  h += '<div class="run-h">Combat</div>' + tabCombat(sc);
  h += '<details class="run-fold"><summary>Loot and rewards</summary>'+tabLoot(sc)+'</details>';
  h += runnerLogBlock(sc);
  h += '<div class="run-actions">'
    + '<button class="btn wide ghost" onclick="deEscalateScene()">Return to roleplay</button>'
    + runnerCompleteBtn(sc)
    + '</div>';
  h += '</div>';
  return h;
}

function runnerCompleteBtn(sc){
  if (sc.status === 'done'){
    return '<button class="btn wide reopen" onclick="reopenScene()">Reopen scene</button>';
  }
  return '<button class="btn wide complete" onclick="completeScene()">&#10003; Mark scene complete</button>';
}

function runnerLogBlock(sc){
  var h = '<div class="run-h">Log</div>';
  h += '<div class="run-logbox"><input class="qd-in run-logi" id="runLog" placeholder="What just happened?" onkeydown="runnerLogKey(event)">'
    + '<button class="qd-b" onclick="runnerLog()">Add</button></div>';
  if (sc.log.length){
    h += '<div class="run-loglist">';
    sc.log.slice(0,8).forEach(function(n){
      h += '<div class="run-logrow"><span class="log-ts">'+esc(n.ts)+'</span> '+esc(n.text)+'</div>';
    });
    h += '</div>';
  }
  return h;
}

function scrRunner(){
  var sc = curSc(); if (!sc){ V.screen='session'; return scrSession(); }
  if (!sc.beatDone) sc.beatDone = {};
  var mode = sc.mode || 'roleplay';
  var sibs = runnerSiblings();
  var idx = sibs.map(function(x){ return x.id; }).indexOf(V.scId);

  var h = '<div class="run-bar">'
    + '<button class="run-exit" onclick="exitRunner()">&larr; Prep</button>'
    + '<div class="run-bar-mid"><span class="run-scene">'+esc(sc.name)
    + ' <span class="mode-badge '+mode+'">'+(mode==='combat'?'Combat':'Roleplay')+'</span>'
    + (sc.status==='done'?' <span class="done-badge">Done</span>':'')+'</span>'
    + '<span class="run-pos">Scene '+(idx+1)+' of '+sibs.length+'</span></div>'
    + '<div class="run-nav">'
    + '<button class="run-step" onclick="runnerStep(-1)"'+(idx<=0?' disabled':'')+'>&larr;</button>'
    + '<button class="run-step" onclick="runnerStep(1)"'+(idx>=sibs.length-1?' disabled':'')+'>&rarr;</button></div>'
    + '</div>';

  if (mode === 'combat'){
    /* combat is the main stage; narration tucked into a fold so beats/clues stay reachable */
    h += '<details class="run-narr-fold"><summary>Scene narration, beats and clues</summary>'
      + runnerNarration(sc) + '</details>';
    h += runnerCombat(sc);
  } else {
    h += '<div class="run-grid">';
    h += runnerNarration(sc);
    h += runnerRoleplay(sc);
    h += '</div>';
  }
  return h;
}


function scrLibrary(){
  var h = '<h1 class="page-h">Library</h1>';
  var sc = curSc();
  if (sc){
    h += '<div class="ctx-bar">Adding to <b>'+esc(sc.name)+'</b>. Tap <span class="gold">+</span> on any profile to drop it into the scene.'
      + '<button class="btn small" onclick="nav(\'scene\')">Back to scene</button></div>';
  }
  h += '<div class="tabs">';
  [['all','All'],['monster','Monsters'],['npc','NPCs'],['item','Items']].forEach(function(f){
    h += '<button class="tab'+(V.libFilter===f[0]?' on':'')+'" onclick="setLibFilter(\''+f[0]+'\')">'+f[1]+'</button>';
  });
  h += '</div>';
  var list = S.library.filter(function(e){ return V.libFilter==='all' || e.type===V.libFilter; });
  if (!list.length){
    h += emptyState('Nothing here yet. Profiles you create can be attached to any scene in any campaign.', 'New profile', 'newProfile()');
  } else {
    list.forEach(function(e){
      var sub = TYPE_LABEL[e.type];
      if (e.sr) sub += ' &middot; '+esc(e.sr)+' &middot; '+e.lp+' LP &middot; '+e.sp+' SP &middot; '+effMaxVit(e)+' vit';
      else if (e.role) sub += ' &middot; '+esc(e.role);
      var canAttach = V.scId && curSc();
      if (!window._cardMenus) window._cardMenus = {};
      var mid = 'm' + (window._cardMenuSeq = (window._cardMenuSeq||0) + 1);
      window._cardMenus[mid] = { coverFn:'editLib(\''+e.id+'\')', renameFn:'', dupFn:'duplicateLib(\''+e.id+'\')', delFn:'deleteLib(\''+e.id+'\')', title:e.name };
      var corner = '';
      if (canAttach) corner += '<button class="icon-btn gold attach-btn" title="Add to current scene" onclick="event.stopPropagation();quickAttach(\''+e.id+'\')">+</button>';
      corner += '<button class="card-menu-btn" title="Options" onclick="event.stopPropagation();cardMenu(\''+mid+'\')">&#8943;</button>';
      var hasImg = e.img && e.img.length;
      h += '<div class="vcard'+(hasImg?' has-cover':'')+'">'
        + '<button class="vcard-main" onclick="editLib(\''+e.id+'\')">'
        + (hasImg ? '<div class="vcard-cover"><img src="'+esc(e.img)+'" alt=""></div>' : '')
        + '<div class="vcard-body"><div class="vcard-badge">'+TYPE_LABEL[e.type]+'</div>'
        + '<div class="vcard-title">'+esc(e.name)+'</div><div class="vcard-sub">'+sub+'</div></div></button>'
        + '<div class="vcard-corner inline">'+corner+'</div></div>';
    });
    h += '<button class="btn wide" onclick="newProfile()">New '+(V.libFilter==='all'?'profile':TYPE_LABEL[V.libFilter])+'</button>';
  }
  return h;
}

/* ---------- search ---------- */

function snippet(text, q){
  var t = String(text||'');
  var i = t.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return esc(t.slice(0, 90)) + (t.length>90?'...':'');
  var start = Math.max(0, i - 35);
  var end = Math.min(t.length, i + q.length + 55);
  var pre = (start>0?'...':'') + t.slice(start, i);
  var hit = t.slice(i, i+q.length);
  var post = t.slice(i+q.length, end) + (end<t.length?'...':'');
  return esc(pre) + '<mark>' + esc(hit) + '</mark>' + esc(post);
}

/* Search the open campaign + the shared library. Returns ranked results. */
function runSearch(q){
  q = (q||'').trim();
  var res = [];
  if (q.length < 2) return res;
  var lc = q.toLowerCase();
  function has(s){ return s && String(s).toLowerCase().indexOf(lc) >= 0; }

  var c = curC();
  if (c){
    if (has(c.name) || has(c.desc)){
      res.push({ kind:'Campaign', title:c.name, sub:snippet(c.desc||c.name, q), go:"nav('campaign','"+c.id+"')" });
    }
    /* campaign notes */
    (c.entries||[]).forEach(function(en){
      if (has(en.title) || has(en.body)){
        res.push({ kind:'Note', title:(en.title||'Untitled')+' ('+noteTypeLabel(en.type)+')', sub:snippet(en.body||en.title, q), go:"nav('campaign','"+c.id+"')" });
      }
    });
    /* players */
    (c.players||[]).forEach(function(p){
      if (has(p.name)) res.push({ kind:'Player', title:p.name, sub:'Level '+p.level, go:"nav('campaign','"+c.id+"');setCTab('roster')" });
    });
    c.acts.forEach(function(a){
      if (has(a.name) || has(a.desc)) res.push({ kind:'Act', title:a.name, sub:snippet(a.desc||a.name, q), go:"nav('act',undefined,'"+a.id+"')" });
      (a.entries||[]).forEach(function(en){
        if (has(en.title) || has(en.body)) res.push({ kind:'Note', title:(en.title||'Untitled')+' in '+a.name, sub:snippet(en.body||en.title, q), go:"nav('act',undefined,'"+a.id+"')" });
      });
      a.sessions.forEach(function(s){
        if (has(s.name) || has(s.desc)) res.push({ kind:'Session', title:s.name, sub:snippet(s.desc||s.name, q), go:"nav('session',undefined,undefined,'"+s.id+"')" });
        (s.entries||[]).forEach(function(en){
          if (has(en.title) || has(en.body)) res.push({ kind:'Note', title:(en.title||'Untitled')+' in '+s.name, sub:snippet(en.body||en.title, q), go:"nav('session',undefined,undefined,'"+s.id+"')" });
        });
        s.scenes.forEach(function(sc){
          if (has(sc.name) || has(sc.desc)) res.push({ kind:'Scene', title:sc.name, sub:snippet(sc.desc||sc.name, q), go:"openScene('"+sc.id+"')" });
          (sc.entries||[]).forEach(function(en){
            if (has(en.title) || has(en.body)) res.push({ kind:'Note', title:(en.title||'Untitled')+' in '+sc.name, sub:snippet(en.body||en.title, q), go:"openScene('"+sc.id+"')" });
          });
          (sc.log||[]).forEach(function(lg){
            if (has(lg.text)) res.push({ kind:'Play log', title:sc.name, sub:snippet(lg.text, q), go:"openScene('"+sc.id+"')" });
          });
        });
      });
    });
  }
  /* library assets */
  (S.library||[]).forEach(function(e){
    if (has(e.name) || has(e.desc) || has(e.role) || has(e.sr)){
      res.push({ kind:TYPE_LABEL[e.type]||'Asset', title:e.name, sub:snippet(e.desc||e.role||e.sr||TYPE_LABEL[e.type], q), go:"nav('library');editLib('"+e.id+"')" });
    }
  });
  /* glossary */
  (S.glossary||[]).forEach(function(g){
    if (has(g.term) || has(g.description)){
      res.push({ kind:'Glossary', title:g.term, sub:snippet(g.description||g.type, q), go:"glossInfo('"+g.id+"')" });
    }
  });
  return res;
}

function scrSearch(){
  var q = window._searchQ || '';
  var h = '<h1 class="page-h">Search</h1>';
  h += '<input class="inp" id="searchBox" value="'+esc(q)+'" placeholder="Search names, notes, descriptions..." oninput="onSearch(this.value)" autocomplete="off">';
  if (!curC()){
    h += '<p class="muted small-note">Open a campaign to search its acts, sessions, scenes, and notes. The library and glossary are always searched.</p>';
  }
  if (q.trim().length < 2){
    h += '<p class="muted small-note">Type at least two characters.</p>';
    return h;
  }
  var res = runSearch(q);
  if (!res.length){
    h += '<p class="muted">No matches for "'+esc(q)+'".</p>';
    return h;
  }
  h += '<p class="muted small-note">'+res.length+' result'+(res.length===1?'':'s')+'</p>';
  res.forEach(function(r){
    h += '<button class="search-row" onclick="'+r.go+'">'
      + '<span class="search-kind">'+esc(r.kind)+'</span>'
      + '<span class="search-title">'+esc(r.title)+'</span>'
      + '<span class="search-snip">'+r.sub+'</span></button>';
  });
  return h;
}
function onSearch(v){
  window._searchQ = v;
  /* re-render only the results area to keep the input focused */
  var box = document.getElementById('searchBox');
  var caret = box ? box.selectionStart : null;
  render();
  var box2 = document.getElementById('searchBox');
  if (box2){ box2.focus(); if (caret!=null){ try { box2.setSelectionRange(caret, caret); } catch(e){} } }
}

function scrData(){
  var h = '<button class="btn small ghost back-data" onclick="nav(campaignResumeScreen())">&larr; Back</button>'
    + '<h1 class="page-h">Settings and data</h1>'
    + '<p class="muted">'+(WIX.connected
        ? 'Connected to lorefell.com. Campaign progress and your Assets library both sync to your account automatically, and this browser keeps a local copy.'
        : 'Saving to this browser. When embedded on lorefell.com with the sync code installed, changes save to your account automatically.')+'</p>'
    + '<div class="sec-h">Backup</div>'
    + '<textarea class="inp ta tall mono" id="expTA" readonly>'+esc(exportJson())+'</textarea>'
    + '<button class="btn wide" id="copyBtn" onclick="copyExport()">Copy backup</button>'
    + '<div class="sec-h">Restore</div>'
    + '<textarea class="inp ta mono" id="impTA" placeholder="Paste a backup here"></textarea>'
    + '<button class="btn wide ghost" onclick="importJson()">Load backup</button>'
    + '<div class="sec-h">Settings</div>'
    + '<div class="card p-row"><span class="p-name">Campaign mode<br><span class="set-note">Highlights glossary terms in notes. Tap a gold term for its meaning.</span></span>'
    + '<button class="toggle'+(S.glossaryOn?' on':'')+'" onclick="toggleGlossary()"><span class="toggle-dot"></span></button></div>'
    + '<div class="card p-row"><span class="p-name">Rolls<br><span class="set-note">Every roll in LoreFell is a d6. A 6 is a Fellmark, a 1 is a Fellstrike.</span></span></div>'
    + '<div class="sec-h">Danger</div>'
    + '<button class="btn wide danger-btn" onclick="wipeAll()">Delete everything</button>'
    + '<p class="build-stamp">Build '+esc(BUILD_VERSION)+'</p>';
  return h;
}

/* ---------- main render ---------- */

function mast(){ return '<div class="fw-mast">The Fate<span class="fw-well">Well</span></div>'; }
function render(){
  var runner = (V.screen==='runner');
  var h = runner ? '' : (mast() + crumb());
  h += runner ? '<main class="wrap wrap-run">' : '<main class="wrap">';
  if (V.screen==='campaigns') h += scrCampaigns();
  else if (V.screen==='campaign') h += scrCampaign();
  else if (V.screen==='act') h += scrAct();
  else if (V.screen==='session') h += scrSession();
  else if (V.screen==='scene') h += scrScene();
  else if (V.screen==='library') h += scrLibrary();
  else if (V.screen==='search') h += scrSearch();
  else if (V.screen==='runner') h += scrRunner();
  else h += scrData();
  h += '</main>';
  if (V.ov) h += ovHtml();
  document.getElementById('app').innerHTML = h;
  document.getElementById('bnav-slot').innerHTML = runner ? '' : bottomNav();
}

document.addEventListener('DOMContentLoaded', function(){
  render();
  requestWix();
  setTimeout(function(){ if (!WIX.connected) requestWix(); }, 1600);
});
