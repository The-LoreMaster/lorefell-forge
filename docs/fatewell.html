/* combat board: full spotlight combat + disruptions + loot */
/* ===================== Combat hooks ===================== */
/* A hook surfaces prepared notes on the combat board when its conditions are met.
   The system watches, the loremaster fires. States: armed, ready, fired. Conditions
   join by AND. A hook with no conditions is manual and always ready. */

var HOOK_KINDS = [
  { k:'enemyVit',         label:'Enemy below %',            needs:'pct' },
  { k:'playerVit',        label:'A player below %',         needs:'pct' },
  { k:'enemyDowned',      label:'An enemy is downed',       needs:'none' },
  { k:'playerDowned',     label:'A player is downed',       needs:'none' },
  { k:'playersAfflicted', label:'Players afflicted (count)',needs:'n' },
  { k:'enemiesAfflicted', label:'Enemies afflicted (count)',needs:'n' },
  { k:'namedAffliction',  label:'Affliction present (name)',needs:'name' }
];
function hookKindDef(k){ var d=null; HOOK_KINDS.forEach(function(x){ if(x.k===k) d=x; }); return d || HOOK_KINDS[0]; }

/* Live entities the conditions read. Monsters and NPCs from combatants, players from
   attendance with their derived scene vitality. */
function hookMonsters(sc){ return (sc.combatants||[]).filter(function(c){ return (c.side||'monster')==='monster'; }); }
function hookPlayers(sc){ return attendingPlayers().map(function(p){ var st=pState(p.id); return { name:p.name, curVit:st.curVit, maxVit:st.maxVit, affs:st.affs||[] }; }); }
function hookAllAfflictable(sc){
  var out = [];
  (sc.combatants||[]).forEach(function(c){ out.push({ affs:c.affs||[] }); });
  hookPlayers(sc).forEach(function(p){ out.push({ affs:p.affs||[] }); });
  return out;
}
function pctAtOrBelow(e, pct){ return e.maxVit>0 && (e.curVit / e.maxVit) * 100 <= pct; }

function evalCond(sc, cond){
  var k = cond.k, pct = Number(cond.pct)||0, n = Number(cond.n)||1, name = String(cond.name||'').toLowerCase();
  if (k==='enemyVit')  return hookMonsters(sc).some(function(c){ return pctAtOrBelow(c, pct); });
  if (k==='playerVit') return hookPlayers(sc).some(function(p){ return pctAtOrBelow(p, pct); });
  if (k==='enemyDowned')  return hookMonsters(sc).some(function(c){ return c.maxVit>0 && c.curVit<=0; });
  if (k==='playerDowned') return hookPlayers(sc).some(function(p){ return p.maxVit>0 && p.curVit<=0; });
  if (k==='playersAfflicted') return hookPlayers(sc).filter(function(p){ return (p.affs||[]).length>0; }).length >= n;
  if (k==='enemiesAfflicted') return hookMonsters(sc).filter(function(c){ return (c.affs||[]).length>0; }).length >= n;
  if (k==='namedAffliction') return hookAllAfflictable(sc).some(function(e){ return (e.affs||[]).some(function(a){ return String(a.name||'').toLowerCase().indexOf(name)>=0 && name; }); });
  return false;
}
function hookState(sc, hook){
  if (hook.fired) return 'fired';
  var cs = hook.conditions || [];
  if (!cs.length) return 'ready'; /* manual */
  return cs.every(function(c){ return evalCond(sc, c); }) ? 'ready' : 'armed';
}
function condText(cond){
  var d = hookKindDef(cond.k);
  if (d.needs==='pct')  return d.label.replace('%', (Number(cond.pct)||0)+'%');
  if (d.needs==='n')    return d.label.replace('(count)', '\u2265 '+(Number(cond.n)||1));
  if (d.needs==='name') return 'Affliction "'+(cond.name||'')+'" present';
  return d.label;
}

/* ---- Triggers strip on the combat board ---- */
function hooksStrip(sc){
  var hooks = sc.hooks || [];
  if (!hooks.length) return '';
  var ranked = hooks.map(function(h){ return { h:h, st:hookState(sc,h) }; });
  var rank = { ready:0, armed:1, fired:2 };
  ranked.sort(function(a,b){ return rank[a.st]-rank[b.st]; });
  var h = '<div class="hooks-strip"><div class="hooks-h">Triggers</div><div class="hooks-chips">';
  ranked.forEach(function(o){
    h += '<button class="hook-chip '+o.st+'" onclick="revealHook(\''+o.h.id+'\')" title="'+esc((o.h.conditions||[]).map(condText).join(' and ')||'Manual')+'">'
      + esc(o.h.label||'Hook') + (o.st==='ready' && (o.h.conditions||[]).length ? ' <span class="hk-dot"></span>' : '') + '</button>';
  });
  h += '</div></div>';
  return h;
}

/* ---- Reveal: read the hook's notes in place, prev/next through the group ---- */
function findHook(hid){ var sc=curSc(), hk=null; (sc.hooks||[]).forEach(function(h){ if(h.id===hid) hk=h; }); return hk; }
function revealNoteHTML(sc, entry){
  return '<div class="entry card-type t-'+entry.type+'">'
    + (entry.img ? '<div class="entry-img"><img src="'+esc(imgSrc(entry.img))+'" alt=""></div>' : '')
    + dialogueHead(dialogueSpeaker(entry))
    + (entry.body ? '<div class="entry-text">'+renderNoteBody(entry.body, 'sc:'+sc.id)+'</div>' : '<div class="muted">Empty.</div>')
    + '</div>';
}
function revealHook(hid){
  var hook = findHook(hid); if (!hook) return;
  if (!hook.fired){ hook.fired = true; save(); }
  window._hookView = { hid:hid, idx:0 };
  renderHookReveal();
}
function renderHookReveal(){
  var v = window._hookView; if (!v) return;
  var sc = curSc(); var hook = findHook(v.hid); if (!hook){ closeModal(); return; }
  var ids = hook.noteIds || [];
  if (v.idx<0) v.idx=0; if (v.idx>=ids.length) v.idx=Math.max(0, ids.length-1);
  var entry = null; (sc.entries||[]).forEach(function(e){ if(e.id===ids[v.idx]) entry=e; });
  var body = ids.length ? (entry ? revealNoteHTML(sc, entry) : '<p class="muted">This note was removed.</p>')
                        : '<p class="muted">No notes attached to this hook yet.</p>';
  var pager = ids.length>1
    ? '<div class="m-row hk-pager"><button class="btn ghost small" '+(v.idx<=0?'disabled':'')+' onclick="hookStep(-1)">&#8592; Prev</button>'
      + '<span class="hk-count">'+(v.idx+1)+' / '+ids.length+'</span>'
      + '<button class="btn ghost small" '+(v.idx>=ids.length-1?'disabled':'')+' onclick="hookStep(1)">Next &#8594;</button></div>'
    : '';
  modal('<h3 class="m-title">'+esc(hook.label||'Hook')+'</h3>' + body + pager
    + '<div class="m-row"><button class="btn" onclick="window._hookView=null;closeModal()">Dismiss</button></div>');
}
function hookStep(d){ var v=window._hookView; if(!v) return; v.idx+=d; renderHookReveal(); }

/* ---- Manage hooks: list, rearm, edit, delete ---- */
function hooksManager(sc){
  var hooks = sc.hooks || [];
  var h = '';
  if (!hooks.length){ h += '<p class="muted pad">No hooks yet. A hook reveals prepared notes when its conditions are met.</p>'; }
  hooks.forEach(function(hk){
    var st = hookState(sc, hk);
    h += '<div class="hook-mrow"><span class="hm-label">'+esc(hk.label||'Untitled hook')+'</span>'
      + '<span class="hm-state">'+st+'</span>'
      + (hk.fired ? '<button class="mini" onclick="rearmHook(\''+hk.id+'\')">Rearm</button>' : '')
      + '<button class="mini ghost" onclick="hookEditor(\''+hk.id+'\')">Edit</button>'
      + '<button class="mini danger" onclick="deleteHook(\''+hk.id+'\')">Delete</button></div>';
  });
  h += '<button class="btn wide ghost small" onclick="hookEditor(\'\')">+ Add hook</button>';
  return h;
}
function rearmHook(hid){ var hk=findHook(hid); if(hk){ hk.fired=false; save(); render(); } }
function deleteHook(hid){
  askConfirm('Delete this hook? The notes it points to are not affected.', function(){
    var sc=curSc(); sc.hooks=(sc.hooks||[]).filter(function(h){ return h.id!==hid; }); save(); render();
  }, 'Delete');
}

/* ---- Hook editor: label, AND conditions, ordered notes ---- */
function hookEditor(hid){
  var existing = hid ? findHook(hid) : null;
  window._hookDraft = existing
    ? JSON.parse(JSON.stringify(existing))
    : { id:uid(), label:'', conditions:[], noteIds:[], fired:false };
  renderHookEditor(!existing);
}
function syncHookInputs(){
  var d = window._hookDraft; if (!d) return;
  var lab = document.getElementById('hkLabel'); if (lab) d.label = lab.value;
  (d.conditions||[]).forEach(function(c, i){
    var kind = document.getElementById('hkK'+i); if (kind) c.k = kind.value;
    var pct = document.getElementById('hkP'+i); if (pct) c.pct = parseInt(pct.value,10)||0;
    var nn  = document.getElementById('hkN'+i); if (nn)  c.n   = parseInt(nn.value,10)||1;
    var nm  = document.getElementById('hkM'+i); if (nm)  c.name= nm.value;
  });
}
function hkAddCond(){ syncHookInputs(); window._hookDraft.conditions.push({ k:'enemyVit', pct:50, n:2, name:'' }); renderHookEditor(false); }
function hkDelCond(i){ syncHookInputs(); window._hookDraft.conditions.splice(i,1); renderHookEditor(false); }
function hkCondKind(i, val){ syncHookInputs(); window._hookDraft.conditions[i].k = val; renderHookEditor(false); }
function hkToggleNote(id){
  syncHookInputs();
  var d = window._hookDraft; var ix = d.noteIds.indexOf(id);
  if (ix>=0) d.noteIds.splice(ix,1); else d.noteIds.push(id);
  renderHookEditor(false);
}
function renderHookEditor(isNew){
  var d = window._hookDraft; var sc = curSc();
  var h = '<h3 class="m-title">'+(isNew?'New hook':'Edit hook')+'</h3>'
    + '<label class="lbl">Label</label><input class="inp" id="hkLabel" value="'+esc(d.label||'')+'" placeholder="Vornak breaks">'
    + '<label class="lbl">Fires when all of these are true</label>';
  if (!d.conditions.length){ h += '<p class="muted small">No conditions. This hook is manual and always ready to fire.</p>'; }
  d.conditions.forEach(function(c, i){
    if (i>0) h += '<div class="hk-and">and</div>';
    var def = hookKindDef(c.k);
    h += '<div class="hk-cond-row"><select class="inp" id="hkK'+i+'" onchange="hkCondKind('+i+',this.value)">';
    HOOK_KINDS.forEach(function(K){ h += '<option value="'+K.k+'"'+(K.k===c.k?' selected':'')+'>'+K.label+'</option>'; });
    h += '</select>';
    if (def.needs==='pct')  h += '<input class="inp" id="hkP'+i+'" type="number" min="1" max="100" value="'+(c.pct!=null?c.pct:50)+'" style="width:72px"> %';
    if (def.needs==='n')    h += '<input class="inp" id="hkN'+i+'" type="number" min="1" value="'+(c.n!=null?c.n:2)+'" style="width:72px">';
    if (def.needs==='name') h += '<input class="inp" id="hkM'+i+'" value="'+esc(c.name||'')+'" placeholder="affliction name" style="flex:1">';
    h += '<button class="mini danger" onclick="hkDelCond('+i+')">&times;</button></div>';
  });
  h += '<button class="btn ghost small" onclick="hkAddCond()">+ Add condition</button>';
  h += '<label class="lbl">Notes to reveal (in order)</label>';
  var entries = sc.entries || [];
  if (!entries.length){ h += '<p class="muted small">This scene has no notes yet. Add notes first, then attach them here.</p>'; }
  entries.forEach(function(e){
    var on = d.noteIds.indexOf(e.id)>=0;
    var pos = d.noteIds.indexOf(e.id);
    h += '<div class="hk-note-pick"><input type="checkbox" '+(on?'checked':'')+' onchange="hkToggleNote(\''+e.id+'\')">'
      + '<span class="entry-type t-'+e.type+'">'+noteTypeLabel(e.type)+'</span> '+esc(e.title||'Untitled')
      + (on ? ' <span class="hk-count">#'+(pos+1)+'</span>' : '') + '</div>';
  });
  h += '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Cancel</button>'
    + '<button class="btn" onclick="saveHook()">Save hook</button></div>';
  modal(h);
}
function saveHook(){
  syncHookInputs();
  var d = window._hookDraft; if (!d) return;
  if (!d.label){ d.label = 'Hook'; }
  var sc = curSc(); sc.hooks = sc.hooks || [];
  var found = false;
  sc.hooks.forEach(function(h, i){ if (h.id===d.id){ sc.hooks[i] = d; found = true; } });
  if (!found) sc.hooks.push(d);
  window._hookDraft = null;
  closeModal(); save(); render();
}

function fwAdjT(key,open){ window._fwAdj=window._fwAdj||{}; window._fwAdj[key]=!!open; }
function fwDockHtml(){
  var nodes=battleNodes(); if(!nodes.length) return '';
  var h='<div class="fw-dock">';
  nodes.forEach(function(n){
    var v=cbVitOf(n), max=v.maxVit||0, cur=Math.max(0,v.curVit||0);
    var pct=max?Math.max(0,Math.min(100,Math.round(cur/max*100))):0;
    var down=(max>0 && cur<=0);
    var ch=(n.kind==='m')?cbChargeOf(n):((n.st&&n.st.charge)||0);
    var pips=''; for(var pi=0;pi<3;pi++) pips+='<span class="tk-pip'+(pi<ch?' lit':'')+'"></span>';
    var lock='';
    if(n.kind==='p'){ var lk=!!(n.st&&n.st.act); lock='<span class="tk-lock'+(lk?' in':'')+'" title="'+(lk?'Locked in':'Waiting to lock')+'"></span>'; }
    var _pd=((curSc().battle||{}).pend||{})[n.key];
    var arrow=(_pd&&_pd.dvit)?(' \u00b7 \u2192 '+Math.max(0, cur+_pd.dvit)):'';
    h+='<div class="fw-tk'+(n.kind==='m'?' foe':'')+(down?' down':'')+'" onclick="fwTokenPopup(\''+n.key+'\')">'+lock
      +'<div class="tn">'+esc(n.name)+'</div>'
      +'<div class="tv"><i style="width:'+pct+'%"></i></div>'
      +'<div class="ts">'+(max?(cur+' / '+max):'on sheet')+arrow+'</div>'
      +'<div class="ts2"><span class="tk-pips">'+pips+'</span>'+(n.kind==='m'&&n.ref.stance?'<span class="tk-st">'+esc(n.ref.stance)+'</span>':'')+'</div></div>';
  });
  return h+'</div>';
}
function fwStageHead(sc){
  var b=sc.battle;
  return '<div class="fw-stagehead"><div class="fw-sh-top">'
    +'<span class="fw-mode"><span class="fw-dot"></span><span>Combat \u00b7 Round '+(b.round||1)+(sc.name?(' \u00b7 '+esc(sc.name)):'')+'</span></span>'
    +'</div>'+fwDockHtml()+'</div>';
}
function cbLogPanel(sc){
  if(!(sc && sc.mode==='combat')) return '';
  var clog=(sc.battle&&sc.battle.clog)||[];
  return '<details class="fw-record"'+(window._fwRecOpen?' open':'')+' ontoggle="window._fwRecOpen=this.open">'
    +'<summary>Combat Logs'+(clog.length?' \u00b7 '+Math.min(clog.length,30):'')+' <span>\u25be</span></summary>'
    +'<div class="cbl"><div class="cbl-body">'
    + (clog.length ? clog.slice(0,30).map(function(e){ return '<div class="cbl-row cbl-'+(e.side||'system')+'">'+esc(e.text||'')+'</div>'; }).join('') : '<div class="cbl-empty">Resolved hits, rolls, and effects appear here. Players see the same log.</div>')
    + '</div></div></details>';
}
function runnerCombat(sc){
  var h = '<div class="run-combat">';
  h += fwStageHead(sc);
  h += tabCombat(sc);
  h += hooksStrip(sc);
  h += '<details class="run-fold"><summary>Disruptions <span class="fold-meta">'+disBalance()+' / '+disBase()+' available</span></summary>'+tabDisruptions(sc)+'</details>';
  h += '<details class="run-fold"><summary>Hooks</summary>'+hooksManager(sc)+'</details>';
  h += cbLogPanel(sc);
  h += '</div>';
  return h;
}

function runnerCompleteBtn(sc){
  if (sc.status === 'done'){
    return '<button class="btn wide reopen" onclick="reopenScene()">Reopen scene</button>';
  }
  return '<button class="btn wide complete" onclick="completeScene()">&#10003; Mark scene complete</button>';
}

function runnerLogBlock(sc){
  var h = '<div class="run-h">Log</div>';
  h += '<div class="run-logbox"><input class="qd-in run-logi" id="runLog" placeholder="What just happened?" onkeydown="runnerLogKey(event)">'
    + '<button class="qd-b" onclick="runnerLog()">Add</button></div>';
  if (sc.log.length){
    h += '<div class="run-loglist">';
    sc.log.slice(0,8).forEach(function(n){
      h += '<div class="run-logrow"><span class="log-ts">'+esc(n.ts)+'</span> '+esc(n.text)+'</div>';
    });
    h += '</div>';
  }
  return h;
}

function scrRunner(){
  var sc = curSc(); if (!sc){ V.screen='session'; return scrSession(); }
  if (!sc.beatDone) sc.beatDone = {};
  var mode = sc.mode || 'roleplay';
  var sibs = runnerSiblings();
  var idx = sibs.map(function(x){ return x.id; }).indexOf(V.scId);

  var bar = '<div class="run-bar">'
    + '<button class="run-exit" onclick="exitRunner()">&larr; Prep</button>'
    + '<div class="run-bar-mid"><span class="run-scene-row"><span class="run-scene">'+esc(sc.name)+'</span>'
    + '<span class="mode-badge '+mode+'">'+(mode==='combat'?'Combat':'Roleplay')+'</span>'
    + (sc.status==='done'?'<span class="done-badge">Done</span>':'')+'</span>'
    + '<span class="run-pos">Scene '+(idx+1)+' of '+sibs.length+'</span>'
    + '<span class="run-saved" id="runSavedLine">'+(S._savedLocal?('Saved '+fmtClock(S._savedLocal)):'')+(S._syncedAcct?(' &middot; synced'):'')+'</span></div>'
    + sceneNavControls(sc)
    + '</div>';

  var head = '<div class="run-head">' + bar + runnerActions(sc, mode) + runnerAttendance(sc) + '</div>';
  var body;
  if (mode === 'combat'){
    body = runnerCombat(sc);
  } else {
    body = V.runList ? runnerNarration(sc) : runnerStepper(sc);
  }
  return '<div class="run-shell">' + head + '<div class="run-scroll">' + body + '</div></div>';
}


function scrLibrary(){
  var h = '<h1 class="page-h">Library</h1>';
  var sc = curSc();
  if (sc){
    h += '<div class="ctx-bar">Adding to <b>'+esc(sc.name)+'</b>. Tap <span class="gold">+</span> on any profile to drop it into the scene.'
      + '<button class="btn small" onclick="nav(\'scene\')">Back to scene</button></div>';
  }
  h += '<div class="tabs">';
  [['all','All'],['monster','Foes'],['npc','NPCs'],['item','Items']].forEach(function(f){
    h += '<button class="tab'+(V.libFilter===f[0]?' on':'')+'" onclick="setLibFilter(\''+f[0]+'\')">'+f[1]+'</button>';
  });
  h += '</div>';
  var list = S.library.filter(function(e){ return V.libFilter==='all' || e.type===V.libFilter; });
  if (!list.length){
    h += emptyState('Nothing here yet. Profiles you create can be attached to any scene in any campaign.', 'New profile', 'newProfile()');
  } else {
    list.forEach(function(e){
      var sub = TYPE_LABEL[e.type];
      if (e.sr) sub += ' &middot; '+esc(e.sr)+' &middot; '+effMaxVit(e)+' vit';
      else if (e.role) sub += ' &middot; '+esc(e.role);
      var canAttach = V.scId && curSc();
      if (!window._cardMenus) window._cardMenus = {};
      var mid = 'm' + (window._cardMenuSeq = (window._cardMenuSeq||0) + 1);
      window._cardMenus[mid] = { coverFn:'editLib(\''+e.id+'\')', renameFn:'', dupFn:'duplicateLib(\''+e.id+'\')', delFn:'deleteLib(\''+e.id+'\')', title:e.name };
      var corner = '';
      if (canAttach) corner += '<button class="icon-btn gold attach-btn" title="Add to current scene" onclick="event.stopPropagation();quickAttach(\''+e.id+'\')">+</button>';
      corner += '<button class="card-menu-btn" title="Options" onclick="event.stopPropagation();cardMenu(\''+mid+'\')">&#8943;</button>';
      var hasImg = e.img && e.img.length;
      h += '<div class="vcard libcard'+(hasImg?' has-cover':'')+'">'
        + '<button class="vcard-main" onclick="editLib(\''+e.id+'\')">'
        + (hasImg ? '<div class="vcard-cover"><img src="'+esc(imgSrc(e.img))+'" alt=""></div>' : '')
        + '<div class="vcard-body"><div class="vcard-badge">'+TYPE_LABEL[e.type]+'</div>'
        + '<div class="vcard-title">'+esc(e.name)+'</div><div class="vcard-sub">'+sub+'</div>'
        + (e.origin ? '<div class="vcard-origin">From '+esc(e.origin)+'</div>' : '')
        + '</div></button>'
        + '<div class="vcard-corner inline">'+corner+'</div></div>';
    });
    h += '<button class="btn wide" onclick="newProfile()">New '+(V.libFilter==='all'?'profile':TYPE_LABEL[V.libFilter])+'</button>';
  }
  return h;
}

/* ---------- search ---------- */

function snippet(text, q){
  var t = String(text||'');
  var i = t.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return esc(t.slice(0, 90)) + (t.length>90?'...':'');
  var start = Math.max(0, i - 35);
  var end = Math.min(t.length, i + q.length + 55);
  var pre = (start>0?'...':'') + t.slice(start, i);
  var hit = t.slice(i, i+q.length);
  var post = t.slice(i+q.length, end) + (end<t.length?'...':'');
  return esc(pre) + '<mark>' + esc(hit) + '</mark>' + esc(post);
}

/* Search the open campaign + the shared library. Returns ranked results. */
function runSearch(q){
  q = (q||'').trim();
  var res = [];
  if (q.length < 2) return res;
  var lc = q.toLowerCase();
  function has(s){ return s && String(s).toLowerCase().indexOf(lc) >= 0; }

  var c = curC();
  if (c){
    if (has(c.name) || has(c.desc)){
      res.push({ kind:'Campaign', title:c.name, sub:snippet(c.desc||c.name, q), go:"nav('campaign','"+c.id+"')" });
    }
    /* campaign notes */
    (c.entries||[]).forEach(function(en){
      if (has(en.title) || has(en.body)){
        res.push({ kind:'Note', title:(en.title||'Untitled')+' ('+noteTypeLabel(en.type)+')', sub:snippet(en.body||en.title, q), go:"nav('campaign','"+c.id+"')" });
      }
    });
    /* players */
    (c.players||[]).forEach(function(p){
      if (has(p.name)) res.push({ kind:'Player', title:p.name, sub:'Level '+p.level, go:"nav('campaign','"+c.id+"');setCTab('roster')" });
    });
    c.acts.forEach(function(a){
      if (has(a.name) || has(a.desc)) res.push({ kind:'Act', title:a.name, sub:snippet(a.desc||a.name, q), go:"nav('act',undefined,'"+a.id+"')" });
      (a.entries||[]).forEach(function(en){
        if (has(en.title) || has(en.body)) res.push({ kind:'Note', title:(en.title||'Untitled')+' in '+a.name, sub:snippet(en.body||en.title, q), go:"nav('act',undefined,'"+a.id+"')" });
      });
      a.sessions.forEach(function(s){
        if (has(s.name) || has(s.desc)) res.push({ kind:'Session', title:s.name, sub:snippet(s.desc||s.name, q), go:"nav('session',undefined,undefined,'"+s.id+"')" });
        (s.entries||[]).forEach(function(en){
          if (has(en.title) || has(en.body)) res.push({ kind:'Note', title:(en.title||'Untitled')+' in '+s.name, sub:snippet(en.body||en.title, q), go:"nav('session',undefined,undefined,'"+s.id+"')" });
        });
        s.scenes.forEach(function(sc){
          if (has(sc.name) || has(sc.desc)) res.push({ kind:'Scene', title:sc.name, sub:snippet(sc.desc||sc.name, q), go:"openScene('"+sc.id+"')" });
          (sc.entries||[]).forEach(function(en){
            if (has(en.title) || has(en.body)) res.push({ kind:'Note', title:(en.title||'Untitled')+' in '+sc.name, sub:snippet(en.body||en.title, q), go:"openScene('"+sc.id+"')" });
          });
          (sc.log||[]).forEach(function(lg){
            if (has(lg.text)) res.push({ kind:'Play log', title:sc.name, sub:snippet(lg.text, q), go:"openScene('"+sc.id+"')" });
          });
        });
      });
    });
  }
  /* library assets */
  (S.library||[]).forEach(function(e){
    if (has(e.name) || has(e.desc) || has(e.role) || has(e.sr)){
      res.push({ kind:TYPE_LABEL[e.type]||'Asset', title:e.name, sub:snippet(e.desc||e.role||e.sr||TYPE_LABEL[e.type], q), go:"nav('library');editLib('"+e.id+"')" });
    }
  });
  /* glossary */
  (S.glossary||[]).forEach(function(g){
    if (has(g.term) || has(g.description)){
      res.push({ kind:'Glossary', title:g.term, sub:snippet(g.description||g.type, q), go:"glossInfo('"+g.id+"')" });
    }
  });
  return res;
}

function scrSearch(){
  var q = window._searchQ || '';
  var h = '<h1 class="page-h">Search</h1>';
  h += '<input class="inp" id="searchBox" value="'+esc(q)+'" placeholder="Search names, notes, descriptions..." oninput="onSearch(this.value)" autocomplete="off">';
  if (!curC()){
    h += '<p class="muted small-note">Open a campaign to search its acts, sessions, scenes, and notes. The library and glossary are always searched.</p>';
  }
  if (q.trim().length < 2){
    h += '<p class="muted small-note">Type at least two characters.</p>';
    return h;
  }
  var res = runSearch(q);
  if (!res.length){
    h += '<p class="muted">No matches for "'+esc(q)+'".</p>';
    return h;
  }
  h += '<p class="muted small-note">'+res.length+' result'+(res.length===1?'':'s')+'</p>';
  res.forEach(function(r){
    h += '<button class="search-row" onclick="'+r.go+'">'
      + '<span class="search-kind">'+esc(r.kind)+'</span>'
      + '<span class="search-title">'+esc(r.title)+'</span>'
      + '<span class="search-snip">'+r.sub+'</span></button>';
  });
  return h;
}
function onSearch(v){
  window._searchQ = v;
  /* re-render only the results area to keep the input focused */
  var box = document.getElementById('searchBox');
  var caret = box ? box.selectionStart : null;
  render();
  var box2 = document.getElementById('searchBox');
  if (box2){ box2.focus(); if (caret!=null){ try { box2.setSelectionRange(caret, caret); } catch(e){} } }
}

function scrData(){
  var h = '<button class="btn small ghost back-data" onclick="nav(campaignResumeScreen())">&larr; Back</button>'
    + '<h1 class="page-h">Settings and data</h1>'
    + '<p class="muted">'+(WIX.connected
        ? 'Connected to lorefell.com. Campaign progress and your Assets library both sync to your account automatically, and this browser keeps a local copy.'
        : 'Saving to this browser. When embedded on lorefell.com with the sync code installed, changes save to your account automatically.')+'</p>'
    + '<div class="sec-h">Backup</div>'
    + '<textarea class="inp ta tall mono" id="expTA" readonly>'+esc(exportJson())+'</textarea>'
    + '<button class="btn wide" id="copyBtn" onclick="copyExport()">Copy backup</button>'
    + (WIX.hosted ? '<button class="btn wide" onclick="syncAllToAccount()">Save all adventures to my account</button>' : '')
    + '<div class="sec-h">Add an adventure</div>'
    + '<p class="muted">Import an adventure pack as a new campaign. This only adds. It never changes or replaces your existing adventures or your library.</p>'
    + '<input type="file" accept="application/json,.json" id="packFile" style="display:none" onchange="readPack(this)">'
    + '<button class="btn wide" onclick="document.getElementById(\'packFile\').click()">Choose adventure pack</button>'
    + '<div id="packMsg" class="muted small-note" style="margin-top:8px"></div>'
    + '<div class="sec-h">Restore</div>'
    + '<textarea class="inp ta mono" id="impTA" placeholder="Paste a backup here"></textarea>'
    + '<button class="btn wide ghost" onclick="importJson()">Load backup</button>'
    + '<div class="sec-h">Settings</div>'
    + '<div class="card p-row"><span class="p-name">Campaign mode<br><span class="set-note">Highlights glossary terms in notes. Tap a gold term for its meaning.</span></span>'
    + '<button class="toggle'+(S.glossaryOn?' on':'')+'" onclick="toggleGlossary()"><span class="toggle-dot"></span></button></div>'
    + '<div class="card p-row"><span class="p-name">Rolls<br><span class="set-note">Every roll in LoreFell is a d6. A 6 is a Fellmark, a 1 is a Fellstrike.</span></span></div>'
    + '<div class="sec-h">Danger</div>'
    + '<button class="btn wide danger-btn" onclick="wipeAll()">Delete everything</button>'
    + '<p class="build-stamp">Build '+esc(BUILD_VERSION)+'</p>';
  return h;
}

/* ---------- main render ---------- */

function mast(){ return '<div class="fw-mast">The Fate<span class="fw-well">Well</span></div>'; }
function render(){
  renderSavedTag();
  var runner = (V.screen==='runner');
  try { document.body.classList.toggle('runner-mode', runner); document.documentElement.classList.toggle('runner', runner); } catch(_){}
  try {
    var _fsc=curSc(); var _fw=!!(runner && _fsc && _fsc.mode==='combat');
    document.body.classList.toggle('fw-flow', _fw);
    document.documentElement.classList.toggle('fw-flow', _fw);
    if(_fw && !window._fwFlowPrev){ try{window.scrollTo(0,0);}catch(_){} }
    window._fwFlowPrev=_fw;
  } catch(_){}
  var h = runner ? '' : (mast() + bottomNav() + crumb());
  h += runner ? '<main class="wrap wrap-run">' : '<main class="wrap">';
  if (V.screen==='campaigns') h += scrCampaigns();
  else if (V.screen==='campaign') h += scrCampaign();
  else if (V.screen==='act') h += scrAct();
  else if (V.screen==='session') h += scrSession();
  else if (V.screen==='scene') h += scrScene();
  else if (V.screen==='library') h += scrLibrary();
  else if (V.screen==='search') h += scrSearch();
  else if (V.screen==='runner') h += scrRunner();
  else h += scrData();
  h += '</main>';
  if (V.ov) h += ovHtml();
  var _scR=[]; try{ document.querySelectorAll('.run-col,.run-scroll').forEach(function(el){ _scR.push(el.scrollTop); }); }catch(_){}
  document.getElementById('app').innerHTML = h;
  try{ var _scE=document.querySelectorAll('.run-col,.run-scroll'); for(var _si=0;_si<_scE.length;_si++){ if(_scR[_si]!=null) _scE[_si].scrollTop=_scR[_si]; } }catch(_){}
  try { wireCardDrag(); } catch(_){}
  try { publishCombat(); } catch(_){}
  try { if(window._fwPopKey && document.getElementById('fwTkOvl')) fwTokenPopup(window._fwPopKey); } catch(_){}
  document.getElementById('bnav-slot').innerHTML = '';
}

document.addEventListener('DOMContentLoaded', function(){
  render();
  requestWix();
  setTimeout(function(){ if (!WIX.connected) requestWix(); }, 1600);
});

</script>
</body>
