/* Readable-on-navy palette. Gold stays ornament, so it is not in here. */
var SPEAKER_COLORS = ['#7fb3d5','#86c79b','#b18fd0','#e0a86b','#d98a8a','#6fc7c0','#c9b06a','#9aa8e0','#d49ac0','#8fc16a'];
function speakerColor(name){
  var key = String(name).toLowerCase().replace(/\s+\d+$/,'').trim();
  var h = 0, i;
  for (i=0;i<key.length;i++){ h = (h*31 + key.charCodeAt(i)) >>> 0; }
  return SPEAKER_COLORS[h % SPEAKER_COLORS.length];
}

/* Named NPCs and monsters attached at a given level, deduped, with colors. */
function speakersForRef(ref){
  var lv = levelByRef(ref); if (!lv) return [];
  var acc;
  if (ref.indexOf('sc:')===0) acc = entitiesOfScene(lv);
  else if (ref.indexOf('s:')===0) acc = entitiesOfSession(lv);
  else if (ref.indexOf('a:')===0) acc = entitiesOfAct(lv);
  else { /* campaign: roll up every act */
    acc = { ids:{}, extra:[] };
    (lv.acts||[]).forEach(function(a){ mergeEnt(acc, entitiesOfAct(a)); });
  }
  var out = [], seen = {};
  Object.keys(acc.ids).forEach(function(id){
    var e = libGet(id);
    if (e && (e.type==='npc' || e.type==='monster') && !seen[e.name.toLowerCase()]){
      seen[e.name.toLowerCase()] = true;
      out.push({ name:e.name, type:e.type, color:speakerColor(e.name), img:e.img||'' });
    }
  });
  acc.extra.forEach(function(x){
    var base = x.name.replace(/\s\d+$/,'');
    if (!seen[base.toLowerCase()]){ seen[base.toLowerCase()]=true; out.push({ name:base, type:x.type, color:speakerColor(base) }); }
  });
  out.sort(function(a,b){ return a.name.localeCompare(b.name); });
  return out;
}

/* Mention targets: attached monsters/NPCs plus the campaign's players. */
function mentionsForRef(ref){
  var list = speakersForRef(ref).slice();
  var seen = {}; list.forEach(function(s){ seen[s.name.toLowerCase()]=true; });
  var c = curC();
  if (c){
    c.players.forEach(function(p){
      if (!seen[p.name.toLowerCase()]){ seen[p.name.toLowerCase()]=true; list.push({ name:p.name, type:'player', color:speakerColor(p.name) }); }
    });
  }
  list.sort(function(a,b){ return a.name.localeCompare(b.name); });
  return list;
}

function normGloss(g){
  var aliases = g.aliases;
  if (typeof aliases === 'string') aliases = aliases.split(',').map(function(a){ return a.trim(); }).filter(Boolean);
  return {
    id: g.id || g._id || uid(),
    term: (g.term || g.name || '').trim(),
    type: g.type || '',
    description: g.description || g.desc || '',
    aliases: aliases || [],
    autoHighlight: g.autoHighlight === true || g.autoHighlight === 'true' || g.autoHighlight === 1
  };
}
function glossById(id){ var r=null; (S.glossary||[]).forEach(function(g){ if(g.id===id) r=g; }); return r; }

/* Active highlightable terms (only when campaign mode is on and the term is flagged),
   expanded with aliases and sorted longest-first for greedy matching. */
function glossaryActiveTerms(){
  if (!S.glossaryOn) return [];
  var out = [];
  (S.glossary||[]).forEach(function(g){
    if (!g.autoHighlight || !g.term) return;
    out.push({ needle:g.term, id:g.id, cs:!!g.cs });
    (g.aliases||[]).forEach(function(a){ if (a) out.push({ needle:a, id:g.id, cs:!!g.cs }); });
  });
  out.sort(function(a,b){ return b.needle.length - a.needle.length; });
  return out;
}
function isWordChar(ch){ return /[A-Za-z0-9]/.test(ch); }

/* Escape raw text and wrap the first occurrence of each flagged term in a gold chip.
   used: map of glossary id -> true, so each term highlights once per note. */
function glossText(t){
  try { return glossaryWrap(String(t||''), {}, glossaryActiveTerms()); } catch(e){ return esc(t||''); }
}
function glossaryWrap(text, used, terms){
  if (!terms || !terms.length) return esc(text);
  var lc = text.toLowerCase();
  var out = '', i = 0;
  while (i < text.length){
    var matched = null;
    var boundaryBefore = (i===0) || !isWordChar(text.charAt(i-1));
    if (boundaryBefore){
      for (var k=0;k<terms.length;k++){
        var n = terms[k].needle, nl = n.toLowerCase();
        var hitHere = terms[k].cs ? (text.substr(i, n.length) === n) : (lc.indexOf(nl, i) === i);
        if (hitHere){
          var afterCh = (i+n.length < text.length) ? text.charAt(i+n.length) : ' ';
          if (!isWordChar(afterCh)){ matched = terms[k]; break; }
        }
      }
    }
    if (matched){
      var seg = text.substr(i, matched.needle.length);
      if (!used[matched.id]){
        used[matched.id] = true;
        out += '<button class="gloss" onclick="glossInfo(\'' + matched.id + '\')">' + esc(seg) + '</button>';
      } else {
        out += esc(seg);
      }
      i += matched.needle.length;
      continue;
    }
    out += esc(text.charAt(i));
    i++;
  }
  return out;
}
function glossInfo(id){
  var g = glossById(id); if (!g) return;
  var typeLine = g.type ? '<p class="muted">'+esc(g.type)+'</p>' : '';
  modal('<h3 class="m-title">'+esc(g.term)+'</h3>'+typeLine
    + '<p class="desc-show">'+esc(g.description||'No description yet.')+'</p>'
    + '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button></div>');
}
function toggleGlossary(){ S.glossaryOn = !S.glossaryOn; save(); render(); }

/* Render a note body, coloring lines that open with an attached speaker's name. */
function renderNoteBody(body, ref){
  var speakers = speakersForRef(ref);
  var byName = {};
  speakers.forEach(function(s){ byName[s.name.toLowerCase()] = s; });
  /* mentions can also point at players; build a wider map for @tags */
  var mentionList = mentionsForRef(ref);
  var byMention = {};
  mentionList.forEach(function(s){ byMention[s.name.toLowerCase()] = s; });
  var mentionNames = mentionList.map(function(s){ return s.name; }).sort(function(a,b){ return b.length - a.length; });
  var glossTerms = glossaryActiveTerms();
  var glossUsed = {};

  function withMentions(text){
    /* text is RAW (unescaped) here; we escape segments as we go */
    var out = '';
    var i = 0;
    while (i < text.length){
      if (text.charAt(i) === '@'){
        var rest = text.slice(i+1);
        var hit = null;
        for (var k=0;k<mentionNames.length;k++){
          var nm = mentionNames[k];
          if (rest.toLowerCase().indexOf(nm.toLowerCase())===0){ hit = nm; break; }
        }
        if (hit){
          var sp = byMention[hit.toLowerCase()];
          out += '<button class="mention" style="color:'+sp.color+';border-color:'+sp.color+'" onclick="mentionInfo(\''+hit.replace(/'/g,"\\'")+'\',\''+ref+'\')">@'+esc(hit)+'</button>';
          i += 1 + hit.length;
          continue;
        }
      }
      /* accumulate a plain run until the next @ */
      var next = text.indexOf('@', i+1);
      if (next === -1) next = text.length;
      out += glossaryWrap(text.slice(i, next), glossUsed, glossTerms);
      i = next;
    }
    return out;
  }

  var lines = String(body).split('\n');
  var out = lines.map(function(line){
    var m = line.match(/^(\s*)([^:]{1,40}):(\s*)([\s\S]*)$/);
    if (m){
      var rawName = m[2].trim();
      var lookup = rawName.toLowerCase().replace(/\s+\d+$/,'');
      /* dialogue can be spoken by monsters, NPCs, or players: use the wider map */
      var sp = byMention[rawName.toLowerCase()] || byName[rawName.toLowerCase()] || byMention[lookup] || byName[lookup];
      if (sp){
        var spImg = sp.img || entityImgByName(rawName);
        var av = spImg ? '<img class="dlg-av" src="'+esc(imgSrc(spImg))+'" alt="">' : '';
        return esc(m[1]) + '<span class="dlg" style="color:'+sp.color+'">'
          + av + '<b>'+esc(rawName)+':</b> ' + applyEmphasis(withMentions(m[4])) + '</span>';
      }
    }
    return applyEmphasis(withMentions(line));
  });
  return out.join('<br>');
}

function entityImgByName(name){
  var exact=String(name).toLowerCase(), base=exact.replace(/\s+\d+$/,''), hit='';
  S.library.forEach(function(x){
    if ((x.type==='npc'||x.type==='monster') && !hit){
      var n=x.name.toLowerCase();
      if ((n===exact||n===base) && x.img) hit=x.img;
    }
  });
  return hit;
}
/* Inline emphasis: **bold** and *italic*. Applied per line, after escaping, so it
   never reaches into the tags or speaker spans the formatter already built. */
function applyEmphasis(html){
  return String(html)
    .replace(/\*\*([^*\n]+)\*\*/g, '<b>$1</b>')
    .replace(/\*([^*\n]+)\*/g, '<i>$1</i>');
}

/* Open the library/quick-review card for an @mentioned entity by name. */
function mentionInfo(name, ref){
  var exact = String(name).toLowerCase();
  var stripped = exact.replace(/\s+\d+$/,'');

  /* 1. library entities (exact match first, then base-name for numbered instances) */
  var e = null;
  S.library.forEach(function(x){
    if ((x.type==='monster'||x.type==='npc'||x.type==='item') && x.name.toLowerCase()===exact) e = x;
  });
  if (!e){
    S.library.forEach(function(x){
      if (!e && (x.type==='monster'||x.type==='npc'||x.type==='item') && x.name.toLowerCase()===stripped) e = x;
    });
  }
  if (e){ chipInfo(e.id); return; }

  /* 2. players on the campaign (exact name, including names that end in a number) */
  var c = curC();
  if (c){
    var p = null;
    c.players.forEach(function(pl){ if (!p && pl.name.toLowerCase()===exact) p = pl; });
    if (!p) c.players.forEach(function(pl){ if (!p && pl.name.toLowerCase()===stripped) p = pl; });
    if (p){
      modal('<h3 class="m-title">'+esc(p.name)+'</h3><p class="muted">Player &middot; Level '+p.level+'</p>'
        + '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button></div>');
      return;
    }
  }
  modal('<h3 class="m-title">'+esc(name)+'</h3><p class="muted">No matching profile found at this level.</p>'
    + '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button></div>');
}

function insertMention(name){
  var ta = document.getElementById('enBody');
  if (!ta) return;
  var v = ta.value || '';
  var pos = (ta.selectionStart !== undefined && ta.selectionStart !== null) ? ta.selectionStart : v.length;
  var pre = v.slice(0, pos), post = v.slice(pos);
  if (pre.length && !/\s$/.test(pre)) pre += ' ';
  var ins = '@' + name + ' ';
  ta.value = pre + ins + post;
  var caret = (pre + ins).length;
  try { ta.focus(); ta.setSelectionRange(caret, caret); } catch(e){}
}
function insertSpeaker(name){
  var ta = document.getElementById('enBody');
  if (!ta) return;
  var v = ta.value || '';
  var pos = (ta.selectionStart !== undefined && ta.selectionStart !== null) ? ta.selectionStart : v.length;
  var pre = v.slice(0, pos), post = v.slice(pos);
  /* start on a fresh line if we are mid-line */
  if (pre.length && !/\n$/.test(pre)) pre += '\n';
  var ins = name + ': ';
  ta.value = pre + ins + post;
  var caret = (pre + ins).length;
  try { ta.focus(); ta.setSelectionRange(caret, caret); } catch(e){}
}
function wrapSelection(marker){
  var ta = document.getElementById('enBody'); if (!ta) return;
  var v = ta.value || '';
  var s = (ta.selectionStart!=null) ? ta.selectionStart : v.length;
  var e = (ta.selectionEnd!=null) ? ta.selectionEnd : v.length;
  var sel = v.slice(s, e) || 'text';
  ta.value = v.slice(0, s) + marker + sel + marker + v.slice(e);
  try { ta.focus(); ta.setSelectionRange(s+marker.length, s+marker.length+sel.length); } catch(_){}
}

/* one prep note as a card, used when card view is on */
function noteCard(ref, e, num){
  var t = e.type || 'general';
  var img = e.img ? '<div class="nc-img"><img src="'+esc(imgSrc(e.img))+'" alt=""></div>' : '';
  var raw = e.body || '';
  var longBody = raw.length > 220 || raw.split('\n').length > 3;
  var body;
  if (!raw){ body = e.img ? '' : '<div class="nc-body muted">Empty.</div>'; }
  else if (longBody){ body = '<div class="nc-body clamp">'+renderNoteBody(raw, ref)+'</div><button type="button" class="nc-more" onclick="toggleNoteBody(this)">More</button>'; }
  else { body = '<div class="nc-body">'+renderNoteBody(raw, ref)+'</div>'; }

function notesBlock(ref, opts){
  opts = opts || {};
  var entries = levelEntries(ref);
  if (V.cardView){
    var hc = '<div class="notes-block">';
    if (!entries.length){
      hc += '<p class="muted pad">No notes yet. Break things into titled entries you can fold and jump to.</p>';
    } else {
      hc += '<div class="cardgrid notegrid" data-kind="note" data-ref="'+ref+'">';
      sortedEntries(entries).forEach(function(e,i){ hc += noteCard(ref, e, i+1); });
      hc += '</div>';
    }
    hc += '<button class="btn wide ghost small add-note" onclick="addEntry(\''+ref+'\')">+ Add note</button>';
    if(ref.indexOf('sc:')===0) hc += '<button class="btn wide ghost small" onclick="forgeScene(\''+ref+'\')">Forge the scene</button>';
    if(ref.indexOf('sc:')===0) hc += '<button class="btn wide ghost small" onclick="summonFoes(\''+ref+'\')">Summon foes</button>';
    hc += '</div>';
    return hc;
  }
  var h = '<div class="notes-block">';
  if (!entries.length){
    h += '<p class="muted pad">No notes yet. Break things into titled entries you can fold and jump to.</p>';
  } else {
    var view = sortedEntries(entries);
    var manyOpen = entries.length >= 3;
    if (entries.length >= 2){
      h += '<div class="notes-tools">'
        + '<button class="mini ghost" onclick="expandAllEntries(\''+ref+'\')">Expand all</button>'
        + '<button class="mini ghost" onclick="collapseAllEntries(\''+ref+'\')">Collapse all</button></div>';
    }
    view.forEach(function(e){
      /* collapse rule: 3+ entries default closed unless pinned or explicitly opened */
      var isOpen = e.pinned || (manyOpen ? (e.open===true) : (e.open!==false));
      var idx = -1; entries.forEach(function(x,i){ if(x.id===e.id) idx=i; });
      h += '<div class="entry card-type t-'+e.type+(e.pinned?' pinned':'')+'" id="entry-'+e.id+'">'
        + '<div class="entry-hd" onclick="toggleEntry(\''+ref+'\',\''+e.id+'\')">'
        + '<span class="caret'+(isOpen?' open':'')+'">&rsaquo;</span>'
        + '<span class="entry-title">'+esc(e.title)+'</span>'
        + '<span class="entry-type t-'+e.type+'">'+noteTypeLabel(e.type)+'</span></div>';
      if (isOpen){
        h += '<div class="entry-body">'
          + (e.img ? '<div class="entry-img"><img src="'+esc(imgSrc(e.img))+'" alt=""></div>' : '')
          + dialogueHead(dialogueSpeaker(e))
          + (e.body ? '<div class="entry-text">'+renderNoteBody(e.body, ref)+'</div>' : (e.img ? '' : '<div class="muted">Empty.</div>'))
          + '<div class="entry-acts">'
          + '<button class="mini'+(e.pinned?' on':'')+'" onclick="pinEntry(\''+ref+'\',\''+e.id+'\')">'+(e.pinned?'Unpin':'Pin')+'</button>'
          + '<button class="mini ghost" onclick="editEntry(\''+ref+'\',\''+e.id+'\')">Edit</button>'
          + '<button class="ord" '+(idx<=0?'disabled':'')+' onclick="moveEntry(\''+ref+'\',\''+e.id+'\',-1)">&uarr;</button>'
          + '<button class="ord" '+(idx>=entries.length-1?'disabled':'')+' onclick="moveEntry(\''+ref+'\',\''+e.id+'\',1)">&darr;</button>'
          + '<button class="mini danger" onclick="deleteEntry(\''+ref+'\',\''+e.id+'\')">Delete</button>'
          + '</div></div>';
      }
      h += '</div>';
    });
  }
  h += '<button class="btn wide ghost small add-note" onclick="addEntry(\''+ref+'\')">+ Add note</button>';
  if(ref.indexOf('sc:')===0) h += '<button class="btn wide ghost small" onclick="forgeScene(\''+ref+'\')">Forge the scene</button>';
  if(ref.indexOf('sc:')===0) h += '<button class="btn wide ghost small" onclick="summonFoes(\''+ref+'\')">Summon foes</button>';
  h += '</div>';
  return h;
}

    + '<div class="token-btns">'
    + '<input type="file" accept="image/*" id="wImgFile" class="token-file" onchange="readToken(this)">'
    + '<button type="button" class="btn small token-up" onclick="document.getElementById(\'wImgFile\').click()">Choose image</button>'
    + '<button type="button" class="btn small ghost" id="wImgClear" onclick="clearToken()"'+(has?'':' style="display:none"')+'>Remove</button>'
    + '</div></div>';
}
function readToken(input){
  var f = input.files && input.files[0];
  if (!f) return;
  if (f.size > 25000000){ alert('That image is very large. Please use one under about 25 MB.'); return; }
  var reader = new FileReader();
  reader.onload = function(ev){
    downscaleImage(ev.target.result, 1024, function(data){
      var hid = document.getElementById('wImg'); if (hid) hid.value = data;
      var prev = document.getElementById('wImgPrev'); if (prev) prev.innerHTML = '<img src="'+data+'" alt="token">';
      var clr = document.getElementById('wImgClear'); if (clr) clr.style.display = '';
    });
  };
  reader.onerror = function(){ alert('Could not read that image. Try a different file.'); };
  reader.readAsDataURL(f);
}
/* Shrink a picked image so the stored value stays small. A full-size phone photo as a
   base64 string is too big for a CMS row, so the save silently fails. Cap the long edge
   and re-encode. Falls back to the original if the canvas path is unavailable. */
function downscaleImage(dataUrl, maxDim, cb){
  try {
    var img = new Image();
    img.onload = function(){
      var w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
      if (!w || !h){ cb(dataUrl); return; }
      var scale = Math.min(1, maxDim / Math.max(w, h));
      var cw = Math.max(1, Math.round(w * scale)), ch = Math.max(1, Math.round(h * scale));
      var cv = document.createElement('canvas'); cv.width = cw; cv.height = ch;
      var ctx = cv.getContext('2d'); if (!ctx){ cb(dataUrl); return; }
      ctx.drawImage(img, 0, 0, cw, ch);
      var out; try { out = cv.toDataURL('image/jpeg', 0.82); } catch(_){ out = ''; }
      cb(out && out.length < dataUrl.length ? out : dataUrl);
    };
    img.onerror = function(){ cb(dataUrl); };
    img.src = dataUrl;
  } catch(_){ cb(dataUrl); }
}

  var f = document.getElementById('wImgFile'); if (f) f.value = '';

function saveWizard(type, id){
  var name = document.getElementById('wName').value.trim();
  if (!name) return;
  var e = id ? libGet(id) : { id: uid(), type: type };
  e.name = name;
  e.desc = document.getElementById('wDesc').value;
  if (type==='monster'){
    var sr = document.getElementById('wSR').value;
    if (!sr){ alert('Pick a Shatter Rating.'); return; }
    e.sr = sr; e.lp = SR_TABLE[sr].lp; e.sp = SR_TABLE[sr].sp;
    e.foeWeight = FOE_WEIGHT[sr] || 0;
    e.maxVit = parseInt(document.getElementById('wVit').value,10) || 0;
    e.build = document.getElementById('wBuild').value.trim();
    e.stance = document.getElementById('wStance').value.trim();
    e.sig = document.getElementById('wSig').value.trim();
    e.source = e.source || 'mine';
    e.img = document.getElementById('wImg').value.trim();
    e.abilities = JSON.parse(JSON.stringify(window._wiz.abilities));
  } else {
    e.role = document.getElementById('wRole').value.trim();
    if (type==='npc'){
      var nv = document.getElementById('wVit');
      e.maxVit = nv ? (parseInt(nv.value,10) || 0) : 0;
      var ni = document.getElementById('wImg');
      e.img = ni ? ni.value : '';
    }
  }
  if (!id){ var _oc = curC(); if (_oc && !e.origin) e.origin = _oc.name || ''; S.library.push(e); }
  pushAsset(e);

function doSummon(diff){

function fwParseFoeLineup(text){
  var out=[]; var chunks=text.split(/@@FOE/).slice(1);
  function snap(val,list){ if(!val)return""; for(var i=0;i<list.length;i++){ if(list[i].toLowerCase()===val.toLowerCase())return list[i]; } for(var j=0;j<list.length;j++){ if(list[j].toLowerCase().indexOf(val.toLowerCase())>=0||val.toLowerCase().indexOf(list[j].toLowerCase())>=0)return list[j]; } return""; }
  chunks.forEach(function(ch){
    var body=ch.split("@@END")[0]; var f={name:"",count:1,build:"",tier:"",stance:"",sig:""};
    body.split(/\r?\n/).forEach(function(ln){
      var m=ln.match(/^\s*(name|count|build|tier|stance|affliction)\s*:\s*(.*)$/i); if(!m) return;
      var v=m[2].trim(), k=m[1].toLowerCase();
      if(k==="name")f.name=v; else if(k==="count")f.count=Math.max(1,Math.min(6,parseInt(v,10)||1));
      else if(k==="build")f.build=v; else if(k==="tier")f.tier=v; else if(k==="stance")f.stance=v;
      else if(k==="affliction")f.sig=(/^none$/i.test(v)?"":v);
    });
    f.build=snap(f.build,FW_FOE_PACK.builds.map(function(b){return b.name;}))||FW_FOE_PACK.builds[0].name;
    f.tier=snap(f.tier,FW_FOE_PACK.tiers.map(function(t){return t.name;}))||"Elite";
    f.stance=snap(f.stance,FW_FOE_PACK.stances)||FW_FOE_PACK.stances[0];
    f.sig=snap(f.sig,FW_FOE_PACK.afflictions);
    if(f.name) out.push(f);
  });
  return out;
}

  attendingPlayers().forEach(function(p){
    var st = pState(p.id);
    nodes.push({ key:'p:'+p.id, kind:'p', ref:p, st:st, name:p.name, act:st.act, target:st.target, done:st.actDone, alive:!(st.maxVit>0 && st.curVit<=0) });
  });
  return nodes;
}
function nodeByKey(key){
  var r=null; battleNodes().forEach(function(n){ if(n.key===key) r=n; }); return r;
}

function focusGraph(){
  var nodes = battleNodes();
  var byKey = {}; nodes.forEach(function(n){ byKey[n.key]=n; n.focus=0; n.cluster=null; });
  var edges = [];       /* all declared ties: define cluster membership for the round */
  var liveEdges = [];   /* unresolved ties: drive glow heat */
  nodes.forEach(function(n){
    if (n.act && n.target && byKey[n.target]){
      edges.push([n.key, n.target]);
      if (!n.done) liveEdges.push([n.key, n.target]);
    }
  });
  liveEdges.forEach(function(e){ byKey[e[0]].focus++; byKey[e[1]].focus++; });
  /* nodes touching any declared edge belong to a cluster for the whole round */
  var inEdge = {};
  edges.forEach(function(e){ inEdge[e[0]]=true; inEdge[e[1]]=true; });
  /* connected components over all declared edges */
  var parent = {};
  function find(k){ while (parent[k]!==k){ parent[k]=parent[parent[k]]; k=parent[k]; } return k; }
  nodes.forEach(function(n){ parent[n.key]=n.key; });
  edges.forEach(function(e){
    var a=find(e[0]), b=find(e[1]);
    if (a!==b) parent[a]=b;
  });
  var clusters = {};
  nodes.forEach(function(n){
    if (inEdge[n.key]){
      var root = find(n.key);
      if (!clusters[root]) clusters[root] = { nodes:[], heat:0 };
      clusters[root].nodes.push(n);
      clusters[root].heat += n.focus;
      n.cluster = root;
    }
  });
  var list = Object.keys(clusters).map(function(k){ return clusters[k]; });
  list.sort(function(a,b){ return b.heat - a.heat; });
  var loose = nodes.filter(function(n){ return !inEdge[n.key]; });
  return { clusters:list, loose:loose, nodes:nodes };
}

function glowTier(n){
  var sc = curSc();
  if (sc.battle.spotMode==='manual'){
    return sc.battle.manual[n.key] ? 3 : 0;
  }
  if (n.focus>=3) return 3;
  if (n.focus===2) return 2;
  if (n.focus===1) return 1;
  return 0;
}

/* Build ordered spotlight items: focus clusters / manual groups, lone unengaged nodes, and events. */
function buildSpotlights(){
  var sc = curSc(), b = sc.battle;
  var raw = [];
  if (b.spotMode==='auto'){
    var g = focusGraph();
    g.clusters.forEach(function(cl, i){
      cl.nodes.sort(function(a,c){ return c.focus - a.focus; });
      var keys = cl.nodes.map(function(n){ return n.key; });
      raw.push({ type:'cluster', id:'cl:'+keys.slice().sort().join('|'), nodes:cl.nodes, label:'Spotlight' });
    });
    g.loose.forEach(function(n){
      raw.push({ type:'solo', id:'solo:'+n.key, nodes:[n], label:'Unengaged' });
    });
  } else {
    /* manual: each lit node (or group of lit nodes) is its own spotlight; rest are unengaged solos */
    var nodes = battleNodes();
    var lit = nodes.filter(function(n){ return b.manual[n.key]; });
    if (lit.length){
      raw.push({ type:'manual', id:'manual:'+lit.map(function(n){return n.key;}).sort().join('|'), nodes:lit, label:'Spotlight' });
    }
    nodes.filter(function(n){ return !b.manual[n.key]; }).forEach(function(n){
      raw.push({ type:'solo', id:'solo:'+n.key, nodes:[n], label:'Unengaged' });
    });
  }
  b.spots.forEach(function(s){ raw.push({ type:'event', id:'ev:'+s.id, event:s, label:'Event' }); });

  /* apply saved order, append new ids in default order, drop stale */
  var byId = {}; raw.forEach(function(r){ byId[r.id]=r; });
  var ordered = [];
  (b.order||[]).forEach(function(id){ if (byId[id]){ ordered.push(byId[id]); delete byId[id]; } });
  raw.forEach(function(r){ if (byId[r.id]){ ordered.push(r); } });

  /* resolved spotlights sink below unresolved, preserving relative order */
  var unresolved = ordered.filter(function(it){ return !spotResolved(it); });
  var resolved = ordered.filter(function(it){ return spotResolved(it); });
  var finalList = unresolved.concat(resolved);

  /* number the active (non-event, non-unengaged) spotlights for labels */
  var n = 0;
  finalList.forEach(function(it){
    if (it.type==='cluster' || it.type==='manual'){ n++; it.label = 'Spotlight ' + n; }
    else if (it.type==='solo'){ it.label = 'Unengaged: ' + it.nodes[0].name; }
    else if (it.type==='event'){ it.label = 'Event'; }
  });
  b.order = finalList.map(function(it){ return it.id; });
  return finalList;
}

function spotResolved(it){
  if (it.type==='event') return !!it.event.done;
  return it.nodes.every(function(n){
    if (n.kind==='m') return n.ref.done || n.ref.curVit<=0 || !n.ref.act;
    return n.st.actDone || !n.st.act;
  });
}

function moveSpot(idx, dir){
  var b = curSc().battle;
  var ord = b.order.slice();
  var j = idx + dir;
  if (j < 0 || j >= ord.length) return;
  var tmp = ord[idx]; ord[idx] = ord[j]; ord[j] = tmp;
  b.order = ord;
  save(); render();
}

}

function unresolvedCount(){

  attendingPlayers().forEach(function(p){
    var st = pState(p.id);
    if (st.act && !st.actDone) n++;
    if (st.react && !st.reactDone) n++;
  });
  sc.battle.spots.forEach(function(s){ if(!s.done) n++; });
  return n;
}

function advanceRound(){
  var sc = curSc();

  if (u > 0){
    askConfirm(u + ' unresolved item' + (u===1?'':'s') + ' remain. Advance the round anyway?', doAdvanceRound, 'Advance');

  }
  doAdvanceRound();
}
function doAdvanceRound(){
  var sc = curSc();
  var b = sc.battle;
  var pend=b.pend||{};
  Object.keys(pend).forEach(function(k){
    var p=pend[k]; if(!p) return;
    if(k.indexOf('m:')===0){
      var id=k.slice(2), foe=null; sc.combatants.forEach(function(c){ if(c.id===id) foe=c; });
      if(foe){
        if(p.dvit){ var mx=foe.maxVit||0, nv=(foe.curVit||0)+p.dvit; foe.curVit=Math.max(0, mx>0?Math.min(mx,nv):nv); }
        (p.affs||[]).forEach(function(nm){ if(!(foe.affs||[]).some(function(a){ return a.name===nm; })) (foe.affs=foe.affs||[]).push({name:nm, kind:'affliction'}); });
      }
    } else if(k.indexOf('p:')===0){
      var pid=k.slice(2), pst=pState(pid);
      if(p.charge!==null && p.charge!==undefined){
        pst.charge=p.charge;
        var _pl=null; (curC().players||[]).forEach(function(x){ if(x.id===pid) _pl=x; });
        if(_pl && _pl.charId){ postToWix({type:'lmtool-combat-charge', campaignId:combatCampaignId(), charId:_pl.charId, value:p.charge}); }
      }
    }
  });
  if(Object.keys(pend).length) cbLog('system','Round '+b.round+' stands. Staged outcomes cement.');
  b.pend={};
  b.round++; b.phase = 'commit'; b.locked = false; b.pLocked = false; b.spots = []; b.manual = {}; b.order = []; window._lastDeclSig=null;
  cbLog('system','Round '+b.round+' begins.');
  b.spotBox = []; b.spotDone = {}; b.undoStack = []; b.activeSpot = 0;
  sc.combatants.forEach(function(c){
    c.act = ''; c.target=''; c.done = false; c.intent = null; c.reactUsed = false; c.fellmark = false; c._pendImp = false; c._acc = null; c.luck = '';
    /* afflictions persist across rounds; removed manually via Fellmark */
  });
  Object.keys(sc.ps).forEach(function(pid){
    var st = sc.ps[pid];
    st.act=''; st.react=''; st.target=''; st.actDone=false; st.reactDone=false; st.reactUsed=false; st.dmg=0; st.dmgDone=0; st.fellmark=false; st.doubleFell=false; st.pierce=0; st.applies=''; st._dealFell=false; st._dealFB=null; st._pendImpP=false; st._rgUsed=false; st._bwUsed=false; st.luck=''; st.base=0; st.dt=''; st.actTier=-1; st.acc=0; st.roll=0; st.kind=''; st.fellstrike=false; st._eva=null; st._loggedEva='';
    /* afflictions persist; cleared manually */
  });
  cbTickFoes(sc);
  save(); render();
}

/* Roster tab for an act or session: auto-collected (bottom-up) + manual additions. */
function ancestorRefs(ref){
  var c = curC(); if (!c) return [];
  var parts = ref.split(':'), kind = parts[0], id = parts[1];
  var src = [];
  if (kind==='a'){ src = (c.manualRefs||[]).slice(); }
  else if (kind==='s'){
    src = (c.manualRefs||[]).slice();
    c.acts.forEach(function(a){ if (a.sessions.some(function(x){ return x.id===id; })) src = src.concat(a.manualRefs||[]); });
  } else if (kind==='sc'){
    src = (c.manualRefs||[]).slice();
    c.acts.forEach(function(a){
      a.sessions.forEach(function(se){
        if (se.scenes.some(function(x){ return x.id===id; })){ src = src.concat(a.manualRefs||[], se.manualRefs||[]); }
      });
    });
  }
  var seen = {}, out = [];
  src.forEach(function(x){ if (!seen[x] && libGet(x)){ seen[x]=true; out.push(x); } });
  return out;
}
function entityRosterTab(ref){
  var lv = levelByRef(ref);
  var kind = ref.indexOf('c:')===0 ? 'campaign' : (ref.indexOf('a:')===0 ? 'act' : 'session');
  var acc = kind==='campaign' ? entitiesOfCampaign(lv) : (kind==='act' ? entitiesOfAct(lv) : entitiesOfSession(lv));
  var autoIds = {}; Object.keys(acc.ids).forEach(function(k){ autoIds[k]=true; });
  var manual = (lv.manualRefs||[]).filter(function(id){ return libGet(id) && !autoIds[id]; });

  var h = '';

function readPack(input){
  var f = input.files && input.files[0];
  input.value = '';                         /* allow re-picking the same file */
  if (!f) return;
  var msg = document.getElementById('packMsg');
  if (msg) msg.textContent = 'Reading ' + f.name + ' ...';
  var reader = new FileReader();
  reader.onload = function(ev){
    var pack;
    try { pack = JSON.parse(ev.target.result); }
    catch(e){ if (msg) msg.textContent = 'That file is not valid JSON.'; return; }
    importPack(pack, msg);
  };
  reader.onerror = function(){ if (msg) msg.textContent = 'Could not read that file.'; };
  reader.readAsText(f);
}

function buildAdventurePack(c){
  var camp = JSON.parse(JSON.stringify(c));
  /* a clean template: the recipient brings their own table */
  camp.players = [];
  var ids = {};
  (camp.manualRefs || []).forEach(function(r){ ids[r] = 1; });
  function scan(arr){ (arr || []).forEach(function(e){ if (e.speaker) ids[e.speaker] = 1; }); }
  scan(camp.entries);
  (camp.acts || []).forEach(function(a){
    scan(a.entries);
    (a.sessions || []).forEach(function(ss){
      scan(ss.entries);
      (ss.scenes || []).forEach(function(sc){ scan(sc.entries); if (sc.ps) sc.ps = {}; if (sc.att) sc.att = {}; sc.mode = 'roleplay'; (sc.hooks||[]).forEach(function(h){ h.fired = false; }); });
    });
  });
  var npcs = [];
  S.library.forEach(function(e){ if (e.type === 'npc' && ids[e.id]) npcs.push(JSON.parse(JSON.stringify(e))); });
  return { meta: { format: 'lorefell-adventure-pack-1', builtAt: Date.now() }, campaign: camp, npcs: npcs };
}

  closeModal();
  advNote('Publishing', 'No need to wait. This finishes on its own, and the card shows a Published tag once it lands.');
}
function importPack(pack, msg){
  function fail(t){ if (msg){ msg.textContent = t; } else { alert(t); } }
  if (!pack || !pack.campaign || !Array.isArray(pack.npcs)
      || !pack.meta || pack.meta.format !== 'lorefell-adventure-pack-1'){
    fail('That does not look like a LoreFell adventure pack.'); return;
  }

  /* fresh, collision-checked ids (uses the existing uid()) */
  var usedIds = {};
  (function collect(o){
    if (o && typeof o === 'object'){
      if (typeof o.id === 'string') usedIds[o.id] = 1;
      for (var k in o){ if (Object.prototype.hasOwnProperty.call(o, k)) collect(o[k]); }
    }
  })(S);
  function freshId(){ var id; do { id = uid(); } while (usedIds[id]); usedIds[id] = 1; return id; }

  /* 1. add every pack NPC to the library as new, map old id -> new id */
  var npcMap = {};
  pack.npcs.forEach(function(n){
    var copy = JSON.parse(JSON.stringify(n));
    var nid = freshId();
    npcMap[n.id] = nid;
    copy.id = nid;
    if (copy.type !== 'npc') copy.type = 'npc';
    S.library.push(copy);
  });

  /* 1b. add every forged foe to the library as a monster, map old id -> new id */
  var foeMap = {};
  (pack.foes || []).forEach(function(f){
    var copy = JSON.parse(JSON.stringify(f));
    var fid = freshId();
    foeMap[f.id] = fid;
    copy.id = fid;
    copy.type = 'monster';
    S.library.push(copy);
  });
  function mapRef(r){ return npcMap[r] || foeMap[r] || r; }

  /* 2. clone the campaign, remint every id, remap dialogue speakers and refs */
  function remapEntry(e){
    e.id = freshId();
    if (e.speaker) e.speaker = npcMap[e.speaker] || e.speaker;
  }
  var camp = JSON.parse(JSON.stringify(pack.campaign));
  camp.id = freshId();
  if (!camp.ovOpen) camp.ovOpen = {};
  // match a free-text world hint from a forged pack to a real world, if it names one
  if (!camp.worldId && camp.worldHint){
    var hint = String(camp.worldHint).toLowerCase();
    for (var wi=0; wi<WORLD_LIST.length; wi++){ if (hint.indexOf(WORLD_LIST[wi].name.toLowerCase())>=0){ camp.worldId = WORLD_LIST[wi].id; break; } }
  }
  delete camp.worldHint;
  if (!Array.isArray(camp.worldIssues)) camp.worldIssues = [];
  camp.manualRefs = (camp.manualRefs || []).map(mapRef);
  (camp.entries || []).forEach(remapEntry);
  (camp.acts || []).forEach(function(a){
    a.id = freshId();
    (a.entries || []).forEach(remapEntry);
    (a.sessions || []).forEach(function(ss){
      ss.id = freshId();
      (ss.entries || []).forEach(remapEntry);
      (ss.scenes || []).forEach(function(sc){
        sc.id = freshId();
        (sc.entries || []).forEach(remapEntry);
        sc.manualRefs = (sc.manualRefs || []).map(mapRef);
      });
    });
  });

  /* 3. normalize through migrate, exactly like adoptHostedCampaigns, then append */
  var wrapped = migrate({
    campaigns: [camp], library: S.library, forge: S.forge,
    wixPlayers: S.wixPlayers, die: S.die
  });
  var newCamp = wrapped.campaigns[0];
  S.campaigns.push(newCamp);

  /* 4. persist and open it */
  save();
  if (WIX.hosted) persistLocalCampaigns();
  if (msg) msg.textContent = 'Added "' + (newCamp.name || 'adventure') + '".';
  nav('campaign', newCamp.id);
}

/* A visual card with an optional cover image. opts: { img, title, sub, openFn,
   coverFn, renameFn, delFn, badge }. Falls back to a clean row when no image. */
function cardItem(opts){
  var hasImg = opts.img && opts.img.length;
  var hasDesc = opts.desc && opts.desc.length;
  if (!window._cardMenus) window._cardMenus = {};
  var mid = 'm' + (window._cardMenuSeq = (window._cardMenuSeq||0) + 1);
  window._cardMenus[mid] = { coverFn:opts.coverFn||'', renameFn:opts.renameFn||'', descFn:opts.descFn||'', dupFn:opts.dupFn||'', delFn:opts.delFn||'', pubFn:opts.pubFn||'', unpubFn:opts.unpubFn||'', title:opts.title };

  var reorder = '';
  if (opts.upFn || opts.downFn){
    reorder = '<span class="card-reorder">'
      + '<button class="reorder-btn" title="Move up" onclick="event.stopPropagation();'+(opts.upFn||'')+'"'+(opts.upFn?'':' disabled')+'>&#8593;</button>'
      + '<button class="reorder-btn" title="Move down" onclick="event.stopPropagation();'+(opts.downFn||'')+'"'+(opts.downFn?'':' disabled')+'>&#8595;</button></span>';
  }
  var menuBtn = '';
  if (opts.coverFn || opts.renameFn || opts.descFn || opts.delFn || opts.pubFn || opts.unpubFn){
    menuBtn = '<button class="card-menu-btn" title="Options" onclick="event.stopPropagation();cardMenu(\''+mid+'\')">&#8943;</button>';
  }
  /* plain card: arrows sit to the LEFT of the menu (one row).
     card with image or description: menu on top, arrows stacked BELOW it. */
  var rich = hasImg || hasDesc;
  var corner = '';
  if (reorder || menuBtn){
    corner = '<div class="vcard-corner'+(rich?' stacked':' inline')+'">'
      + (rich ? (menuBtn + reorder) : (reorder + menuBtn))
      + '</div>';
  }

  /* number: overlaid on the cover when there is an image, inline beside the title otherwise */
  var numOverlay = (opts.num && hasImg) ? '<span class="vcard-num">'+opts.num+'</span>' : '';
  var numInline  = (opts.num && !hasImg) ? '<span class="vcard-num inline">'+opts.num+'</span>' : '';

  return '<div class="vcard'+(hasImg?' has-cover':'')+'">'

function childGrid(kind, items, build, addFn, addLabel){
  var cards=items.map(function(it,i){ var o=build(it,i); if(o.num===undefined) o.num=i+1; return gridCard(o); }).join('');

function applyCardOrder(kind, ids, ref){
  var arr = kind==='act' ? (curC()&&curC().acts)
    : kind==='session' ? (curA()&&curA().sessions)
    : kind==='scene' ? (curSe()&&curSe().scenes)
    : kind==='note' ? (ref?levelEntries(ref):null) : null;

/* pointer drag reorder for the card grids, touch and mouse */
function wireCardDrag(){
  document.querySelectorAll('.cardgrid').forEach(function(grid){
    var kind=grid.getAttribute('data-kind');
    grid.querySelectorAll('[data-grip]').forEach(function(grip){
      grip.addEventListener('pointerdown',function(e){
        e.preventDefault();
        var item=grip.closest('.dcard'); if(!item) return;
        item.classList.add('dragging'); grid.classList.add('dropping');
        try{grip.setPointerCapture(e.pointerId);}catch(_){}
        function move(ev){
          item.style.pointerEvents='none';
          var t=document.elementFromPoint(ev.clientX,ev.clientY);
          item.style.pointerEvents='';
          var over=t&&t.closest('.dcard');
          if(over&&over!==item&&over.parentNode===item.parentNode){
            var r=over.getBoundingClientRect();
            var before=(ev.clientY<r.top+r.height/2)||(Math.abs(ev.clientY-(r.top+r.height/2))<r.height/2&&ev.clientX<r.left+r.width/2);
            item.parentNode.insertBefore(item, before?over:over.nextSibling);
          }
        }
        function up(){
          try{grip.releasePointerCapture(e.pointerId);}catch(_){}
          grip.removeEventListener('pointermove',move); grip.removeEventListener('pointerup',up);
          item.classList.remove('dragging'); grid.classList.remove('dropping');
          var ids=[].slice.call(grid.querySelectorAll('.dcard')).map(function(x){return x.getAttribute('data-id');});
          applyCardOrder(kind, ids, grid.getAttribute('data-ref'));
        }
        grip.addEventListener('pointermove',move); grip.addEventListener('pointerup',up);
      });
    });
  });
}

  if (!b.pend) b.pend = {};

function cbAffsOf(n){ var o = cbVitOf(n); if(!o.affs) o.affs=[]; return o.affs; }
function cbChargeOf(n){ return (cbVitOf(n).charge)||0; }
function cbReactUsed(n){ return !!cbVitOf(n).reactUsed; }
function cbTargetOf(n){ return n.kind==='m' ? (n.ref.target||'') : ((n.st||pState(n.ref.id)).target||''); }
function cbActOf(n){
  if(n.kind!=='m') return ((n.st||pState(n.ref.id)).act||'');
  var c=n.ref, it=c.intent;
  if(it && it.type){
    var lbl=it.type;
    if(it.ability && it.ability!=='__std__') lbl+=' \u00b7 '+it.ability;
    if(it.item) lbl+=' \u00b7 '+it.item;
    if(it.skill) lbl+=' \u00b7 '+it.skill;
    if(it.stance) lbl+=' \u00b7 '+it.stance;
    return lbl;
  }
  return c.act||'';
}

function combatSpots(){
  var nodes = battleNodes(), byKey={};
  nodes.forEach(function(n){ byKey[n.key]=n; });
  var adj={}; nodes.forEach(function(n){ adj[n.key]=[]; });
  nodes.forEach(function(n){ var t=cbTargetOf(n); if(t && byKey[t]){ adj[n.key].push(t); adj[t].push(n.key); } });
  var seen={}, groups=[];
  nodes.forEach(function(n){
    if(seen[n.key]) return;
    var stack=[n.key], comp=[]; seen[n.key]=true;
    while(stack.length){ var k=stack.pop(); comp.push(k); adj[k].forEach(function(x){ if(!seen[x]){ seen[x]=true; stack.push(x); } }); }
    var head=byKey[comp[0]];
    var engaged = comp.length>1 || !!cbTargetOf(head);
    groups.push({ ids:comp, engaged:!!engaged });
  });
  groups.sort(function(a,b){ if(b.engaged!==a.engaged) return b.engaged?1:-1; return b.ids.length-a.ids.length; });
  return groups;
}

function cbResolveSpot(){

  var snap={ box:b.spotBox.slice(), done:Object.assign({},b.spotDone), active:b.activeSpot, mode:b.spotMode, applied:[] };
  inBox.forEach(function(k){
    var n=nodeByKey(k);

    if(_isFell && n.ref.intent && n.ref.intent.type==='Attack' && n.ref.target && n.ref.target!=='env'){

      var _affN=(ab && ab.applies && ab.applies.name) ? ab.applies.name : (n.ref.sig||'');

    }
    if(n && n.kind==='m' && n.ref.intent && n.ref.intent.type==='Attack'){
      var _it=n.ref.intent, _T=0;
      if(_it.ability && _it.ability!=='__std__'){ var _ab=(n.ref.abilities||[]).filter(function(a){ return a.name===_it.ability; })[0]; if(_ab && typeof _ab.tier==='number') _T=_ab.tier; }
      var _landed=true;

        (_pst.defEva||[]).forEach(function(e){ if(e.foe===('m:'+n.ref.id)) _eva=e.total; });
        if(_eva!=null) _landed=(_acc>=_eva);
      }

    }
    b.spotDone[k]=true;
  });
  b.undoStack.push(snap);
  /* recap for any players resolved this spotlight */
  inBox.forEach(function(k){
    if(k.indexOf('p:')!==0) return;
    var pid=k.slice(2), st=pState(pid);

}

  var roll=(v>=1&&v<=6)?v:(1+Math.floor(Math.random()*6)), imp=IMP_TABLE[roll-1];
  if(!(foe.affs||[]).some(function(a){ return a.name===imp; })) (foe.affs=foe.affs||[]).push({ name:imp, kind:'impairment' });
  var temps=cbImpTemps(imp);
  temps.forEach(function(t){ if(!(foe.affs||[]).some(function(a){ return a.name===t; })) foe.affs.push({ name:t, kind:'affliction' }); });
  foe._pendImp=false; save(); render();
  cbToast('Impairment 1d6 \u2192 '+roll+'. '+imp+' takes hold on '+esc(foe.name)+(temps.length?(', applying '+temps.join(' and ')):'')+'.');
}
function cbDoImpairmentFor(cid, v){ var foe=null; curSc().combatants.forEach(function(c){ if(c.id===cid) foe=c; }); if(foe) cbDoImpairment(foe, v); }

function cbDoImpairmentPlayer(pid, v){

  var temps=cbImpTemps(imp);

function cbApplyIncoming(pid, cid){
  var st=pState(pid); var dmg=st.dmg||0; if(dmg<=0) return;
  var foe=null; curSc().combatants.forEach(function(c){ if(c.id===cid) foe=c; });
  if(!foe) return;
  var pname=''; (curC().players||[]).forEach(function(x){ if(x.id===pid) pname=x.name; }); pname=pname||'A Fell';
  var base=Math.min(st.base||0, dmg), bonus=Math.max(0, dmg-base);
  var r=cbFoeResolve(foe, base, bonus, st.dt||'phys', st.pierce||0);
  var dbl=!!st.doubleFell, total=dbl?r.total*2:r.total;

  if(st.fellmark && st.applies){
    var pdA=fwPend('m:'+cid);
    var ex=(foe.affs||[]).some(function(a){ return a.name===st.applies; }) || pdA.affs.indexOf(st.applies)>=0;

  }

  var _ev=st._eva, _accStr=(st.acc>0 && _ev)?(' \u00b7 acc '+st.acc+' vs eva '+_ev.total):'', _affStr=(st.fellmark && st.applies)?(' + '+st.applies):'', _fmStr=(st.fellmark?' \u00b7 Fellmark':'');
  cbLog('fell', pname+': '+(st.act||'attack')+' hits '+foe.name+' for '+total+' ('+r.base+' base + '+r.bonus+' bonus'+(dbl?', doubled':'')+(r.marks.length?(' + '+r.marks.length+' from '+r.marks.join(' + ')):'')+')'+_affStr+_fmStr+_accStr+'.');
  if(dbl){ foe._pendImp=true; save(); render(); cbToast('Double Fellmark on '+esc(foe.name)+'. Roll the Impairment.'); }
  // charge only on a landing weapon attack: standard climbs to T1, T1 to T2, T2 to T3, a landed T3 resets to 0
  st._eva=null;

    var _cur=st.charge||0, _nv=null, _T=st.actTier;

    if(p && p.charId){ postToWix({type:'lmtool-combat-damage',campaignId:combatCampaignId(),charId:p.charId,base:bounce,bonus:0,dt:'phys'}); cbToast(esc(p.name)+' takes '+bounce+' back ('+why.join(' + ')+').'); } }

/* ================= RECAP GENERATOR ================= */

/* Build a recap from a session: ticked beats and play-log lines per scene. */
function buildSessionRecap(s){
  var lines = [];
  s.scenes.forEach(function(sc){
    var bits = [];
    /* ticked beats first, they are the planned turns that actually happened */
    (sc.entries||[]).forEach(function(e){
      if (e.type==='beat' && sc.beatDone && sc.beatDone[e.id]){
        bits.push((e.title?e.title+': ':'') + (e.body||''));
      }
    });
    /* play log, oldest first */
    var log = (sc.log||[]).slice().reverse();
    log.forEach(function(n){ bits.push(n.text); });
    if (bits.length){
      lines.push({ scene:sc.name, bits:bits });
    }
  });
  return lines;
}
function buildCampaignRecap(c){
  var out = [];
  (c.acts||[]).forEach(function(a){
    a.sessions.forEach(function(s){
      var r = buildSessionRecap(s);
      if (r.length) out.push({ session:a.name+' / '+s.name, scenes:r });
    });
  });
  return out;
}
function recapText(blocks, isCampaign){
  var t = '';
  if (isCampaign){
    blocks.forEach(function(b){
      t += b.session + '\n';
      b.scenes.forEach(function(sc){
        t += '  ' + sc.scene + '\n';
        sc.bits.forEach(function(x){ t += '    - ' + x + '\n'; });
      });
      t += '\n';
    });
  } else {
    blocks.forEach(function(sc){
      t += sc.scene + '\n';
      sc.bits.forEach(function(x){ t += '  - ' + x + '\n'; });
      t += '\n';
    });
  }
  return t.trim();
}

function showRecap(){
  var s = curSe(); if (!s) return;
  var blocks = buildSessionRecap(s);
  window._recapBlocks = blocks; window._recapTitle = s.name;
  var h = '<h3 class="m-title">Recap: '+esc(s.name)+'</h3>';
  if (!blocks.length){
    h += '<p class="muted">Nothing to recap yet. Recaps gather the beats you tick and the play-log notes you capture while running scenes.</p>'
      + '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button></div>';
    modal(h); return;
  }
  h += '<p class="muted small-note">From ticked beats and the play log across this session.</p>';
  h += '<div class="recap-body">';
  blocks.forEach(function(sc){
    h += '<div class="recap-scene">'+esc(sc.scene)+'</div><ul class="recap-list">';
    sc.bits.forEach(function(x){ h += '<li>'+glossText(x)+'</li>'; });
    h += '</ul>';
  });
  h += '</div>';
  h += '<textarea class="inp ta recap-ta" id="recapTA" readonly>'+esc(recapText(blocks, false))+'</textarea>';
  h += '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button>'
    + '<button class="btn ghost" id="recapMdBtn" onclick="copyRecapMd()">Copy for Discord</button>'
    + '<button class="btn" id="recapCopy" onclick="copyRecap()">Copy recap</button></div>';
  modal(h);
}
function recapMd(){
  var blocks = window._recapBlocks || []; if(!blocks.length) return '';
  var t = '**' + (window._recapTitle || 'Session recap') + '**\n';
  blocks.forEach(function(sc){
    t += '\n__' + sc.scene + '__\n';
    sc.bits.forEach(function(x){ t += '- ' + x + '\n'; });
  });
  return t.trim();
}
function copyRecapMd(){
  var md = recapMd(); if(!md) return;
  var ta = document.createElement('textarea');
  ta.value = md; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0, 9999999);
  var ok=false; try { ok = document.execCommand('copy'); } catch(e){}
  document.body.removeChild(ta);
  var btn = document.getElementById('recapMdBtn');
  if(btn){ btn.textContent = ok ? 'Copied' : 'Copy failed'; setTimeout(function(){ btn.textContent='Copy for Discord'; }, 2000); }
}
function copyRecap(){
  var ta = document.getElementById('recapTA');
  ta.removeAttribute('readonly'); ta.select(); ta.setSelectionRange(0, 9999999);
  var ok=false; try { ok = document.execCommand('copy'); } catch(e){}
  ta.setAttribute('readonly','');
  var btn = document.getElementById('recapCopy');
  btn.textContent = ok ? 'Copied' : 'Select and copy';
  setTimeout(function(){ btn.textContent = 'Copy recap'; }, 2000);
}

  sc.status = 'done';
  save();
  /* auto-advance to the next scene in the session if there is one */
  var sibs = runnerSiblings();
  var i = sibs.map(function(x){ return x.id; }).indexOf(V.scId);
  if (i >= 0 && i < sibs.length-1){
    V.scId = sibs[i+1].id;
    var nx = curSc(); if (nx){ if (!nx.beatDone) nx.beatDone = {}; nx.mode = 'roleplay'; }
  }
  render(); window.scrollTo(0,0);
}
function reopenScene(){
  var sc = curSc(); if (!sc) return;
  sc.status = 'active'; save(); render();
}

/* Generic LM d6 roll for the roleplay board. 6 is a Fellmark, 1 is a Fellstrike. */
function rollTag(n){ return n===6 ? 'Fellmark' : (n===1 ? 'Fellstrike' : ''); }
function lmRoll(){
  var n = Math.floor(Math.random() * 6) + 1;
  var tag = rollTag(n);
  window._lmRoll = { n:n, tag:tag };
  var d = new Date();
  var ts = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  curSc().log.unshift({ ts:ts, text:'LM roll: '+n+(tag?' ('+tag+')':'') });
  save(); render();
}

/* sibling scenes in the current session, for prev/next jumps */
function sceneNavRow(){
  var sibs = runnerSiblings();
  var ix = sibs.map(function(x){ return x.id; }).indexOf(V.scId);
  var hasPrev = ix > 0;
  var hasNext = ix >= 0 && ix < sibs.length - 1;
  var h = '<div class="scene-nav-row">'
    + '<button class="btn ghost small" '+(hasPrev?'':'disabled')+' onclick="runnerStep(-1)">&#8592; Previous scene</button>';
  if (hasNext){
    h += '<button class="btn ghost small" onclick="runnerStep(1)">Next scene &#8594;</button>';
  } else {
    h += '<button class="btn ghost small" onclick="addScene()">&#43; Add a scene</button>';
  }
  return h + '</div>';
}
function runnerSiblings(){
  var s = curSe(); if (!s) return [];
  return s.scenes;
}
function runnerStep(dir){
  var sibs = runnerSiblings(); if (!sibs.length) return;
  var i = sibs.map(function(x){ return x.id; }).indexOf(V.scId);
  var j = i + dir;
  if (j < 0 || j >= sibs.length) return;
  V.scId = sibs[j].id;
  var sc = curSc(); if (sc){ if (!sc.beatDone) sc.beatDone = {}; sc.mode = 'roleplay'; }
  save(); render(); window.scrollTo(0,0);
}

function toggleBeat(eid){
  var sc = curSc(); if (!sc.beatDone) sc.beatDone = {};
  if (sc.beatDone[eid]) delete sc.beatDone[eid]; else sc.beatDone[eid] = true;

/* inline log writer used inside the runner, no modal */
function runnerLogModal(){

    list = '<div class="run-loglist">';

function runnerLog(){

function runnerLogKey(ev){ if (ev && (ev.key==='Enter'||ev.keyCode===13) && !ev.shiftKey){ ev.preventDefault && ev.preventDefault(); runnerLog(); } }

function entriesByType(sc, type){ return (sc.entries||[]).filter(function(e){ return e.type===type; }); }

/* A runner note box tinted by its type accent (--tc), set via the t-<type> class. */
function runNote(e, ref, type, opts){

/* LEFT: narration rail */
function runnerNarration(sc){
  var ref = 'sc:'+sc.id;

  } else {
    /* Render in the order set in the scene builder. The type still drives the look,
       but the sequence is the author's, not a regroup by type. */

/* Roleplay run as a stepper: one beat at a time, previews above and below, the
   beat image (or the speaking NPC's image for dialogue) under the whole stack.

function runToggleHtml(){
  return '<span class="rs-seg"><button class="'+(!V.runList?'on':'')+'" onclick="setRunList(false)">Stepper</button>'
       + '<button class="'+(V.runList?'on':'')+'" onclick="setRunList(true)">List</button></span>';
}
function stepPreview(e, where, i){
  var label = where==='prev' ? '&#9650; previous' : '&#9660; next';
  return '<div class="rs-prev t-'+(e.type||'general')+'" onclick="runBeatGo('+i+')">'
    + '<span class="rs-arrow">'+label+'</span>'
    + '<span class="rs-pk">'+esc(noteTypeLabel(e.type))+'</span>'
    + '<span class="rs-pt">'+esc(e.title || (e.body||'').slice(0,60) || 'Untitled')+'</span></div>';

function stepImageHTML(e){
  if (e.img) return '<div class="rs-img"><img src="'+esc(imgSrc(e.img))+'" alt=""></div>';
  if ((e.type||'')==='dialogue'){ var sp=dialogueSpeaker(e); if (sp && sp.img) return '<div class="rs-img"><img src="'+esc(imgSrc(sp.img))+'" alt=""></div>'; }
  return '';
}
function runnerStepper(sc){
  var ref = 'sc:'+sc.id;
  var list = sortedEntries(sc.entries||[]);
  if (!list.length){
    return '<div class="run-col run-narr run-stepper"><div class="rs-top">'+runToggleHtml()+'</div>'
      + '<p class="muted">No prep notes in this scene yet. Tap Edit scene to add read-aloud text, beats, and clues.</p></div>';
  }
  if (typeof sc.runIdx !== 'number' || sc.runIdx < 0) sc.runIdx = 0;
  if (sc.runIdx > list.length-1) sc.runIdx = list.length-1;
  var i = sc.runIdx, cur = list[i];
  var dir = window._runDir; window._runDir = null;
  var enterCls = dir==='next' ? ' enter-next' : dir==='prev' ? ' enter-prev' : '';
  var rail = '';
  for (var k=0; k<list.length; k++){ rail += '<span class="rs-pip'+(k<i?' done':k===i?' now':'')+'"></span>'; }
  var h = '<div class="run-col run-narr run-stepper">';
  h += '<div class="rs-top">'+runToggleHtml()+'<span class="rs-rail">'+rail+'</span><span class="rs-count">Beat '+(i+1)+' of '+list.length+'</span></div>';
  h += '<div class="rs-stack">';
  if (i>0) h += stepPreview(list[i-1], 'prev', i-1);
  h += '<div class="rs-card t-'+(cur.type||'general')+enterCls+'">'+runStreamNote(cur, ref, sc, {noImg:true, plain:true})+'</div>';
  if (i<list.length-1) h += stepPreview(list[i+1], 'next', i+1);
  h += '</div>';
  h += stepImageHTML(cur);
  h += '</div>';
  return h;
}
function runBeatStep(d){
  var sc = curSc(); if (!sc) return;
  var list = sortedEntries(sc.entries||[]);
  var n = (typeof sc.runIdx==='number'?sc.runIdx:0) + d;
  if (n<0) n=0; if (n>list.length-1) n=list.length-1;
  window._runDir = d>0 ? 'next' : 'prev';
  sc.runIdx = n; save(); render();
}
function runBeatGo(i){
  var sc = curSc(); if (!sc) return;
  window._runDir = (i > (sc.runIdx||0)) ? 'next' : 'prev';
  sc.runIdx = i; save(); render();
}
function setRunList(on){ V.runList = !!on; save(); render(); }
/* One note, styled by type, in builder order. */
function clueSlug(x){ return String(x||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
function clueHandlesIn(text){
  var out=[], re=/#([a-z0-9][a-z0-9-]*)/gi, m;
  while ((m=re.exec(String(text||'')))){ out.push(m[1].toLowerCase()); }
  return out;
}
function clueEntryHandle(e){ return clueSlug(e.handle || e.title); }
function postQuest(entryId, status){
  var sc=curSc(); if(!sc) return;
  var e=null; (sc.entries||[]).forEach(function(x){ if(x.id===entryId) e=x; });
  if(!e){ /* the quest note may live on the session or act */
    var a=curA(), ss=curS();
    [ss,a,curC()].forEach(function(lvl){ if(!e && lvl) (lvl.entries||[]).forEach(function(x){ if(x.id===entryId) e=x; }); });
  }
  if(!e) return;
  post({ type:'lmtool-quest', campaignId:curC().id, quest:{ entryId:e.id, title:e.title||'', body:e.body||'', status:status } });
  cbToast(status==='open' ? 'Posting to the quest board' : status==='complete' ? 'Marking complete' : 'Retracting');
}
function revealLoreClue(entryId){
  var sc = curSc(); if (!sc) return;
  var lc=null; (sc.entries||[]).forEach(function(e){ if(e.id===entryId) lc=e; });
  if (!lc) return;
  var handles = clueHandlesIn(lc.body);
  var clues=[];
  handles.forEach(function(hd){
    (sc.entries||[]).forEach(function(e){ if(e.type==='clue' && clueEntryHandle(e)===hd){ clues.push({ handle:hd, title:e.title||'', body:e.body||'' }); } });
  });
  if (!clues.length){ alert('No matching Clue note found for the #tags here. Add a Clue note whose handle matches.'); return; }
  var picks={}; attendingPlayers().forEach(function(p){ if(p.charId) picks[p.charId]=true; });
  window._clueReveal = { entryId:entryId, clues:clues, picks:picks };
  renderClueReveal();
}
function toggleCluePick(cid){ var r=window._clueReveal; if(!r) return; r.picks[cid]=!r.picks[cid]; renderClueReveal(); }
function renderClueReveal(){
  var r=window._clueReveal; if(!r) return;
  var sc=curSc();
  var h='<h3 class="m-title">Reveal clue</h3>';
  r.clues.forEach(function(cl){
    h+='<div class="entry card-type t-clue"><div class="entry-body">'
      +(cl.title?'<div class="run-note-t">'+esc(cl.title)+'</div>':'')
      +'<div class="entry-text">'+renderNoteBody(cl.body, 'sc:'+(sc?sc.id:''))+'</div></div></div>';
  });
  h+='<label class="lbl">Card to</label>';
  var any=false;
  attendingPlayers().forEach(function(p){
    if (p.charId){ any=true;
      h+='<div class="hk-note-pick"><input type="checkbox" '+(r.picks[p.charId]?'checked':'')+' onchange="toggleCluePick(\''+p.charId+'\')"> '+esc(p.name)+'</div>';
    } else {
      h+='<div class="hk-note-pick"><input type="checkbox" disabled> <span class="muted">'+esc(p.name)+' (no sheet)</span></div>';
    }
  });
  if (!any) h+='<p class="muted small">No present players have a linked sheet. Link a character to card clues.</p>';
  h+='<div class="m-row"><button class="btn ghost" onclick="window._clueReveal=null;closeModal()">Cancel</button>'
    +'<button class="btn" onclick="cardClue()">Card to players</button></div>';
  modal(h);
}
function cardClue(){
  var r=window._clueReveal; if(!r) return;
  var c=curC(); var cid = WIX.hub ? c.id : (WIX.campaignId || c.id);
  var scName=(curSc()&&curSc().name)||'';
  var charIds=Object.keys(r.picks).filter(function(k){ return r.picks[k]; });
  if (!charIds.length){ alert('Pick at least one player with a sheet.'); return; }
  r.clues.forEach(function(cl){
    postToWix({ type:'lmtool-assign-clue', campaignId:cid, charIds:charIds, clue:{ handle:cl.handle, title:cl.title, body:cl.body, scene:scName } });
  });
  window._clueReveal=null; closeModal();
  modal('<h3 class="m-title">Clue carded</h3><p class="muted">Sent to '+charIds.length+' player'+(charIds.length===1?'':'s')+'. It will appear under Notes on their sheet.</p><div class="m-row"><button class="btn" onclick="closeModal()">Done</button></div>');
}
function runnerAttendance(sc){
  var c=curC(); if(!c || !(c.players||[]).length) return '';
  var chips=c.players.map(function(p){
    var on=!!(sc.att && sc.att[p.id]);
    return '<button class="att-chip'+(on?' on':'')+'" onclick="fwToggleAtt(\''+p.id+'\')">'+esc(p.name)+'</button>';
  }).join('');

function fwToggleAtt(pid){
  var sc=curSc(); if(!sc) return;
  sc.att=sc.att||{}; sc.att[pid]=!sc.att[pid];
  save(); render();
}
function runStreamNote(e, ref, sc, opts){
  var t = e.type || 'general';
  var noImg = opts && opts.noImg;
  if (t==='readaloud'){
    return '<div class="run-read t-readaloud">'
      + (e.title ? '<div class="run-read-t">'+esc(e.title)+'</div>' : '')
      + (!noImg && e.img ? '<div class="run-note-img"><img src="'+esc(imgSrc(e.img))+'" alt=""></div>' : '')
      + '<div class="run-read-b">'+renderNoteBody(e.body||'', ref)+'</div></div>';
  }
  if (t==='lorecheck'){
    var hasClue = clueHandlesIn(e.body||'').length > 0;
    return '<div class="run-note t-lorecheck">'
      + (e.title ? '<div class="run-note-t">'+esc(e.title)+'</div>' : '')
      + '<div class="run-note-b">'+renderNoteBody(e.body||'', ref)+'</div>'
      + (hasClue ? '<button class="btn ghost small" onclick="revealLoreClue(\''+e.id+'\')">Reveal clue</button>' : '')
      + '</div>';
  }
  if (t==='quest'){
    var qs = e.qStatus || '';
    return '<div class="run-note t-quest">'
      + (e.title ? '<div class="run-note-t">'+esc(e.title)+'</div>' : '')
      + '<div class="run-note-b">'+renderNoteBody(e.body||'', ref)+'</div>'
      + (qs===''
          ? '<button class="btn ghost small" onclick="postQuest(\''+e.id+'\',\'open\')">Post to quest board</button>'
          : qs==='open'
            ? '<div class="cru-state">On the board</div>'
              + '<button class="btn ghost small" onclick="postQuest(\''+e.id+'\',\'complete\')">Mark complete</button>'
              + '<button class="btn ghost small" onclick="postQuest(\''+e.id+'\',\'removed\')">Retract</button>'
            : qs==='complete'
              ? '<div class="cru-state">Complete on the board</div>'
                + '<button class="btn ghost small" onclick="postQuest(\''+e.id+'\',\'removed\')">Retract</button>'
              : '<button class="btn ghost small" onclick="postQuest(\''+e.id+'\',\'open\')">Post again</button>')
      + '</div>';
  }
  if (t==='crucible'){
    var inCombat = sc.mode==='combat';
    return '<div class="run-crucible t-crucible'+(inCombat?' spent':'')+'">'
      + (e.title ? '<div class="run-read-t">'+esc(e.title)+'</div>' : '')
      + (e.body ? '<div class="run-read-b">'+renderNoteBody(e.body||'', ref)+'</div>' : '')
      + (inCombat
          ? '<div class="cru-state">Combat underway</div>'
          : '<button class="btn escalate cru-btn" onclick="escalateScene()">&#9876; Begin combat</button>')
      + '</div>';
  }
  if (t==='beat'){
    var done = sc.beatDone && sc.beatDone[e.id];
    return '<button class="run-beat t-beat'+(done?' done':'')+'" onclick="toggleBeat(\''+e.id+'\')">'
      + '<span class="check'+(done?' on':'')+'"></span>'
      + '<span class="run-beat-tx">'+(e.title?'<b>'+esc(e.title)+'</b> ':'')+glossText(e.body||'')+'</span></button>';
  }
  if (t==='secret'){
    /* kept folded in place so a glance at the screen does not spill it, but it holds its spot */
    return '<details class="run-fold secret"><summary>'+(e.title?esc(e.title)+' &middot; ':'')+'Secret, LM eyes only</summary>'
      + runNote(e, ref, 'secret') + '</details>';
  }
  return runNote(e, ref, t, opts);
}

/* frozen control strip: the actions the loremaster reaches for constantly */
function nextSessionInfo(){
  var c=curC(), s=curSe(); if(!c||!s) return null;
  var acts = (c.acts && c.acts.length) ? c.acts : (curA()?[curA()]:[]);
  var flat=[]; acts.forEach(function(ac){ (ac.sessions||[]).forEach(function(se){ flat.push({act:ac,ses:se}); }); });
  var idx=-1; flat.forEach(function(x,i){ if(x.ses.id===s.id) idx=i; });
  if (idx<0 || idx>=flat.length-1) return null;
  return flat[idx+1];
}
function gotoNextSession(){
  var nx=nextSessionInfo(); if(!nx) return;
  V.aId=nx.act.id; V.sId=nx.ses.id;
  var first=(nx.ses.scenes||[])[0];
  if (first){ V.scId=first.id; if(!first.beatDone) first.beatDone={}; first.mode='roleplay'; first.runIdx=0; V.screen='runner'; }
  else { V.scId=null; V.screen='session'; }
  save(); render(); window.scrollTo(0,0);
}
/* Scene-level arrows. The forward arrow glows gold once you reach the last note of a
   scene, then becomes Next Session once every scene in the session is complete. */
function sceneNavControls(sc){
  var mode = sc.mode||'roleplay';
  var sibs = runnerSiblings();
  var idx = sibs.map(function(x){return x.id;}).indexOf(V.scId);
  var list = sortedEntries(sc.entries||[]);
  var atEnd = (mode!=='combat') && list.length>0 && (sc.runIdx||0) >= list.length-1;
  var lastScene = idx >= sibs.length-1;
  var allDone = sibs.length>0 && sibs.every(function(x){ return x.status==='done'; });
  var nx = nextSessionInfo();
  var prev = '<button class="run-step" title="Previous scene" onclick="runnerStep(-1)"'+(idx<=0?' disabled':'')+'>&larr;</button>';
  var next;
  if (lastScene && nx){
    next = '<button class="run-step nextsess'+(allDone?' gold-glow':'')+'" onclick="gotoNextSession()">Next Session &rarr;</button>';
  } else if (!lastScene){
    next = '<button class="run-step'+(atEnd?' gold-glow':'')+'" title="Next scene" onclick="runnerStep(1)">&rarr;</button>';
  } else {
    next = '<button class="run-step" disabled>&rarr;</button>';
  }
  return '<div class="run-nav"><span class="run-nav-lbl">Scenes</span>'+prev+next+'</div>';
}
function runnerActions(sc, mode){
  var lr = window._lmRoll;
  var lrOut = lr ? ('<span class="roll-n'+(lr.tag?' '+lr.tag.toLowerCase():'')+'">'+lr.n+'</span>'+(lr.tag?'<span class="roll-tag '+lr.tag.toLowerCase()+'">'+lr.tag+'</span>':'')) : '';
  var stepper = (mode!=='combat' && !V.runList);
  var _bl = sortedEntries(sc.entries||[]);

  var _right = stepper ? '<button class="beatnav-arrow" title="Next note" onclick="runBeatStep(1)"'+((_bi>=_bl.length-1||!_bl.length)?' disabled':'')+'>&rarr;</button>' : '';
  var h = '<div class="run-actions-bar">'+_left+'<div class="run-actions-mid">';
  h += '<button class="btn ghost" onclick="runnerLogModal()">Log</button>';

/* who's at the table, shown in combat */
function runnerTable(sc){
