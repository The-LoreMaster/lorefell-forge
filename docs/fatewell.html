<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FateWell</title>
<!-- build: fw-topbar2 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a0e1a; --navy2:#101627; --navy3:#161e33;
  --silver:#dce8ef; --ice:#b8ccd8; --gold:#c9a84c;
  --line:rgba(184,204,216,.16); --line2:rgba(184,204,216,.3);
  --glow:rgba(140,190,220,.35);
  --danger:#c96a5a;
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html{ font-size:16px; overscroll-behavior-x:none; }
body{
  background:var(--navy); color:var(--silver);
  font-family:'Crimson Pro', Georgia, serif; font-size:.95rem; line-height:1.4;
  padding-bottom:74px; min-height:100vh;
  overscroll-behavior-x:none;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:radial-gradient(ellipse 120% 60% at 50% -10%, rgba(184,204,216,.07), transparent 60%);
}
#app{ position:relative; z-index:1; }
.wrap{ max-width:720px; margin:0 auto; padding:0 14px 28px; }

/* type */
.page-h{
  font-family:'Cinzel', serif; font-weight:600; font-size:1.2rem; letter-spacing:.04em;
  margin:8px 0 10px; color:var(--silver);
}
.sec-h{
  font-family:'Cinzel', serif; font-size:.74rem; font-weight:600; letter-spacing:.14em;
  text-transform:uppercase; color:var(--ice); margin:16px 0 7px;
  display:flex; align-items:center; gap:10px;
}
.sec-h::after{ content:''; flex:1; height:1px; background:linear-gradient(90deg, var(--line2), transparent); }
.sub-h{
  font-family:'Cinzel', serif; font-size:.74rem; font-weight:600; letter-spacing:.14em;
  text-transform:uppercase; color:var(--ice); opacity:.85; margin:18px 0 8px;
}
.muted{ color:var(--ice); opacity:.72; font-size:.95rem; }
.center{ text-align:center; }
.pad{ padding:6px 2px 10px; }
.small-pad{ padding:4px 0 8px; font-size:.92rem; }
.mono{ font-family:ui-monospace, Menlo, monospace; font-size:.78rem; }

/* crumb */
.crumb{
  position:sticky; top:0; z-index:30; display:flex; flex-wrap:wrap; align-items:center; gap:4px;
  padding:8px 12px 7px; font-size:.8rem;
  background:linear-gradient(var(--navy) 78%, transparent);
  font-family:'Cinzel', serif; letter-spacing:.03em;
}
.cr-link{ color:var(--ice); cursor:pointer; }
.cr-link:active{ color:var(--silver); }
.cr-sep{ color:var(--gold); opacity:.8; padding:0 2px; }
.cr-cur{ color:var(--silver); }

/* cards & rows */
.card{
  background:var(--navy2); border:1px solid var(--line); border-radius:10px;
  padding:9px 11px; margin-bottom:7px;
}
.row-card{ display:flex; align-items:stretch; padding:0; overflow:hidden; }
.rc-main{
  flex:1; text-align:left; background:none; border:none; color:inherit; font:inherit;
  padding:10px 11px; cursor:pointer; min-width:0;
}
.rc-main.static{ cursor:default; }
.rc-title{ font-family:'Cinzel', serif; font-weight:600; font-size:.92rem; letter-spacing:.02em; }
.rc-sub{ font-size:.8rem; color:var(--ice); opacity:.8; margin-top:2px; }
.rc-acts{ display:flex; align-items:center; padding-right:8px; gap:2px; }
.icon-btn{
  background:none; border:none; color:var(--ice); font-size:1.15rem; cursor:pointer;
  width:33px; height:33px; border-radius:7px; line-height:1;
}
.icon-btn:active{ background:var(--navy3); }
.icon-btn.danger{ color:var(--danger); }

/* buttons */
.btn{
  font-family:'Cinzel', serif; font-weight:600; letter-spacing:.05em; font-size:.8rem;
  background:var(--navy3); color:var(--silver);
  border:1px solid var(--line2); border-radius:8px;
  padding:10px 14px; cursor:pointer;
}
.btn:active{ border-color:var(--ice); }
.btn.wide{ display:block; width:100%; margin:8px 0 4px; }
.btn.small{ padding:7px 11px; font-size:.72rem; }
.btn.ghost{ background:transparent; }
.btn.slim{ width:auto; }
.danger-btn{ border-color:rgba(201,106,90,.5); color:var(--danger); background:transparent; }
.fab{
  position:fixed; right:13px; bottom:78px; z-index:25;
  width:45px; height:45px; border-radius:50%;
  background:var(--navy3); color:var(--gold); font-size:1.1rem;
  border:1px solid var(--gold); cursor:pointer;
  box-shadow:0 4px 18px rgba(0,0,0,.5);
}

/* inputs */
.inp{
  width:100%; background:var(--navy3); border:1px solid var(--line); border-radius:8px;
  color:var(--silver); font-family:'Crimson Pro', serif; font-size:.92rem;
  padding:9px 10px; margin:3px 0;
}
.inp:focus{ outline:none; border-color:var(--ice); }
.inp:disabled{ opacity:.55; }
.inp.slim{ width:auto; }
.ta{ min-height:70px; resize:vertical; }
.inp, .ta{ touch-action:auto; overscroll-behavior:contain; }
.ta.tall{ min-height:120px; }
.lbl{
  display:block; font-family:'Cinzel', serif; font-size:.72rem; letter-spacing:.12em;
  text-transform:uppercase; color:var(--ice); margin:9px 0 2px;
}

/* empty state */
.empty{
  text-align:center; padding:17px 12px; border:1px dashed var(--line2); border-radius:10px;
  margin-bottom:10px; color:var(--ice);
}
.empty p{ margin-bottom:14px; }

/* players */
.p-row{ display:flex; align-items:center; gap:8px; padding:7px 2px; border-bottom:1px solid var(--line); }
.p-row:last-child{ border-bottom:none; }
.p-row.click{ cursor:pointer; }
.p-name{ flex:1; font-weight:500; min-width:0; overflow:hidden; text-overflow:ellipsis; }
.p-lvl{ font-family:'Cinzel', serif; font-size:.78rem; letter-spacing:.06em; color:var(--ice); }
.check{
  width:20px; height:20px; border-radius:5px; border:1.5px solid var(--line2); flex:none;
  position:relative;
}
.check.on{ border-color:var(--gold); background:rgba(201,168,76,.12); }
.check.on::after{
  content:'\2713'; position:absolute; inset:0; display:grid; place-items:center;
  color:var(--gold); font-size:.95rem;
}

/* tabs */
.tabs{ display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:6px; scrollbar-width:none; }
.tabs::-webkit-scrollbar{ display:none; }
.tab{
  font-family:'Cinzel', serif; font-size:.72rem; font-weight:600; letter-spacing:.06em;
  background:transparent; color:var(--ice); border:1px solid transparent;
  padding:7px 11px; border-radius:999px; cursor:pointer; white-space:nowrap; flex:none;
}
.tab.on{ color:var(--silver); border-color:var(--line2); background:var(--navy2); }

/* stats */
.stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin:7px 0 10px; }
.stat{
  background:var(--navy2); border:1px solid var(--line); border-radius:10px;
  text-align:center; padding:8px 4px;
}
.st-n{ font-family:'Cinzel', serif; font-weight:700; font-size:1.25rem; color:var(--silver); }
.st-n.big{ font-size:2rem; }
.st-l{ font-family:'Cinzel', serif; font-size:.66rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ice); margin-top:2px; }

/* combat */
.round-bar{ display:flex; align-items:center; gap:10px; margin:4px 0 12px; }
.round-n{ flex:1; display:flex; align-items:baseline; gap:7px; }
.round-lbl{ font-family:'Cinzel', serif; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--ice); opacity:.8; }
.round-big{ font-family:'Cinzel Decorative', serif; font-size:1.7rem; color:var(--gold); line-height:1; }
.phases{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:14px; }
.ph{
  font-family:'Cinzel', serif; font-size:.74rem; font-weight:600; letter-spacing:.05em;
  background:transparent; color:var(--ice); border:1px solid var(--line);
  padding:7px 3px; border-radius:7px; cursor:pointer;
}
.ph.on{ color:var(--silver); border-color:var(--ice); background:var(--navy2); }
.ph-sec{
  border:1px solid var(--line); border-radius:10px; padding:3px 10px 8px; margin-bottom:9px;
  background:var(--navy2); transition:box-shadow .25s, border-color .25s;
}
.ph-sec.lit{
  border-color:var(--ice);
  box-shadow:0 0 0 1px var(--glow), 0 0 26px rgba(140,190,220,.14);
}
.ph-h{
  font-family:'Cinzel', serif; font-weight:600; font-size:.95rem; letter-spacing:.04em;
  padding:8px 0 6px; cursor:pointer; display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.lm-tag, .lock-tag, .count-tag{
  font-size:.62rem; letter-spacing:.1em; text-transform:uppercase;
  border:1px solid var(--line2); border-radius:999px; padding:3px 9px; color:var(--ice);
}
.lock-tag{ border-color:var(--gold); color:var(--gold); }
.count-tag{ margin-left:auto; }
.count-tag.clear{ border-color:rgba(140,200,150,.5); color:#9ecf9e; }
.cm-row{ padding:7px 0; border-bottom:1px solid var(--line); }
.cm-row:last-of-type{ border-bottom:none; }
.cm-name{ font-weight:600; margin-bottom:1px; }

.res-card{
  border:1px solid var(--line); border-radius:9px; padding:8px 10px; margin-bottom:8px;
  background:var(--navy3);
}
.res-card.downed{ opacity:.55; }
.down-tag{ font-family:'Cinzel', serif; font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--danger); margin:2px 0 4px; }
.res-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:4px; }
.res-row{ display:flex; align-items:center; gap:10px; padding:7px 0; }
.res-row.click{ cursor:pointer; }
.res-txt{ flex:1; min-width:0; }
.res-txt.done{ opacity:.5; text-decoration:line-through; }
.vit{ display:flex; align-items:center; gap:6px; }
.vit-b{
  width:30px; height:30px; border-radius:7px; border:1px solid var(--line2);
  background:var(--navy2); color:var(--silver); font-size:1rem; cursor:pointer; line-height:1;
}
.vit-n{ font-family:'Cinzel', serif; font-weight:700; font-size:.95rem; min-width:38px; text-align:center; }
.vit-max{ font-size:.78rem; color:var(--ice); font-weight:500; }

.affs{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
.aff{
  font-size:.8rem; border:1px solid var(--line2); border-radius:999px; padding:3px 4px 3px 10px;
  color:var(--ice); display:inline-flex; align-items:center; gap:4px;
}
.aff-x{ background:none; border:none; color:var(--danger); font-size:.95rem; cursor:pointer; padding:0 5px; }
.aff.add{ cursor:pointer; background:none; padding:3px 10px; font-family:'Crimson Pro', serif; }

/* disruptions */
.dis-head{ text-align:center; padding:14px 0 6px; }
.m-row.center{ justify-content:center; margin-top:10px; }
.dis-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin:16px 0 4px; }
.dis-btn{
  display:flex; flex-direction:column; gap:4px; align-items:flex-start;
  background:var(--navy2); border:1px solid var(--line); border-radius:10px;
  padding:10px; cursor:pointer; color:var(--silver); text-align:left;
}
.dis-btn:active{ border-color:var(--ice); }
.dis-btn.off{ opacity:.4; }
.dis-name{ font-family:'Crimson Pro', serif; font-size:.98rem; font-weight:600; }
.dis-cost{ font-family:'Cinzel', serif; font-size:.85rem; color:var(--gold); }

/* loot */
.shard-bar{ margin:10px 0 16px; font-size:.98rem; color:var(--ice); }
.shard-n{ font-family:'Cinzel', serif; font-weight:700; color:var(--silver); margin-right:6px; }
.shard-track{ height:6px; border-radius:999px; background:var(--navy3); border:1px solid var(--line); margin-top:8px; overflow:hidden; }
.shard-fill{ height:100%; background:linear-gradient(90deg, var(--ice), var(--gold)); transition:width .3s; }
.loot-card{ background:var(--navy2); border:1px solid var(--line); border-radius:10px; padding:12px; margin-bottom:10px; }
.loot-grid{ display:grid; grid-template-columns:1fr 1.4fr; gap:10px; align-items:end; margin:8px 0 2px; }
.roll-line{ display:flex; align-items:center; gap:10px; margin-top:4px; }
.roll-r{ flex:1; font-size:1.05rem; }
.lucky{
  font-family:'Cinzel', serif; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase;
  background:transparent; border:1px solid var(--line2); color:var(--ice);
  border-radius:999px; padding:6px 12px; cursor:pointer;
}
.lucky.on{ border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.1); }

/* refs & log */
.ref-card, .log-card{ display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
.ref-desc{ font-size:.92rem; color:var(--ice); margin-top:3px; }
.log-ts{ font-family:'Cinzel', serif; font-size:.66rem; letter-spacing:.1em; color:var(--gold); margin-bottom:2px; }

/* library picker */
.type-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin:14px 0; }
.type-btn{
  font-family:'Cinzel', serif; font-weight:600; font-size:.9rem; letter-spacing:.05em;
  background:var(--navy3); border:1px solid var(--line2); color:var(--silver);
  border-radius:9px; padding:13px 6px; cursor:pointer;
}
.pick-row{
  display:flex; justify-content:space-between; align-items:center; gap:10px; width:100%;
  background:var(--navy3); border:1px solid var(--line); border-radius:9px;
  color:var(--silver); font:inherit; padding:9px 10px; margin-bottom:6px; cursor:pointer; text-align:left;
}

/* SR table */
.sr-table{ border:1px solid var(--line); border-radius:9px; overflow:hidden; margin:6px 0; }
.sr-row{
  display:grid; grid-template-columns:1.6fr 1fr 1fr 1.2fr; padding:7px 10px;
  border-bottom:1px solid var(--line); cursor:pointer; font-size:.95rem;
}
.sr-row:last-child{ border-bottom:none; }
.sr-head{ cursor:default; font-family:'Cinzel', serif; font-size:.66rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ice); background:var(--navy3); }
.sr-row.sel{ background:rgba(140,190,220,.12); box-shadow:inset 3px 0 0 var(--gold); }

/* modal */
.m-back{
  position:fixed; inset:0; z-index:50; background:rgba(4,6,12,.78);
  display:flex; align-items:flex-end; justify-content:center;
}
.m-card{
  width:100%; max-width:560px; max-height:88vh; overflow-y:auto;
  background:var(--navy2); border:1px solid var(--line2);
  border-radius:14px 14px 0 0; padding:14px 14px 22px;
}
@media (min-width:600px){
  .m-back{ align-items:center; }
  .m-card{ border-radius:14px; padding-bottom:18px; }
}
.m-title{ font-family:'Cinzel', serif; font-weight:600; font-size:1.1rem; letter-spacing:.04em; margin-bottom:8px; }
.m-row{ display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }

/* bottom nav */
.bnav{
  position:fixed; left:0; right:0; bottom:0; z-index:40;
  display:grid; grid-template-columns:repeat(3,1fr);
  background:var(--navy2); border-top:1px solid var(--line);
  padding:4px 8px calc(6px + env(safe-area-inset-bottom));
}
.bn-btn{ flex:1; min-width:0; 
  font-family:'Cinzel', serif; font-size:.62rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
  background:none; border:none; color:var(--ice); opacity:.7; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0;
}
.bn-btn.on{ opacity:1; color:var(--silver); }
.bn-btn.on .bn-g{ color:var(--gold); }
.bn-g{ font-size:1.05rem; }

@media (prefers-reduced-motion: reduce){
  *{ transition:none !important; }
}

.build-stamp{ text-align:center; font-size:.74rem; color:var(--muted); margin:18px 0 4px; letter-spacing:.05em; }

/* v18: card number, description, reorder */
/* number overlaid on a cover image */
.vcard-cover .vcard-num{
  position:absolute; top:8px; left:8px; z-index:2;
  min-width:26px; height:26px; padding:0 7px; border-radius:8px;
  background:rgba(10,14,26,.72); border:1px solid var(--gold); color:var(--gold);
  font-family:'Cinzel',serif; font-size:.82rem; font-weight:600;
  display:grid; place-items:center;
}
/* number inline beside the title when there is no image */
.vcard-head{ display:flex; align-items:flex-start; gap:10px; padding-right:56px; }
.vcard.has-cover .vcard-head{ padding-right:0; }
.vcard-headtext{ flex:1; min-width:0; }
.vcard-num.inline{
  flex:none; min-width:28px; height:28px; padding:0 7px; border-radius:8px;
  background:transparent; border:1px solid var(--gold); color:var(--gold);
  font-family:'Cinzel',serif; font-size:.84rem; font-weight:600;
  display:grid; place-items:center; margin-top:1px;
}
.vcard-desc{
  font-size:.9rem; color:var(--ice); opacity:.85; line-height:1.45;
  margin-top:8px; white-space:pre-wrap;
}
.vcard.has-cover .vcard-desc{ margin-top:6px; }
.card-reorder{ display:flex; flex-direction:column; gap:1px; }
.reorder-btn{
  width:32px; height:21px; cursor:pointer; padding:0;
  background:rgba(10,14,26,.55); border:1px solid var(--line2); color:var(--silver);
  font-size:.78rem; line-height:1; display:grid; place-items:center;
}
.reorder-btn:first-child{ border-radius:8px 8px 0 0; }
.reorder-btn:last-child{ border-radius:0 0 8px 8px; border-top:none; }
.reorder-btn:disabled{ opacity:.3; }
.reorder-btn:active{ background:rgba(10,14,26,.85); }
.desc-show{ font-size:.98rem; line-height:1.5; color:var(--ice); margin:4px 0; white-space:pre-wrap; }
.cr-spacer{ flex:1; }

/* v22: glossary highlight + toggle */
.gloss{
  display:inline; background:none; border:none; padding:0; font:inherit; cursor:pointer;
  color:var(--gold); border-bottom:1px dotted var(--gold);
}
.gloss:active{ opacity:.7; }
.set-note{ display:inline-block; font-size:.78rem; color:var(--muted); font-weight:400; margin-top:2px; }
.toggle{
  width:46px; height:26px; border-radius:999px; flex:none; cursor:pointer; padding:0;
  background:var(--navy3); border:1px solid var(--line2); position:relative; transition:background .15s;
}
.toggle .toggle-dot{
  position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%;
  background:var(--muted); transition:left .15s, background .15s;
}
.toggle.on{ background:rgba(201,168,76,.25); border-color:var(--gold); }
.toggle.on .toggle-dot{ left:22px; background:var(--gold); }

/* v27: search */
.search-row{
  display:block; width:100%; text-align:left; cursor:pointer;
  background:var(--navy2); border:1px solid var(--line); border-radius:10px;
  padding:10px 13px; margin-bottom:8px; color:inherit; font:inherit;
}
.search-row:active{ background:var(--navy3); }
.search-kind{
  display:inline-block; font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.12em;
  text-transform:uppercase; color:var(--gold); margin-bottom:3px;
}
.search-title{ display:block; font-family:'Cinzel',serif; font-size:.95rem; color:var(--silver); }
.search-snip{ display:block; font-size:.85rem; color:var(--ice); opacity:.8; margin-top:2px; line-height:1.4; }
.search-snip mark, .search-row mark{ background:rgba(201,168,76,.28); color:var(--silver); border-radius:2px; padding:0 1px; }

/* v34: gear, roll tags */
.cr-gear{ background:none; border:none; color:var(--ice); opacity:.7; cursor:pointer; font-size:1.05rem; padding:0 2px; margin-left:8px; }
.cr-gear:active{ opacity:1; }
.back-data{ margin-bottom:8px; }
.roll-n{ font-family:'Cinzel Decorative',serif; font-size:1.5rem; color:var(--silver); }
.roll-n.fellmark{ color:var(--gold); }
.roll-n.fellstrike{ color:#d98a8a; }
.roll-tag{ font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; margin-left:8px; padding:2px 8px; border-radius:999px; }
.roll-tag.fellmark{ color:var(--gold); border:1px solid rgba(201,168,76,.6); }
.roll-tag.fellstrike{ color:#d98a8a; border:1px solid rgba(217,138,138,.6); }

/* v33: row thumbs, fold meta, LM roll */
.cm-row{ display:flex; align-items:center; gap:8px; }
.row-thumb{ flex:none; width:34px; height:34px; border-radius:7px; overflow:hidden; background:var(--navy3); border:1px solid var(--line2); display:flex; align-items:center; justify-content:center; }
.row-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
.row-thumb.mono{ font-family:'Cinzel',serif; font-size:.95rem; color:var(--ice); }
.fold-meta{ font-family:'Crimson Pro',serif; font-size:.82rem; letter-spacing:0; text-transform:none; color:var(--gold); margin-left:6px; }
.lm-roll{ display:flex; align-items:center; gap:12px; margin:2px 0 6px; }
.lm-roll-out{ font-family:'Cinzel Decorative',serif; font-size:1.3rem; color:var(--gold); }

/* v32: scene modes + runner restructure */
.scene-meta{ display:flex; gap:8px; align-items:center; margin:-4px 0 12px; }
.mode-badge{ font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; padding:3px 9px; border-radius:999px; border:1px solid var(--line2); }
.mode-badge.roleplay{ color:var(--ice); border-color:rgba(127,179,213,.5); }
.mode-badge.combat{ color:#e0a0a0; border-color:rgba(217,138,138,.55); }
.done-badge{ font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; padding:3px 9px; border-radius:999px; color:#9ccfa8; border:1px solid rgba(134,199,155,.5); }

.run-actions{ margin-top:16px; display:flex; flex-direction:column; gap:8px; }
.btn.escalate{ background:rgba(217,138,138,.12); border-color:rgba(217,138,138,.55); color:#e0a0a0; }
.btn.complete{ background:rgba(134,199,155,.12); border-color:rgba(134,199,155,.5); color:#9ccfa8; }
.btn.reopen{ background:none; border-color:var(--line2); color:var(--ice); }

.run-narr-fold{ background:var(--navy2); border:1px solid var(--line); border-radius:9px; padding:4px 14px; margin-bottom:14px; }
.run-narr-fold summary{ cursor:pointer; font-family:'Cinzel',serif; font-size:.74rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ice); padding:9px 0; }
.run-narr-fold .run-col{ padding-bottom:8px; }
.run-combat{ max-width:920px; margin:0 auto; }

/* v30: recap */
.recap-body{ max-height:300px; overflow-y:auto; margin:4px 0 10px; }
.recap-scene{ font-family:'Cinzel',serif; font-size:.8rem; letter-spacing:.08em; text-transform:uppercase; color:var(--gold); margin:10px 0 4px; }
.recap-list{ margin:0 0 6px; padding-left:18px; }
.recap-list li{ font-size:.95rem; line-height:1.5; color:var(--silver); margin-bottom:3px; }
.recap-ta{ min-height:90px; font-size:.85rem; opacity:.75; }

/* v29: session runner */
.wrap-run{ max-width:1100px; padding:0 12px 28px; }
.run-enter{ background:rgba(201,168,76,.12); border-color:var(--gold); color:var(--gold); margin-bottom:12px; }
.run-bar{
  position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:10px;
  background:var(--navy2); border-bottom:1px solid var(--line2); padding:10px 12px; margin:0 -12px 14px;
}
.run-exit{ background:none; border:1px solid var(--line2); color:var(--ice); border-radius:8px; padding:7px 12px; cursor:pointer; font:inherit; font-size:.82rem; flex:none; }
.run-bar-mid{ flex:1; display:flex; flex-direction:column; align-items:center; line-height:1.2; min-width:0; }
.run-scene{ font-family:'Cinzel Decorative',serif; font-size:1.05rem; color:var(--silver); text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%; }
.run-pos{ font-size:.72rem; color:var(--muted); letter-spacing:.1em; }
.run-nav{ display:flex; gap:6px; flex:none; }
.run-step{ background:var(--navy3); border:1px solid var(--line2); color:var(--silver); border-radius:8px; padding:7px 13px; cursor:pointer; font-size:1rem; }
.run-step:disabled{ opacity:.3; cursor:default; }

.run-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
.run-col{ min-width:0; }
.run-h{
  font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ice); opacity:.85; margin:16px 0 8px; display:flex; align-items:center; gap:10px;
}
.run-h:first-child{ margin-top:0; }
.run-round{ margin-left:auto; display:flex; align-items:baseline; gap:6px; }

.run-read{ background:rgba(184,204,216,.06); border-left:3px solid var(--ice); border-radius:0 8px 8px 0; padding:12px 15px; margin-bottom:10px; }
.run-read-t{ font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ice); opacity:.7; margin-bottom:5px; }
.run-read-b{ font-size:1.12rem; line-height:1.6; color:var(--silver); font-style:italic; }
.run-desc{ font-size:1rem; line-height:1.55; color:var(--silver); margin-bottom:9px; }

.run-beat{ display:flex; gap:10px; align-items:flex-start; width:100%; text-align:left; background:var(--navy2); border:1px solid var(--line); border-radius:9px; padding:10px 12px; margin-bottom:7px; cursor:pointer; color:inherit; font:inherit; }
.run-beat .check{ margin-top:2px; flex:none; }
.run-beat.done .run-beat-tx{ opacity:.5; text-decoration:line-through; }
.run-beat-tx{ font-size:.98rem; line-height:1.45; }

.run-fold{ background:var(--navy2); border:1px solid var(--line); border-radius:9px; padding:4px 12px; margin-bottom:8px; }
.run-fold summary{ cursor:pointer; font-family:'Cinzel',serif; font-size:.78rem; letter-spacing:.08em; text-transform:uppercase; color:var(--ice); padding:7px 0; }
.run-fold.secret summary{ color:var(--gold); }
.run-fold .run-desc{ margin:6px 0; }

.run-counters{ display:flex; gap:10px; }
.run-count{ flex:1; background:var(--navy2); border:1px solid var(--line); border-radius:9px; padding:9px 12px; text-align:center; }
.rc-lbl{ display:block; font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
.rc-val{ display:block; font-family:'Cinzel Decorative',serif; font-size:1.2rem; color:var(--silver); margin-top:2px; }

.run-cb{ background:var(--navy2); border:1px solid var(--line2); border-radius:10px; padding:11px 13px; margin-bottom:9px; }
.run-cb.downed{ opacity:.55; }
.run-cb-top{ display:flex; align-items:baseline; gap:4px; flex-wrap:wrap; }
.run-cb-vit{ margin-left:auto; font-family:'Cinzel Decorative',serif; font-size:1.05rem; color:var(--silver); }
.run-vbar{ height:7px; background:var(--navy3); border-radius:4px; overflow:hidden; margin:7px 0; }
.run-vbar span{ display:block; height:100%; background:linear-gradient(90deg, var(--gold), var(--ice)); transition:width .2s; }

.run-logbox{ display:flex; gap:6px; }
.run-logbox .run-logi{ flex:1 1 auto; width:auto; min-width:0; text-align:left; }
.run-loglist{ margin-top:9px; }
.run-logrow{ font-size:.9rem; color:var(--ice); padding:6px 0; border-bottom:1px solid var(--line); line-height:1.4; }

@media (max-width:760px){
  .run-grid{ grid-template-columns:1fr; gap:6px; }
  .run-read-b{ font-size:1.05rem; }
}

/* v28: quick damage */
.qd{ display:flex; gap:5px; margin:6px 0 2px; align-items:center; }
.qd-in{
  width:62px; flex:none; text-align:center; font:inherit; font-size:.9rem;
  background:var(--navy3); color:var(--silver); border:1px solid var(--line2); border-radius:7px; padding:6px 4px;
}
.qd-b{
  font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase; cursor:pointer;
  border-radius:7px; padding:7px 11px; border:1px solid var(--line2); background:var(--navy3); color:var(--silver);
}
.qd-b.dmg{ border-color:rgba(217,138,138,.55); color:#e0a0a0; }
.qd-b.heal{ border-color:rgba(134,199,155,.5); color:#9ccfa8; }
.qd-b:active{ opacity:.7; }

/* v14: visual cards + note images */
.vcard{
  position:relative; background:var(--navy2); border:1px solid var(--line);
  border-radius:12px; margin-bottom:9px; overflow:hidden;
  display:flex; align-items:stretch; min-height:56px;
}
.vcard.has-cover{ flex-direction:column; }
.vcard-main{
  flex:1; min-width:0; text-align:left; background:none; border:none; color:inherit; font:inherit;
  cursor:pointer; padding:0; display:flex; flex-direction:column;
}
.vcard-cover{ width:100%; height:128px; overflow:hidden; background:var(--navy3); }
.vcard-cover img{ width:100%; height:100%; object-fit:cover; display:block; }
.vcard-body{ padding:12px 13px; }
.vcard.has-cover .vcard-body{ padding:11px 13px 12px; }
.vcard-badge{
  font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.14em; text-transform:uppercase;
  color:var(--gold); margin-bottom:3px;
}
.vcard-title{ font-family:'Cinzel',serif; font-weight:600; font-size:.98rem; letter-spacing:.02em; }
.vcard-sub{ font-size:.82rem; color:var(--ice); opacity:.8; margin-top:2px; }
/* ellipsis menu in the top-right corner of every card */
.card-menu-btn{
  position:absolute; top:8px; right:8px; z-index:2;
  width:34px; height:34px; border-radius:9px; cursor:pointer;
  background:rgba(10,14,26,.55); border:1px solid var(--line2); color:var(--silver);
  font-size:1.15rem; line-height:1; padding:0; display:grid; place-items:center;
}
.card-menu-btn:active{ background:rgba(10,14,26,.8); }
.vcard-corner{ position:absolute; top:8px; right:8px; z-index:2; display:flex; gap:6px; }
.vcard-corner.inline{ flex-direction:row; align-items:center; }
.vcard-corner.stacked{ flex-direction:column; align-items:flex-end; }
.vcard-corner .card-menu-btn{ position:static; }
.vcard-corner.stacked .card-reorder{ flex-direction:column; }
.attach-btn{
  width:34px; height:34px; border-radius:9px;
  background:rgba(201,168,76,.16); border:1px solid var(--gold); color:var(--gold);
  font-size:1.3rem; line-height:1; padding:0; display:grid; place-items:center; cursor:pointer;
}
/* action sheet menu */
.menu-list{ display:flex; flex-direction:column; gap:8px; margin:8px 0 4px; }
.menu-item{
  width:100%; text-align:left; cursor:pointer;
  background:var(--navy3); color:var(--silver); border:1px solid var(--line2);
  border-radius:10px; padding:14px 16px; font-family:'Crimson Pro',serif; font-size:1rem;
}
.menu-item:active{ background:var(--navy2); }
.menu-item.danger{ color:#e08a8a; border-color:rgba(217,138,138,.4); }

.entry-img{ width:100%; border-radius:8px; overflow:hidden; margin:2px 0 8px; border:1px solid var(--line); }
.entry-img img{ width:100%; max-height:240px; object-fit:cover; display:block; }

/* v13: note type help */
.labelrow{ display:flex; align-items:center; gap:8px; }
.info-btn{
  width:20px; height:20px; border-radius:50%; flex:none; cursor:pointer;
  background:transparent; border:1px solid var(--ice); color:var(--ice);
  font-family:'Cinzel',serif; font-size:.66rem; font-style:italic; line-height:1; padding:0;
}
.info-btn:active{ border-color:var(--gold); color:var(--gold); }
.help-list{ display:flex; flex-direction:column; gap:10px; margin:6px 0 2px; }
.help-row{ border-left:2px solid var(--line2); padding-left:10px; }
.help-name{ font-family:'Cinzel',serif; font-weight:600; font-size:.86rem; letter-spacing:.03em; color:var(--silver); }
.help-desc{ font-size:.92rem; color:var(--ice); margin-top:2px; line-height:1.45; }

/* v12: note type picker chips */
.type-pick{ display:flex; flex-wrap:wrap; gap:6px; margin:4px 0 2px; }
.type-pill{
  font-family:'Crimson Pro',serif; font-size:.86rem; cursor:pointer;
  background:var(--navy3); color:var(--ice);
  border:1px solid var(--line2); border-left:3px solid var(--tc,var(--line2));
  border-radius:8px; padding:7px 11px;
}
.type-pill.on{
  color:var(--silver); background:var(--navy2);
  border-color:var(--tc,var(--ice)); border-left-color:var(--tc,var(--ice));
  box-shadow:inset 0 0 0 1px var(--tc,var(--ice));
}

/* v11: in-iframe confirm */
.confirm-msg{ font-size:.98rem; line-height:1.5; margin:4px 0 4px; }

/* v9: roster tabs, tokens, chip remove */
.chip-x{ background:none; border:none; color:var(--danger); font-size:.95rem; cursor:pointer; padding:0 2px 0 6px; }
.small-note{ margin:-2px 0 8px; font-size:.86rem; }
.token-field{ display:flex; align-items:center; gap:12px; margin:4px 0; }
.token-prev{
  width:64px; height:64px; border-radius:10px; border:1px solid var(--line2);
  background:var(--navy3); display:grid; place-items:center; overflow:hidden; flex:none;
}
.token-prev img{ width:100%; height:100%; object-fit:cover; }
.token-prev .muted{ font-size:.7rem; text-align:center; }
.token-prev.big{ width:120px; height:120px; margin:6px auto 10px; }
.token-btns{ display:flex; flex-direction:column; gap:6px; }
.token-up{ display:inline-block; text-align:center; cursor:pointer; }
.token-file{ position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
.tok-sm{ width:22px; height:22px; border-radius:5px; object-fit:cover; vertical-align:middle; margin-right:6px; border:1px solid var(--line); }

/* v8: dialogue speakers */
.sp-hint{ font-size:.82rem; color:var(--ice); opacity:.75; margin:8px 0 5px; }
.sp-chips{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:4px; }
.sp-chip{
  font-family:'Crimson Pro',serif; font-size:.86rem;
  background:transparent; border:1px solid var(--line2); border-radius:999px;
  padding:5px 12px; cursor:pointer;
}
.sp-chip:active{ opacity:.7; }
.entry-text .dlg{ display:inline; }
.entry-text .dlg b{ font-weight:600; }

/* v7: note entries */
.notes-block{ margin-bottom:6px; }
.jump-bar{ display:flex; flex-wrap:wrap; gap:6px; margin:2px 0 10px; }
.jump-chip{
  font-family:'Crimson Pro',serif; font-size:.82rem;
  background:var(--navy3); border:1px solid var(--line); color:var(--ice);
  border-radius:999px; padding:5px 11px; cursor:pointer; border-left-width:3px;
}
.jump-chip:active{ border-color:var(--ice); }
.entry{ border:1px solid var(--line); border-radius:9px; margin-bottom:7px; overflow:hidden; background:var(--navy2); }
.entry.pinned{ border-color:var(--gold); }
.entry-hd{
  display:flex; align-items:center; gap:8px; padding:10px 11px; cursor:pointer;
}
.entry-title{ flex:1; font-family:'Cinzel',serif; font-weight:600; font-size:.88rem; letter-spacing:.02em; min-width:0; }
.entry-type{
  font-family:'Cinzel',serif; font-size:.56rem; letter-spacing:.12em; text-transform:uppercase;
  border:1px solid var(--line2); border-radius:999px; padding:3px 8px; color:var(--ice); white-space:nowrap;
}
.entry-body{ padding:2px 12px 12px; }
.entry-text{ font-size:.95rem; line-height:1.5; }
.entry-acts{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:10px; }
.add-note{ margin-top:4px; }

/* type color coding, shared by jump chips, badges, and note cards.
   --tc is the type's accent; cards use it as a left border. */
.t-exposition{ --tc:#7fb3d5; }
.t-dialogue{   --tc:#86c79b; }
.t-lmdesc{     --tc:#c9b06a; }
.t-lorecheck{  --tc:#9aa8e0; }
.t-clue{       --tc:#d4a86b; }
.t-readaloud{  --tc:#6fc7c0; }
.t-secret{     --tc:#c9a84c; }
.t-beat{       --tc:#b18fd0; }
.t-reminder{   --tc:#d98a8a; }
.t-general{    --tc:#8fa0b3; }
/* jump chips + badges read the accent */
.jump-chip{ border-left-color:var(--tc, var(--line2)); }
.entry-type{ color:var(--tc, var(--ice)); border-color:var(--tc, var(--line2)); opacity:.95; }
/* the note card itself wears a thicker left border in its type color */
.entry.card-type{ border-left:3px solid var(--tc, var(--line2)); }
.entry.card-type.pinned{ border-color:var(--gold); border-left-color:var(--gold); }

/* inline @mention chip */
.mention{
  display:inline; font:inherit; cursor:pointer;
  background:transparent; border:1px solid currentColor; border-radius:6px;
  padding:0 5px; line-height:1.3; white-space:nowrap;
}
.mention:active{ opacity:.7; }

/* v6: phase clarity, manual loot */
.ph-h{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.ph-label{ cursor:pointer; }
.mini-unlock{
  margin-left:auto; font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.08em; text-transform:uppercase;
  background:transparent; border:1px solid var(--gold); color:var(--gold);
  border-radius:999px; padding:4px 11px; cursor:pointer; white-space:nowrap;
}
.mini-unlock:active{ background:rgba(201,168,76,.14); }
.lucky-note{ font-size:.82rem; color:var(--gold); opacity:.9; margin:2px 0 6px; }
.roll-in{ flex:1; min-width:0; }
.roll-line{ display:flex; align-items:center; gap:8px; margin-top:4px; }

/* v5: spotlights, npcs, afflictions */

.seg{ display:flex; gap:6px; margin:3px 0; }
.seg-b{
  flex:1; font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.06em;
  background:transparent; border:1px solid var(--line2); color:var(--ice);
  border-radius:8px; padding:9px 6px; cursor:pointer;
}
.seg-b.on{ border-color:var(--gold); color:var(--silver); background:var(--navy3); }
.aff.eff{ border-style:dashed; border-color:rgba(184,204,216,.45); }
.npc-tag{
  font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.12em; text-transform:uppercase;
  color:var(--gold); opacity:.85;
}
.pick-row.split{ justify-content:space-between; }
.pick-acts{ display:flex; gap:6px; }
.mini{
  font-family:'Cinzel',serif; font-size:.64rem; letter-spacing:.06em;
  background:var(--navy3); border:1px solid var(--line2); color:var(--silver);
  border-radius:7px; padding:6px 9px; cursor:pointer;
}
.mini.ghost{ background:transparent; color:var(--ice); }
.mini-sel{ margin-top:3px; width:100%; font-size:.82rem; }
.spot-block{
  border:1px solid var(--line); border-radius:10px; padding:6px 9px 9px;
  margin-bottom:10px; background:rgba(16,22,39,.5);
}
.spot-block.spot-done{ opacity:.6; }
.spot-hd{ display:flex; align-items:center; justify-content:space-between; padding:4px 2px 7px; }
.spot-name{
  font-family:'Cinzel',serif; font-size:.74rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  color:var(--ice);
}
.spot-tag{ color:#9ecf9e; border:1px solid rgba(140,200,150,.5); border-radius:999px; padding:1px 7px; font-size:.58rem; margin-left:6px; }
.spot-move{ display:flex; gap:4px; }
.ord{
  width:30px; height:30px; border-radius:7px; border:1px solid var(--line2);
  background:var(--navy3); color:var(--silver); font-size:.85rem; cursor:pointer; line-height:1;
}
.ord:disabled{ opacity:.3; cursor:default; }
.res-card.is-npc{ border-left:2px solid var(--gold); }

/* v4: abilities, library context, feedback */
.ab-row{ align-items:flex-start; }
.ab-info{ margin:4px 0 6px; }
.ab-info b, .inv-row b{ font-size:.92rem; }
.icon-btn.gold{ color:var(--gold); font-size:1.3rem; font-weight:700; }
.ctx-bar{
  background:var(--navy2); border:1px solid var(--gold); border-radius:9px;
  padding:9px 11px; margin-bottom:9px; font-size:.86rem; color:var(--ice);
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.ctx-bar b{ color:var(--silver); }
.ctx-bar .btn{ margin-left:auto; }
.gold{ color:var(--gold); }

/* v3: monster creator */
.attr-grid{ border:1px solid var(--line); border-radius:8px; padding:6px 10px 8px; margin:3px 0; }
.att-cat{
  font-family:'Cinzel', serif; font-size:.6rem; letter-spacing:.14em; text-transform:uppercase;
  color:var(--gold); margin:7px 0 2px;
}
.attr-row{ display:flex; align-items:center; gap:8px; padding:2px 0; }
.attr-name{ flex:1; font-size:.92rem; }
.attr-b{
  width:28px; height:28px; border-radius:7px; border:1px solid var(--line2);
  background:var(--navy2); color:var(--silver); font-size:.95rem; cursor:pointer; line-height:1;
}
.attr-v{ width:24px; text-align:center; font-family:'Cinzel', serif; font-weight:700; font-size:.95rem; }
.sp-left{ font-family:'Cinzel', serif; font-size:.7rem; letter-spacing:.08em; color:var(--gold); margin:2px 0 4px; }
.sp-left.over{ color:var(--danger); }
.inv-add{ display:flex; gap:7px; align-items:center; }
.inv-add .inp{ flex:1; }
.inv-row{
  display:flex; justify-content:space-between; align-items:center; gap:8px;
  padding:5px 5px 5px 10px; border:1px solid var(--line); border-radius:8px; margin:4px 0; font-size:.9rem;
}
.mon-name{ cursor:pointer; border-bottom:1px dotted var(--line2); }

/* v2 additions */
.sync{
  margin-left:auto; font-size:.6rem; letter-spacing:.12em; text-transform:uppercase;
  border:1px solid var(--line2); border-radius:999px; padding:3px 9px; color:var(--ice); opacity:.8;
}
.sync.on{ border-color:rgba(140,200,150,.55); color:#9ecf9e; }
.wix-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; background:#9ecf9e; margin-left:5px; vertical-align:middle; }

/* glow tiers: spotlight focus brightness */
.res-card.glow0{}
.res-card.glow1{ border-color:rgba(140,190,220,.35); box-shadow:0 0 10px rgba(140,190,220,.10); }
.res-card.glow2{ border-color:rgba(160,205,230,.6); box-shadow:0 0 16px rgba(140,190,220,.22); }
.res-card.glow3{
  border-color:var(--ice);
  box-shadow:0 0 0 1px var(--glow), 0 0 30px rgba(140,190,220,.34);
  background:linear-gradient(180deg, rgba(140,190,220,.07), var(--navy3));
}
.tgt{ color:var(--ice); opacity:.85; font-size:.9rem; }

<script>
(function(){
  var SRC="LoreMasterTool";
  var wrap=document.getElementById("lfFb"),tg=document.getElementById("lfFbToggle"),
      inp=document.getElementById("lfFbInput"),btn=document.getElementById("lfFbBtn"),msg=document.getElementById("lfFbMsg");
  if(!wrap||!tg||!inp||!btn) return;
  tg.addEventListener("click",function(){ var o=wrap.classList.toggle("open"); tg.setAttribute("aria-expanded",o?"true":"false"); if(o) inp.focus(); });
  inp.addEventListener("input",function(){ btn.disabled=inp.value.trim().length===0; });
  btn.addEventListener("click",function(){
    var t=inp.value.trim(); if(!t) return;
    try{ window.parent.postMessage({type:"LOREFELL_FEEDBACK_SUBMIT",payload:{source:SRC,comment:t}},"*"); }catch(e){}
    inp.value=""; btn.disabled=true; msg.textContent="Thank you. Your feedback was sent.";
    setTimeout(function(){ msg.textContent=""; },4000);
  });
})();
</script>

<script>
/* FateWell (loremaster and lorekeeper hub): campaign manager + battle tracker. Vanilla JS, localStorage + Wix postMessage sync. */

var BUILD_VERSION = 'b34 (d6 only, no Data tab)';
var STORE_KEY = 'lorefell_lm_v1';

var SR_TABLE = {
  'Minion':   { lp:1, sp:9,  vit:8  },
  'Elite':    { lp:2, sp:11, vit:16 },
  'Champion': { lp:3, sp:14, vit:24 },
  'Epic':     { lp:4, sp:16, vit:32 },
  'Forsaken': { lp:5, sp:19, vit:40 }
};
var SR_ORDER = ['Minion','Elite','Champion','Epic','Forsaken'];

var DISRUPTIONS = [
  ['Change Action', 2], ['Escape Effect', 3], ['Add Equipped Utility', 3],
  ['Remove All Afflictions', 5], ['Revive an Enemy', 5], ['Environmental Effect', 8],
  ['Charge All Enemies', 10], ['Magical Effect', 15]
];

var TYPE_LABEL = { monster:'Monster', npc:'NPC', item:'Item' };

var ATTRS = [
  ['Offensive', ['Precision','Power','Magic']],
  ['Defensive', ['Evasion','Durability','Resistance']],
  ['Core', ['Vigor','Wit']]
];
var ATTR_LIST = ['Precision','Power','Magic','Evasion','Durability','Resistance','Vigor','Wit'];
function blankAttrs(){ var o={}; ATTR_LIST.forEach(function(a){ o[a]=0; }); return o; }
function attrSpend(attrs){ var t=0; ATTR_LIST.forEach(function(a){ t += (attrs && attrs[a]) || 0; }); return t; }

/* ---------- utils ---------- */

function uid(){ return Math.random().toString(36).slice(2,10); }

/* Normalize a LoreForge CMS row to the same shape the character sheet reads */
/* Serialize a library entity to a flat CMS row for the Assets collection.
   JSON-bearing fields are stringified so they survive plain text columns. */
function assetToRow(e){
  return {
    assetId: e.id,
    type: e.type,
    name: e.name || '',
    description: e.desc || '',
    shatterRating: e.sr || '',
    lp: e.lp || 0,
    sp: e.sp || 0,
    maxVit: e.maxVit || 0,
    role: e.role || '',
    image: e.img || '',
    attrs: JSON.stringify(e.attrs || {}),
    inventory: JSON.stringify(e.inv || []),
    abilities: JSON.stringify(e.abilities || []),
    foeWeight: e.foeWeight || 0
  };
}
/* Rebuild a library entity from a CMS row. Tolerates already-parsed or string JSON. */
function rowToAsset(r){
  function pick(){ for (var i=0;i<arguments.length;i++){ var k=arguments[i]; if (r[k]!==undefined && r[k]!==null && r[k]!=='') return r[k]; } return undefined; }
  function jp(v, fallback){
    if (v===undefined || v===null || v==='') return fallback;
    if (typeof v === 'object') return v;
    try { return JSON.parse(v); } catch(e){ return fallback; }
  }
  var type = pick('type') || 'monster';
  var e = {
    id: pick('assetId','_id','id') || uid(),
    type: type,
    name: pick('name') || '',
    desc: pick('description','desc') || ''
  };
  if (type==='monster'){
    e.sr = pick('shatterRating','sr') || '';
    e.lp = Number(pick('lp')) || (e.sr && SR_TABLE[e.sr] ? SR_TABLE[e.sr].lp : 0);
    e.sp = Number(pick('sp')) || (e.sr && SR_TABLE[e.sr] ? SR_TABLE[e.sr].sp : 0);
    e.maxVit = Number(pick('maxVit')) || 0;
    e.foeWeight = Number(pick('foeWeight')) || 0;
    e.img = pick('image','img') || '';
    e.attrs = jp(pick('attrs'), blankAttrs());
    e.inv = jp(pick('inventory','inv'), []);
    e.abilities = jp(pick('abilities'), []);
  } else {
    e.role = pick('role') || '';
    if (type==='npc'){
      e.maxVit = Number(pick('maxVit')) || 0;
      e.attrs = jp(pick('attrs'), blankAttrs());
      e.inv = jp(pick('inventory','inv'), []);
      e.abilities = jp(pick('abilities'), []);
    }
  }
  return e;
}
function pushAsset(e){ postToWix({ type:'lmtool-asset-save', asset: assetToRow(e) }); }
function deleteAsset(id){ postToWix({ type:'lmtool-asset-delete', assetId: id }); }

function normForge(e){
  function pick(){ for (var i=0;i<arguments.length;i++){ var k=arguments[i]; if (e[k]!==undefined && e[k]!==null && e[k]!=='') return e[k]; } return ''; }
  return {
    id: pick('_id','id') || uid(),
    name: pick('title','name'),
    tier: Number(pick('tier')) || 1,
    use: pick('use') || 'Act',
    desc: pick('shorthand','description','desc')
  };
}
function esc(s){
  if (s === undefined || s === null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ---------- state, migration, persistence ---------- */

function seed(){ return { campaigns: [], library: [], wixPlayers: [], forge: [], glossary: [], glossaryOn: false, die: 6, sealed: [] }; }

function migrate(d){
  if (!d.wixPlayers) d.wixPlayers = [];
  if (!d.sealed) d.sealed = [];
  if (!d.forge) d.forge = [];
  if (!d.die) d.die = 6;
  if (!d.glossary) d.glossary = [];
  if (d.glossaryOn===undefined) d.glossaryOn = false;
  (d.campaigns||[]).forEach(function(c){
    if (!c.type) c.type = 'legacy';
    if (!Array.isArray(c.acts)) c.acts = [];
  });
  (d.library||[]).forEach(function(e){
    if (e.type==='enemy') e.type='monster';
    if (e.type==='monster'){
      if (!e.attrs) e.attrs = blankAttrs();
      if (!e.inv) e.inv = [];
      if (!e.abilities) e.abilities = [];
    }
  });
  function fixNoteTypes(obj){
    (obj.entries||[]).forEach(function(en){ if (en.type==='exposition') en.type='lmdesc'; });
  }
  function seedEntries(obj, legacyField){
    if (!obj.entries){
      obj.entries = [];
      var legacy = obj[legacyField];
      if (legacy && String(legacy).trim()){
        obj.entries.push({ id:uid(), title:'Notes', type:'general', body:String(legacy), pinned:false, open:true });
      }
    }
  }
  (d.campaigns||[]).forEach(function(c){
    if (!c.ovOpen) c.ovOpen = {};
    seedEntries(c, 'notes'); fixNoteTypes(c);
    if (c.img===undefined) c.img='';
    if (c.desc===undefined) c.desc='';
    if (!c.manualRefs) c.manualRefs = [];
    (c.entries||[]).forEach(function(en){ if (en.img===undefined) en.img=''; });
    (c.players||[]).forEach(function(p){ if (p.wixId===undefined) p.wixId=null; });
    (c.acts||[]).forEach(function(a){
      seedEntries(a, 'notes'); fixNoteTypes(a);
      if (a.img===undefined) a.img='';
      if (a.desc===undefined) a.desc='';
      (a.entries||[]).forEach(function(en){ if (en.img===undefined) en.img=''; });
      if (!a.manualRefs) a.manualRefs = [];
      (a.sessions||[]).forEach(function(s){
        seedEntries(s, 'notes'); fixNoteTypes(s);
        if (s.img===undefined) s.img='';
        if (s.desc===undefined) s.desc='';
        (s.entries||[]).forEach(function(en){ if (en.img===undefined) en.img=''; });
        if (!s.manualRefs) s.manualRefs = [];
        (s.scenes||[]).forEach(function(sc){
          seedEntries(sc, 'prep'); fixNoteTypes(sc);
          if (sc.img===undefined) sc.img='';
          if (sc.desc===undefined) sc.desc='';
          if (!sc.mode) sc.mode = (sc.combatants && sc.combatants.length) ? 'combat' : 'roleplay';
          if (!sc.status) sc.status = 'active';
          if (!sc.beatDone) sc.beatDone = {};
          (sc.entries||[]).forEach(function(en){ if (en.img===undefined) en.img=''; });
          if (!sc.battle.spotMode) sc.battle.spotMode = 'auto';
          if (!sc.battle.order) sc.battle.order = [];
          if (!sc.battle.manual) sc.battle.manual = {};
          (sc.combatants||[]).forEach(function(cb){
            if (cb.type==='enemy') cb.type='monster';
            if (cb.target===undefined) cb.target='';
            if (!cb.attrs) cb.attrs = blankAttrs();
            if (!cb.inv) cb.inv = [];
            if (!cb.abilities) cb.abilities = [];
            if (!cb.side) cb.side = (cb.type==='npc') ? 'npc' : 'monster';
            (cb.affs||[]).forEach(function(a){ if(!a.kind) a.kind='affliction'; delete a.rounds; });
          });
          Object.keys(sc.ps||{}).forEach(function(pid){
            (sc.ps[pid].affs||[]).forEach(function(a){ if(!a.kind) a.kind='affliction'; delete a.rounds; });
          });
          Object.keys(sc.ps||{}).forEach(function(pid){
            if (sc.ps[pid].target===undefined) sc.ps[pid].target='';
          });
        });
      });
    });
  });
  return d;
}

function load(){
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    var d = JSON.parse(raw);
    if (!d || !d.campaigns) return null;
    return migrate(d);
  } catch(e){ return null; }
}

var S = load() || seed();
var V = { screen:'campaigns', cId:null, aId:null, sId:null, scId:null, tab:'notes', cTab:'overview', aTab:'overview', sTab:'overview', libFilter:'all', ov:false };

/* ---------- Wix bridge ---------- */

/* Two modes:
   - hosted: the Wix page sends a campaignId; the tool works on that one campaign
     and saves its contents back to that campaign's row (Option B).
   - standalone: no page; full multi-campaign localStorage behaviour for offline use. */
var WIX = { connected:false, loaded:false, hosted:false, campaignId:null, saveTimer:null };

function postToWix(m){
  try { if (window.parent !== window) window.parent.postMessage(m, '*'); } catch(e){}
}

function saveLocal(){
  try { localStorage.setItem(STORE_KEY, JSON.stringify(S)); } catch(e){}
}

/* In hosted mode the campaign contents are one object; the library and forge
   are account-global and sync separately, so they are excluded from the blob. */
function campaignBlob(){
  var c = curC();
  return c ? { campaign: c, savedAt: Date.now() } : null;
}

function save(){
  saveLocal();
  clearTimeout(WIX.saveTimer);
  WIX.saveTimer = setTimeout(function(){
    if (WIX.hosted){
      var blob = campaignBlob();
      if (blob && WIX.campaignId){
        postToWix({ type:'lmtool-save', campaignId: WIX.campaignId, data: blob });
      }
    } else {
      postToWix({ type:'lmtool-save', data: S });
    }
  }, 900);
}

function mergePool(c){
  S.wixPlayers.forEach(function(wp){
    var found = null;
    c.players.forEach(function(p){ if (p.wixId && p.wixId===wp.id) found = p; });
    if (!found){
      c.players.forEach(function(p){ if (!found && p.name.toLowerCase()===String(wp.name).toLowerCase()) found = p; });
    }
    if (found){
      found.wixId = wp.id;
      found.name = wp.name;
      if (wp.level) found.level = wp.level;
      if (wp.charId) found.charId = wp.charId;
    } else {
      c.players.push({ id:uid(), wixId:wp.id, charId:wp.charId||null, name:wp.name, level:wp.level||1 });
    }
  });
}

function autoMergePlayers(campaignId){
  var targets = [];
  if (campaignId){
    S.campaigns.forEach(function(c){ if (c.id===campaignId) targets.push(c); });
  } else {
    var cur = curC();
    if (cur) targets.push(cur);
    S.campaigns.forEach(function(c){ if (!c.players.length && targets.indexOf(c)<0) targets.push(c); });
  }
  targets.forEach(mergePool);
}

function syncPlayersNow(){ mergePool(curC()); save(); render(); }

window.addEventListener('message', function(ev){
  var m = ev.data || {};
  if (m.type === 'lmtool-data'){
    /* standalone: full multi-campaign state */
    WIX.connected = true; WIX.loaded = true;
    if (m.data && m.data.campaigns){ S = migrate(m.data); saveLocal(); }
    render();
  }
  if (m.type === 'lmtool-open'){
    /* hosted: the page opens one campaign by id, optionally with its saved contents */
    WIX.connected = true; WIX.loaded = true; WIX.hosted = true;
    WIX.campaignId = m.campaignId || null;
    var incoming = (m.data && m.data.campaign) ? m.data.campaign : null;
    if (incoming){
      incoming.id = WIX.campaignId || incoming.id;
      /* migrate just this campaign through the shared migration via a wrapper */
      var wrapped = migrate({ campaigns:[incoming], library:S.library, forge:S.forge, wixPlayers:S.wixPlayers, die:S.die });
      var migrated = wrapped.campaigns[0];
      var found = false;
      S.campaigns = S.campaigns.map(function(c){ if (c.id===migrated.id){ found=true; return migrated; } return c; });
      if (!found) S.campaigns.push(migrated);
    } else if (WIX.campaignId){
      /* brand-new empty campaign created on the site */
      var exists = S.campaigns.some(function(c){ return c.id===WIX.campaignId; });
      if (!exists){
        var fresh = { id:WIX.campaignId, name:m.title||'Adventure',type:'legacy', notes:'', img:'', desc:'', entries:[], manualRefs:[], players:[], acts:[], ovOpen:{} };
        S.campaigns.push(fresh);
        if (S.wixPlayers.length) mergePool(fresh);
      }
    }
    V.cId = WIX.campaignId; V.aId=null; V.sId=null; V.scId=null;
    V.screen = 'campaign';
    saveLocal(); render(); requestSealed();
  }
  if (m.type === 'lmtool-players'){
    WIX.connected = true;
    if (Array.isArray(m.players)){
      S.wixPlayers = m.players;
      autoMergePlayers(m.campaignId);
      save(); render(); requestSealed();
    }
  }
  if (m.type === 'lmtool-forge'){

/* The sealed past is loremaster-only. The tool asks the page for it by the current
   campaign's roster, and the page answers only for loremaster and lorekeeper roles. */
function requestSealed(){
  var c = curC(); if (!c) return;
  var memberIds = c.players.map(function(p){ return p.wixId; }).filter(Boolean);
  var charIds = c.players.map(function(p){ return p.charId; }).filter(Boolean);

// Foe vitality scales with the party (average party level x number of Fell x tier weight),
// so a canon foe carries a weight instead of a fixed number. Use the set value when there
// is one, otherwise derive it from the open campaign's roster.
function effMaxVit(e){
  if (!e) return 0;
  if (e.maxVit && e.maxVit > 0) return e.maxVit;
  if (e.foeWeight){
    var c = curC();
    var party = (c && c.players && c.players.length) ? c.players.length : 4;
    var apl = 1;
    if (c && c.players && c.players.length){
      var sum = 0; c.players.forEach(function(p){ sum += (parseInt(p.level,10) || 1); });
      apl = Math.max(1, Math.round(sum / c.players.length));
    }
    return apl * party * e.foeWeight;
  }
  return e.maxVit || 0;
}
function sealedFor(p){
  if (!S.sealed || !S.sealed.length || !p) return null;
  var norm = function(v){ return String(v||'').trim().replace(/^the\s+/i,'').toLowerCase(); };
  var byChar = null, byId = null, byName = null;
  S.sealed.forEach(function(e){
    if (p.charId && e.charId && e.charId===p.charId) byChar = e;
    if (p.wixId && e.ownerMemberId && e.ownerMemberId===p.wixId) byId = e;
    if (!byName && norm(e.name)===norm(p.name)) byName = e;
  });
  return byChar || byId || byName || null;
}
function sealHtml(e){
  var h = '';
  if (e.reveals && e.reveals.length){
    h += '<div class="seal-h">Reveals</div><ul class="seal-list">';
    e.reveals.forEach(function(r){ h += '<li>'+esc(typeof r==='string'?r:(r.text||''))+'</li>'; });
    h += '</ul>';

  if (e.fragments && e.fragments.length){
    h += '<div class="seal-h">Fragments</div><ul class="seal-list">';
    e.fragments.forEach(function(f){ var t = typeof f==='string'?f:((f.type?f.type+': ':'')+(f.text||'')); h += '<li>'+esc(t)+'</li>'; });
    h += '</ul>';
  }
  if (e.sealCode) h += '<div class="seal-code">Seal '+esc(e.sealCode)+'</div>';
  if (!h) h = '<div class="seal-empty">No sealed past recorded.</div>';
  return h;
}

/* Duplicate a scene: keep prep (notes, attached refs, combatant lineup) but
   reset the live battle, attendance, log, and loot so the copy is fresh to run. */
function duplicateScene(id){
  var s = curSe(); if (!s) return;
  var src = null, idx = -1;
  s.scenes.forEach(function(x, i){ if (x.id===id){ src = x; idx = i; } });
  if (!src) return;
  var copy = newScene(src.name + ' (copy)');
  copy.desc = src.desc || '';
  copy.img = src.img || '';
  copy.prep = src.prep || '';
  /* deep-copy prep notes with fresh ids */
  copy.entries = (src.entries||[]).map(function(e){
    return { id:uid(), title:e.title, type:e.type, body:e.body, pinned:e.pinned, open:e.open, img:e.img||'' };
  });
  /* keep attached library refs */
  copy.refs = (src.refs||[]).slice();
  /* keep the monster/NPC lineup, fresh ids, full vitality, no afflictions or intents */
  copy.combatants = (src.combatants||[]).map(function(c){
    return { id:uid(), libId:c.libId, name:c.name, side:c.side||'monster', sr:c.sr,
      maxVit:c.maxVit, curVit:c.maxVit, act:'', target:'', done:false, affs:[], img:c.img||'' };
  });
  s.scenes.splice(idx+1, 0, copy);
  save(); render();
}

/* Resolve a level object from a "kind:id" ref, searching the current campaign. */
function levelByRef(ref){
  var parts = ref.split(':'), kind = parts[0], id = parts[1];
  var c = curC(); if (!c) return null;
  if (kind==='c') return c;
  var found = null;
  c.acts.forEach(function(a){
    if (kind==='a' && a.id===id) found = a;
    a.sessions.forEach(function(s){
      if (kind==='s' && s.id===id) found = s;
      s.scenes.forEach(function(sc){
        if (kind==='sc' && sc.id===id) found = sc;
      });
    });
  });
  return found;
}
function levelEntries(ref){
  var lv = levelByRef(ref);
  if (!lv) return [];
  if (!lv.entries) lv.entries = [];
  return lv.entries;
}

/* Sorted view: pinned first, original order otherwise */
function sortedEntries(entries){
  var pinned = [], rest = [];
  entries.forEach(function(e){ (e.pinned?pinned:rest).push(e); });
  return pinned.concat(rest);
}

/* ---------- dialogue speakers ---------- */

/* Readable-on-navy palette. Gold stays ornament, so it is not in here. */
var SPEAKER_COLORS = ['#7fb3d5','#86c79b','#b18fd0','#e0a86b','#d98a8a','#6fc7c0','#c9b06a','#9aa8e0','#d49ac0','#8fc16a'];
function speakerColor(name){
  var key = String(name).toLowerCase().replace(/\s+\d+$/,'').trim();
  var h = 0, i;
  for (i=0;i<key.length;i++){ h = (h*31 + key.charCodeAt(i)) >>> 0; }
  return SPEAKER_COLORS[h % SPEAKER_COLORS.length];
}

/* Named NPCs and monsters attached at a given level, deduped, with colors. */
function speakersForRef(ref){
  var lv = levelByRef(ref); if (!lv) return [];
  var acc;
  if (ref.indexOf('sc:')===0) acc = entitiesOfScene(lv);
  else if (ref.indexOf('s:')===0) acc = entitiesOfSession(lv);
  else if (ref.indexOf('a:')===0) acc = entitiesOfAct(lv);
  else { /* campaign: roll up every act */
    acc = { ids:{}, extra:[] };
    (lv.acts||[]).forEach(function(a){ mergeEnt(acc, entitiesOfAct(a)); });
  }
  var out = [], seen = {};
  Object.keys(acc.ids).forEach(function(id){
    var e = libGet(id);
    if (e && (e.type==='npc' || e.type==='monster') && !seen[e.name.toLowerCase()]){
      seen[e.name.toLowerCase()] = true;
      out.push({ name:e.name, type:e.type, color:speakerColor(e.name) });
    }
  });
  acc.extra.forEach(function(x){
    var base = x.name.replace(/\s\d+$/,'');
    if (!seen[base.toLowerCase()]){ seen[base.toLowerCase()]=true; out.push({ name:base, type:x.type, color:speakerColor(base) }); }
  });
  out.sort(function(a,b){ return a.name.localeCompare(b.name); });
  return out;
}

/* Mention targets: attached monsters/NPCs plus the campaign's players. */
function mentionsForRef(ref){
  var list = speakersForRef(ref).slice();
  var seen = {}; list.forEach(function(s){ seen[s.name.toLowerCase()]=true; });
  var c = curC();
  if (c){
    c.players.forEach(function(p){
      if (!seen[p.name.toLowerCase()]){ seen[p.name.toLowerCase()]=true; list.push({ name:p.name, type:'player', color:speakerColor(p.name) }); }
    });
  }
  list.sort(function(a,b){ return a.name.localeCompare(b.name); });
  return list;
}

/* ---------- glossary ---------- */

function normGloss(g){
  var aliases = g.aliases;
  if (typeof aliases === 'string') aliases = aliases.split(',').map(function(a){ return a.trim(); }).filter(Boolean);
  return {
    id: g.id || g._id || uid(),
    term: (g.term || g.name || '').trim(),
    type: g.type || '',
    description: g.description || g.desc || '',
    aliases: aliases || [],
    autoHighlight: g.autoHighlight === true || g.autoHighlight === 'true' || g.autoHighlight === 1
  };
}
function glossById(id){ var r=null; (S.glossary||[]).forEach(function(g){ if(g.id===id) r=g; }); return r; }

/* Active highlightable terms (only when campaign mode is on and the term is flagged),
   expanded with aliases and sorted longest-first for greedy matching. */
function glossaryActiveTerms(){
  if (!S.glossaryOn) return [];
  var out = [];
  (S.glossary||[]).forEach(function(g){
    if (!g.autoHighlight || !g.term) return;
    out.push({ needle:g.term, id:g.id });
    (g.aliases||[]).forEach(function(a){ if (a) out.push({ needle:a, id:g.id }); });
  });
  out.sort(function(a,b){ return b.needle.length - a.needle.length; });
  return out;
}
function isWordChar(ch){ return /[A-Za-z0-9]/.test(ch); }

/* Escape raw text and wrap the first occurrence of each flagged term in a gold chip.
   used: map of glossary id -> true, so each term highlights once per note. */
function glossaryWrap(text, used, terms){
  if (!terms || !terms.length) return esc(text);
  var lc = text.toLowerCase();
  var out = '', i = 0;
  while (i < text.length){
    var matched = null;
    var boundaryBefore = (i===0) || !isWordChar(text.charAt(i-1));
    if (boundaryBefore){
      for (var k=0;k<terms.length;k++){
        var n = terms[k].needle, nl = n.toLowerCase();
        if (lc.indexOf(nl, i) === i){
          var afterCh = (i+n.length < text.length) ? text.charAt(i+n.length) : ' ';
          if (!isWordChar(afterCh)){ matched = terms[k]; break; }
        }
      }
    }
    if (matched){
      var seg = text.substr(i, matched.needle.length);
      if (!used[matched.id]){
        used[matched.id] = true;
        out += '<button class="gloss" onclick="glossInfo(\'' + matched.id + '\')">' + esc(seg) + '</button>';
      } else {
        out += esc(seg);
      }
      i += matched.needle.length;
      continue;
    }
    out += esc(text.charAt(i));
    i++;
  }
  return out;
}
function glossInfo(id){
  var g = glossById(id); if (!g) return;
  var typeLine = g.type ? '<p class="muted">'+esc(g.type)+'</p>' : '';
  modal('<h3 class="m-title">'+esc(g.term)+'</h3>'+typeLine
    + '<p class="desc-show">'+esc(g.description||'No description yet.')+'</p>'
    + '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button></div>');
}
function toggleGlossary(){ S.glossaryOn = !S.glossaryOn; save(); render(); }

/* Render a note body, coloring lines that open with an attached speaker's name. */
function renderNoteBody(body, ref){
  var speakers = speakersForRef(ref);
  var byName = {};
  speakers.forEach(function(s){ byName[s.name.toLowerCase()] = s; });
  /* mentions can also point at players; build a wider map for @tags */
  var mentionList = mentionsForRef(ref);
  var byMention = {};
  mentionList.forEach(function(s){ byMention[s.name.toLowerCase()] = s; });
  var mentionNames = mentionList.map(function(s){ return s.name; }).sort(function(a,b){ return b.length - a.length; });
  var glossTerms = glossaryActiveTerms();
  var glossUsed = {};

  function withMentions(text){
    /* text is RAW (unescaped) here; we escape segments as we go */
    var out = '';
    var i = 0;
    while (i < text.length){
      if (text.charAt(i) === '@'){
        var rest = text.slice(i+1);
        var hit = null;
        for (var k=0;k<mentionNames.length;k++){
          var nm = mentionNames[k];
          if (rest.toLowerCase().indexOf(nm.toLowerCase())===0){ hit = nm; break; }
        }
        if (hit){
          var sp = byMention[hit.toLowerCase()];
          out += '<button class="mention" style="color:'+sp.color+';border-color:'+sp.color+'" onclick="mentionInfo(\''+hit.replace(/'/g,"\\'")+'\',\''+ref+'\')">@'+esc(hit)+'</button>';
          i += 1 + hit.length;
          continue;
        }
      }
      /* accumulate a plain run until the next @ */
      var next = text.indexOf('@', i+1);
      if (next === -1) next = text.length;
      out += glossaryWrap(text.slice(i, next), glossUsed, glossTerms);
      i = next;
    }
    return out;
  }

  var lines = String(body).split('\n');
  var out = lines.map(function(line){
    var m = line.match(/^(\s*)([^:]{1,40}):(\s*)([\s\S]*)$/);
    if (m){
      var rawName = m[2].trim();
      var lookup = rawName.toLowerCase().replace(/\s+\d+$/,'');
      /* dialogue can be spoken by monsters, NPCs, or players: use the wider map */
      var sp = byMention[rawName.toLowerCase()] || byName[rawName.toLowerCase()] || byMention[lookup] || byName[lookup];
      if (sp){
        return esc(m[1]) + '<span class="dlg" style="color:'+sp.color+'">'
          + '<b>'+esc(rawName)+':</b> ' + withMentions(m[4]) + '</span>';
      }
    }
    return withMentions(line);
  });
  return out.join('<br>');
}

/* Open the library/quick-review card for an @mentioned entity by name. */
function mentionInfo(name, ref){
  var exact = String(name).toLowerCase();
  var stripped = exact.replace(/\s+\d+$/,'');

  /* 1. library entities (exact match first, then base-name for numbered instances) */
  var e = null;
  S.library.forEach(function(x){
    if ((x.type==='monster'||x.type==='npc'||x.type==='item') && x.name.toLowerCase()===exact) e = x;
  });
  if (!e){
    S.library.forEach(function(x){
      if (!e && (x.type==='monster'||x.type==='npc'||x.type==='item') && x.name.toLowerCase()===stripped) e = x;
    });
  }
  if (e){ chipInfo(e.id); return; }

  /* 2. players on the campaign (exact name, including names that end in a number) */
  var c = curC();
  if (c){
    var p = null;
    c.players.forEach(function(pl){ if (!p && pl.name.toLowerCase()===exact) p = pl; });
    if (!p) c.players.forEach(function(pl){ if (!p && pl.name.toLowerCase()===stripped) p = pl; });
    if (p){
      modal('<h3 class="m-title">'+esc(p.name)+'</h3><p class="muted">Player &middot; Level '+p.level+'</p>'
        + '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button></div>');
      return;
    }
  }
  modal('<h3 class="m-title">'+esc(name)+'</h3><p class="muted">No matching profile found at this level.</p>'
    + '<div class="m-row"><button class="btn ghost" onclick="closeModal()">Close</button></div>');
}

function insertMention(name){
  var ta = document.getElementById('enBody');
  if (!ta) return;
  var v = ta.value || '';
  var pos = (ta.selectionStart !== undefined && ta.selectionStart !== null) ? ta.selectionStart : v.length;
  var pre = v.slice(0, pos), post = v.slice(pos);
  if (pre.length && !/\s$/.test(pre)) pre += ' ';
  var ins = '@' + name + ' ';
  ta.value = pre + ins + post;
  var caret = (pre + ins).length;
  try { ta.focus(); ta.setSelectionRange(caret, caret); } catch(e){}
}
function insertSpeaker(name){
  var ta = document.getElementById('enBody');
  if (!ta) return;
  var v = ta.value || '';
  var pos = (ta.selectionStart !== undefined && ta.selectionStart !== null) ? ta.selectionStart : v.length;
  var pre = v.slice(0, pos), post = v.slice(pos);
  /* start on a fresh line if we are mid-line */
  if (pre.length && !/\n$/.test(pre)) pre += '\n';
  var ins = name + ': ';
  ta.value = pre + ins + post;
  var caret = (pre + ins).length;
  try { ta.focus(); ta.setSelectionRange(caret, caret); } catch(e){}
}

/* The reusable notes block: jump bar + collapsible entry cards. */
function notesBlock(ref, opts){
  opts = opts || {};
  var entries = levelEntries(ref);
  var h = '<div class="notes-block">';
  if (entries.length >= 3){
    h += '<div class="jump-bar">';
    sortedEntries(entries).forEach(function(e){
      h += '<button class="jump-chip t-'+e.type+'" onclick="jumpEntry(\''+ref+'\',\''+e.id+'\')">'
        + (e.pinned?'&#9733; ':'')+esc(e.title)+'</button>';
    });
    h += '</div>';
  }
  if (!entries.length){
    h += '<p class="muted pad">No notes yet. Break things into titled entries you can fold and jump to.</p>';
  } else {
    var view = sortedEntries(entries);
    var manyOpen = entries.length >= 3;
    view.forEach(function(e){
      /* collapse rule: 3+ entries default closed unless pinned or explicitly opened */
      var isOpen = e.pinned || (manyOpen ? (e.open===true) : (e.open!==false));
      var idx = -1; entries.forEach(function(x,i){ if(x.id===e.id) idx=i; });
      h += '<div class="entry card-type t-'+e.type+(e.pinned?' pinned':'')+'" id="entry-'+e.id+'">'
        + '<div class="entry-hd" onclick="toggleEntry(\''+ref+'\',\''+e.id+'\')">'
        + '<span class="caret'+(isOpen?' open':'')+'">&rsaquo;</span>'
        + '<span class="entry-title">'+esc(e.title)+'</span>'
        + '<span class="entry-type t-'+e.type+'">'+noteTypeLabel(e.type)+'</span></div>';
      if (isOpen){
        h += '<div class="entry-body">'
          + (e.img ? '<div class="entry-img"><img src="'+esc(e.img)+'" alt=""></div>' : '')
          + (e.body ? '<div class="entry-text">'+renderNoteBody(e.body, ref)+'</div>' : (e.img ? '' : '<div class="muted">Empty.</div>'))
          + '<div class="entry-acts">'
          + '<button class="mini'+(e.pinned?' on':'')+'" onclick="pinEntry(\''+ref+'\',\''+e.id+'\')">'+(e.pinned?'Unpin':'Pin')+'</button>'
          + '<button class="mini ghost" onclick="editEntry(\''+ref+'\',\''+e.id+'\')">Edit</button>'
          + '<button class="ord" '+(idx<=0?'disabled':'')+' onclick="moveEntry(\''+ref+'\',\''+e.id+'\',-1)">&uarr;</button>'
          + '<button class="ord" '+(idx>=entries.length-1?'disabled':'')+' onclick="moveEntry(\''+ref+'\',\''+e.id+'\',1)">&darr;</button>'
          + '<button class="mini danger" onclick="deleteEntry(\''+ref+'\',\''+e.id+'\')">Delete</button>'
          + '</div></div>';
      }
      h += '</div>';
    });
  }
  h += '<button class="btn wide ghost small add-note" onclick="addEntry(\''+ref+'\')">+ Add note</button>';
  h += '</div>';
  return h;
}

  w.attrs[a] = Math.max(0, cur + d);

function tokenField(current){

    + '<input type="hidden" id="wImg" value="'+esc(current||'')+'">'
    + '<div class="token-prev" id="wImgPrev">'+(has?'<img src="'+esc(current)+'" alt="token">':'<span class="muted">No image</span>')+'</div>'
    + '<div class="token-btns">'
    + '<input type="file" accept="image/*" id="wImgFile" class="token-file" onchange="readToken(this)">'
    + '<button type="button" class="btn small token-up" onclick="document.getElementById(\'wImgFile\').click()">Choose image</button>'
    + '<button type="button" class="btn small ghost" id="wImgClear" onclick="clearToken()"'+(has?'':' style="display:none"')+'>Remove</button>'
    + '</div></div>';

function readToken(input){
  var f = input.files && input.files[0];
  if (!f) return;
  if (f.size > 1500000){ alert('That image is large. Please use one under about 1.5 MB so it syncs cleanly.'); return; }
  var reader = new FileReader();
  reader.onload = function(ev){
    var data = ev.target.result;
    var hid = document.getElementById('wImg'); if (hid) hid.value = data;
    var prev = document.getElementById('wImgPrev'); if (prev) prev.innerHTML = '<img src="'+data+'" alt="token">';
    var clr = document.getElementById('wImgClear'); if (clr) clr.style.display = '';
  };
  reader.onerror = function(){ alert('Could not read that image. Try a different file.'); };
  reader.readAsDataURL(f);
}
function clearToken(){
  var hid = document.getElementById('wImg'); if (hid) hid.value = '';
  var prev = document.getElementById('wImgPrev'); if (prev) prev.innerHTML = '<span class="muted">No image</span>';
  var clr = document.getElementById('wImgClear'); if (clr) clr.style.display = 'none';

function saveWizard(type, id){
  var name = document.getElementById('wName').value.trim();
  if (!name) return;
  var e = id ? libGet(id) : { id: uid(), type: type };
  e.name = name;
  e.desc = document.getElementById('wDesc').value;
  if (type==='monster'){
    var sr = document.getElementById('wSR').value;
    if (!sr){ alert('Pick a Shatter Rating.'); return; }
    e.sr = sr; e.lp = SR_TABLE[sr].lp; e.sp = SR_TABLE[sr].sp;
    e.maxVit = parseInt(document.getElementById('wVit').value,10) || SR_TABLE[sr].vit;
    e.img = document.getElementById('wImg').value.trim();
    e.attrs = JSON.parse(JSON.stringify(window._wiz.attrs));
    e.inv = window._wiz.inv.slice();
    e.abilities = JSON.parse(JSON.stringify(window._wiz.abilities));
  } else {
    e.role = document.getElementById('wRole').value.trim();
    if (type==='npc'){
      var nv = document.getElementById('wVit');
      e.maxVit = nv ? (parseInt(nv.value,10) || 0) : 0;
      var ni = document.getElementById('wImg');
      e.img = ni ? ni.value : '';
    }
  }
  if (!id) S.library.push(e);
  pushAsset(e);
  var attachAfter = window._attachAfter;
  closeModal(); save();
  if (attachAfter && V.screen==='scene' && type==='monster'){ countModal(e.id); return; }
  if (attachAfter && V.screen==='scene'){ attachRef(e.id); return; }
  render();
}

/* ---------- spotlight graph ---------- */

function battleNodes(){
  var sc = curSc(), nodes = [];
  sc.combatants.forEach(function(c){
    nodes.push({ key:'m:'+c.id, kind:'m', side:c.side||'monster', ref:c, name:c.name, act:c.act, target:c.target, done:c.done, alive:c.curVit>0 });
  });
  attendingPlayers().forEach(function(p){
    var st = pState(p.id);
    nodes.push({ key:'p:'+p.id, kind:'p', ref:p, st:st, name:p.name, act:st.act, target:st.target, done:st.actDone, alive:true });
  });
  return nodes;
}
function nodeByKey(key){
  var r=null; battleNodes().forEach(function(n){ if(n.key===key) r=n; }); return r;
}

function focusGraph(){
  var nodes = battleNodes();
  var byKey = {}; nodes.forEach(function(n){ byKey[n.key]=n; n.focus=0; n.cluster=null; });
  var edges = [];       /* all declared ties: define cluster membership for the round */
  var liveEdges = [];   /* unresolved ties: drive glow heat */
  nodes.forEach(function(n){
    if (n.act && n.target && byKey[n.target]){
      edges.push([n.key, n.target]);
      if (!n.done) liveEdges.push([n.key, n.target]);
    }
  });
  liveEdges.forEach(function(e){ byKey[e[0]].focus++; byKey[e[1]].focus++; });
  /* nodes touching any declared edge belong to a cluster for the whole round */
  var inEdge = {};
  edges.forEach(function(e){ inEdge[e[0]]=true; inEdge[e[1]]=true; });
  /* connected components over all declared edges */
  var parent = {};
  function find(k){ while (parent[k]!==k){ parent[k]=parent[parent[k]]; k=parent[k]; } return k; }
  nodes.forEach(function(n){ parent[n.key]=n.key; });
  edges.forEach(function(e){
    var a=find(e[0]), b=find(e[1]);
    if (a!==b) parent[a]=b;
  });
  var clusters = {};
  nodes.forEach(function(n){
    if (inEdge[n.key]){
      var root = find(n.key);
      if (!clusters[root]) clusters[root] = { nodes:[], heat:0 };
      clusters[root].nodes.push(n);
      clusters[root].heat += n.focus;
      n.cluster = root;
    }
  });
  var list = Object.keys(clusters).map(function(k){ return clusters[k]; });
  list.sort(function(a,b){ return b.heat - a.heat; });
  var loose = nodes.filter(function(n){ return !inEdge[n.key]; });
  return { clusters:list, loose:loose, nodes:nodes };
}

function glowTier(n){
  var sc = curSc();
  if (sc.battle.spotMode==='manual'){
    return sc.battle.manual[n.key] ? 3 : 0;
  }
  if (n.focus>=3) return 3;
  if (n.focus===2) return 2;
  if (n.focus===1) return 1;
  return 0;
}

/* Build ordered spotlight items: focus clusters / manual groups, lone unengaged nodes, and events. */
function buildSpotlights(){
  var sc = curSc(), b = sc.battle;
  var raw = [];
  if (b.spotMode==='auto'){
    var g = focusGraph();
    g.clusters.forEach(function(cl, i){
      cl.nodes.sort(function(a,c){ return c.focus - a.focus; });
      var keys = cl.nodes.map(function(n){ return n.key; });
      raw.push({ type:'cluster', id:'cl:'+keys.slice().sort().join('|'), nodes:cl.nodes, label:'Spotlight' });
    });
    g.loose.forEach(function(n){
      raw.push({ type:'solo', id:'solo:'+n.key, nodes:[n], label:'Unengaged' });
    });
  } else {
    /* manual: each lit node (or group of lit nodes) is its own spotlight; rest are unengaged solos */
    var nodes = battleNodes();
    var lit = nodes.filter(function(n){ return b.manual[n.key]; });
    if (lit.length){
      raw.push({ type:'manual', id:'manual:'+lit.map(function(n){return n.key;}).sort().join('|'), nodes:lit, label:'Spotlight' });
    }
    nodes.filter(function(n){ return !b.manual[n.key]; }).forEach(function(n){
      raw.push({ type:'solo', id:'solo:'+n.key, nodes:[n], label:'Unengaged' });
    });
  }
  b.spots.forEach(function(s){ raw.push({ type:'event', id:'ev:'+s.id, event:s, label:'Event' }); });

  /* apply saved order, append new ids in default order, drop stale */
  var byId = {}; raw.forEach(function(r){ byId[r.id]=r; });
  var ordered = [];
  (b.order||[]).forEach(function(id){ if (byId[id]){ ordered.push(byId[id]); delete byId[id]; } });
  raw.forEach(function(r){ if (byId[r.id]){ ordered.push(r); } });

  /* resolved spotlights sink below unresolved, preserving relative order */
  var unresolved = ordered.filter(function(it){ return !spotResolved(it); });
  var resolved = ordered.filter(function(it){ return spotResolved(it); });
  var finalList = unresolved.concat(resolved);

  /* number the active (non-event, non-unengaged) spotlights for labels */
  var n = 0;
  finalList.forEach(function(it){
    if (it.type==='cluster' || it.type==='manual'){ n++; it.label = 'Spotlight ' + n; }
    else if (it.type==='solo'){ it.label = 'Unengaged: ' + it.nodes[0].name; }
    else if (it.type==='event'){ it.label = 'Event'; }
  });
  b.order = finalList.map(function(it){ return it.id; });
  return finalList;
}

function spotResolved(it){
  if (it.type==='event') return !!it.event.done;
  return it.nodes.every(function(n){
    if (n.kind==='m') return n.ref.done || n.ref.curVit<=0 || !n.ref.act;
    return n.st.actDone || !n.st.act;
  });
}

function moveSpot(idx, dir){
  var b = curSc().battle;
  var ord = b.order.slice();
  var j = idx + dir;
  if (j < 0 || j >= ord.length) return;
  var tmp = ord[idx]; ord[idx] = ord[j]; ord[j] = tmp;
  b.order = ord;
  save(); render();
}

  });
  return h + '</select>';
}
