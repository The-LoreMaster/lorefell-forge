<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ForgeMaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;600&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0a0e1a; --navy-2:#10162a; --panel:#0d1322; --ink:#060912;
    --silver:#dce8ef; --ice:#b8ccd8; --gold:#c9a84c; --gold-bright:#e2c574;
    --muted:#7e8a99; --error:#cf7d8c;
    --gold-line:rgba(201,168,76,.45); --gold-faint:rgba(201,168,76,.16);
    --ice-glow:rgba(184,204,216,.26); --hair:rgba(184,204,216,.14);
    --display:"Cinzel Decorative",Georgia,serif; --head:"Cinzel",Georgia,serif; --body:"Crimson Pro",Georgia,serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:var(--body);color:var(--silver);
    background:radial-gradient(120% 90% at 50% 12%, #131b30 0%, var(--navy) 48%, var(--ink) 100%);
    min-height:100vh;-webkit-font-smoothing:antialiased;padding:0 0 calc(28px + env(safe-area-inset-bottom))}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px}

  header.head{text-align:center;padding:24px 16px 8px}
  .eyebrow{font-family:var(--head);font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--ice);opacity:.7;margin:0 0 7px}
  .title{font-family:var(--display);font-weight:700;font-size:26px;letter-spacing:.03em;margin:0;line-height:1;text-shadow:0 0 24px rgba(184,204,216,.12)}
  .sub{font-size:14px;color:var(--muted);margin:8px 0 0}
  .rule{width:48px;height:1px;margin:13px auto 0;background:linear-gradient(90deg,transparent,var(--gold-line),transparent)}

  .bar{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;margin:18px 0 6px}
  .ctl{display:flex;align-items:center;gap:9px}
  .ctl > span{font-family:var(--head);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--hair);border-radius:4px;overflow:hidden}
  .seg button{font-family:var(--head);font-size:13px;background:transparent;color:var(--muted);border:0;
    padding:7px 13px;cursor:pointer;transition:background .15s,color .15s}
  .seg button[aria-pressed="true"]{background:rgba(201,168,76,.12);color:var(--silver);box-shadow:inset 0 0 0 1px var(--gold-line)}

  section.group{margin:18px 0;border:1px solid var(--hair);border-radius:8px;
    background:linear-gradient(180deg,var(--navy-2),var(--panel));padding:14px 14px 16px}
  .group h2{font-family:var(--head);font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ice);margin:0 0 2px}
  .group .hint{font-size:12.5px;color:var(--muted);margin:0 0 12px}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{appearance:none;cursor:pointer;border:1px solid var(--hair);border-radius:6px;
    background:rgba(184,204,216,.03);color:var(--silver);font-family:var(--body);font-size:14.5px;
    padding:9px 12px;display:flex;align-items:center;gap:9px;transition:border-color .15s,box-shadow .2s,background .15s;text-align:left}
  .chip .cost{font-family:var(--head);font-size:11px;color:var(--gold);border:1px solid var(--gold-faint);
    border-radius:10px;padding:1px 7px;white-space:nowrap}
  .chip:hover:not(.locked){border-color:var(--gold-line)}
  .chip[aria-pressed="true"]{border-color:var(--gold-line);background:rgba(201,168,76,.07);
    box-shadow:0 0 0 1px var(--gold-faint),0 0 16px var(--ice-glow)}
  .chip:focus-visible{outline:none;border-color:var(--silver);box-shadow:0 0 0 1px var(--gold-line)}
  .chip.locked{opacity:.45;cursor:not-allowed}
  .chip .lock{font-size:11px;color:var(--muted)}

  .panel{margin:22px 0 0;border-top:1px solid var(--hair);padding-top:18px}
  .msg{margin:0 0 12px;font-size:13.5px;line-height:1.4}
  .msg .err{color:var(--error);display:block}
  .msg .warn{color:var(--gold-bright);display:block}
  .msg .ok{color:var(--ice);display:block}

  .budget{display:flex;align-items:center;gap:12px;margin:0 0 16px}
  .meter{flex:1;height:7px;border-radius:4px;background:rgba(184,204,216,.08);overflow:hidden;border:1px solid var(--hair)}
  .meter > i{display:block;height:100%;background:linear-gradient(90deg,var(--ice),var(--gold));transition:width .2s ease}
  .meter.over > i{background:linear-gradient(90deg,var(--error),var(--error))}
  .budget .read{font-family:var(--head);font-size:12px;letter-spacing:.06em;color:var(--muted);white-space:nowrap}

  .actions{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}
  .btn{appearance:none;cursor:pointer;font-family:var(--head);font-size:13px;letter-spacing:.06em;
    border-radius:5px;padding:11px 16px;border:1px solid var(--hair);background:rgba(184,204,216,.04);color:var(--silver);
    transition:border-color .15s,box-shadow .2s,opacity .15s}
  .btn:hover{border-color:var(--gold-line)}
  .btn:focus-visible{outline:none;border-color:var(--silver);box-shadow:0 0 0 1px var(--gold-line)}
  .btn.primary{border-color:var(--gold-line);box-shadow:0 0 18px rgba(201,168,76,.08)}
  .btn[disabled]{opacity:.4;cursor:not-allowed;border-color:var(--hair);box-shadow:none}
  .name{flex:1;min-width:160px;background:rgba(6,9,18,.5);border:1px solid var(--hair);border-radius:5px;
    color:var(--silver);font-family:var(--body);font-size:14.5px;padding:10px 12px}
  .name:focus{outline:none;border-color:var(--gold-line)}
  .name::placeholder{color:var(--muted)}

  .cards{display:grid;gap:12px}
  .card{border:1px solid var(--hair);border-radius:7px;background:rgba(6,9,18,.4);padding:12px 13px}
  .card .ct{display:flex;justify-content:space-between;align-items:center;margin:0 0 7px}
  .card h3{font-family:var(--head);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:0}
  .card .copy{font-family:var(--head);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ice);
    background:transparent;border:1px solid var(--hair);border-radius:3px;padding:3px 8px;cursor:pointer}
  .card .copy:hover{border-color:var(--gold-line);color:var(--silver)}
  .card .body{font-size:14.5px;line-height:1.45;color:var(--silver);white-space:pre-wrap}
  .card .body.mono{font-family:var(--head);letter-spacing:.02em}

  .toast{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);
    font-family:var(--head);font-size:12.5px;letter-spacing:.06em;color:var(--silver);background:rgba(6,9,18,.92);
    border:1px solid var(--gold-line);padding:10px 16px;border-radius:4px;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;z-index:30;box-shadow:0 0 24px var(--ice-glow);max-width:88vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-2px)}
  .toast.bad{border-color:var(--error)}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <header class="head">
    <p class="eyebrow">LoreFell</p>
    <h1 class="title" id="forgeTitle">ForgeMaster</h1>
    <p class="sub" id="forgeSub">Loading the forge…</p>
    <div class="rule"></div>
  </header>

  <div class="wrap">
    <div class="bar">
      <div class="ctl"><span>Tier</span><div class="seg" id="tierSeg"></div></div>
      <div class="ctl"><span>Form</span><div class="seg" id="formSeg"></div></div>
    </div>
    <div id="groups"></div>
    <div class="panel">
      <div class="msg" id="msg"></div>
      <div class="budget"><div class="meter" id="meter"><i></i></div><span class="read" id="read"></span></div>
      <div class="actions">
        <input class="name" id="name" type="text" placeholder="Name this creation (optional)" maxlength="80">
        <button class="btn" id="randomize">Randomize</button>
        <button class="btn primary" id="submit">Submit</button>
      </div>
      <div class="cards" id="cards"></div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="./rules.js"></script>
<script>
(function(){
  /* ---------- shared rule interpreter (loaded from rules.js) ---------- */
  var validate = (window.LF && window.LF.validate) || function(){
    return {legal:false,errors:["rules.js failed to load"],warnings:[],totals:{cost:0,budget:[0,0],extraPoints:0}};
  };

  /* ---------- config + baked-in default (SigilForge seed) ---------- */
  var params=new URLSearchParams(location.search);
  var FORGE_KEY=params.get("forge")||"sigilforge";
  var DEFAULT_DEF={
    forgeKey:"sigilforge", title:"SigilForge", version:1, submitTarget:"Sigils",
    componentGroups:[
      {id:"damagePackages",label:"Damage",selection:"exactlyOne"},
      {id:"targetingProfiles",label:"Targeting",selection:"exactlyOne"},
      {id:"utilityComponents",label:"Effects",selection:"maxOf",count:2}
    ],
    rules:{
      budgets:{byTier:{"1":[1,2],"2":[3,4],"3":[5,6]}},
      gates:[
        {category:"affliction",requires:{anyOf:[{tier:2},{form:2}]}},
        {category:"amplify",requires:{tier:2}},
        {category:"majorAffliction",requires:{anyOf:[{tier:3},{form:3}]}},
        {category:"allEnemies",requires:{anyOf:[{tier:3},{form:3}]}},
        {category:"threeTargets",requires:{form:2}},
        {category:"spread",requires:{form:2}}
      ],
      slots:[
        {id:"primaryDamage",selection:"exactlyOne",from:"damagePackages"},
        {id:"targeting",selection:"exactlyOne",from:"targetingProfiles"},
        {id:"nonDamage",selection:"maxOf",count:2,from:"utilityComponents"}
      ],
      exceptions:[{when:{tier:3,form:3},budgetOverride:[1,7],label:"Mythic"}],
      modifiers:[{id:"baseDamage",effect:"grantExtraPoint",amount:1}]
    },
    components:[
      {componentId:"baseDamage",groupId:"damagePackages",label:"Base Damage",cost:1,categories:[]},
      {componentId:"heavyStrike",groupId:"damagePackages",label:"Heavy Strike",cost:3,categories:[]},
      {componentId:"single",groupId:"targetingProfiles",label:"Single Target",cost:1,categories:[]},
      {componentId:"threeTargets",groupId:"targetingProfiles",label:"Three Targets",cost:2,categories:["threeTargets"]},
      {componentId:"allEnemies",groupId:"targetingProfiles",label:"All Enemies",cost:3,categories:["allEnemies"]},
      {componentId:"burn",groupId:"utilityComponents",label:"Burn",cost:2,categories:["affliction"]},
      {componentId:"majorBurn",groupId:"utilityComponents",label:"Major Burn",cost:4,categories:["affliction","majorAffliction"]}
    ]
  };

  /* ---------- state ---------- */
  var def=null;
  var state={tier:1, form:1, selected:{}, result:null}; // selected: { groupId: Set ... } via plain object of sets
  var sel=new Set(); // flat set of selected componentIds

  function byId(id){return (def.components||[]).filter(function(c){return c.componentId===id;})[0];}
  function groupComps(gid){return (def.components||[]).filter(function(c){return c.groupId===gid;});}
  function isAllowed(c){
    return (c.categories||[]).every(function(cat){
      var gate=(def.rules.gates||[]).filter(function(g){return g.category===cat;})[0];
      return !gate || meets(gate.requires,{tier:state.tier,form:state.form});
    });
  }
  function groupSel(gid){return groupComps(gid).filter(function(c){return sel.has(c.componentId);});}

  /* ---------- rendering ---------- */
  function seg(el, count, current, onPick){
    el.innerHTML="";
    for(var i=1;i<=count;i++){(function(n){
      var b=document.createElement("button");
      b.textContent=n; b.setAttribute("aria-pressed", n===current?"true":"false");
      b.addEventListener("click",function(){onPick(n);});
      el.appendChild(b);
    })(i);}
  }

  function render(){
    document.getElementById("forgeTitle").textContent=def.title||def.forgeKey;
    document.getElementById("forgeSub").textContent="Build a "+(def.title||def.forgeKey).replace(/Forge$/,"")+" creation";
    seg(document.getElementById("tierSeg"),3,state.tier,setTier);
    seg(document.getElementById("formSeg"),3,state.form,setForm);
    renderGroups();
    renderPanel();
    postHeight();
  }

  function renderGroups(){
    var host=document.getElementById("groups"); host.innerHTML="";
    (def.componentGroups||[]).forEach(function(g){
      var s=document.createElement("section"); s.className="group";
      var hint = g.selection==="exactlyOne" ? "Choose one"
        : g.selection==="atLeastOne" ? "Choose at least one"
        : g.selection==="maxOf" ? ("Up to "+(g.count||0))
        : "Optional";
      s.innerHTML='<h2>'+g.label+'</h2><p class="hint">'+hint+'</p>';
      var chips=document.createElement("div"); chips.className="chips";
      groupComps(g.id).forEach(function(c){
        var allowed=isAllowed(c), on=sel.has(c.componentId);
        var b=document.createElement("button"); b.className="chip"+(on?" sel":"")+(allowed?"":" locked");
        b.setAttribute("aria-pressed", on?"true":"false");
        var lock = allowed ? "" : '<span class="lock">needs '+gateText(c)+'</span>';
        b.innerHTML='<span>'+c.label+'</span><span class="cost">'+c.cost+'</span>'+lock;
        if(allowed){ b.addEventListener("click",function(){pick(g,c.componentId);}); }
        else { b.disabled=true; }
        chips.appendChild(b);
      });
      s.appendChild(chips); host.appendChild(s);
    });
  }

  function gateText(c){
    return (c.categories||[]).map(function(cat){
      var g=(def.rules.gates||[]).filter(function(x){return x.category===cat;})[0];
      return g?describe(g.requires):"";
    }).filter(Boolean).join("; ");
  }

  function renderPanel(){
    var payload=currentPayload();
    var r=validate(payload, def); state.result=r;

    var msg=document.getElementById("msg"); msg.innerHTML="";
    r.errors.forEach(function(e){var d=document.createElement("span");d.className="err";d.textContent=e;msg.appendChild(d);});
    r.warnings.forEach(function(w){var d=document.createElement("span");d.className="warn";d.textContent=w;msg.appendChild(d);});
    if(r.legal && !r.warnings.length){var d=document.createElement("span");d.className="ok";d.textContent="Legal build.";msg.appendChild(d);}

    var max=r.totals.budget[1]||1, pct=Math.min(100,Math.round((r.totals.cost/max)*100));
    var meter=document.getElementById("meter"); meter.className="meter"+(r.totals.cost>max?" over":"");
    meter.querySelector("i").style.width=pct+"%";
    document.getElementById("read").textContent=r.totals.cost+" / "+r.totals.budget[1]+" pts";

    document.getElementById("submit").disabled=!r.legal;

    renderCards(payload, r);
  }

  function renderCards(payload, r){
    var labels=(payload.selections||[]).map(function(id){var c=byId(id);return c?c.label:id;});
    var shorthand="T"+payload.tier+"F"+payload.form+" ["+labels.join(", ")+"]";
    var full="Tier "+payload.tier+", Form "+payload.form+". Components: "+(labels.join(", ")||"none")+".";
    var extraNote=r.totals.extraPoints?(" ("+r.totals.extraPoints+" extra from modifiers)"):"";
    var budget="Spent "+r.totals.cost+" of "+r.totals.budget[1]+" points"+extraNote+". Tier band "+r.totals.budget[0]+" to "+r.totals.budget[1]+".";
    var cards=[["Shorthand",shorthand,true],["Full",full,false],["Budget",budget,false]];
    var host=document.getElementById("cards"); host.innerHTML="";
    cards.forEach(function(c){
      var d=document.createElement("div"); d.className="card";
      d.innerHTML='<div class="ct"><h3>'+c[0]+'</h3><button class="copy">Copy</button></div>'
        +'<div class="body'+(c[2]?" mono":"")+'">'+escapeHtml(c[1])+'</div>';
      d.querySelector(".copy").addEventListener("click",function(){copyText(c[1]);toast("Copied "+c[0].toLowerCase());});
      host.appendChild(d);
    });
  }

  function escapeHtml(s){return String(s).replace(/[&<>]/g,function(m){return ({"&":"&amp;","<":"&lt;",">":"&gt;"})[m];});}

  /* ---------- interactions ---------- */
  function pick(g, id){
    var was=sel.has(id);
    if(g.selection==="exactlyOne"){
      groupComps(g.id).forEach(function(c){sel.delete(c.componentId);});
      if(!was) sel.add(id);
    } else {
      if(was){ sel.delete(id); }
      else {
        if(g.selection==="maxOf" && groupSel(g.id).length>=(g.count||0)) return;
        sel.add(id);
      }
    }
    renderGroups(); renderPanel(); postHeight();
  }

  function setTier(n){ state.tier=n; dropLocked(); render(); }
  function setForm(n){ state.form=n; dropLocked(); render(); }
  function dropLocked(){
    Array.from(sel).forEach(function(id){ var c=byId(id); if(c && !isAllowed(c)) sel.delete(id); });
  }

  function currentPayload(){
    return { tier:state.tier, form:state.form, selections:Array.from(sel),
             title:(document.getElementById("name").value||"").trim() };
  }

  /* ---------- randomize (enumerate legal builds, pick uniformly) ---------- */
  function subsets(arr){
    var out=[[]];
    arr.forEach(function(x){ out=out.concat(out.map(function(s){return s.concat([x]);})); });
    return out;
  }
  function randomize(){
    var groups=def.componentGroups||[];
    var perGroup=groups.map(function(g){
      var ids=groupComps(g.id).filter(isAllowed).map(function(c){return c.componentId;});
      var opts=[];
      if(g.selection==="exactlyOne"){ ids.forEach(function(id){opts.push([id]);}); }
      else if(g.selection==="atLeastOne"){ subsets(ids).forEach(function(s){if(s.length>=1)opts.push(s);}); }
      else if(g.selection==="maxOf"){ subsets(ids).forEach(function(s){if(s.length<=(g.count||0))opts.push(s);}); }
      else { opts=subsets(ids); }
      if(!opts.length) opts.push([]);
      return opts;
    });
    var total=perGroup.reduce(function(a,o){return a*o.length;},1);
    var builds=[];
    if(total<=20000){
      var idx=perGroup.map(function(){return 0;});
      for(var n=0;n<total;n++){
        var combo=[]; perGroup.forEach(function(o,i){combo=combo.concat(o[idx[i]]);});
        builds.push(combo);
        for(var k=perGroup.length-1;k>=0;k--){ if(++idx[k]<perGroup[k].length) break; idx[k]=0; }
      }
    } else {
      for(var s=0;s<4000;s++){
        var c=[]; perGroup.forEach(function(o){c=c.concat(o[Math.floor(Math.random()*o.length)]);});
        builds.push(c);
      }
    }
    var legal=builds.filter(function(b){return validate({tier:state.tier,form:state.form,selections:b},def).legal;});
    if(!legal.length){ toast("No legal build at Tier "+state.tier+", Form "+state.form, true); return; }
    var pickList=legal[Math.floor(Math.random()*legal.length)];
    sel=new Set(pickList);
    renderGroups(); renderPanel(); postHeight();
  }

  /* ---------- submit ---------- */
  function submit(){
    var payload=currentPayload();
    var r=validate(payload, def);
    if(!r.legal){ toast("Build is not legal yet", true); return; }
    if(window.parent && window.parent!==window){
      send({type:"FORGE_SUBMIT", forgeKey:def.forgeKey||FORGE_KEY, payload:payload});
      toast("Submitting…");
    } else {
      toast("Submitted (standalone preview)");
    }
  }
  function handleResult(m){
    if(m.ok){ toast("Submitted to "+(def.submitTarget||"the collection")); }
    else { toast((m.errors&&m.errors[0])||"Submission rejected", true); }
  }

  /* ---------- utilities ---------- */
  function copyText(t){
    try{
      var ta=document.createElement("textarea"); ta.value=t;
      ta.style.position="fixed"; ta.style.top="-1000px"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta); return true;
    }catch(e){ return false; }
  }
  var toastTimer;
  function toast(text, bad){
    var el=document.getElementById("toast"); el.textContent=text;
    el.className="toast show"+(bad?" bad":"");
    clearTimeout(toastTimer); toastTimer=setTimeout(function(){el.className="toast"+(bad?" bad":"");},1800);
  }
  function send(msg){ if(window.parent && window.parent!==window){ window.parent.postMessage(msg,"*"); } }
  function postHeight(){ send({type:"FORGE_HEIGHT", height:document.body.scrollHeight}); }

  /* ---------- bridge + boot ---------- */
  function applyDefinition(d){ def=d; sel=new Set(); state.tier=1; state.form=1; render(); }
  window.addEventListener("message", function(e){
    var m=e.data||{};
    if(m.type==="FORGE_DEFINITION" && m.definition){ applyDefinition(m.definition); }
    if(m.type==="FORGE_SUBMIT_RESULT"){ handleResult(m); }
  });
  document.getElementById("randomize").addEventListener("click", randomize);
  document.getElementById("submit").addEventListener("click", submit);
  window.addEventListener("resize", postHeight);

  // ask the page for the definition; fall back to the baked-in default if none arrives
  send({type:"FORGE_READY", forgeKey:FORGE_KEY});
  setTimeout(function(){ if(!def){ applyDefinition(DEFAULT_DEF); } }, 1200);
})();
</script>
</body>
</html>
