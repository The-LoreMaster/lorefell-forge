<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LoreFell Arsenal Cards in FellGlass, prototype two</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a0e1a; --panel:#10162a; --panel2:#0d1322;
  --silver:#dce8ef; --ice:#b8ccd8; --gold:#c9a84c; --muted:#7e8a99;
  --ember:#c96a5a; --line:rgba(184,204,216,.16); --goldline:rgba(201,168,76,.4);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--navy); color:var(--silver); font-family:'Crimson Pro',serif; }
button{ font:inherit; color:inherit; background:none; border:none; cursor:pointer; }

.proto-tag{ text-align:center; font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); padding:10px 12px 0; }
.wrap{ max-width:620px; margin:0 auto; padding:0 14px 34px; }

/* head: player, charge, phase */
.hh-kick{ font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); padding-top:12px; }
.hh-name{ font-family:'Cinzel Decorative',serif; font-size:1.4rem; margin:2px 0 8px; }
.charge-fix{ display:flex; align-items:center; gap:12px; padding:9px 13px; border:1px solid var(--goldline); border-radius:10px; background:linear-gradient(180deg, rgba(201,168,76,.06), transparent); }
.cf-l{ font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:var(--ice); }
.cf-pips{ display:flex; gap:9px; }
.cf-pip{ width:23px; height:23px; border-radius:50%; border:1px solid var(--goldline); transition:box-shadow .25s ease, background .25s ease; }
.cf-pip.on{ background:radial-gradient(circle at 40% 35%, #e8cf8a, var(--gold) 70%); box-shadow:0 0 11px rgba(201,168,76,.5); }
.cf-hint{ margin-left:auto; color:var(--muted); font-size:.82rem; font-style:italic; }

.phase-seg{ display:flex; gap:6px; margin:12px 0 4px; }
.phase-seg button{ flex:1; font-family:'Cinzel',serif; font-size:.64rem; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); border:1px solid var(--line); border-radius:8px; padding:9px 0; }
.phase-seg button.on{ color:var(--gold); border-color:var(--goldline); background:rgba(201,168,76,.07); }

/* the declare card shell */
.dshell{ border:1px solid var(--line); border-radius:12px; background:linear-gradient(180deg, var(--panel), var(--panel2)); padding:13px 13px 15px; margin-top:10px; }
.d-l{ font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.16em; text-transform:uppercase; color:var(--ice); margin:10px 0 6px; }
.d-l:first-child{ margin-top:0; }

.act-seg{ display:flex; flex-wrap:wrap; gap:6px; }
.act-seg button{ font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; color:var(--silver); border:1px solid var(--line); border-radius:999px; padding:7px 13px; }
.act-seg button.on{ color:var(--gold); border-color:var(--goldline); background:rgba(201,168,76,.08); }

.plainline{ color:var(--muted); font-size:.9rem; padding:8px 2px 2px; font-style:italic; }

select.demo{ width:100%; background:var(--panel2); color:var(--silver); border:1px solid var(--line); border-radius:8px; padding:9px 10px; font:inherit; }

/* dealt card rail */
.deal{ display:flex; gap:10px; overflow-x:auto; padding:8px 2px 12px; scroll-snap-type:x proximity; -webkit-overflow-scrolling:touch; }
.deal::-webkit-scrollbar{ height:6px; }
.deal::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }
@media (prefers-reduced-motion: no-preference){
  .deal .card{ animation:dealin .35s ease both; }
  .deal .card:nth-child(2){ animation-delay:.06s; } .deal .card:nth-child(3){ animation-delay:.12s; }
  .deal .card:nth-child(4){ animation-delay:.18s; } .deal .card:nth-child(5){ animation-delay:.24s; }
  @keyframes dealin{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
}

/* card anatomy, plates only when the row carries one */
.card{ position:relative; flex:0 0 216px; scroll-snap-align:start; text-align:left;
  background:linear-gradient(180deg, #121a30, var(--panel2));
  border:1px solid var(--goldline); border-radius:12px; overflow:hidden;
  display:flex; transition:opacity .3s ease, filter .3s ease, box-shadow .3s ease; }
.card.picked{ border-color:var(--gold); box-shadow:0 0 0 1px rgba(201,168,76,.4), 0 0 16px rgba(201,168,76,.2); }
.card.locked{ opacity:.42; filter:grayscale(.55); pointer-events:none; }
.card .tier-rail{ width:20px; flex:none; display:flex; flex-direction:column; align-items:center; gap:6px; padding-top:11px;
  background:rgba(10,14,26,.55); border-right:1px solid var(--line); }
.tr-pip{ width:8px; height:8px; border-radius:50%; border:1px solid var(--goldline); transition:background .3s ease; }
.tr-pip.on{ background:var(--gold); box-shadow:0 0 6px rgba(201,168,76,.55); }
.card-in{ flex:1; min-width:0; display:flex; flex-direction:column; }
.art{ height:76px; position:relative; display:grid; place-items:center; border-bottom:1px solid var(--goldline);
  background:radial-gradient(110px 60px at 50% 20%, rgba(184,204,216,.14), transparent), linear-gradient(180deg,#141c33,#0c1122); }
.art .glyph{ font-size:1.7rem; color:var(--ice); opacity:.85; }
.art .src{ position:absolute; right:5px; bottom:4px; font-family:'Cinzel',serif; font-size:.48rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); border:1px solid var(--line); border-radius:5px; padding:2px 5px; background:rgba(10,14,26,.7); }
.c-kick{ font-family:'Cinzel',serif; font-size:.54rem; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); padding:9px 10px 0; }
.c-name{ font-family:'Cinzel',serif; font-weight:600; font-size:.98rem; color:var(--silver); padding:2px 10px 0; }
.c-body{ padding:5px 10px 9px; font-size:.87rem; line-height:1.4; color:var(--ice); flex:1; }
.c-dmg{ padding:0 10px 7px; font-size:.8rem; color:var(--silver); }
.c-dmg b{ color:var(--gold); font-weight:600; }
.c-foot{ border-top:1px solid var(--line); padding:6px 10px 8px; font-size:.75rem; color:var(--muted); }
.c-foot .warm{ color:var(--ember); }
.c-foot .good{ color:#9ec98f; }
.locknote{ position:absolute; inset:auto 0 0 20px; padding:5px 10px; background:rgba(10,14,26,.85);
  font-family:'Cinzel',serif; font-size:.56rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ember); border-top:1px solid var(--line); }

.stage{ display:flex; gap:7px; align-items:flex-start; padding:3px 0; color:var(--muted); }
.stage .sp{ width:8px; height:8px; border-radius:50%; border:1px solid var(--goldline); margin-top:5px; flex:none; transition:background .3s ease; }
.stage.lit{ color:var(--ice); }
.stage.lit .sp{ background:var(--gold); box-shadow:0 0 6px rgba(201,168,76,.55); }
.stage .st-k{ font-family:'Cinzel',serif; font-size:.56rem; letter-spacing:.1em; text-transform:uppercase; min-width:48px; padding-top:2px; }
.stage .st-t{ flex:1; font-size:.83rem; line-height:1.35; }

/* declaration summary */
.decl-sum{ margin-top:12px; border:1px dashed var(--goldline); border-radius:10px; padding:10px 12px; font-size:.92rem; color:var(--ice); }
.decl-sum b{ color:var(--gold); font-family:'Cinzel',serif; font-size:.66rem; letter-spacing:.12em; text-transform:uppercase; margin-right:8px; }
.sendbtn{ display:block; width:100%; margin-top:10px; font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.16em; text-transform:uppercase; color:var(--navy); background:linear-gradient(180deg,#e0c87a,var(--gold)); border-radius:9px; padding:12px 0; }

.footnote{ color:var(--muted); font-size:.84rem; line-height:1.5; padding:16px 2px 0; }
</style>
</head>
<body>
<div class="proto-tag">Prototype two. The dealt hand inside the FellGlass declare flow. Not wired.</div>
<div class="wrap" id="app"></div>

<script>
var S = { charge:1, phase:'declare', act:'', pick:'', stance:'Stalwart', react:'', target:'The Shardspawn 1' };

var ABILITIES = [
  { tier:0, name:'Basic Attack', img:'', body:'Precision against the target\u2019s Evasion.',
    dmg:'<b>Base</b> 1 + Power to Vitality \u00b7 <b>Bonus</b> 3 vs Durability', foot:'Lands to light Charge 1.' },
  { tier:1, name:'Riven Edge', img:'&#10022;', body:'A tearing follow-through. The wound stays open.',
    dmg:'<b>Base</b> 1 + Power to Vitality \u00b7 <b>Bonus</b> 4 vs Durability', foot:'<span class="warm">Fellmark lands Bleeding.</span> Lands to light Charge 2.' },
  { tier:2, name:'Skysplitter Arc', img:'&#9885;', body:'A full turning cut through everything in reach of the haft.',
    dmg:'<b>Base</b> 1 + Power to Vitality \u00b7 <b>Bonus</b> 5 vs Durability', foot:'<span class="warm">Fellmark lands Dislocated.</span> Lands to light Charge 3.' },
  { tier:3, name:'Last Cairn', img:'', body:'Everything the meter holds, spent in one falling blow.',
    dmg:'<b>Base</b> 1 + Power to Vitality \u00b7 <b>Bonus</b> 8 vs Durability', foot:'<span class="warm">Resolves, then the meter falls to 0.</span>' },
  { tier:1, name:'Emberlash', img:'', spell:true, body:'A whip of coalfire. Magic against the Difficulty. No Evasion.',
    dmg:'<b>Base</b> 1 + Magic to Vitality \u00b7 <b>Bonus</b> 3 vs Resistance', foot:'<span class="warm">Fellmark lands Ignited.</span>' }
];

var STANCES = [
  { name:'Shrouded', img:'', t1:'+2 Evasion.', t2:'Incoming damage reduced by Evasion.', t3:'Immune to Fellstrikes.' },
  { name:'Stalwart', img:'', t1:'+2 Durability.', t2:'Incoming damage reduced by Durability.', t3:'Immune to Fellmarks.' },
  { name:'Vestments', img:'', t1:'+2 Resistance.', t2:'Incoming damage reduced by Resistance.', t3:'Cannot be the target of a spell.' }
];

var LOREBOUND = {
  name:'The Aerostrix', aspect:'Augury', img:'&#129413;',
  initial:'When a Fell makes an attack, that attack is a Lucky Roll.',
  branch:'The target\u2019s Evasion becomes 0 against that attack.',
  crown:'Add a second Lucky die to that attack.'
};

function tierRail(){
  var h='<div class="tier-rail">';
  for(var i=1;i<=3;i++) h+='<span class="tr-pip'+(S.charge>=i?' on':'')+'"></span>';
  return h+'</div>';
}
function art(a, srcTag){
  if(!a) return '';
  return '<div class="art"><span class="glyph">'+a+'</span><span class="src">'+srcTag+'</span></div>';
}

function abilityCard(a, i){
  var locked = a.tier>0 && a.tier>S.charge;
  var picked = S.pick===a.name;
  var kick = (a.spell?'Spell':'Weapon \u00b7 Hatchet')+' \u00b7 '+(a.tier===0?'Always ready':'Tier '+a.tier);
  return '<button class="card'+(locked?' locked':'')+(picked?' picked':'')+'" onclick="pickAbility(\''+a.name+'\')">'
    + tierRail()
    + '<span class="card-in">'
    + art(a.img, 'Creations \u00b7 img')
    + '<span class="c-kick">'+kick+'</span>'
    + '<span class="c-name">'+a.name+'</span>'
    + '<span class="c-body">'+a.body+'</span>'
    + '<span class="c-dmg">'+a.dmg+'</span>'
    + '<span class="c-foot">'+(picked?'<span class="good">Declared.</span> ':'')+a.foot+'</span>'
    + '</span>'
    + (locked?'<span class="locknote">Needs Tier '+a.tier+' charge</span>':'')
    + '</button>';
}

function stanceCard(st){
  var worn = S.stance===st.name;
  return '<button class="card'+(worn?' picked':'')+'" onclick="wearStance(\''+st.name+'\')">'
    + tierRail()
    + '<span class="card-in">'
    + art(st.img, 'canon \u00b7 SiteAssets')
    + '<span class="c-kick">Armor Stance'+(worn?' \u00b7 worn':'')+'</span>'
    + '<span class="c-name">'+st.name+'</span>'
    + '<span class="c-body">'
    + stageRow('Tier 1', st.t1, S.charge>=1)
    + stageRow('Tier 2', st.t2, S.charge>=2)
    + stageRow('Tier 3', st.t3, S.charge>=3)
    + '</span>'
    + '<span class="c-foot">'+(worn?'<span class="good">Worn now.</span> Lit tiers hold while the charge does.':'Tap to wear. Switching spends your Act.')+'</span>'
    + '</span></button>';
}

function stageRow(k, t, lit){
  return '<span class="stage'+(lit?' lit':'')+'"><span class="sp"></span><span class="st-k">'+k+'</span><span class="st-t">'+t+'</span></span>';
}

function loreboundCard(){
  var lb=LOREBOUND;
  return '<button class="card picked" style="flex-basis:320px" onclick="void 0">'
    + tierRail()
    + '<span class="card-in">'
    + art(lb.img, 'CanonAspects \u00b7 art')
    + '<span class="c-kick">Lorebound \u00b7 React \u00b7 once per Round</span>'
    + '<span class="c-name">'+lb.name+' \u00b7 '+lb.aspect+'</span>'
    + '<span class="c-body">'
    + stageRow('Initial', lb.initial, S.charge>=1)
    + stageRow('Branch', lb.branch, S.charge>=2)
    + stageRow('Crown', lb.crown, S.charge>=3)
    + '</span>'
    + '<span class="c-foot">Resolves at your charge. Allies first, no self benefit before Corsair form.</span>'
    + '</span></button>';
}

function render(){
  var h='';
  h+='<div class="hh-kick">FellGlass \u00b7 The Stage</div>'
    +'<div class="hh-name">Billy Ravencairn</div>'
    +'<div class="charge-fix"><span class="cf-l">Charge</span><span class="cf-pips">';
  for(var i=1;i<=3;i++) h+='<button class="cf-pip'+(S.charge>=i?' on':'')+'" onclick="setCharge('+i+')" aria-label="Set charge '+i+'"></button>';
  h+='</span><span class="cf-hint">Tap the pips. The hand answers.</span></div>';

  h+='<div class="phase-seg">'
    +'<button class="'+(S.phase==='declare'?'on':'')+'" onclick="setPhase(\'declare\')">Declare</button>'
    +'<button class="'+(S.phase==='resolve'?'on':'')+'" onclick="setPhase(\'resolve\')">Resolution</button>'
    +'</div>';

  h+='<div class="dshell">';
  if(S.phase==='declare'){
    h+='<div class="d-l">Your Act</div><div class="act-seg">';
    [['attack','Attack'],['stance','Change Stance'],['skill','Use a skill'],['item','Use an item']].forEach(function(p){
      h+='<button class="'+(S.act===p[0]?'on':'')+'" onclick="setAct(\''+p[0]+'\')">'+p[1]+'</button>';
    });
    h+='</div>';

    if(S.act==='attack'){
      h+='<div class="d-l">The hand deals your attacks</div><div class="deal">';
      ABILITIES.forEach(function(a,i){ h+=abilityCard(a,i); });
      h+='</div>';
      if(S.pick){
        h+='<div class="d-l">Target</div><select class="demo"><option>'+S.target+'</option><option>The Shardspawn 2</option><option>Hollow Warden</option></select>';
      }
    } else if(S.act==='stance'){
      h+='<div class="d-l">The hand deals your stances</div><div class="deal">';
      STANCES.forEach(function(st){ h+=stanceCard(st); });
      h+='</div>';
    } else if(S.act==='skill'){
      h+='<div class="plainline">Skills stay a list. No cards needed.</div>'
        +'<select class="demo"><option>Breakout</option><option>Climb</option><option>Lorecraft</option></select>';
    } else if(S.act==='item'){
      h+='<div class="plainline">Items stay a list. No cards needed.</div>'
        +'<select class="demo"><option>Waybread</option><option>Coalflask</option></select>';
    } else {
      h+='<div class="plainline">Choose your Act. The hand stays folded until you do.</div>';
    }

    if(S.act==='attack' && S.pick){
      h+='<div class="decl-sum"><b>Declared</b>'+S.pick+' \u2192 '+S.target+'</div>'
        +'<button class="sendbtn">Send to the LoreMaster</button>';
    }
    if(S.act==='stance'){
      h+='<div class="decl-sum"><b>Declared</b>Change Armor Stance \u2192 '+S.stance+'</div>'
        +'<button class="sendbtn">Send to the LoreMaster</button>';
    }
  } else {
    h+='<div class="d-l">Your React</div><div class="act-seg">'
      +'<button class="'+(S.react==='move'?'on':'')+'" onclick="setReact(\'move\')">Movement</button>'
      +'<button class="'+(S.react==='lb'?'on':'')+'" onclick="setReact(\'lb\')">'+LOREBOUND.name+'</button>'
      +'</div>';
    if(S.react==='lb'){
      h+='<div class="d-l">The Aspect answers</div><div class="deal">'+loreboundCard()+'</div>'
        +'<div class="decl-sum"><b>React</b>'+LOREBOUND.name+' \u00b7 '+LOREBOUND.aspect+' at charge '+S.charge+'</div>'
        +'<button class="sendbtn">Declare your React</button>';
    } else if(S.react==='move'){
      h+='<div class="plainline">Movement. A plain line, no card.</div>'
        +'<div class="decl-sum"><b>React</b>Movement</div>'
        +'<button class="sendbtn">Declare your React</button>';
    } else {
      h+='<div class="plainline">Choose your React. The Aspect card stays folded until you call it.</div>';
    }
  }
  h+='</div>';

  h+='<p class="footnote">The hand only deals what the choice calls for: attack cards when an attack is chosen, stance cards when the stance changes, the Aspect card when its React is called. Skills and items stay lists. Art plates appear only when the collection row carries an image, so Basic Attack, Last Cairn, Emberlash, and the stances open straight at their names.</p>';

  document.getElementById('app').innerHTML=h;
}

function setCharge(n){ S.charge = (S.charge===n ? n-1 : n); render(); }
function setPhase(p){ S.phase=p; render(); }
function setAct(a){ S.act=(S.act===a?'':a); S.pick=''; render(); }
function pickAbility(name){ S.pick=(S.pick===name?'':name); render(); }
function wearStance(name){ S.stance=name; render(); }
function setReact(r){ S.react=(S.react===r?'':r); render(); }

render();
</script>
</body>
</html>
