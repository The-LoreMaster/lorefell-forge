<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RelicForge</title>
<!-- build: pagination -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;600&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0a0e1a; --panel:#10162a; --silver:#dce8ef; --ice:#b8ccd8;
    --gold:#c9a84c; --muted:#7e8a99;
    --line:rgba(184,204,216,.14); --line-strong:rgba(184,204,216,.26);
    --field:#0c1222;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--navy)}
  .rf{
    background:var(--navy); color:var(--silver);
    font-family:"Crimson Pro",Georgia,serif; font-size:17px; line-height:1.5;
    -webkit-font-smoothing:antialiased; padding:14px; max-width:860px; margin:0 auto;
  }
  .rf *{font-family:inherit}
  .rf h1,.rf h2,.rf h3,.rf .label,.rf .tab,.rf .badge,.rf .btn{font-family:"Cinzel",serif}

  /* Header */
  .rf-head{text-align:center; padding:6px 0 14px}
  .rf-title{
    font-family:"Cinzel Decorative",serif; font-weight:700;
    font-size:clamp(28px,7vw,46px); letter-spacing:.04em; color:var(--silver);
    margin:0; line-height:1.05;
  }
  .rf-sub{color:var(--ice); font-style:italic; margin:6px 0 0; font-size:clamp(14px,3.4vw,18px)}
  .rf-title .rf-gold{color:var(--gold)}
  .rf-ember{
    width:140px; max-width:60%; height:1px; margin:14px auto 0;
    background:linear-gradient(90deg,transparent,var(--line-strong) 22%,var(--gold) 50%,var(--line-strong) 78%,transparent);
    position:relative;
  }
  .rf-ember::after{
    content:""; position:absolute; left:50%; top:50%; width:6px; height:6px; margin:-3px 0 0 -3px;
    border-radius:50%; background:var(--gold); box-shadow:0 0 8px rgba(201,168,76,.7);
  }

  /* Mobile tab switch */
  .rf-tabs{display:flex; gap:8px; margin:16px 0 14px}
  .rf-tab{
    flex:1; text-align:center; padding:11px 8px; cursor:pointer;
    background:var(--panel); color:var(--ice); border:1px solid var(--line);
    text-transform:uppercase; letter-spacing:.12em; font-size:12px; font-weight:600;
    border-radius:2px;
  }
  .rf-tab[aria-selected="true"]{color:var(--silver); border-color:var(--line-strong); box-shadow:inset 0 -2px 0 var(--gold)}

  .rf-cols{display:block}
  .rf-panel{
    background:var(--panel); border:1px solid var(--line); border-radius:3px; padding:16px;
  }
  .rf-panel + .rf-panel{margin-top:16px}

  .rf-panel h2{
    margin:0 0 2px; font-size:14px; font-weight:600; letter-spacing:.14em;
    text-transform:uppercase; color:var(--silver);
  }
  .rf-panel .hint{color:var(--muted); font-size:14px; margin:0 0 14px}

  /* Catalog controls */
  .rf-controls{display:flex; flex-direction:column; gap:10px; margin-bottom:12px}
  .rf-search{
    width:100%; padding:10px 12px; background:var(--field); color:var(--silver);
    border:1px solid var(--line); border-radius:2px; font-size:16px;
  }
  .rf-search::placeholder{color:var(--muted)}
  .rf-filters{display:flex; flex-wrap:wrap; gap:6px}
  .rf-chip{
    padding:6px 11px; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    font-family:"Cinzel",serif; font-weight:600; cursor:pointer;
    background:transparent; color:var(--ice); border:1px solid var(--line); border-radius:999px;
  }
  .rf-chip[aria-pressed="true"]{color:var(--navy); background:var(--ice); border-color:var(--ice)}

  /* Catalog list */
  .rf-list{}
  .rf-pager{display:flex;justify-content:center;align-items:center;gap:6px;flex-wrap:wrap;margin:16px 0 2px}
  .rf-pg{min-width:34px;padding:7px 10px;border:1px solid var(--line);background:transparent;color:var(--ice);border-radius:6px;font-family:"Cinzel",serif;font-size:13px;cursor:pointer}
  .rf-pg[aria-current="true"]{background:var(--ice);color:var(--navy);border-color:var(--ice)}
  .rf-pg:disabled{opacity:.4;cursor:default}
  .rf-pg.dots{border:0;cursor:default;color:var(--muted)}
  .rf-group-label{
    font-family:"Cinzel",serif; font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--gold); margin:14px 0 8px; padding-bottom:6px; border-bottom:1px solid var(--line);
  }
  .rf-group-label:first-child{margin-top:0}
  .rf-card{
    border:1px solid var(--line); border-radius:3px; padding:12px 13px; margin-bottom:9px; background:var(--field);
    display:flex; gap:13px; align-items:flex-start;
  }
  .rf-card-body{flex:1; min-width:0}
  .rf-card-top{display:flex; align-items:baseline; justify-content:space-between; gap:10px}
  .rf-name{font-family:"Cinzel",serif; font-weight:600; color:var(--silver); font-size:16px}
  .rf-cost{color:var(--ice); font-size:14px; white-space:nowrap}
  .rf-meta{display:flex; gap:6px; margin:7px 0 6px; flex-wrap:wrap}
  .badge{
    font-size:10px; letter-spacing:.12em; text-transform:uppercase; font-weight:600;
    padding:3px 8px; border:1px solid var(--line-strong); border-radius:999px; color:var(--ice);
  }
  .rf-desc{color:var(--silver); font-size:15px; margin:2px 0 0}
  .rf-seed{
    margin-top:9px; font-family:"Cinzel",serif; font-size:11px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--gold); background:none; border:none; cursor:pointer; padding:0;
  }
  .rf-seed:hover{color:var(--silver)}
  .rf-empty{color:var(--muted); font-style:italic; padding:20px 4px}

  /* Form */
  .rf-field{margin-bottom:14px}
  .label{
    display:block; font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ice); margin-bottom:6px; font-weight:600;
  }
  .label .req{color:var(--gold)}
  .rf-input, .rf-select, .rf-textarea{
    width:100%; padding:10px 12px; background:var(--field); color:var(--silver);
    border:1px solid var(--line); border-radius:2px; font-size:16px;
  }
  .rf-textarea{min-height:120px; resize:vertical; line-height:1.5}
  .rf-row{display:flex; gap:12px}
  .rf-row > *{flex:1}
  .rf-input:focus, .rf-select:focus, .rf-textarea:focus, .rf-search:focus{
    outline:none; border-color:var(--gold); box-shadow:0 0 0 1px rgba(201,168,76,.35)
  }
  .rf-actions{display:flex; gap:10px; margin-top:6px}
  .btn{
    font-family:"Cinzel",serif; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
    font-size:13px; padding:13px 16px; border-radius:2px; cursor:pointer; border:1px solid var(--line-strong);
  }
  .btn-primary{flex:2; background:var(--ice); color:var(--navy); border-color:var(--ice)}
  .btn-primary:hover{background:var(--silver); border-color:var(--silver)}
  .btn-ghost{flex:1; background:transparent; color:var(--ice)}
  .btn-ghost:hover{color:var(--silver); border-color:var(--line-strong)}
  .btn:disabled{opacity:.5; cursor:default}
  .rf-status{margin-top:12px; font-size:14px; min-height:20px}
  .rf-status.ok{color:var(--ice)}
  .rf-status.err{color:var(--gold)}

  *:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
  .rf-card-img{flex:0 0 120px; width:120px; height:120px; object-fit:cover; border-radius:3px; border:1px solid var(--line); display:block; margin:0}
  @media (max-width:560px){
    .rf-card{flex-direction:column}
    .rf-card-img{flex-basis:auto; width:100%; height:170px}
  }
  .rf-uploader{display:flex; align-items:center; justify-content:center; min-height:96px; border:1px dashed var(--line); border-radius:3px; color:var(--muted); cursor:pointer; background:var(--field); text-align:center; padding:12px; font-size:13px}
  .rf-uploader img{max-height:170px; max-width:100%; border-radius:3px; border:1px solid var(--line)}
  .rf-by{color:var(--gold); border-color:var(--line-strong)}

  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
<div class="rf" id="relicforge">
  <header class="rf-head">
    <h1 class="rf-title">Relic<span class="rf-gold">Forge</span></h1>
  </header>

  <div class="rf-tabs" role="tablist" aria-label="RelicForge view">
    <div class="rf-tab" role="tab" id="tab-catalog" aria-controls="panel-catalog" aria-selected="true" tabindex="0">Catalog</div>
    <div class="rf-tab" role="tab" id="tab-forge" aria-controls="panel-forge" aria-selected="false" tabindex="0">Forge a Relic</div>
  </div>

  <div class="rf-cols">
    <!-- LEFT: catalog -->
    <section class="rf-panel" id="panel-catalog" role="tabpanel" aria-labelledby="tab-catalog">
      <h2>The Catalog</h2>
      <p class="hint">Every relic already in the vault. Read one, then seed a new design from it.</p>
      <div class="rf-controls">
        <input type="search" class="rf-search" id="rf-search" placeholder="Search by name or effect" aria-label="Search the catalog">
        <div class="rf-filters" id="rf-filters" role="group" aria-label="Filter by group"></div>
      </div>
      <div class="rf-list" id="rf-list" aria-live="polite"></div>
    </section>

    <!-- RIGHT: submission -->
    <section class="rf-panel" id="panel-forge" role="tabpanel" aria-labelledby="tab-forge" style="display:none">
      <h2>Forge a Relic</h2>
      <p class="hint">Send a new relic to LoreForge, where the table votes it toward canon.</p>

      <div class="rf-field">
        <label class="label" for="f-name">Name <span class="req">*</span></label>
        <input class="rf-input" id="f-name" maxlength="60" placeholder="What is it called">
      </div>

      <div class="rf-row">
        <div class="rf-field">
          <label class="label" for="f-group">Group</label>
          <select class="rf-select" id="f-group">
            <option>Skill</option><option selected>Combat</option><option>Field</option><option>Harvest</option><option>Other</option>
          </select>
        </div>
        <div class="rf-field">
          <label class="label" for="f-use">Use <span class="req">*</span></label>
          <select class="rf-select" id="f-use">
            <option>Passive</option><option>React</option><option>Act</option><option>Rest</option>
          </select>
        </div>
      </div>

      <div class="rf-row">
        <div class="rf-field">
          <label class="label" for="f-cost">Cost</label>
          <input class="rf-input" id="f-cost" maxlength="30" placeholder="e.g. 30 Arca">
        </div>
        <div class="rf-field">
          <label class="label" for="f-uses">Uses</label>
          <input class="rf-input" id="f-uses" maxlength="30" placeholder="e.g. 1 time use">
        </div>
      </div>

      <div class="rf-field">
        <label class="label" for="f-rarity">Rarity</label>
        <select class="rf-select" id="f-rarity">
          <option>Common</option><option>Rare</option><option>Legendary</option>
        </select>
      </div>

      <div class="rf-field">
        <label class="label" for="f-desc">Description <span class="req">*</span></label>
        <textarea class="rf-textarea" id="f-desc" maxlength="600" placeholder="State plainly what it does."></textarea>
      </div>

      <div class="rf-field">
        <label class="label" for="f-img">Image</label>
        <label class="rf-uploader" id="rf-up"><span id="rf-up-txt">Tap to add an image</span><input type="file" id="f-img" accept="image/*" hidden></label>
      </div>

      <div class="rf-actions">
        <button class="btn btn-primary" id="f-submit" type="button">Send to LoreForge</button>
        <button class="btn btn-ghost" id="f-copy" type="button">Copy</button>
      </div>
      <p class="rf-status" id="f-status" role="status" aria-live="polite"></p>
    </section>
  </div>
</div>

<script>
(function(){
  "use strict";
  var SLUG = "relicforge";

  var ITEMS = [
    // Skill
    {g:"Skill",n:"Filcher's Band",u:"Passive",c:"30 Arca",x:"Unlimited",d:"Grants a Lucky roll on Precision skill checks, covering Trickery, Presence, and Finesse. Roll two dice and keep the higher result."},
    {g:"Skill",n:"Haulers",u:"Passive",c:"30 Arca",x:"Unlimited",d:"Grants a Lucky roll on Power skill checks, covering Might, Movement, and Bearing. Roll two dice and keep the higher result."},
    {g:"Skill",n:"Foxfire",u:"Passive",c:"30 Arca",x:"Unlimited",d:"Grants a Lucky roll on Magic skill checks, covering Weaving, Spirit, and Creation. Roll two dice and keep the higher result."},
    {g:"Skill",n:"Sinew Cord",u:"Passive",c:"30 Arca",x:"Unlimited",d:"Grants a Lucky roll on Vigor skill checks, covering Endurance, Renewal, and Resolve. Roll two dice and keep the higher result."},
    {g:"Skill",n:"Journal",u:"Passive",c:"30 Arca",x:"Unlimited",d:"Grants a Lucky roll on Wit skill checks, covering Vigilance, Logic, and Lore. Roll two dice and keep the higher result."},
    {g:"Skill",n:"Silk Runners",u:"Passive",c:"30 Arca",x:"Unlimited",d:"Grants a Lucky roll on Evasion skill checks, covering Reflex, Elusion, and Poise. Roll two dice and keep the higher result."},
    {g:"Skill",n:"Ballast Cuff",u:"Passive",c:"30 Arca",x:"Unlimited",d:"A weighted cuff that settles the body and roots the stance. Grants a Lucky roll on Durability skill checks, covering Guard, Temper, and Anchor. Roll two dice and keep the higher result."},
    {g:"Skill",n:"Aegis Charm",u:"Passive",c:"30 Arca",x:"Unlimited",d:"A warding charm that steadies mind and spirit against what would break them. Grants a Lucky roll on Resistance skill checks, covering Conviction, Sanctum, and Resonance. Roll two dice and keep the higher result."},
    // Combat
    {g:"Combat",n:"Quiver",u:"Passive",c:"1 Atla",x:"3 individual uses",d:"The Quiver enhances accuracy, ensuring success for up to three of your chosen attacks. These strikes land without an accuracy roll. You may still roll for a Fellmark to trigger bonus damage or effects, and any Fellstrike result is ignored."},
    {g:"Combat",n:"Whetstone",u:"Passive",c:"3 Atla",x:"3 individual uses",d:"The Whetstone empowers your strikes, doubling the damage of up to three chosen attacks. No action is required to activate it."},
    {g:"Combat",n:"Astral Prism",u:"Passive",c:"1 Atla",x:"3 individual uses",d:"The Astral Prism ensures the success of up to three chosen spells. No rolls are required. Each selected spell activates flawlessly."},
    {g:"Combat",n:"Spell Magnifier",u:"Passive",c:"3 Atla",x:"1 time use",d:"The Spell Magnifier doubles one effect of a chosen spell, such as its range, number of targets, damage, duration, bonus, or penalty. The enhancement applies once, when the spell is used."},
    {g:"Combat",n:"Mantle",u:"Passive",c:"25 Arca",x:"3 individual uses",d:"The Mantle provides evasion against up to three chosen physical attacks. It triggers the moment you are targeted, with no action required."},
    {g:"Combat",n:"Cloak",u:"Passive",c:"25 Arca",x:"3 individual uses",d:"The Cloak causes up to three chosen spell attacks against you to fail. It triggers the instant you are targeted, with no action required."},
    {g:"Combat",n:"Shield",u:"Passive",c:"25 Arca",x:"3 individual uses",d:"The Shield blocks all base and bonus damage from up to three attacks that target a chosen ally. It triggers the moment the ally is targeted, with no action required."},
    {g:"Combat",n:"Amber Amulet",u:"Passive",c:"8 Arca",x:"1 time use",d:"This charm doubles all Vitality healing you receive for the duration of a single battle. Its effect lasts until the fight ends."},
    {g:"Combat",n:"Dragonscale Heart",u:"Passive",c:"4 Atla",x:"1 time use",d:"This relic doubles your total Vitality for the duration of a single battle. Its power lasts until the fight ends."},
    {g:"Combat",n:"Aether Lens",u:"Act",c:"2 Atla",x:"1 time use",d:"The Aether Lens reveals all discovered Skyvault Shards for the duration of a battle. Once per round you may spend your Act to draw a single shard into reach, even one that lies outside your normal range."},
    {g:"Combat",n:"Revealing Powder",u:"Act",c:"10 Arca",x:"1 time use",d:"Lets the holder see through Obscured and Distortion effects until the end of the battle."},
    {g:"Combat",n:"Talisman",u:"React",c:"3 Atla",x:"1 time use",d:"Negates a single physical or magical attack, wasting the enemy's Act. You may declare it after the attack is declared. You forfeit your own Act on the following round from the strain."},
    {g:"Combat",n:"Caltrops",u:"Act",c:"5 Arca",x:"1 time use",d:"Deals 1 damage to anything that steps on them or begins a round in their space. When thrown, they cover five adjacent spaces from where they land."},
    {g:"Combat",n:"Smoke Bomb",u:"React",c:"10 Arca",x:"1 time use",d:"After an attack hits you, you immediately reposition within your Mobility Range once the damage is resolved."},
    {g:"Combat",n:"Water Skin",u:"Passive",c:"10 Arca",x:"1 time use",d:"Negates the effects of Fatigue for the duration of a single battle. The water skin must remain equipped when the battle ends, through the Endurance check."},
    {g:"Combat",n:"Swifting Sash",u:"Passive",c:"4 Zurith",x:"1 time use",d:"Grants one additional Act or React each round for the duration of the battle. Choose which when you declare. A decisive edge for the Fell who can spend it well."},
    {g:"Combat",n:"Uncrossing Oil",u:"Act",c:"20 Arca",x:"1 time use",d:"Removes the negative effects of a single spell or ability, freeing the user from harmful conditions. It does not affect Afflictions, Discordants, or Impairments."},
    {g:"Combat",n:"Ash Salt",u:"Act",c:"10 Arca",x:"1 time use",d:"Scattered over the afflicted, ash salt breaks a single Affliction and lifts it away. Use it freely outside combat, or spend your Act to use it during a fight."},
    {g:"Combat",n:"Kindlestone",u:"Act",c:"1 Atla",x:"1 time use",d:"Holds up to three charges, banked into it outside of battle. Spend your Act to release them, raising your charge meter by the stored amount up to your cap."},
    {g:"Combat",n:"Unbroken Cuirass",u:"React",c:"6 Zurith",x:"1 time use",d:"Forged from a Stalwart breastplate that took a killing blow and held. When an Impairment would take hold of you, the plate breaks in its place. Prevent one Impairment before it lands, or shake off one already on you."},
    {g:"Combat",n:"Skeleton Key",u:"Passive",c:"4 Zurith",x:"1 time use",d:"Upon death, you are revived from Pandemonium with 1 Vitality. It triggers on its own, pulling the soul back from the brink with no action or roll."},
    {g:"Combat",n:"Tablet",u:"Act",c:"3 Atla, double for Tier 2 and triple for Tier 3",x:"1 time use",d:"Carries a weapon attack engraved on its surface. Used against a target within range of the engraved physical ability, it strikes automatically with no accuracy roll. The effect triggers the moment the target is chosen."},
    {g:"Combat",n:"Potion",u:"Act",c:"3 Atla, double for Tier 2 and triple for Tier 3",x:"1 time use",d:"Carries a spell sealed in its liquid. Thrown at a target within the spell's range, it casts automatically with no accuracy or casting roll. The effect triggers the moment the liquid lands."},
    {g:"Combat",n:"Rune",u:"Act to place",c:"2 Atla, double for Tier 2 and triple for Tier 3",x:"1 time use",d:"Holds a spell bound within its sigils. When a target steps into the marked space, the rune casts the spell automatically with no roll. The effect triggers the instant the rune is sprung."},
    {g:"Combat",n:"Trap",u:"Act to place",c:"2 Atla, double for Tier 2 and triple for Tier 3",x:"1 time use",d:"Holds a physical ability wound into its gears. When a target steps into the marked space, the trap strikes automatically with no accuracy roll. The effect triggers the instant the trap is sprung."},
    {g:"Combat",n:"Glyph",u:"Act",c:"10 Arca",x:"1 time use",d:"An Affliction captured on a scroll. Apply it to a weapon outside of battle to carry the Affliction into your strikes, or spend your Act in a fight to lay the Affliction directly onto an enemy."},
    {g:"Combat",n:"Grappling Hook",u:"Act",c:"15 Arca",x:"1 time use",d:"Once per battle, hook a target you can see along a clear path within twice your Mobility Range, an enemy, an ally, or an open space. Either pull the target into an open space beside you, or pull yourself into an open space beside it."},
    {g:"Combat",n:"Scabbard",u:"Passive",c:"2 Atla",x:"1 time use",d:"The first attack you draw each battle lands as a Fellmark, dealing its bonus damage and triggering its effects with no roll."},
    {g:"Combat",n:"Stifling Soles",u:"Passive",c:"10 Arca",x:"1 time use",d:"When your party moves to ambush, your approach succeeds without a roll. The opening is yours before the first die is cast."},
    {g:"Combat",n:"Fleetsoles",u:"Passive",c:"15 Arca",x:"1 time use",d:"Once per battle, take an extra move of up to your Mobility Range without spending your Act. You cross hazards in the path as if they were not there."},
    {g:"Combat",n:"Bracewell",u:"React",c:"25 Arca",x:"3 individual uses",d:"Spend your React to brace the buckler, halving the damage of one attack against you, of any kind."},
    {g:"Combat",n:"Rootgreaves",u:"Passive",c:"12 Arca",x:"1 time use",d:"For one battle you cannot be Pushed or Pulled. Your footing holds against any force that would move you."},
    {g:"Combat",n:"Gloomcowl",u:"Act",c:"15 Arca",x:"1 time use",d:"Draw the cowl and vanish into gloom, becoming Obscured to enemies until you attack or the round ends."},
    {g:"Combat",n:"Spellsewn Robes",u:"Passive",c:"3 Atla",x:"1 time use",d:"Once this battle, a spell you cast lingers one extra round."},
    {g:"Combat",n:"Skyvault Shard",u:"Act, or Rest",c:"None",x:"1 time use",d:"A Skyvault Shard kept ready rather than searched for in the heat of battle. It is a shard in full and does everything one does. Spend it to heal, to imprint or slag an ability, to fuel a Paragon, or to charge all three tiers when you hold no weapon, each at the cost of your Act. At rest it restores you to full Vitality and rolls to shed Fatigue, and it can revive a fallen Fell from Pandemonium at full Vitality, one of the few things that can. A Skyvault Shard is never bought or sold, only found."},
    {g:"Combat",n:"Darkshard",u:"Act",c:"None",x:"1 time use",d:"A shard of Pandemonium, the reverse of a Skyvault Shard, that feeds on them. Set it in an open space, opening a 10 space radius. Feed it Skyvault Shards, each one raising its Vitality by 1, and while you stand within the radius you may keep feeding it. Every enemy inside the radius is cut off from the Aether, left with nothing but standard attacks. Weapon abilities, spells, infusions, augmentations, armor stances, and lorebound Aspects all fall silent. It shatters when it takes damage equal to its Vitality, which ends the effect. A darkshard is never bought or sold, only carried up out of Pandemonium."},
    // Field
    {g:"Field",n:"Augur",u:"Rest",c:"1 Atla",x:"1 time use",d:"A guiding spark, called forth to track an item, quest, or person. It manifests as a glowing mote of light that leads its owner toward the chosen target, revealing hidden objects and enemies and piercing the darkness and illusions that would block sight. Its glow lasts until its purpose is fulfilled or a battle begins."},
    {g:"Field",n:"Food Portion",u:"Rest",c:"5 Oro",x:"1 time use",d:"Each food portion eaten grants a Renewal roll for healing. During a rest you may consume a number of portions equal to 1 plus your Vigor."},
    {g:"Field",n:"Upgrade Kit",u:"Rest",c:"2 Atla",x:"1 time use",d:"Allows a weapon to reforge into its next form, unlocking new ability and affliction options and altering its range and grip."},
    {g:"Field",n:"Resonant Tuner",u:"Rest",c:"5 Atla",x:"1 time use",d:"Unlocks a locked slot for an Infusion, Affliction, Augmentation, or Aspect. Once a weapon already has three slots filled, the tuner may add one more slot beyond its normal limit."},
    {g:"Field",n:"Treasure Key",u:"Rest",c:"1 Atla",x:"1 time use",d:"Used at the loot roll, it increases your result by 1, shifting it upward by one number."},
    {g:"Field",n:"Lore Manual",u:"Rest",c:"5 Zurith",x:"1 time use",d:"Increases competency in a single skill by 1 point. One of the few things in the Sphere that can raise a skill outside the slow work of use, and rare enough that most Fell never hold one."},
    {g:"Field",n:"Camp Kettle",u:"Rest",c:"2 Atla",x:"1 time use",d:"Shared over a rest, the kettle clears every rank of Fatigue from the whole party at once."},
    {g:"Field",n:"Overture",u:"Rest",c:"3 Atla",x:"3 individual uses",d:"Played for a chosen party at rest. At the start of their next battle, each Fell it was played for negates the first hostile Combat Effect that would take hold of them."},
    {g:"Field",n:"Lodestone",u:"Rest",c:"10 Zurith",x:"1 time use",d:"Held by a Fell at rest, the needle swings off its old heading and a life turns with it. The Fell resets to level 0. All spent Ascension Crystals return, and every skill Mastery is refunded as 6 skill points to spend anew. Nothing of the old build survives but the choice to set a new course."},
    {g:"Field",n:"Reading Wheel",u:"Rest",c:"1 Atla",x:"1 time use",d:"Spend it at rest on a relic whose purpose you do not know. The wheel turns until it reads true, then tells you plainly what the relic does. It reads one relic, then falls still."},
    {g:"Field",n:"Wispin Coin",u:"Rest",c:"10 Zurith",x:"1 time use",d:"One of the rarest things a Fell can hold. Spent outside of combat, the coin opens a door into Whip's Emporium for a single visit. Only the Fell who flips it may step through. Inside you may buy, sell, and trade whatever Whip is carrying at Whip's prices, and the coin is spent when the door closes behind you. Whip deals with no one bound to an enemy he is running from, and anyone who threatens him in his own shop finds the coin will never answer them again. The LoreMaster decides what he carries and what he asks for it."},
    // Harvest
    {g:"Harvest",n:"Butcher Knife",u:"Rest",c:"2 Atla",x:"1 time use",d:"Taken to a defeated enemy in place of your loot roll. The knife carves out one of the weapon abilities that enemy carried and leaves it as a Tablet or a Trap, your choice. It can take only what the enemy actually had, at the tier the LoreMaster allows."},
    {g:"Harvest",n:"Marrow Tap",u:"Rest",c:"2 Atla",x:"1 time use",d:"Worked into a defeated enemy in place of your loot roll. It draws out one of the spells that enemy could cast and seals it as a Potion or a Rune, your choice. It can take only what the enemy actually had, at the tier the LoreMaster allows."},
    {g:"Harvest",n:"Flensing Hook",u:"Rest",c:"2 Atla",x:"1 time use",d:"Drawn across a defeated enemy in place of your loot roll. It strips one of the Afflictions that enemy could inflict and pins it to a Glyph. It can take only what the enemy actually had, at the tier the LoreMaster allows."}
  ];
  var GROUPS = ["Skill","Combat","Field","Harvest"];

  var $ = function(id){return document.getElementById(id)};
  var esc = function(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})};

  var state = {q:"", filter:"All", image:null};
  var RF_PAGE_SIZE=8, rfPage=0;
  var LIBRARY = null;
  function source(){ return (LIBRARY && LIBRARY.length) ? LIBRARY : ITEMS; }
  function groupsInUse(){ var b=GROUPS.slice(); source().forEach(function(it){ if(b.indexOf(it.g)<0) b.push(it.g); }); return b; }

  // Filters
  var filterWrap = $("rf-filters");
  ["All"].concat(GROUPS).forEach(function(g){
    var b = document.createElement("button");
    b.className="rf-chip"; b.type="button"; b.textContent=g;
    b.setAttribute("aria-pressed", g==="All" ? "true":"false");
    b.addEventListener("click", function(){
      state.filter=g; rfPage=0;
      Array.prototype.forEach.call(filterWrap.children,function(c){c.setAttribute("aria-pressed", c.textContent===g?"true":"false")});
      render();
    });
    filterWrap.appendChild(b);
  });

  function matches(it){
    if(state.filter!=="All" && it.g!==state.filter) return false;
    if(!state.q) return true;
    var q=state.q.toLowerCase();
    return it.n.toLowerCase().indexOf(q)>-1 || it.d.toLowerCase().indexOf(q)>-1;
  }

  function cardHTML(it){
    var img = it.image ? '<img class="rf-card-img" src="'+esc(it.image)+'" alt="" loading="lazy">' : '';
    var cost = it.c ? '<span class="rf-cost">'+esc(it.c)+'</span>' : '';
    var meta = '<div class="rf-meta">';
    if(it.u) meta += '<span class="badge">'+esc(it.u)+'</span>';
    if(it.x) meta += '<span class="badge">'+esc(it.x)+'</span>';
    if(it.id && !it.canon) meta += '<span class="badge">Submitted</span>';
    if(it.by) meta += '<span class="badge rf-by">by '+esc(it.by)+'</span>';
    meta += '</div>';
    return img+'<div class="rf-card-body"><div class="rf-card-top"><span class="rf-name">'+esc(it.n)+'</span>'+cost+'</div>'+
      meta+'<p class="rf-desc">'+esc(it.d)+'</p>'+
      '<button class="rf-seed" type="button">Base a new relic on this</button></div>';
  }
  function pagerHTML(page,pages){
    if(pages<=1) return "";
    var h='<div class="rf-pager">';
    h+='<button class="rf-pg" data-pg="'+(page-1)+'"'+(page<=0?" disabled":"")+'>Prev</button>';
    var nums=[]; for(var i=0;i<pages;i++){ if(i===0||i===pages-1||Math.abs(i-page)<=1) nums.push(i); else if(nums[nums.length-1]!==-1) nums.push(-1); }
    nums.forEach(function(i){ if(i===-1){ h+='<span class="rf-pg dots">…</span>'; } else { h+='<button class="rf-pg" data-pg="'+i+'" aria-current="'+(i===page?"true":"false")+'">'+(i+1)+'</button>'; } });
    h+='<button class="rf-pg" data-pg="'+(page+1)+'"'+(page>=pages-1?" disabled":"")+'>Next</button>';
    return h+'</div>';
  }
  function render(){
    var list=$("rf-list"); list.innerHTML="";
    var shown=[];
    groupsInUse().forEach(function(g){ source().filter(matches).filter(function(i){return i.g===g;}).forEach(function(it){ shown.push(it); }); });
    if(!shown.length){ list.innerHTML='<p class="rf-empty">Nothing in the vault matches that. Forge it instead.</p>'; postHeight(); return; }
    var pages=Math.max(1,Math.ceil(shown.length/RF_PAGE_SIZE));
    if(rfPage>=pages) rfPage=pages-1; if(rfPage<0) rfPage=0;
    var slice=shown.slice(rfPage*RF_PAGE_SIZE, rfPage*RF_PAGE_SIZE+RF_PAGE_SIZE);
    var lastG=null, html="";
    slice.forEach(function(it){ if(it.g!==lastG){ html+='<div class="rf-group-label">'+esc(it.g)+'</div>'; lastG=it.g; } html+='<div class="rf-card">'+cardHTML(it)+'</div>'; });
    html+=pagerHTML(rfPage,pages);
    list.innerHTML=html;
    var seeds=list.querySelectorAll(".rf-seed");
    slice.forEach(function(it,idx){ if(seeds[idx]) seeds[idx].addEventListener("click", function(){ seed(it); }); });
    list.querySelectorAll(".rf-pg[data-pg]").forEach(function(b){ b.addEventListener("click", function(){ var n=+b.getAttribute("data-pg"); if(n!==rfPage){ rfPage=n; render(); var s=$("rf-search"); (list.scrollIntoView?list:s).scrollIntoView&&list.scrollIntoView({block:"start"}); } }); });
    postHeight();
  }

  function seed(it){
    $("f-name").value = it.n;
    $("f-group").value = (GROUPS.indexOf(it.g)>-1 ? it.g : "Other");
    $("f-use").value = it.u;
    $("f-cost").value = it.c;
    $("f-uses").value = it.x;
    $("f-desc").value = it.d;
    setView("forge");
    $("f-name").focus();
    setStatus("Seeded from "+it.n+". Reshape it into something new.","ok");
  }

  // Tabs (mobile)
  function setView(which){
    var cat = which==="catalog";
    $("panel-catalog").style.display = cat ? "block":"none";
    $("panel-forge").style.display = cat ? "none":"block";
    $("tab-catalog").setAttribute("aria-selected", cat?"true":"false");
    $("tab-forge").setAttribute("aria-selected", cat?"false":"true");
    postHeight();
  }
  $("tab-catalog").addEventListener("click", function(){setView("catalog")});
  $("tab-forge").addEventListener("click", function(){setView("forge")});
  ["tab-catalog","tab-forge"].forEach(function(id){
    $(id).addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){e.preventDefault(); $(id).click();} });
  });

  $("rf-search").addEventListener("input", function(e){ state.q=e.target.value; rfPage=0; render(); });

  // Image upload (stored as a data URL, sent with the submission)
  $("f-img").addEventListener("change", function(e){
    var file=e.target.files && e.target.files[0]; if(!file) return;
    var r=new FileReader();
    r.onload=function(){ state.image=r.result; $("rf-up").innerHTML='<img src="'+state.image+'" alt="preview">'+'<input type="file" id="f-img" accept="image/*" hidden>'; wireImg(); };
    r.readAsDataURL(file);
  });
  function wireImg(){ $("f-img").addEventListener("change", function(e){ var file=e.target.files&&e.target.files[0]; if(!file) return; var r=new FileReader(); r.onload=function(){ state.image=r.result; $("rf-up").innerHTML='<img src="'+state.image+'" alt="preview"><input type="file" id="f-img" accept="image/*" hidden>'; wireImg(); }; r.readAsDataURL(file); }); }

  // Build payload
  function buildPayload(){
    return {
      title: $("f-name").value.trim(),
      tier: $("f-rarity").value,
      form: {
        group: $("f-group").value,
        use: $("f-use").value,
        cost: $("f-cost").value.trim(),
        uses: $("f-uses").value.trim(),
        rarity: $("f-rarity").value,
        description: $("f-desc").value.trim()
      },
      image: state.image || null,
      selections: []
    };
  }

  function setStatus(msg,kind){
    var el=$("f-status"); el.textContent=msg||""; el.className="rf-status"+(kind?(" "+kind):"");
    postHeight();
  }

  function validate(p){
    if(!p.title) return "Give the relic a name.";
    if(!p.form.description) return "Describe what the relic does.";
    return null;
  }

  // Submit to LoreForge via the page bridge
  $("f-submit").addEventListener("click", function(){
    var p=buildPayload();
    var err=validate(p);
    if(err){ setStatus(err,"err"); return; }
    try{
      window.parent.postMessage({type:"RELIC_SUBMIT", forgeKey:SLUG, source:SLUG, payload:p}, "*");
      setStatus("Sent to LoreForge. The table will vote it toward canon.","ok");
      $("f-submit").disabled=true;
      setTimeout(function(){ $("f-submit").disabled=false; }, 2500);
    }catch(e){
      setStatus("The forge could not reach LoreForge. Try again.","err");
    }
  });

  // Confirmation from the page bridge, if wired
  window.addEventListener("message", function(ev){
    var d=ev.data; if(!d||typeof d!=="object") return;
    if(d.type==="RELIC_LIBRARY"){
      if(Array.isArray(d.relics)){ LIBRARY=d.relics; render(); }
      return;
    }
    if(d.type!=="RELIC_SUBMIT_RESULT") return;
    if(d.ok){ setStatus("LoreForge received the relic"+(d.creationId?(", entry "+d.creationId):"")+".","ok"); }
    else { setStatus((d.errors&&d.errors[0])||"LoreForge rejected the submission.","err"); }
  });

  // Copy for LoreMaster, with execCommand fallback for Wix
  $("f-copy").addEventListener("click", function(){
    var p=buildPayload();
    var text =
      p.title+"\n"+
      p.form.group+" relic, "+p.form.use+", "+p.tier+"\n"+
      "Cost: "+(p.form.cost||"unset")+"   Uses: "+(p.form.uses||"unset")+"\n\n"+
      (p.form.description||"");
    var done=function(){ setStatus("Copied for the LoreMaster.","ok"); };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done, function(){ legacyCopy(text,done); });
    } else { legacyCopy(text,done); }
  });
  function legacyCopy(text,done){
    var ta=document.createElement("textarea");
    ta.value=text; ta.setAttribute("readonly",""); ta.style.position="absolute"; ta.style.left="-9999px";
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand("copy"); done(); }catch(e){ setStatus("Copy failed. Select the text by hand.","err"); }
    document.body.removeChild(ta);
  }

  // Tell the Wix page our height so the iframe can size to content
  var lastH=0;
  function postHeight(){
    var h=document.getElementById("relicforge").offsetHeight+36;
    if(Math.abs(h-lastH)<2) return; lastH=h;
    try{ window.parent.postMessage({type:"RELIC_HEIGHT", forgeKey:SLUG, height:h}, "*"); }catch(e){}
  }
  window.addEventListener("resize", function(){ setView($("tab-catalog").getAttribute("aria-selected")==="true"?"catalog":"forge"); });

  // Boot
  render();
  setView("catalog");
  try{ window.parent.postMessage({type:"RELIC_READY", forgeKey:SLUG}, "*"); }catch(e){}
  try{ window.parent.postMessage({type:"RELIC_LIBRARY_LOAD", forgeKey:SLUG}, "*"); }catch(e){}
  setTimeout(postHeight, 400);
})();
</script>
</body>
</html>
