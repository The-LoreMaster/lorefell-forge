<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Hearth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;600&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0a0e1a;
    --navy-2:#10162a;
    --panel:#0d1322;
    --ink:#060912;
    --silver:#dce8ef;
    --ice:#b8ccd8;
    --gold:#c9a84c;
    --gold-bright:#e2c574;
    --gold-bright:#e2c372;
    --muted:#7e8a99;
    --ice-glow:rgba(184,204,216,.28);
    --gold-line:rgba(201,168,76,.45);
    --gold-faint:rgba(201,168,76,.16);
    --display:"Cinzel Decorative", Georgia, serif;
    --head:"Cinzel", Georgia, serif;
    --body:"Crimson Pro", Georgia, serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--body);
    color:var(--silver);
    background:
      radial-gradient(120% 90% at 50% 18%, #131b30 0%, var(--navy) 46%, var(--ink) 100%);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    padding:0 0 calc(34px + env(safe-area-inset-bottom));
  }

  /* header */
  .head{text-align:center;padding:26px 18px 6px}
  .head__title{
    font-family:var(--display);font-weight:700;color:var(--silver);
    font-size:30px;letter-spacing:.04em;margin:0;line-height:1;
    text-shadow:0 0 26px rgba(184,204,216,.12);
  }
  .head__rule{
    width:54px;height:1px;margin:14px auto 0;
    background:linear-gradient(90deg,transparent,var(--gold-line),transparent);
  }

  .stage-wrap{max-width:980px;margin:0 auto;padding:0 16px}

  /* ---------- shared node visuals ---------- */
  .node{
    appearance:none;border:1px solid rgba(184,204,216,.16);
    background:linear-gradient(180deg,var(--navy-2),var(--panel));
    color:var(--silver);cursor:pointer;pointer-events:auto;display:grid;place-items:center;
    transition:transform .18s ease, border-color .18s ease, box-shadow .25s ease, background .18s ease;
  }
  .node svg{width:34px;height:34px;display:block;color:var(--gold)}
  .node:hover,.node:focus-visible{
    border-color:var(--gold-line);
    box-shadow:0 0 0 1px var(--gold-faint), 0 0 22px var(--ice-glow);
    transform:translateY(-2px);
    outline:none;
  }
  .node:hover svg,.node:focus-visible svg{color:var(--gold-bright)}
  .node:active{transform:translateY(0) scale(.97)}
  .node.is-firing{box-shadow:0 0 0 1px var(--gold-line), 0 0 30px rgba(201,168,76,.4), 0 0 40px var(--ice-glow)}

  /* ---------- PHONE layout ---------- */
  .phone{display:none}
  .layout-phone .phone{display:block}
  .layout-phone .wide{display:none}

  .ember{
    width:100%;border-radius:7px;padding:20px 18px;margin:18px 0 22px;
    display:flex;align-items:center;gap:16px;text-align:left;
    border:1px solid var(--gold-line);
    background:
      radial-gradient(80% 120% at 18% 30%, rgba(201,168,76,.10), transparent 60%),
      linear-gradient(180deg,var(--navy-2),var(--panel));
    box-shadow:0 0 30px rgba(201,168,76,.07), inset 0 0 24px rgba(184,204,216,.04);
    cursor:pointer;color:var(--silver);appearance:none;
    transition:border-color .2s ease, box-shadow .25s ease, transform .15s ease;
    animation:emberPulse 5.5s ease-in-out infinite;
  }
  .ember:active{transform:scale(.992)}
  .ember:focus-visible{outline:none;border-color:var(--silver);box-shadow:0 0 0 1px var(--gold-line),0 0 26px var(--ice-glow)}
  .ember__ic{flex:none;width:54px;height:54px;display:grid;place-items:center;
    border-radius:50%;border:1px solid var(--gold-line);
    background:radial-gradient(circle at 50% 40%, rgba(201,168,76,.14), transparent 70%)}
  .ember__ic svg{width:30px;height:30px;color:var(--gold)}
  .ember__name{font-family:var(--display);font-size:21px;letter-spacing:.02em;margin:0 0 2px}
  .ember__sub{font-size:14px;color:var(--ice);opacity:.8;margin:0}

  .section-label{
    font-family:var(--head);font-size:11px;letter-spacing:.26em;text-transform:uppercase;
    color:var(--muted);margin:6px 2px 11px;display:flex;align-items:center;gap:12px;
  }
  .section-label::after{content:"";flex:1;height:1px;background:rgba(184,204,216,.1)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
  .tile{
    border-radius:6px;padding:18px 12px 15px;min-height:122px;
    grid-template-rows:auto auto auto;gap:9px;text-align:center;
  }
  .tile__ic{width:38px;height:38px;display:grid;place-items:center}
  .tile__ic svg{width:34px;height:34px}
  .tile__label{font-family:var(--head);font-size:15px;font-weight:600;letter-spacing:.02em}
  .tile__desc{font-size:12.5px;color:var(--muted);line-height:1.25}
  .tile--dim{opacity:.92}

  .wide-tile{
    width:100%;display:flex;align-items:center;gap:14px;text-align:left;
    padding:15px 16px;border-radius:6px;margin-bottom:12px;min-height:74px;
  }
  .wide-tile__ic{flex:none;width:46px;height:46px;display:grid;place-items:center;
    border-radius:50%;border:1px solid rgba(184,204,216,.18)}
  .wide-tile__ic svg{width:28px;height:28px}
  .wide-tile__txt{display:flex;flex-direction:column;gap:2px}
  .wide-tile__label{font-family:var(--head);font-size:17px;font-weight:600;letter-spacing:.02em}
  .wide-tile__desc{font-size:13px;color:var(--muted)}

  /* phone gold shimmer */
  .tile,.wide-tile{position:relative;overflow:hidden}
  .tile::after,.wide-tile::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(115deg,transparent 42%,rgba(201,168,76,.07) 50%,transparent 58%);
    transform:translateX(-130%);animation:shimmer 6s ease-in-out infinite}

  /* ---------- WIDE (ring) layout ---------- */
  .wide{display:none}
  .layout-wide .wide{display:block}
  .layout-wide .phone{display:none}

  .stage{
    position:relative;width:min(560px,86vw);aspect-ratio:1/1;margin:18px auto 8px;
  }
  .stage--lm{width:min(720px,94vw)}
  .orbit{position:absolute;inset:0;pointer-events:none;animation:orbit var(--dur,160s) linear infinite}
  .orbit--rev{animation:orbit-rev var(--dur,160s) linear infinite}
  .stage:has(.node:hover) .orbit,.stage:has(.node:hover) .spin-fix{animation-play-state:paused}
  .guide{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    border-radius:50%;border:1px solid var(--gold-faint);pointer-events:none;
  }
  .point{position:absolute;transform:translate(-50%,-50%);width:120px}
  .spin-fix{display:flex;flex-direction:column;align-items:center;gap:7px}
  .orbit .spin-fix{animation:orbit-rev var(--dur,160s) linear infinite}
  .orbit--rev .spin-fix{animation:orbit var(--dur,160s) linear infinite}
  .point .label{font-family:var(--head);font-size:12.5px;letter-spacing:.03em;color:var(--ice);
    text-align:center;line-height:1.1}
  .tip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:9px;
    white-space:nowrap;background:rgba(6,9,18,.94);border:1px solid var(--gold-line);
    color:var(--silver);font-family:var(--body);font-size:12.5px;padding:5px 9px;border-radius:3px;
    opacity:0;pointer-events:none;transition:opacity .16s ease;z-index:5;box-shadow:0 0 16px var(--ice-glow)}
  .point:hover .tip,.point:focus-within .tip{opacity:1}
  .point.center{width:160px}
  .node--lg{width:132px;height:132px;border-radius:50%;
    border-color:var(--gold-line);
    background:
      radial-gradient(circle at 50% 38%, rgba(201,168,76,.13), transparent 68%),
      linear-gradient(180deg,var(--navy-2),var(--panel));
    box-shadow:0 0 38px rgba(201,168,76,.10), inset 0 0 26px rgba(184,204,216,.05);
    animation:emberPulse 5.5s ease-in-out infinite}
  .node--lg svg{width:52px;height:52px;color:var(--gold)}
  .point.center .label{font-family:var(--display);font-size:17px;color:var(--silver);
    position:absolute;left:50%;top:calc(100% + 12px);transform:translateX(-50%);width:170px}
  .node--md{width:92px;height:92px;border-radius:50%}
  .node--md svg{width:36px;height:36px}
  .node--sm{width:72px;height:72px;border-radius:50%}
  .node--sm svg{width:28px;height:28px}

  /* PNG icon sizing (used when a node has an img URL) */
  .ic-img{display:block;object-fit:contain;width:34px;height:34px}
  .ember__ic .ic-img{width:30px;height:30px}
  .wide-tile__ic .ic-img{width:28px;height:28px}
  .node--md .ic-img{width:36px;height:36px}
  .node--sm .ic-img{width:28px;height:28px}
  .node--lg .ic-img{width:52px;height:52px}
  .point--sm{width:96px}
  .point--sm .label{font-size:11.5px;color:var(--muted)}
  .point--sm .node{opacity:.85;border-color:rgba(184,204,216,.13)}

  /* entrance */
  .anim-in{opacity:0;transform:translateY(8px)}
  .play .anim-in{animation:rise .5s ease forwards}
  .play .point{animation:fadeIn .5s ease forwards;opacity:0}

  /* status line */
  .status{
    position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);
    font-family:var(--head);font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--silver);background:rgba(6,9,18,.86);border:1px solid var(--gold-line);
    padding:9px 16px;border-radius:3px;opacity:0;pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;z-index:30;
    box-shadow:0 0 24px var(--ice-glow);
  }
  .status.show{opacity:1;transform:translateX(-50%) translateY(-2px)}

  @keyframes emberPulse{
    0%,100%{box-shadow:0 0 26px rgba(201,168,76,.06), inset 0 0 22px rgba(184,204,216,.04)}
    50%{box-shadow:0 0 40px rgba(201,168,76,.13), inset 0 0 30px rgba(184,204,216,.07)}
  }
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{to{opacity:1}}
  @keyframes orbit{to{transform:rotate(360deg)}}
  @keyframes orbit-rev{to{transform:rotate(-360deg)}}
  @keyframes shimmer{0%{transform:translateX(-130%)}55%,100%{transform:translateX(130%)}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
    .anim-in{opacity:1 !important;transform:none !important}
    .point{opacity:1 !important}
  }
</style>
</head>
<body class="layout-auto">

  <!-- icon sprite -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-fell" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="6" r="2.4"/><path d="M12 8.6V15M8.4 11.4H15.6M12 15l-2.4 4.2M12 15l2.4 4.2"/></g></symbol>
      <symbol id="i-sigil" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1.4"/><path d="M12 4.5v15M4.5 12h15M6.4 6.4l11.2 11.2M17.6 6.4 6.4 17.6"/></g></symbol>
      <symbol id="i-shard" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.2 18.4 9 12 20.8 5.6 9Z"/><path d="M5.6 9h12.8M12 3.2V9"/></g></symbol>
      <symbol id="i-bond" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="9.4" cy="12" r="4.1"/><circle cx="14.6" cy="12" r="4.1"/></g></symbol>
      <symbol id="i-brand" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5.4" r="1.5"/><path d="M12 6.9V20M12 12 8 8.2M12 14.2 16 10.4"/></g></symbol>
      <symbol id="i-echo" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.4" cy="18.6" r="1"/><path d="M5.4 18.6A6 6 0 0 1 11 13M5.4 18.6A10 10 0 0 1 15 9M5.4 18.6A14 14 0 0 1 19 5"/></g></symbol>
      <symbol id="i-foe" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 8.2 4.8 4.2M17 8.2 19.2 4.2M7 8.2a5 5 0 0 1 10 0c0 4.3-2.2 7.2-5 8.4-2.8-1.2-5-4.1-5-8.4Z"/><circle cx="10" cy="10.2" r=".9"/><circle cx="14" cy="10.2" r=".9"/></g></symbol>
      <symbol id="i-saga" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.2c-2-1.5-5-1.5-7 0v11c2-1.5 5-1.5 7 0 2-1.5 5-1.5 7 0v-11c-2-1.5-5-1.5-7 0Z"/><path d="M12 6.2v11"/></g></symbol>
      <symbol id="i-relic" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3.3"/><path d="M10.3 10.3 18 18M15 15l2-2M17 17l2-2"/></g></symbol>
      <symbol id="i-glass" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.4"/><path d="M5.6 12q6.4-5 12.8 0-6.4 5-12.8 0Z"/><circle cx="12" cy="12" r="1.8"/></g></symbol>
      <symbol id="i-well" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8.4"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.9"/></g></symbol>
    </defs>
  </svg>

  <header class="head">
    <h1 class="head__title">The Hearth</h1>
    <div class="head__rule"></div>
  </header>

  <div class="stage-wrap">
    <div class="phone" id="phone"></div>
    <div class="wide" id="wide"></div>
  </div>

  <div class="status" id="status" role="status" aria-live="polite"></div>

<script>
(function(){
  // Node list mirrors ForgeConfig: role, group, order, route. The hub renders from this.
  // ICON ART: paste each Wix Media PNG URL into "img". Leave "" to show the gold placeholder.
  // PNG specs: square, 256px or larger, transparent background, pre-colored gold (#c9a84c).
  var FORGES = [
    {label:"FellForge",  desc:"Forge a Fell",        role:"player",     order:1, icon:"i-fell",  img:"", route:"/fellforge"},
    {label:"SigilForge", desc:"Abilities and spells", role:"player",     order:2, icon:"i-sigil", img:"", route:"/sigilforge"},
    {label:"ShardForge", desc:"Infuse and augment",   role:"player",     order:3, icon:"i-shard", img:"", route:"/shardforge"},
    {label:"BondForge",  desc:"Shape a Lorebound",    role:"player",     order:4, icon:"i-bond",  img:"", route:"/bondforge"},
    {label:"BrandForge", desc:"Author a lineage",     role:"player",     order:5, icon:"i-brand", img:"", route:"/brandforge"},
    {label:"EchoForge",  desc:"Author an origin",     role:"player",     order:6, icon:"i-echo",  img:"", route:"/echoforge"},
    {label:"SagaForge",  desc:"Build adventures",     role:"loremaster", order:1, icon:"i-saga",  img:"", route:"/sagaforge"},
    {label:"FoeForge",   desc:"Build adversaries",    role:"loremaster", order:2, icon:"i-foe",   img:"", route:"/foeforge"},
    {label:"RelicForge", desc:"Items and remnants",   role:"loremaster", order:3, icon:"i-relic", img:"", route:"/relicforge"}
  ];
  var CENTER = {
    player:     {label:"FellGlass", desc:"Your characters", icon:"i-glass", img:"", route:"/fellglass"},
    loremaster: {label:"FateWell",  desc:"Your sagas",      icon:"i-well",  img:"", route:"/fatewell"}
  };

  var body = document.body;
  var phone = document.getElementById("phone");
  var wide  = document.getElementById("wide");
  var statusEl = document.getElementById("status");
  var role = "player";
  var statusTimer;

  function bySort(a,b){return a.order-b.order;}
  function playerForges(){return FORGES.filter(function(f){return f.role==="player";}).sort(bySort);}
  function lmForges(){return FORGES.filter(function(f){return f.role==="loremaster";}).sort(bySort);}

  function setStatus(label){
    statusEl.textContent = "Opening " + label;
    statusEl.classList.add("show");
    clearTimeout(statusTimer);
    statusTimer = setTimeout(function(){statusEl.classList.remove("show");}, 1500);
  }

  function fire(btn,label){
    btn.classList.add("is-firing");
    setTimeout(function(){btn.classList.remove("is-firing");},420);
    setStatus(label);
  }
  function activate(btn,item){
    fire(btn,item.label);
    // In a Wix embed, ask the parent page to navigate. Standalone shows the status line.
    if(window.parent && window.parent!==window){
      window.parent.postMessage({type:"HEARTH_NAV",route:item.route,label:item.label},"*");
    }
  }

  function svg(icon){return '<svg aria-hidden="true"><use href="#'+icon+'"/></svg>';}
  function iconHTML(node){
    if(node.img){return '<img class="ic-img" src="'+node.img+'" alt="" loading="lazy" />';}
    return svg(node.icon);
  }

  function tile(f,dim){
    var b = document.createElement("button");
    b.className = "node tile anim-in" + (dim?" tile--dim":"");
    b.setAttribute("aria-label","Open "+f.label);
    b.innerHTML = '<span class="tile__ic">'+iconHTML(f)+'</span>'
      + '<span class="tile__label">'+f.label+'</span>'
      + '<span class="tile__desc">'+f.desc+'</span>';
    b.addEventListener("click",function(){activate(b,f);});
    return b;
  }

  function sectionLabel(text){
    var d = document.createElement("div");
    d.className="section-label";d.textContent=text;return d;
  }
  function gridOf(list,dim){
    var g=document.createElement("div");g.className="grid";
    list.forEach(function(f){g.appendChild(tile(f,dim));});
    return g;
  }

  function ember(){
    var c=CENTER[role];
    var b=document.createElement("button");
    b.className="ember";b.setAttribute("aria-label","Open "+c.label);
    b.innerHTML='<span class="ember__ic">'+iconHTML(c)+'</span>'
      +'<span><p class="ember__name">'+c.label+'</p><p class="ember__sub">'+c.desc+'</p></span>';
    b.addEventListener("click",function(){activate(b,c);});
    return b;
  }

  function wideTile(f,dim){
    var b=document.createElement("button");
    b.className="node wide-tile anim-in"+(dim?" tile--dim":"");
    b.setAttribute("aria-label","Open "+f.label);
    b.innerHTML='<span class="wide-tile__ic">'+iconHTML(f)+'</span>'
      +'<span class="wide-tile__txt"><span class="wide-tile__label">'+f.label+'</span>'
      +'<span class="wide-tile__desc">'+f.desc+'</span></span>';
    b.addEventListener("click",function(){activate(b,f);});
    return b;
  }

  function buildPhone(){
    phone.innerHTML="";
    phone.appendChild(ember());
    if(role==="player"){
      phone.appendChild(gridOf(playerForges(),false));
    } else {
      var lm=lmForges();                              // SagaForge, FoeForge, RelicForge
      phone.appendChild(sectionLabel("Loremaster Forges"));
      phone.appendChild(wideTile(lm[0],false));        // SagaForge, full width
      phone.appendChild(gridOf(lm.slice(1),false));    // FoeForge + RelicForge
      phone.appendChild(sectionLabel("Player Forges"));
      phone.appendChild(gridOf(playerForges(),true));
    }
  }

  function point(f,opts){
    opts=opts||{};
    var wrap=document.createElement("div");
    wrap.className="point"+(opts.center?" center":"")+(opts.small?" point--sm":"");
    var fix=document.createElement("div");fix.className="spin-fix";
    var b=document.createElement("button");
    b.className="node "+(opts.center?"node--lg":(opts.small?"node--sm":"node--md"));
    b.setAttribute("aria-label","Open "+f.label);
    b.innerHTML=iconHTML(f);
    b.addEventListener("click",function(){activate(b,f);});
    fix.appendChild(b);
    var tip=document.createElement("span");tip.className="tip";tip.textContent=f.desc;
    fix.appendChild(tip);
    var lab=document.createElement("span");lab.className="label";lab.textContent=f.label;
    fix.appendChild(lab);
    wrap.appendChild(fix);
    return wrap;
  }

  function place(wrap,radiusPct,angleDeg){
    var rad=angleDeg*Math.PI/180;
    wrap.style.left=(50 + radiusPct*Math.cos(rad))+"%";
    wrap.style.top =(50 + radiusPct*Math.sin(rad))+"%";
  }

  function guide(diaPct){
    var g=document.createElement("div");g.className="guide";
    g.style.width=diaPct+"%";g.style.height=diaPct+"%";return g;
  }

  function ring(list,radiusPct,startDeg,small){
    var stepped=360/list.length;
    return list.map(function(f,i){
      var p=point(f,{small:small});
      place(p,radiusPct,startDeg+i*stepped);
      return p;
    });
  }

  function orbitLayer(dur){
    var o=document.createElement("div");o.className="orbit";o.style.setProperty("--dur",dur);
    return o;
  }

  function buildWide(){
    wide.innerHTML="";
    var stage=document.createElement("div");
    stage.className="stage"+(role==="loremaster"?" stage--lm":"");

    if(role==="player"){
      stage.appendChild(guide(72));
      var o=orbitLayer("150s");
      ring(playerForges(),36,-90,false).forEach(function(p){o.appendChild(p);});
      stage.appendChild(o);
    } else {
      stage.appendChild(guide(48));
      stage.appendChild(guide(82));
      var oi=orbitLayer("125s");                       // inner ring, spins the opposite way
      oi.classList.add("orbit--rev");
      ring(lmForges(),24,-90,false).forEach(function(p){oi.appendChild(p);});
      stage.appendChild(oi);
      var oo=orbitLayer("195s");                       // outer ring, slower
      ring(playerForges(),41,-60,true).forEach(function(p){oo.appendChild(p);});
      stage.appendChild(oo);
    }
    var c=point(CENTER[role],{center:true});           // center stays still, outside any orbit
    place(c,0,0);
    stage.appendChild(c);

    wide.appendChild(stage);
  }

  function render(){
    buildPhone();
    buildWide();
    // retrigger entrance
    body.classList.remove("play");
    void body.offsetWidth;
    body.classList.add("play");
  }

  // Role comes from the member's Wix role. The parent page posts it after load.
  // Default is "player". To preview the Loremaster Hearth locally, set var role = "loremaster" above.
  window.addEventListener("message",function(e){
    var msg=e.data||{};
    if(msg.type==="HEARTH_ROLE" && (msg.role==="player"||msg.role==="loremaster")){
      role=msg.role; render();
    }
  });

  // Responsive layout: phone grid below 600px, ring above. Handled by CSS.
  var autoCss=document.createElement("style");
  autoCss.textContent="@media(max-width:600px){.layout-auto .wide{display:none}.layout-auto .phone{display:block}}"
    +"@media(min-width:601px){.layout-auto .phone{display:none}.layout-auto .wide{display:block}}";
  document.head.appendChild(autoCss);

  render();
})();
</script>
</body>
</html>
