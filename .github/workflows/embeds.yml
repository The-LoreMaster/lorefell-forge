name: Seed Embeds

# Refreshes SiteEmbeds rows whenever a tool's embed copy changes, so the
# CMS-served tools update on every push with no Wix edits. Idempotent upserts.
on:
  push:
    branches: [main]
    paths:
      - 'embeds/**'
      - '.github/workflows/embeds.yml'
  workflow_dispatch: {}

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
      WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
      WIX_ACCOUNT_ID: ${{ secrets.WIX_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/seedEmbeds.js
