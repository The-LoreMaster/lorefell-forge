name: Canon Drift Gate
on:
  push:
    paths:
      - 'docs/**'
      - 'embeds/**'
      - 'schemas/seed/**'
      - 'data/**'
      - 'canon/**'
      - 'scripts/genCanon.js'
      - 'scripts/build.js'
      - 'scripts/rules.core.js'
  pull_request:
    paths:
      - 'docs/**'
      - 'embeds/**'
      - 'schemas/seed/**'
      - 'data/**'
      - 'canon/**'
      - 'scripts/genCanon.js'
      - 'scripts/build.js'
      - 'scripts/rules.core.js'
  workflow_dispatch:
jobs:
  canon:
    runs-on: ubuntu-latest
    env:
      HAS_VAULT_TOKEN: ${{ secrets.VAULT_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history so axis 3 can diff against the base
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Axis 3 is differential: it compares the base of this change to the pushed tree.
      # PR -> the PR base sha; push -> the commit before the push.
      - name: Resolve base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi
      # Vault-to-seed staleness (v2 item 1). The vault is a separate private repo, so this
      # step needs a VAULT_TOKEN secret with read access to The-LoreMaster/lorefell-fellguide.
      # Without the secret the step skips loudly rather than failing, so forks and secretless
      # runs stay green while the main repo gets the real check.
      - name: Check out the vault
        if: ${{ env.HAS_VAULT_TOKEN == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: The-LoreMaster/lorefell-fellguide
          token: ${{ secrets.VAULT_TOKEN }}
          path: .vault-checkout
      - name: Vault to seed staleness
        if: ${{ env.HAS_VAULT_TOKEN == 'true' }}
        run: |
          VAULT_DIR=.vault-checkout node scripts/canonFromVault.js
          if ! git diff --exit-code --stat schemas/seed/; then
            echo '::error::Seeds are stale against the vault. Run VAULT_DIR=../lorefell-fellguide node scripts/canonFromVault.js and commit the result (then node scripts/genCanon.js for the baked copies).'
            exit 1
          fi
      - name: Note when the vault check is skipped
        if: ${{ env.HAS_VAULT_TOKEN != 'true' }}
        run: echo '::warning::VAULT_TOKEN secret not set; vault-to-seed staleness NOT checked.'
      - name: Canon drift gate
        env:
          CANON_BASE: ${{ steps.base.outputs.ref }}
        run: node canon/checkCanon.js
