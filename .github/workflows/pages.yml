name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.a.outputs.page_url || steps.b.outputs.page_url || steps.c.outputs.page_url }}
    steps:
      - name: Deploy attempt 1
        id: a
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 20
      - name: Wait
        if: steps.a.outcome == 'failure'
        run: sleep 120
      - name: Deploy attempt 2
        id: b
        continue-on-error: true
        if: steps.a.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 20
      - name: Wait again
        if: steps.a.outcome == 'failure' && steps.b.outcome == 'failure'
        run: sleep 180
      - name: Deploy attempt 3
        id: c
        if: steps.a.outcome == 'failure' && steps.b.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 20
