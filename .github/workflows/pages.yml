name: Deploy Pages

# Replaces the built-in Pages deploy so the deploy step can retry. GitHub's
# automatic pages-build-deployment fails intermittently on its own infrastructure
# with "Deployment failed, try again later"; a retry clears it without a manual rerun.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy with retry
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
          error_count: 15
          reporting_interval: 5000
