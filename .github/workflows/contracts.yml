name: Contracts
on:
  push:
    paths:
      - 'docs/**'
      - 'velo/**'
      - 'scripts/checkContracts.js'
  pull_request:
    paths:
      - 'docs/**'
      - 'velo/**'
      - 'scripts/checkContracts.js'
  workflow_dispatch:
jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/checkContracts.js
