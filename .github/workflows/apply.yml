name: Apply CMS

on:
  # Auto-apply on push is parked until the canonical ForgeConfig/ForgeComponents
  # collections are chosen. Re-enable the push trigger after consolidation.
  workflow_dispatch: {}

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
      WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
      WIX_ACCOUNT_ID: ${{ secrets.WIX_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Backup first
        run: node scripts/backup.js

      - name: Upload backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_id }}
          path: backups/
          if-no-files-found: warn

      - name: Create collections
        run: node scripts/createCollection.js

      - name: Seed items
        run: node scripts/upsertItems.js

      - name: Migrate legacy LoreForgeAbilities into Creations
        run: node scripts/migrate.js
