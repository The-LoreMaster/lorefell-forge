/* ---- dice ----
   Two layers, kept apart on purpose. rollFromTray owns the result and sends it
   through the seam. animateDie owns the visual and is told what landed. A
   physics layer can replace animateDie later without touching the result. */
var ROLL_TYPES = { attack:'Attack', evade:'Evade', skill:'Skill', generic:'Generic' };
var PIPS = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
var REST = { 1:[0,0], 2:[0,-90], 3:[-90,0], 4:[90,0], 5:[0,90], 6:[0,180] };
/* A skin is a texture swap and nothing more. Skins are earned in game, so they
   live on the Fell and they travel. Every roll carries the skin it was thrown
   with, which is what lets the rest of the table see what you unlocked instead
   of taking your word for it. Placeholder names, Joel and Nate own the real ones. */
var DICE_SKINS = {
  emberglass: { bg:'linear-gradient(160deg,#3d1a22,#170a10)', pip:'#f0b49c' },
  frostvein:  { bg:'linear-gradient(160deg,#16304a,#081420)', pip:'#b8ccd8' },
  loamcut:    { bg:'linear-gradient(160deg,#271c3e,#0f0a1c)', pip:'#c6b2ea' },
  plainstone: { bg:'linear-gradient(160deg,#1b2440,#0b101f)', pip:'#dce8ef' },
  boneash:    { bg:'linear-gradient(160deg,#2a2622,#14110e)', pip:'#c9a84c' }
};
function skinFor(type, who){
  var owner = (!who || who === S.character.name) ? S.character : (S.party || {})[who];
  return DICE_SKINS[((owner || {}).diceSkins || {})[type]] || DICE_SKINS.plainstone;
}
function skinKey(type, who){
  var owner = (!who || who === S.character.name) ? S.character : (S.party || {})[who];
  return ((owner || {}).diceSkins || {})[type] || 'plainstone';
}
var spins = 0, tumbleEnds = 0;

function paintCube(c, skin){
  var h = '';
  c.style.setProperty('--pip', skin.pip);
  for (var n = 1; n <= 6; n++){
    var cells = '';
    for (var i = 0; i < 9; i++) cells += '<i' + (PIPS[n].indexOf(i) >= 0 ? ' class="on"' : '') + '></i>';
    h += '<div class="face f' + n + '" style="background:' + skin.bg + '">' + cells + '</div>';
  }
  c.innerHTML = h;
}
/* the socket die, which is only ever your own and only ever shows your skin */
function buildCube(type){
  paintCube(document.getElementById('restCube'), skinFor(type || S.rollType));
  aimCube(document.getElementById('restCube'), 1, true);
}
function aimCube(c, n, instant){
  var r = REST[n];
  if (instant){ c.style.transition = 'none'; }
  spins += 2;
  c.style.transform = 'rotateX(' + (spins*360 + r[0]) + 'deg) rotateY(' + (spins*360 + r[1]) + 'deg)';
  if (instant){ void c.offsetWidth; c.style.transition = ''; }
}
var flourishT = null, flourishedId = 0;
function flourish(e){
  /* wait out the tumble so the readout and the face agree, then hold and fade */
  clearTimeout(flourishT);
  flourishT = setTimeout(function(){
    var f = document.getElementById('flourish');
    var note = e.n === 6 ? '<span class="fnote">Fellmark</span>'
             : e.n === 1 ? '<span class="fnote">Fellstrike</span>' : '';
    var mods = (e.mods || []).map(function(x){
      return '<span class="fmod">+ ' + esc(x.label) + ' ' + x.value + '</span>';
    }).join('');
    var tot = (e.mods && e.mods.length) ? '<span class="ftot">= ' + e.total + '</span>' : '';
    f.className = e.n === 6 ? 'mark' : e.n === 1 ? 'strike' : '';
    f.innerHTML = '<span class="ftype">' + esc(ROLL_TYPES[e.rollType] || e.rollType) + '</span>'
      + '<span class="fdie">' + e.n + '</span>' + mods + tot + note;
    void f.offsetWidth;
    f.classList.add('show');
    flourishT = setTimeout(function(){ f.classList.remove('show'); }, HOLD);
  }, Math.max(0, tumbleEnds - Date.now()));
}
/* ---- the throw ----
   Screen space, so it lands the same for everyone no matter where their camera is.
   Choreography only. The number is decided elsewhere and arrives as remote truth,
   this is only told what to carry. Nothing here may ever pick a face.
   Every roll at the table throws, not only your own. That is the point of earning
   a skin. Your die leaves your socket and returns to it, everyone else's arcs in
   from the edge and fades where it lands, wearing whatever they unlocked. */
var FLIGHT = 900, HOLD = 2000, HOME = 420;
var myDice = 0, dieHome = true, booted = false;

function slotCentre(){
  var r = document.getElementById('dieSlot').getBoundingClientRect();
  return { x:r.left + r.width / 2, y:r.top + r.height / 2 };
}
/* The table, minus the furniture. Two randoms averaged give a centre bias, so it
   scatters like a thrown die instead of drifting to the edges or repeating a spot. */
function landSpot(){
  var r = mapEl().getBoundingClientRect(), m = isMobile();
  var x0 = r.left + (m ? 30 : 250), x1 = r.left + r.width - (m ? 30 : 286);
  var y0 = r.top + (m ? 86 : 58), y1 = r.top + r.height - (m ? 116 : 152);
  if (x1 <= x0 || y1 <= y0) return { x:r.left + r.width / 2, y:r.top + r.height / 2 };
  function pick(a, b){ return a + (b - a) * ((Math.random() + Math.random()) / 2); }
  return { x:pick(x0, x1), y:pick(y0, y1) };
}
/* one long arc, then two decaying bounces off the table */
function hop(p){
  if (p < 0.70) return Math.sin((p / 0.70) * Math.PI) * 168;
  if (p < 0.89) return Math.sin(((p - 0.70) / 0.19) * Math.PI) * 38;
  return Math.sin(((p - 0.89) / 0.11) * Math.PI) * 10;
}
function easeOut(p){ return 1 - Math.pow(1 - p, 3); }
function makeDie(skin, tag){
  var el = document.createElement('div');
  el.className = 'dieflight';
  el.innerHTML = '<div class="diefx"><i></i><i></i><i></i><b></b></div>'
    + '<div class="dieshake"><div class="cube"></div></div>'
    + (tag ? '<div class="dietag">' + esc(tag) + '</div>' : '');
  paintCube(el.querySelector('.cube'), skin);
  document.getElementById('dieField').appendChild(el);
  return el;
}
function throwFor(e){
  var mine = e.who === S.character.name;
  var skin = DICE_SKINS[e.skin] || skinFor(e.rollType, e.who);
  /* work out the throw before anything reaches the DOM, so a bad measurement
     cannot strand a die on the table with nothing to animate it */
  var to = landSpot();
  var from = mine ? slotCentre() : { x:to.x, y:mapEl().getBoundingClientRect().top - 70 };
  var el = makeDie(skin, mine ? '' : e.who);
  var cube = el.querySelector('.cube');
  el.style.left = from.x + 'px'; el.style.top = from.y + 'px';
  el.style.opacity = '1'; el.style.transform = 'translate(0px,0px) scale(1)';
  if (mine){
    myDice++;
    dieHome = false;
    tumbleEnds = Date.now() + FLIGHT;
    document.getElementById('restCube').classList.add('away');
    document.getElementById('dieSlot').classList.add('empty');
  }
  aimCube(cube, e.n);
  var dx = to.x - from.x, dy = to.y - from.y, t0 = performance.now();
  (function frame(now){
    var p = Math.min(1, (now - t0) / FLIGHT), q = easeOut(p);
    el.style.transform = 'translate(' + (dx * q) + 'px,' + (dy * q - hop(p)) + 'px) scale('
      + (1 + 0.28 * Math.sin(p * Math.PI)) + ')';
    if (p < 1) requestAnimationFrame(frame);
  })(t0);
  /* the landing, where a Fellmark or a Fellstrike announces itself */
  setTimeout(function(){
    if (e.n === 6 || e.n === 1){
      var kind = e.n === 6 ? 'mark' : 'strike';
      el.querySelector('.diefx').className = 'diefx ' + kind;
      el.querySelector('.dieshake').className = 'dieshake ' + kind;
      cube.classList.add(kind);
      if (e.n === 6) cube.style.setProperty('--pip', '#f6e3a6');
    }
  }, FLIGHT);
  /* sit, then leave. Yours shrinks back into its socket, everyone else's lifts and fades. */
  setTimeout(function(){
    el.classList.add('home');
    el.style.transform = mine
      ? 'translate(' + (dx * 0.18) + 'px,' + (dy * 0.18 - 26) + 'px) scale(0.3)'
      : 'translate(' + dx + 'px,' + (dy - 26) + 'px) scale(0.85)';
    el.style.opacity = '0';
  }, FLIGHT + HOLD);
  setTimeout(function(){
    el.remove();
    if (mine && --myDice === 0){
      dieHome = true;
      document.getElementById('restCube').classList.remove('away');
      document.getElementById('dieSlot').classList.remove('empty');
      buildCube(S.rollType);
    }
  }, FLIGHT + HOLD + HOME);
}
function rollFromTray(){

function setRollType(t){

var _tpHideT = null;

/* ---- the LoreMaster card strip ----

function isLM(){ return S.role === 'lm'; }
/* which card sits centered in the carousel. A view fact, so it lives out here with

var lmFocus = { scene:0, commit:0, resolve:0 };

function lmSetTab(id, tab){ lmExpanded = id; lmTab = tab; paintLmStrip(); paintHud(); }
function lmFace(){ return S.mode === 'combat' ? (S.scene.combatPhase || 'commit') : 'scene'; }
function lmDeck(){

function paintLmStrip(){

function lmStripHtml(){
  if (!isLM()) return '';
  var f = lmFace();
  var sceneLabel = esc(S.scene.name);
  var head = f === 'scene'
    ? ('<button class="lm-scenebtn" onclick="openWin(\'scenes\')">' + sceneLabel + ' <span class="lm-chev">\u25be</span></button>')
    : (f === 'resolve' ? ('Round ' + S.round + ' \u00b7 Spotlights')
    : ('Round ' + S.round + ' \u00b7 Commit'));
  var deck = lmDeck();
  var focus = Math.max(0, Math.min(lmFocus[f] || 0, deck.length - 1));
  lmFocus[f] = focus;
  var stage = '';
  if (!deck.length){
    stage = '<div class="lm-empty">' + (f === 'resolve' ? 'No acts were committed.' : 'Nothing here.') + '</div>';
  } else {
    stage = deck.map(function(item, i){
      var rel = i - focus;
      if (Math.abs(rel) > 1) return '';
      var pos = rel === 0 ? 'center' : (rel < 0 ? 'left' : 'right');
      var clickAttr = pos === 'center' ? '' : ' onclick="lmGoTo(' + i + ')"';
      return '<div class="lm-slot ' + pos + '"' + clickAttr + '>' + cardFor(item) + '</div>';
    }).join('');

  var dots = deck.length > 1 ? '<div class="lm-dots">' + deck.map(function(_, i){

  }).join('') + '</div>' : '';

  var prev = deck.length > 1 ? '<button class="lm-nav l" onclick="lmStep(-1)" aria-label="Previous">\u2039</button>' : '<span class="lm-nav-sp"></span>';
  var next = deck.length > 1 ? '<button class="lm-nav r" onclick="lmStep(1)" aria-label="Next">\u203a</button>' : '<span class="lm-nav-sp"></span>';
  return '<div class="lm-topbar">' + prev
    + '<span class="lm-head">' + head + '</span>' + lmPhaseControls()
    + '<button class="lm-minbtn" onclick="lmMinimize()" title="Minimize">\u2013</button>'
    + next + '</div>'

function foeDiceRow(f){
  return '<div class="lmc-dicerow"><span class="lmc-alab">Roll</span>'
    + '<button class="lmc-die" id="tsDie-' + f.id + '" onclick="lmFoeRoll(\'' + f.id + '\')" aria-label="Roll the foe die">' + (f._roll || '?') + '</button>'
    + '<span class="lmc-dieout" id="tsDieOut-' + f.id + '">' + (f._roll ? foeRollTag(f) : '') + '</span></div>'
    + evaRow(f);
}
function foeRollTag(f){
  var v = f._roll;
  return v===6 ? 'Fellmark' : (v===1 ? 'Fellstrike' : String(v));
}
/* auto evasion, matching fwEvaRow. Shows only when this foe's act targets a Fell.
   Before the die is thrown it waits; after, accuracy meets the Fell's Evasion. */
function evaRow(f){
  if (!(f.act && f.target)) return '';
  var tgt = null; S.scene.fell.forEach(function(p){ if(p.id===f.target) tgt=p; });
  if (!tgt) return '';
  var eva = (tgt.attrs && tgt.attrs.Evasion) || 0;
  if (!f._roll) return '<div class="lmc-eva"><span class="lmc-alab">Evasion</span>'
    + '<span class="lmc-wait">waiting on the roll vs ' + esc(tgt.name) + ' (Evasion ' + eva + ')</span></div>';
  var prec = (f.attrs && f.attrs.Precision) || 0;
  var acc = f._roll + prec;
  var hit = acc >= eva;
  return '<div class="lmc-eva"><span class="lmc-alab">Evasion</span>'
    + 'accuracy ' + acc + ' vs Evasion ' + eva + ' \u00b7 '
    + '<b class="' + (hit?'lmc-hit':'lmc-miss') + '">' + (hit?'Hit':'Evaded') + '</b></div>';
}
function lmFoeRoll(id){
  var f = findC(id); if(!f) return;
  f._roll = 1 + Math.floor(Math.random()*6);
  var tag = foeRollTag(f);
  var prec = (f.attrs && f.attrs.Precision) || 0;
  var line = '<b>' + esc(f.name) + '</b> rolls ' + f._roll;
  if (f.act && f.target){
    var tgt=null; S.scene.fell.forEach(function(p){ if(p.id===f.target) tgt=p; });
    if (tgt){ var eva=(tgt.attrs&&tgt.attrs.Evasion)||0, acc=f._roll+prec;
      line += ' + Precision ' + prec + ' = ' + acc + ' vs ' + esc(tgt.name) + ' Evasion ' + eva
        + ' \u2192 <b>' + (acc>=eva?'Hit':'Evaded') + '</b>'; }
  } else { line += ' \u2192 ' + esc(tag); }
  pushLog({ kind:'sys', html:line + '.' });
  applyRemoteState({ scene:S.scene, log:S.log });
}
/* the Spotlight gold box, matching the FateWell runner: compact cards side by side,
   click one to open its tabs in place. The box hugs its members, low and wide, so
   the map stays visible above it. */
function spotGroupCard(it){
  var done = spotResolved(it);
  var manual = S.scene.spotMode==='manual';
  var inner = it.nodes.map(function(n){
    var c = n.ref, isFoe = n.kind==='foe';
    if (lmExpanded === c.id){
      return '<div class="lm-spotslot open">' + (isFoe ? foeCardOpen(c) : fellCardOpen(c)) + '</div>';
    }
    var mtog = manual ? '<button class="lmc-mdot' + (S.scene.manual[n.key]?' on':'') + '" onclick="event.stopPropagation();lmToggleManual(\'' + n.key + '\')" title="Group into the spotlight">\u25c9</button>' : '';
    var mini = isFoe ? foeCardCompact(c) : fellCardCompact(c);
    /* a small die on the compact face so a foe can roll without opening */
    var die = isFoe ? '<div class="lm-minidie">' + foeDiceRow(c) + '</div>' : '';
    return '<div class="lm-spotslot">' + mtog + mini + die + '</div>';
  }).join('');

    + '<div class="lmc-spothead"><span class="lmc-spotnum">' + esc(it.label) + '</span>'
    + '<button class="lmbtn sm2" onclick="lmResolveGroup(\'' + it.id + '\')">' + (done?'Resolved':'Resolve') + '</button></div>'
    + '<div class="lm-spotrow">' + inner + '</div></div>';
}
function lmResolveGroup(id){
  var it = buildSpotlights().filter(function(x){ return x.id===id; })[0];

}
function cardFor(item){

function lmStep(d){

/* A quest is prep until it is offered. Running the beat is what puts it on the board. */
function questBeatAction(b){
  if (!isLM() || b.kind !== 'quest') return '';
  if (b.posted) return '<div class="qb-done">Posted to the board</div>';
  return '<button class="lmbtn gold qb-post" onclick="postQuestBeat(\'' + b.id + '\')">Post this quest</button>';
}
function beatById(id){
  var hit = null;
  ((S.scene && S.scene.beats) || []).forEach(function(b){ if (sameId(b.id, id)) hit = b; });

function postQuestBeat(id){
  var b = beatById(id); if (!b || b.posted) return;
  var sc = S.scene;
  sc.quests = sc.quests || [];
  var q = { entryId:'qb-' + b.id, title:b.title || 'A quest', body:b.body || '', status:'open' };
  var already = sc.quests.filter(function(x){ return sameId(x.entryId, q.entryId); })[0];
  if (!already) sc.quests.push(q); else q.entryId = already.entryId;
  b.posted = true;
  questPush(q);
  pushLog({ kind:'sys', html:'<b>' + esc(q.title) + '</b> is posted to the board.' });

/* the foe card. Compact by default, matching the FateWell strip. Click to expand

function foeCard(f){ return lmExpanded === f.id ? foeCardOpen(f) : foeCardCompact(f); }

function manualDot(key){

function foeCardCompact(f){

function foeCardOpen(f){

  var tabrow = '<div class="lmc-tabs">' + tabs.map(function(t){
    return '<button class="lmc-tab' + (lmTab === t ? ' on' : '') + '" onclick="lmSetTab(\'' + f.id + '\',\'' + t + '\')">' + labels[t] + '</button>';
  }).join('') + '</div>';

function foeTabBody(f, tab){
  var sr = f.sr || 'Elite', minion = sr === 'Minion', d = f.dmg;
  if (tab === 'about'){
    return '<div class="lmc-sd">' + esc(sr) + ' Foe</div>'
      + '<div class="lmc-vit">' + f.curVit + ' / ' + f.maxVit + chargePips(f, 'foe') + '</div>'
      + foeLiveHtml(f)
      + actLine(f, 'foe') + foeDiceRow(f);
  }
  if (tab === 'attributes'){
    return f.attrs ? attrsGrid(f.attrs) : '<div class="lmc-note">No attributes.</div>';
  }
  if (tab === 'attack'){
    return '<div class="lmc-dmg">' + d.base + ' + ' + d.bonus + ' ' + d.type
      + '<span class="lmc-acc">' + esc(d.acc) + ' to hit</span></div>'
      + '<div class="lmc-note">Base always lands. Bonus meets ' + (d.type === 'magical' ? 'Resistance' : 'Durability') + '.'
      + (minion ? '' : ' Landing it charges the first tier.') + '</div>';
  }
  if (tab === 'acts'){
    var h = '', acts = (f.acts || []).slice().sort(function(a,b){ return (a.tier||0)-(b.tier||0); });
    var ceil = tsRating(sr).acts, ch = f.charge || 0;
    if (minion) h += '<div class="lmc-note">A Minion brings only its Standard Attack.</div>';
    if (!acts.length && !minion) h += '<div class="lmc-note">No Acts forged.</div>';
    acts.forEach(function(a){
      var t = a.tier || 0, beyond = t > ceil, locked = !beyond && !minion && t > ch;
      var gray = beyond || locked || (minion && t > 0);
      var why = (beyond || minion) ? 'beyond rating' : (locked ? 'needs charge ' + t : '');
      h += '<div class="lmc-kit' + (gray ? ' gray' : '') + '"><span class="lmc-kn">' + esc(a.name) + '</span>'
         + '<span class="lmc-kt">Tier ' + t + '</span>' + (why ? '<span class="lmc-why">' + why + '</span>' : '')
         + '<div class="lmc-ke">' + esc(a.effect || '') + '</div></div>';
    });
    h += '<div class="lmc-lbl">React</div>' + foeReactRow(f);
    return h;
  }
  if (tab === 'stats'){
    var h = kitChunk('Infusions', f.infusions || [], tsRating(sr).inf)
          + kitChunk('Augmentations', f.augments || [], tsRating(sr).inf);
    if (f.stance) h += '<div class="lmc-lbl">Stance</div><div class="lmc-kit"><span class="lmc-kn">' + esc(f.stance) + '</span></div>';
    if (f.sig) h += '<div class="lmc-lbl">Afflictions</div><div class="lmc-kit"><span class="lmc-kn">' + esc(f.sig) + '</span><span class="lmc-kt">on Fellmark, signature</span></div>';
    if (!h) h = '<div class="lmc-note">Nothing carried.</div>';
    return h;
  }
  return '';
}
function attrsGrid(a){
  var pairs = [['Precision','Evasion'],['Power','Durability'],['Magic','Resistance'],['Vigor','Wit']];
  return '<div class="lmc-attrs">' + pairs.map(function(p){
    return '<div class="lmc-arow"><span>' + p[0] + '</span><b>' + (a[p[0]]||0) + '</b></div>'
         + '<div class="lmc-arow"><span>' + p[1] + '</span><b>' + (a[p[1]]||0) + '</b></div>';
  }).join('') + '</div>';
}
function kitChunk(label, list, revealed){
  if (!list.length) return '';
  var h = '<div class="lmc-lbl">' + label + '</div>';
  list.forEach(function(nm, i){
    var gray = i >= revealed;
    h += '<div class="lmc-kit' + (gray ? ' gray' : '') + '"><span class="lmc-kn">' + esc(nm) + '</span>'
       + (gray ? '<span class="lmc-why">beyond rating</span>' : '') + '</div>';

}
function foeReactRow(f){

function lmUseFoeReact(id){ var c = findC(id); if(c){ c.reactUsed = true; applyRemoteState({ scene:S.scene }); } }
function lmFoeReactReset(id){ var c = findC(id); if(c){ c.reactUsed = false; applyRemoteState({ scene:S.scene }); } }

/* Fell card mirrors the foe card: compact by default, tabbed when opened. Tabs

function fellCard(p){ return lmExpanded === p.id ? fellCardOpen(p) : fellCardCompact(p); }

function compactPipsFell(p){

function fellCardOpen(p){

  }

  if (tab === 'attack'){
    if (!d) return '<div class="lmc-note">No weapon set.</div>';
    return '<div class="lmc-dmg">' + d.base + ' + ' + d.bonus + ' ' + d.type
      + '<span class="lmc-acc">' + esc(d.acc) + ' to hit</span></div>'

    (p.lore||[]).forEach(function(x){ h+='<div class="lmc-note">'+esc(x)+'</div>'; });
    return h || '<div class="lmc-note">Nothing carried.</div>';
  }
  return '';
}

/* charge pips, dark when empty and gold when set, clickable for the LM */
/* In battle the LoreMaster moves a foe's vitality, charges and what is on it.
   Nothing else edits these; the shelf holds what a foe is, this holds what is happening. */
function inBattle(){ return S.mode === 'combat'; }
function foeById(id){
  var hit = null;
  ((S.scene && S.scene.foes) || []).forEach(function(f){ if (sameId(f.id, id)) hit = f; });
  return hit;
}
function foeVit(id, delta){
  var f = foeById(id); if (!f) return;
  f.curVit = Math.max(0, Math.min(f.maxVit || 0, (f.curVit || 0) + delta));
  pushLog({ kind:'sys', html:esc(f.name) + (delta < 0 ? ' takes ' + (-delta) : ' recovers ' + delta) + ', now ' + f.curVit + '/' + f.maxVit + '.' });
  combatPublish(); applyRemoteState({ scene:S.scene, log:S.log }); paintLmStrip(); paintHud();
}
function foeCharge(id, v){
  var f = foeById(id); if (!f) return;
  f.charge = Math.max(0, Math.min(3, v));
  combatPublish(); applyRemoteState({ scene:S.scene }); paintLmStrip(); paintHud();
}
var TS_EFFECTS = ['Bleeding','Burning','Blinded','Dazed','Exposed','Frozen','Poisoned','Prone','Rooted','Silenced','Slowed','Staggered','Weakened'];
function foeAffAdd(id){
  var f = foeById(id); if (!f) return;
  var opts = TS_EFFECTS.filter(function(e){ return (f.affs || []).indexOf(e) < 0; });
  tsModal('<h3 class="tsm-title">What takes hold</h3>'
    + '<select class="tsm-inp" id="afPick">' + opts.map(function(e){ return '<option value="' + esc(e) + '">' + esc(e) + '</option>'; }).join('') + '</select>'
    + (opts.length ? '' : '<p class="tsm-note">Everything is already on it.</p>')
    + '<div class="tsm-row"><button class="tsm-btn ghost" onclick="tsCloseModal()">Cancel</button>'
    + '<button class="tsm-btn" onclick="foeAffSave(\'' + id + '\')">Apply</button></div>');
}
function foeAffSave(id){
  var f = foeById(id); if (!f) return;
  var v = (document.getElementById('afPick') || {}).value;
  if (v){
    f.affs = f.affs || [];
    if (f.affs.indexOf(v) < 0) f.affs.push(v);
    pushLog({ kind:'sys', html:esc(v) + ' takes hold of ' + esc(f.name) + '.' });
  }
  tsCloseModal(); combatPublish(); applyRemoteState({ scene:S.scene, log:S.log }); paintLmStrip();
}
function foeAffDrop(id, name){

/* A Fell's declare as it came off their sheet, and the LoreMaster's answer to it. */
function fellDeclareHtml(p){
  if (!inBattle()) return '';
  var dcl = declareFor(p.charId || p.id);
  var h = '<div class="bt-live">';
  if (dcl && (dcl.act || dcl.roll)){

/* once acts lock, each committed act becomes a Spotlight, wrapped in a gold box.
   The LM swipes through them and resolves one at a time. */
function battleNodes(){
  return S.scene.foes.map(function(c){ return { key:'f:'+c.id, kind:'foe', ref:c }; })
    .concat(S.scene.fell.map(function(c){ return { key:'p:'+c.id, kind:'fell', ref:c }; }));
}
function focusGraph(){
  var nodes = battleNodes(), byKey = {};
  nodes.forEach(function(n){ byKey[n.key]=n; n.focus=0; });
  var edges = [];
  nodes.forEach(function(n){
    var tgt = n.ref.target;
    var tk = tgt ? (S.scene.foes.some(function(f){return f.id===tgt;}) ? 'f:'+tgt : 'p:'+tgt) : null;
    if (n.ref.act && tk && byKey[tk]){ edges.push([n.key, tk]); byKey[n.key].focus++; byKey[tk].focus++; }
  });
  var inEdge = {}; edges.forEach(function(e){ inEdge[e[0]]=true; inEdge[e[1]]=true; });
  var parent = {}; nodes.forEach(function(n){ parent[n.key]=n.key; });
  function find(k){ while(parent[k]!==k){ parent[k]=parent[parent[k]]; k=parent[k]; } return k; }
  edges.forEach(function(e){ var a=find(e[0]), b=find(e[1]); if(a!==b) parent[a]=b; });
  var clusters = {};
  nodes.forEach(function(n){
    if (inEdge[n.key]){ var root=find(n.key);
      if(!clusters[root]) clusters[root]={ nodes:[], heat:0 };
      clusters[root].nodes.push(n); clusters[root].heat+=n.focus; }
  });
  var list = Object.keys(clusters).map(function(k){ return clusters[k]; });
  list.sort(function(a,b){ return b.heat-a.heat; });
  var loose = nodes.filter(function(n){ return !inEdge[n.key]; });
  return { clusters:list, loose:loose, nodes:nodes };
}
function buildSpotlights(){
  var raw = [], fg = focusGraph();
  if (S.scene.spotMode === 'auto'){
    fg.clusters.forEach(function(cl){
      var keys = cl.nodes.map(function(n){ return n.key; });
      raw.push({ type:'cluster', id:'cl:'+keys.slice().sort().join('|'), nodes:cl.nodes });
    });
    fg.loose.forEach(function(n){ raw.push({ type:'solo', id:'solo:'+n.key, nodes:[n] }); });
  } else {
    var nodes = battleNodes();
    var lit = nodes.filter(function(n){ return S.scene.manual[n.key]; });
    if (lit.length) raw.push({ type:'manual', id:'manual:'+lit.map(function(n){return n.key;}).sort().join('|'), nodes:lit });
    nodes.filter(function(n){ return !S.scene.manual[n.key]; }).forEach(function(n){
      raw.push({ type:'solo', id:'solo:'+n.key, nodes:[n] });
    });
  }
  var byId={}; raw.forEach(function(r){ byId[r.id]=r; });
  var ordered=[];
  (S.scene.spotOrder||[]).forEach(function(id){ if(byId[id]){ ordered.push(byId[id]); delete byId[id]; } });
  raw.forEach(function(r){ if(byId[r.id]) ordered.push(r); });
  var unresolved = ordered.filter(function(it){ return !spotResolved(it); });
  var resolved = ordered.filter(function(it){ return spotResolved(it); });
  var finalList = unresolved.concat(resolved);
  var n=0;
  finalList.forEach(function(it){
    if(it.type==='cluster'||it.type==='manual'){ n++; it.label='Spotlight '+n; }
    else it.label='Unengaged: '+it.nodes[0].ref.name;
  });
  S.scene.spotOrder = finalList.map(function(it){ return it.id; });
  return finalList;
}
function spotResolved(it){
  return it.nodes.every(function(n){ return n.ref.spot==='done' || (n.ref.curVit||0)<=0 || !n.ref.act; });
}
function lmSpotDeck(){

    .map(function(it){ return { kind:'spotgroup', data:it }; });
}

/* ---- LM intent, all through send() or local scene edits echoed as remote truth ---- */
/* ---- the scene deck ----
   A scene is a saved bundle of the table: the map, every token's position and
   footprint, and the grid. The deck belongs to the campaign and outlives the
   session. Switching scenes snapshots the live table into the scene being left and
   restores the one being entered, so the party stands where you left them. */
var _stageStore = [];   /* stands in for the Scenes collection rows */
function stubSaveStage(sc){
  var i=-1; _stageStore.forEach(function(x,k){ if(x.stageId===sc.stageId) i=k; });
  if(i>=0) _stageStore[i]=Object.assign({},_stageStore[i],sc); else _stageStore.push(Object.assign({},sc));
  return Promise.resolve({ ok:true });
}
function stubListStages(){ return Promise.resolve(_stageStore.slice()); }
function stubDeleteStage(id){ _stageStore=_stageStore.filter(function(x){ return x.stageId!==id; }); return Promise.resolve({ ok:true }); }
var stageBackend = { save:stubSaveStage, list:stubListStages, remove:stubDeleteStage };

/* ---- Stages: the private instance layer ----
   A stage is one board, a map and where every token stands. Stages live in S.instance,
   never on the scene, so an exported adventure carries the scene and its map pack but
   never a board. Scenes bind to stages many to many through S.instance.bindings, keyed by
   scene id: a scene lists the stages it uses and which is active, and one stage can serve
   several scenes, sharing its layout between them. Persistence is per account through
   stageBackend, so one LoreMaster's stages never reach another. */
function curSceneId(){ return S.scene.id || 'sc-default'; }
function sceneBinding(){
  var id = curSceneId();
  if (!S.instance.bindings[id]) S.instance.bindings[id] = { stageIds:[], activeStageId:null };
  return S.instance.bindings[id];
}
function instanceStages(){ return S.instance.stages || (S.instance.stages = []); }
function stageById(id){ var r=null; instanceStages().forEach(function(x){ if(x.stageId===id) r=x; }); return r; }
function sceneStages(){ return (sceneBinding().stageIds||[]).map(stageById).filter(Boolean); }
function activeStageId(){ return sceneBinding().activeStageId; }
/* Stage work counts as a local edit: without this stamp an in-flight snapshot
   lands a moment later and puts the old deck back. */
function stageTouch(){ S._advTouch = Date.now(); }
function stageUpsert(b){
  stageTouch();
  var lib = instanceStages(), i=-1;
  lib.forEach(function(x,k){ if(x.stageId===b.stageId) i=k; });
  if (i>=0) lib[i]=b; else lib.push(b);
}
function bindStageToScene(id){
  var bd = sceneBinding();
  if (bd.stageIds.indexOf(id) < 0) bd.stageIds.push(id);
}

/* snapshot the live table into a stage bundle */
function stageSnapshot(){
  var active = activeStageId();
  var known = active ? stageById(active) : null;
  return {
    stageId: active || ('st-' + Date.now()),
    name: (known && known.name) || S.scene.name,
    mapId: S.scene.background || null,
    tokens: S.tokens.map(function(t){ return { id:t.id, kind:t.kind, label:t.label, name:t.name, img:t.img, x:t.x, y:t.y, cells:t.cells, mine:t.mine, refId:t.refId }; }),
    grid: Object.assign({}, S.grid),
    mapW: S.map.w, mapH: S.map.h
  };
}
/* restore a stage onto the live table, through the seam so it syncs */
function stageRestore(b){
  sceneBinding().activeStageId = b.stageId;
  S.scene.background = b.mapId;
  S.tokens = (b.tokens||[]).map(function(t){ return Object.assign({}, t); });
  S.grid = Object.assign({}, b.grid || S.grid);
  S.map = { w: b.mapW || 2400, h: b.mapH || 1600 };
  applyRemoteState({ scene:S.scene, tokens:S.tokens, grid:S.grid, map:S.map, instance:S.instance });
  paintMapArt();
}
/* the switcher lists the stages bound to the current scene */
/* The Lobby is the table before a map is laid down: the blue parchment, no tokens. */
function ensureLobby(){
  var bd = sceneBinding(); if (!bd) return;
  var stages = instanceStages();
  var lobby = stages.filter(function(s){ return String(s.name || '').toLowerCase() === 'lobby'; })[0];
  if (!lobby){
    lobby = { stageId:'st-lobby', name:'Lobby', mapId:null, tokens:[], grid:S.grid, mapW:S.map.w, mapH:S.map.h };
    S.instance.stages = stages.concat([lobby]);
    if (stageBackend && stageBackend.save) stageBackend.save(lobby);
  }
  bd.stageIds = bd.stageIds || [];
  if (bd.stageIds.indexOf(lobby.stageId) < 0) bd.stageIds.unshift(lobby.stageId);
  if (!bd.activeStageId) bd.activeStageId = lobby.stageId;
}
function stageDeck(){ return sceneStages(); }
function lmSaveCurrentStage(){
  var b = stageSnapshot();
  var bd = sceneBinding();
  bd.activeStageId = b.stageId;
  bindStageToScene(b.stageId);
  stageUpsert(b);
  stageBackend.save(b);
  applyRemoteState({ instance:S.instance });
}
function lmSwitchStage(id){
  if (activeStageId() === id) { return; }
  lmSaveCurrentStage();                       /* the leaving stage keeps its layout */
  var b = stageById(id);
  if (b){ stageRestore(b); pushLog({ kind:'sys', html:'Stage set to <b>' + esc(b.name) + '</b>.' }); applyRemoteState({ log:S.log }); }
  refreshStagesWin();
}

function lmStageMap(id){

    + '</select>'
    + (maps.length ? '' : '<p class="tsm-note">Your shelf is empty. Upload one from Maps in the scene runner.</p>')
    + '<div class="tsm-row"><button class="tsm-btn ghost" onclick="tsCloseModal()">Cancel</button>'

function lmStageMapSave(id){
  var st = stageById(id); if (!st) return;
  var v = (document.getElementById('stMap') || {}).value || null;

/* A full size battle map is many megabytes as base64 and the upload gives out
   quietly. Draw it down to something sane first, as the other tools do. */
function shrinkImage(file, max){
  return new Promise(function(resolve){
    var fr = new FileReader();
    fr.onload = function(ev){
      var img = new Image();
      img.onload = function(){
        var w = img.naturalWidth || 1, h = img.naturalHeight || 1;
        var scale = Math.min(1, max / Math.max(w, h));
        if (scale >= 1){ resolve(String(ev.target.result).split(',')[1]); return; }
        var c = document.createElement('canvas');
        c.width = Math.round(w * scale); c.height = Math.round(h * scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', 0.86).split(',')[1]);
      };
      img.onerror = function(){ resolve(String(ev.target.result).split(',')[1]); };
      img.src = ev.target.result;
    };
    fr.onerror = function(){ resolve(''); };
    fr.readAsDataURL(file);
  });
}
function fileToBase64(file){
  return new Promise(function(res, rej){
    var r = new FileReader();
    r.onload = function(){ res(String(r.result).split(',')[1] || ''); };
    r.onerror = function(){ rej(new Error('read failed')); };
    r.readAsDataURL(file);
  });
}

/* local upload. Reads the file to an object URL, measures the image so the map box

function lmMapDrop(e){

function lmMapFilePicked(input){

  var url = URL.createObjectURL(file);
  var img = new Image();
  img.onload = function(){
    var id = 'up-' + Date.now();

    var w = img.naturalWidth||2400, h = img.naturalHeight||1600;
    var m = { id:id, assetId:id, folder:'', name:nm, url:url, w:w, h:h, source:'account', local:true };

    }).then(function(){

function place(el, t){

  el.style.left = (t.x - px / 2) + 'px';
  el.style.top  = (t.y - px / 2) + 'px';

      + (sel === t.id ? ' sel' : '') + (t.img ? ' hasimg' : '');

/* Odd footprints centre on a cell, even footprints centre on an intersection,
   otherwise a 2x2 straddles four half cells and covers none of them. */
function snapAxis(v, off, cells){

function wireDrag(el, t){

      el.removeEventListener('pointermove', mv); el.removeEventListener('pointerup', upfn);

      t.y = clamp(snapAxis(t.y, S.grid.offY, c), 0, S.map.h);

function dist(a, b){ return Math.hypot(a.x - b.x, a.y - b.y); }
