<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ThreadSpire Shell</title>
<style>
:root{ --navy:#0a0e1a; --panel:#10162a; --panel2:#141b33; --line:#2a3352; --gold:#c9a84c; --silver:#dce8ef; --ice:#b8ccd8; --muted:#7e8a99; --danger:#a32d2d; --pink:#d4537e; }
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{ background:var(--navy); color:var(--silver); font-family:'Crimson Pro',Georgia,serif; overflow:hidden; }
button{ font:inherit; color:inherit; background:none; border:none; cursor:pointer; }

#stage{ position:fixed; inset:0; }
#map{ position:absolute; inset:0; background:var(--navy); overflow:hidden; touch-action:none; cursor:grab; }
#map.panning{ cursor:grabbing; }
#mapLayer{ position:absolute; left:0; top:0; transform-origin:0 0; will-change:transform; }
#mapArt{ position:absolute; left:0; top:0; background:
  radial-gradient(circle at 28% 34%, #7d90a4 0 16%, transparent 16.4%),
  radial-gradient(circle at 72% 66%, #5a6a7b 0 20%, transparent 20.4%),
  radial-gradient(circle at 54% 18%, #6f8296 0 11%, transparent 11.4%), #66788a; }
#mapArt video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
#grid{ position:absolute; left:0; top:0; pointer-events:none; }
.token{ position:absolute; border-radius:50%; border:2px solid rgba(0,0,0,.4); display:flex; align-items:center;
  justify-content:center; font-family:Cinzel,serif; color:#fff; user-select:none; touch-action:none; }
.token.mine{ border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,.6); cursor:grab; }
.token.sel{ box-shadow:0 0 0 3px rgba(255,255,255,.85), 0 0 22px 7px rgba(201,168,76,.65); z-index:5; }
#tokmenu{ position:fixed; z-index:58; width:184px; background:rgba(10,14,26,.96); border:1.5px solid var(--gold); border-radius:8px; padding:9px; display:none; }
#tokmenu.open{ display:block; }
#tokmenu .tmh{ font-family:Cinzel,serif; font-size:.62rem; letter-spacing:.14em; color:var(--gold); margin-bottom:7px; }
#tokmenu input{ width:100%; background:#0b1020; border:1px solid var(--line); border-radius:5px; color:var(--silver); font:inherit; font-size:.78rem; padding:5px 7px; margin-bottom:7px; }
#tokmenu input:focus{ outline:none; border-color:var(--gold); }
#tokmenu .tmsz{ display:flex; gap:5px; }
#tokmenu .tmsz button{ flex:1; border:1px solid var(--line); border-radius:5px; font-family:Cinzel,serif; font-size:.68rem; color:var(--ice); padding:6px 0; }
#tokmenu .tmsz button.on{ background:#1e3f8f; border-color:#9fc3ff; color:#fff; }
#tokmenu .tm-del{ width:100%; margin-top:8px; border:1px solid rgba(201,106,90,.6); border-radius:5px; color:#e0b0a4; font-family:Cinzel,serif; font-size:.62rem; letter-spacing:.08em; text-transform:uppercase; padding:6px 0; }
#tokmenu .tm-del:active{ background:rgba(201,106,90,.25); }
.token.lm-drag{ cursor:grab; }
.token.p{ background:#37548d; } .token.foe{ background:var(--danger); } .token.npc{ background:#5f5e5a; } .token.asset{ background:#3d6b58; }
.token.hasimg{ background-size:cover; background-position:center; }
.token .tok-face{ display:flex; align-items:center; justify-content:center; width:100%; height:100%; }
.token.hasimg .tok-face{ visibility:hidden; }
.token .tok-label{ position:absolute; top:100%; left:50%; transform:translateX(-50%); margin-top:3px; white-space:nowrap; font-family:Cinzel,serif; font-size:.62rem; letter-spacing:.04em; color:var(--silver); background:rgba(10,14,26,.82); border:1px solid rgba(220,232,239,.2); border-radius:4px; padding:1px 6px; pointer-events:none; }

.frame{ position:fixed; inset:0; pointer-events:none; border:14px solid transparent; border-image:linear-gradient(160deg,#171208,#57431a,#171208) 1; }

#log{ position:fixed; top:16px; right:16px; width:250px; max-height:220px; overflow-y:auto; background:rgba(10,14,26,.92); border:1px solid var(--gold); border-radius:8px; padding:8px 10px; font-size:.82rem; line-height:1.45; }
.log-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.log-h{ font-family:Cinzel,serif; font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); }
.log-x{ background:none; border:none; color:var(--gold); font-size:.95rem; line-height:1; cursor:pointer; padding:0 4px; }
#log.min{ max-height:none; }
#log.min .lchat, #log.min .logstream{ display:none; }
#log div{ color:var(--gold); } #log div b{ color:var(--ice); font-weight:600; }

#rail{ position:fixed; right:16px; bottom:110px; display:flex; flex-direction:column; gap:8px; width:200px; }
.plaque{ background:var(--panel); border:1.5px solid var(--gold); border-radius:6px; padding:9px 13px; font-family:Cinzel,serif; letter-spacing:.1em; font-size:.82rem; color:var(--silver); text-align:left; transition:background .15s; }
.plaque .ico{ display:none; }
.plaque:hover{ background:var(--panel2); }
.plaque.lit{ background:#1e3f8f; border-color:#9fc3ff; color:#fff; box-shadow:0 0 14px rgba(60,110,220,.55); }

#hud{ position:fixed; right:16px; bottom:16px; width:200px; background:var(--panel); border:1.5px solid var(--gold); border-radius:8px; padding:10px; }
#hud .prow{ display:flex; align-items:center; gap:10px; cursor:pointer; }
#hud .portrait{ width:56px; height:56px; border-radius:8px; border:2px solid var(--gold); background:#37548d center/cover; flex:none; }
#hud.lm .gems{ display:none; }
#mhud.lm .gems, #mhud.lm .fmark, #mhud.lm .gem{ display:none; }
.win-note{ font-size:.86rem; color:var(--ice); line-height:1.5; margin-bottom:12px; }
.win-search{ width:100%; background:#0b1020; border:1px solid var(--line); border-radius:6px; color:var(--silver); font:inherit; font-size:.86rem; padding:8px 10px; }
.win-search:focus{ outline:none; border-color:var(--gold); }
.jrow{ display:flex; gap:7px; margin-bottom:14px; }
.jrow input{ flex:1; min-width:0; background:#0b1020; border:1px solid var(--line); border-radius:6px; color:var(--silver); font:inherit; font-size:.88rem; padding:8px 10px; }
.jrow input:focus{ outline:none; border-color:var(--gold); }
.jadd{ border:1px solid var(--gold); border-radius:6px; color:var(--gold); font-family:Cinzel,serif; font-size:.68rem; letter-spacing:.08em; text-transform:uppercase; padding:0 14px; flex:none; }
.jempty{ color:var(--muted); font-size:.86rem; padding:10px 0; }
.jentry{ border:1px solid var(--line); border-left:3px solid var(--gold); border-radius:8px; padding:8px 11px; margin-bottom:8px; background:var(--navy2,#0e1526); }
.jhead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
.jtime{ font-family:Cinzel,serif; font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
.jx{ background:none; border:none; color:var(--muted); font-size:.95rem; line-height:1; cursor:pointer; padding:0 2px; }
.jx:hover{ color:#e0b0a4; }
.jtext{ font-size:.9rem; color:var(--ice); line-height:1.45; white-space:pre-wrap; }
#hud .pname{ font-family:Cinzel,serif; font-size:.9rem; }
#hud .psub{ font-size:.78rem; color:var(--ice); }
#hud .gems{ display:flex; gap:7px; margin-top:10px; align-items:center; justify-content:space-between; }
.gem{ width:44px; height:44px; transform:rotate(45deg); border:2px solid var(--gold); background:#1c4f8f; display:flex; align-items:center; justify-content:center; border-radius:6px; flex:none; }
.gem span{ transform:rotate(-45deg); font-family:Cinzel,serif; font-size:.85rem; color:#fff; }
.gem.lp{ background:#26215c; }
@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(212,83,126,.7);} 50%{ box-shadow:0 0 16px 5px rgba(212,83,126,.45);} }

/* placeholder Fellmark. Joel's symbol drops in here as art, the behaviour stays. */
.fmark{ width:46px; height:46px; flex:none; border-radius:50%; }
.fmark .fmshape{ fill:var(--panel); stroke:var(--gold); stroke-width:2.5; }
.fmark .fmrune{ fill:none; stroke:var(--gold); stroke-width:2.5; stroke-linecap:round; }
.fmark.combat{ animation:pulse 1.1s ease-in-out infinite; cursor:pointer; }
.fmark.combat .fmshape{ fill:var(--pink); stroke:#ed93b1; }
.fmark.combat .fmrune{ stroke:#fff; }
#fellmarkM{ display:none; }

#win{ position:fixed; top:60px; right:250px; width:min(720px,55vw); bottom:60px; background:var(--panel); border:2px solid var(--gold); border-radius:10px; display:none; flex-direction:column; }
#win.open{ display:flex; }
#win .whead{ display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid var(--line); }
#win .wx{ width:28px; height:28px; border:1.5px solid var(--gold); border-radius:50%; color:var(--gold); font-size:1rem; line-height:1; flex:none; }
#win .wtitle{ font-family:Cinzel,serif; letter-spacing:.14em; font-size:.95rem; }
#win .wbody{ flex:1; overflow-y:auto; padding:16px; font-size:.95rem; line-height:1.6; }
.stub{ height:12px; background:var(--panel2); border-radius:4px; margin:10px 0; }
.pill{ display:inline-block; border:1px solid var(--gold); border-radius:14px; padding:3px 12px; font-size:.82rem; margin:0 6px 6px 0; }
.pill.dim{ border-color:var(--line); color:var(--ice); }
.sendbtn{ display:block; width:100%; background:#1e3f8f; border:1px solid #9fc3ff; border-radius:8px; color:#fff; font-family:Cinzel,serif; letter-spacing:.08em; padding:10px 0; margin-top:14px; }

.lchat{ display:flex; gap:6px; align-items:center; padding-bottom:7px; border-bottom:1px solid var(--line); margin-bottom:7px; }
.lchat input{ flex:1; min-width:0; background:#0b1020; border:1px solid var(--line); border-radius:5px; color:var(--silver); font:inherit; font-size:.8rem; padding:5px 7px; }
.lchat input:focus{ outline:none; border-color:var(--gold); }
.lchat button{ border:1px solid var(--gold); border-radius:5px; color:var(--gold); font-family:Cinzel,serif; font-size:.66rem; letter-spacing:.08em; padding:5px 7px; flex:none; }
.logstream .le{ margin:3px 0; }
.logstream .le.sys{ color:var(--gold); }
.logstream .le.say{ color:var(--silver); }
.logstream .le.roll{ color:var(--ice); }
.logstream b{ color:var(--ice); font-weight:600; }
.logstream .say b{ color:var(--gold); }
.logstream .num{ font-family:Cinzel,serif; color:var(--silver); }
.logstream .mark{ color:var(--gold); font-family:Cinzel,serif; font-size:.72rem; letter-spacing:.08em; }
.logstream .strike{ color:#f09595; font-family:Cinzel,serif; font-size:.72rem; letter-spacing:.08em; }

#tray{ position:fixed; left:16px; bottom:16px; z-index:50; display:flex; align-items:center; gap:10px; }
/* the socket the die lives in and returns to. It is the click target, the die
   itself flies and is pointer transparent the whole way. */
#dieSlot{ width:64px; height:64px; border-radius:10px; border:1.5px dashed transparent; transition:border-color .3s, background .3s; }
#dieSlot.empty{ border-color:rgba(201,168,76,.45); background:rgba(201,168,76,.05); }

.dieflight{ position:fixed; width:64px; height:64px; margin:-32px 0 0 -32px; pointer-events:none; z-index:57; }
.dieflight.home{ transition:transform 420ms cubic-bezier(.4,0,.6,1), opacity 420ms ease; }
.dieshake{ width:100%; height:100%; position:relative; }
.dieshake.mark{ animation:markrise 1200ms cubic-bezier(.2,.9,.3,1); }
.dieshake.strike{ animation:strikeshake 520ms ease-out; }
.dietag{ position:absolute; top:100%; left:50%; transform:translateX(-50%); margin-top:7px; white-space:nowrap;
  font-family:Cinzel,serif; font-size:.6rem; letter-spacing:.1em; color:var(--ice); text-shadow:0 1px 4px #000; }
@keyframes markrise{ 0%{ transform:scale(1); } 26%{ transform:scale(1.3); } 100%{ transform:scale(1); } }
@keyframes strikeshake{ 0%,100%{ transform:translate(0,0); } 15%{ transform:translate(-4px,2px); } 30%{ transform:translate(4px,-2px); }
  45%{ transform:translate(-3px,-2px); } 60%{ transform:translate(3px,2px); } 78%{ transform:translate(-2px,1px); } }

.diefx{ position:absolute; left:50%; top:50%; width:64px; height:64px; margin:-32px 0 0 -32px; pointer-events:none; }
.diefx i{ position:absolute; inset:0; border-radius:11px; border:2px solid transparent; opacity:0; }
.diefx b{ position:absolute; left:50%; top:50%; width:150px; height:150px; margin:-75px 0 0 -75px; border-radius:50%; opacity:0; }
@keyframes burst{ from{ transform:rotate(45deg) scale(.4); opacity:.95; } to{ transform:rotate(45deg) scale(3.6); opacity:0; } }
@keyframes aura{ 0%{ opacity:0; transform:scale(.45); } 24%{ opacity:1; transform:scale(1); } 100%{ opacity:0; transform:scale(1.6); } }
.diefx.mark i{ border-color:var(--gold); animation:burst 1200ms cubic-bezier(.12,.7,.28,1) forwards; }
.diefx.mark i:nth-child(2){ animation-delay:170ms; }
.diefx.mark i:nth-child(3){ animation-delay:340ms; }
.diefx.mark b{ background:radial-gradient(circle, rgba(201,168,76,.6) 0%, rgba(201,168,76,.16) 42%, transparent 66%); animation:aura 1300ms ease-out forwards; }
.diefx.strike i{ border-color:#e24b4a; animation:burst 640ms cubic-bezier(.2,.95,.3,1) forwards; }
.diefx.strike i:nth-child(2){ animation-delay:80ms; }
.diefx.strike i:nth-child(3){ display:none; }
.diefx.strike b{ background:radial-gradient(circle, rgba(226,75,74,.55) 0%, rgba(226,75,74,.14) 42%, transparent 66%); animation:aura 720ms ease-out forwards; }

#dieField{ position:fixed; inset:0; pointer-events:none; z-index:57; }
.cube{ width:64px; height:64px; position:relative; transform-style:preserve-3d; transition:transform 900ms cubic-bezier(.2,.75,.25,1); --pip:#dce8ef; }
#restCube{ transition:opacity .2s ease; }
#restCube.away{ opacity:0; }
.cube .face{ position:absolute; inset:0; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); gap:2px; padding:7px; border:1px solid var(--gold); border-radius:9px; backface-visibility:hidden; }
.cube .face i{ border-radius:50%; opacity:0; }
.cube .face i.on{ opacity:1; background:var(--pip); box-shadow:0 0 5px var(--pip); }
.cube .f1{ transform:translateZ(32px); }
.cube .f6{ transform:rotateY(180deg) translateZ(32px); }
.cube .f2{ transform:rotateY(90deg) translateZ(32px); }
.cube .f5{ transform:rotateY(-90deg) translateZ(32px); }
.cube .f3{ transform:rotateX(90deg) translateZ(32px); }
.cube .f4{ transform:rotateX(-90deg) translateZ(32px); }
.cube.mark .face{ border-color:var(--gold); box-shadow:inset 0 0 16px rgba(201,168,76,.6), 0 0 26px rgba(201,168,76,.55); }
.cube.strike .face{ border-color:#e24b4a; box-shadow:inset 0 0 16px rgba(226,75,74,.5), 0 0 22px rgba(226,75,74,.5); }
.tchip{ background:var(--panel); border:1.5px solid var(--gold); border-radius:6px; font-family:Cinzel,serif; font-size:.72rem; letter-spacing:.1em; color:var(--silver); padding:7px 10px; }
.tpick{ position:absolute; left:0; bottom:78px; display:none; flex-direction:column; background:var(--panel); border:1.5px solid var(--gold); border-radius:6px; overflow:hidden; min-width:118px; }
.tpick.open{ display:flex; }
.tpick button{ font-family:Cinzel,serif; font-size:.72rem; letter-spacing:.08em; color:var(--ice); text-align:left; padding:8px 11px; }
.tpick button:hover{ background:var(--panel2); }
.tpick button.on{ color:#fff; background:#1e3f8f; }

#flourish{ position:fixed; left:50%; bottom:26px; z-index:55; opacity:0; transform:translate(-50%,16px); pointer-events:none;
  transition:opacity .3s ease, transform .3s ease; background:rgba(10,14,26,.94); border:1px solid var(--gold); border-radius:9px;
  padding:10px 18px; font-family:Cinzel,serif; font-size:.92rem; letter-spacing:.06em; display:flex; align-items:baseline; gap:9px; white-space:nowrap; }
#flourish.show{ opacity:1; transform:translate(-50%,0); }
#flourish .ftype{ font-size:.68rem; letter-spacing:.14em; color:var(--muted); }
#flourish .fdie{ font-size:1.5rem; color:var(--silver); }
#flourish .fmod{ font-size:.8rem; color:var(--ice); }
#flourish .ftot{ font-size:1.5rem; color:var(--gold); }
#flourish.mark{ border-color:var(--gold); box-shadow:0 0 20px rgba(201,168,76,.45); }
#flourish.mark .fdie{ color:var(--gold); }
#flourish.strike{ border-color:#a32d2d; box-shadow:0 0 20px rgba(163,45,45,.4); }
#flourish.strike .fdie{ color:#f09595; }
#flourish .fnote{ font-size:.68rem; letter-spacing:.14em; }
#flourish.mark .fnote{ color:var(--gold); }
#flourish.strike .fnote{ color:#f09595; }

#drawer{ display:none; }
#lmstrip{ position:fixed; left:0; right:0; bottom:18px; z-index:55; pointer-events:none; display:flex; flex-direction:column; align-items:center; }
#cleanExit{ display:none; position:fixed; top:10px; left:10px; z-index:200; background:rgba(10,14,26,.5); border:1px solid rgba(201,168,76,.4); color:var(--gold); font-family:Cinzel,serif; font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; border-radius:6px; padding:4px 9px; cursor:pointer; opacity:.45; }
#cleanExit:hover{ opacity:1; }
body.clean #cleanExit{ display:block; }
body.clean #rail, body.clean #hud, body.clean #mhud, body.clean #win, body.clean #mrail, body.clean #tray, body.clean #lmstrip, body.clean #devbar, body.clean #log{ display:none !important; }
#win{ position:relative; }
#win #sheetFrame{ display:none; position:absolute; left:0; right:0; top:44px; bottom:0; width:100%; border:none; background:var(--navy); border-radius:0 0 12px 12px; }
#win.sheeting{ left:16px; right:232px; width:auto; top:16px; bottom:16px; }
#win.sheeting #winBody{ display:none; }
#win.sheeting #sheetFrame{ display:block; }
#sheetSub{ display:none; gap:6px; padding:8px 12px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
#win.arsenal.sheeting #sheetSub{ display:flex; }
#win.arsenal.sheeting #sheetFrame{ top:88px; }
.subtab{ border:1px solid var(--line2,#2a3552); background:transparent; color:var(--silver); font-family:Cinzel,serif; font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; padding:5px 11px; border-radius:6px; cursor:pointer; }
.subtab.on{ border-color:var(--gold); color:var(--gold); }
#lmstrip.hidden{ display:none; }
#lmstrip > *{ pointer-events:auto; }
.lm-topbar{ display:flex; align-items:center; gap:9px; margin-bottom:10px; background:rgba(10,14,26,.9); border:1px solid var(--line); border-radius:10px; padding:6px 10px; }
.lm-topbar .lm-head{ margin:0 4px; }
.lm-head{ font-family:Cinzel,serif; letter-spacing:.1em; font-size:.68rem; color:var(--gold); text-transform:uppercase; }
.lm-stage{ position:relative; display:flex; align-items:center; justify-content:center; gap:0; height:auto; width:min(92vw,700px); }
.lm-slot{ transition:transform .2s ease, opacity .2s ease; cursor:pointer; }
.lm-slot.center{ z-index:3; transform:scale(1); opacity:1; }
.lm-slot.left{ z-index:1; transform:scale(.72) translateX(22%); opacity:.32; }
.lm-slot.right{ z-index:1; transform:scale(.72) translateX(-22%); opacity:.32; }
#lmstrip.lm-scene .lm-slot.left, #lmstrip.lm-scene .lm-slot.right{ display:none; }   /* beats show one at a time; arrows and dots navigate */
.lm-nav{ width:30px; height:30px; flex:none; border-radius:50%; background:var(--navy3,#0c1424); border:1px solid var(--gold); color:var(--gold); font-size:1.15rem; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.lm-nav:active{ background:var(--gold); color:var(--navy); }
.lm-nav.l{ margin-right:2px; } .lm-nav.r{ margin-left:2px; }
.lm-nav-sp{ width:30px; flex:none; }
.lm-scenebtn{ font-family:Cinzel,serif; letter-spacing:.1em; font-size:.68rem; color:var(--gold); text-transform:uppercase; background:none; border:none; cursor:pointer; padding:2px 4px; }
.lm-scenebtn:hover{ text-shadow:0 0 8px rgba(201,168,76,.6); }
.lm-chev{ font-size:.6rem; }
.sd-list{ display:flex; flex-direction:column; gap:7px; margin-bottom:10px; }
.nb-scene{ font-family:Cinzel,serif; font-size:.86rem; color:var(--gold); letter-spacing:.06em; margin:12px 0 7px; }
.nb-beat{ border:1px solid var(--line); border-left-width:3px; border-radius:8px; padding:8px 11px; margin-bottom:7px; background:var(--navy2,#0e1526); }
.nb-beat.read{ border-left-color:var(--ice); } .nb-beat.check{ border-left-color:var(--gold); } .nb-beat.choice{ border-left-color:#ed93b1; }
.nb-tag{ font-family:Cinzel,serif; font-size:.56rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ice); opacity:.8; display:block; }
.nb-title{ font-family:Cinzel,serif; font-size:.88rem; color:var(--silver); display:block; margin:2px 0; }
.nb-body{ font-size:.84rem; color:var(--ice); line-height:1.45; }
.lb-row{ display:flex; justify-content:space-between; align-items:baseline; padding:6px 2px; border-bottom:1px solid rgba(220,232,239,.1); }
.lb-name{ font-family:Cinzel,serif; font-size:.84rem; color:var(--silver); }
.lb-meta{ font-size:.7rem; color:var(--muted); }
.sd-box{ background:var(--panel); border:2px solid var(--gold); border-radius:11px; padding:10px; display:flex; flex-direction:column; gap:7px; width:min(300px,86vw); max-height:52vh; overflow-y:auto; box-shadow:0 10px 34px rgba(0,0,0,.6); }
.sd-card{ display:flex; align-items:stretch; gap:0; border:1px solid var(--line); border-radius:8px; overflow:hidden; background:var(--navy2,#0e1526); }
.sd-card.on{ border-color:var(--gold); box-shadow:0 0 0 1px rgba(201,168,76,.35); }
.sd-main{ flex:1; display:flex; align-items:center; gap:9px; padding:7px 9px; cursor:pointer; text-align:left; min-width:0; }
.sd-thumb{ width:44px; height:32px; border-radius:5px; flex:none; background:linear-gradient(135deg,#4a5a6d,#2b3646); background-size:cover; background-position:center; }
.sd-thumb.sd-ph{ background:linear-gradient(135deg,#38506e,#1c2b45); }
.sd-name{ font-family:Cinzel,serif; font-size:.74rem; color:var(--silver); display:block; }
.sd-meta{ font-size:.62rem; color:var(--muted); display:block; }
.sd-main > span:nth-child(2){ flex:1; min-width:0; }
.sd-x{ width:28px; flex:none; color:var(--muted); font-size:.95rem; cursor:pointer; border-left:1px solid var(--line); }
.sd-x:hover{ color:#e0b0a4; }
.sd-new{ border:1px dashed var(--gold); border-radius:8px; color:var(--gold); font-family:Cinzel,serif; font-size:.66rem; letter-spacing:.08em; text-transform:uppercase; padding:8px 0; cursor:pointer; }
.lm-dots{ display:flex; gap:6px; margin-top:9px; justify-content:center; }
.lm-dot{ width:7px; height:7px; border-radius:50%; background:rgba(220,232,239,.3); cursor:pointer; }
.lm-dot.on{ background:var(--gold); }
.lmbtn{ border:1px solid var(--line); border-radius:6px; background:rgba(16,22,42,.9); color:var(--ice); font-family:Cinzel,serif; font-size:.6rem; letter-spacing:.08em; text-transform:uppercase; padding:5px 11px; cursor:pointer; }
.lmbtn.gold{ border-color:var(--gold); color:var(--gold); }
.lmbtn.sm{ font-size:.58rem; padding:5px 9px; margin-top:8px; width:100%; }
.lmbtn:active{ background:var(--navy3); }
/* the card itself. Solid for the LM, no see-through, it floats on the map. */
/* the clear zone each side control needs: HUD is 200 + 16 inset, plus a gap.
   A centered card is capped so its half never crosses into that zone. */
.lmcard{ background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:13px 15px; box-shadow:0 6px 24px rgba(0,0,0,.5); }
/* scene beat card: compact, hard-capped so it never leaves the screen; body scrolls within */
.lmcard.beat{ width:min(94vw, 560px); min-width:0; max-width:none; padding:10px 13px; height:min(20vh, 150px); display:flex; flex-direction:column; box-sizing:border-box; }
.lmcard.beat .lmc-body{ max-height:none; flex:1 1 auto; min-height:0; overflow-y:auto; font-size:.85rem; line-height:1.5; }
/* foe combat card, compact by default like the FateWell strip, expands on click */
.lmcard.foe, .lmcard.fell{ width:172px; cursor:pointer; }
.lmcard.foe.expanded, .lmcard.fell.expanded{ width:min(340px, calc(100vw - 160px)); max-height:44vh; overflow-y:auto; cursor:default; }
.lmcard.spotbox{ width:max-content; max-width:min(680px, calc(100vw - 160px)); max-height:44vh; overflow-y:auto; padding:10px 13px 12px; }
.lmc-spothead{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:8px; }
.lmc-spothead .lmbtn.sm2{ margin:0; width:auto; }
.lm-spotrow{ display:flex; gap:9px; align-items:flex-start; overflow-x:auto; }
.lm-spotslot{ position:relative; flex:0 0 auto; }
.lm-spotslot .lmc-mdot{ position:absolute; top:-4px; right:-4px; z-index:2; }
.lm-spotslot.open{ flex:0 0 auto; }
.lm-minidie{ margin-top:5px; }
.lm-minidie .lmc-dicerow{ margin-top:0; }
.lm-minidie .lmc-alab{ display:none; }
.lm-minidie .lmc-die{ width:24px; height:24px; font-size:.74rem; }
.lm-minidie .lmc-dieout{ font-size:.64rem; }
/* the minimized pill */
.lm-pill{ background:rgba(10,14,26,.94); border:1px solid var(--gold); border-radius:20px; color:var(--gold); font-family:Cinzel,serif; font-size:.66rem; letter-spacing:.1em; text-transform:uppercase; padding:8px 16px; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,.5); }
.lm-pill-arrow{ margin-left:6px; }
.lm-minbtn{ background:none; border:1px solid var(--line); border-radius:5px; color:var(--ice); width:22px; height:22px; line-height:1; cursor:pointer; font-size:.9rem; padding:0; }
.lm-minbtn:active{ background:var(--navy3); }
/* the map picker overlay */
#mapPicker{ position:fixed; inset:0; z-index:70; display:none; align-items:center; justify-content:center; background:rgba(4,7,14,.72); }
.mp-box{ width:min(680px,90vw); max-height:80vh; overflow-y:auto; background:var(--panel); border:2px solid var(--gold); border-radius:12px; padding:16px 18px; }
.mp-head{ display:flex; align-items:center; justify-content:space-between; font-family:Cinzel,serif; letter-spacing:.1em; font-size:.8rem; color:var(--gold); text-transform:uppercase; margin-bottom:14px; }
.mp-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
.mp-card{ background:var(--navy2,#0e1526); border:1px solid var(--line); border-radius:9px; padding:8px; cursor:pointer; text-align:left; transition:border-color .15s; }
.mp-card:hover{ border-color:var(--ice); }
.mp-card.on{ border-color:var(--gold); box-shadow:0 0 0 1px rgba(201,168,76,.4); }
.mp-thumb{ height:82px; border-radius:6px; margin-bottom:7px; background:linear-gradient(135deg,#4a5a6d,#2b3646); position:relative; overflow:hidden; }
.mp-thumb.mp-adventure{ background:linear-gradient(135deg,#5a6a7b,#38506e); }
.mp-thumb.mp-account{ background:linear-gradient(135deg,#3d6b58,#2a4a3d); }
.mp-thumb.mp-up{ background:var(--navy3,#0c1424); border:1px dashed var(--gold); display:flex; align-items:center; justify-content:center; }
.mp-thumb.mp-up span{ color:var(--gold); font-size:1.6rem; }
.mp-name{ font-family:Cinzel,serif; font-size:.76rem; color:var(--silver); }
.mp-meta{ font-size:.66rem; color:var(--muted); margin-top:2px; }
.mp-upload{ border-style:dashed; }
.mp-upload.drag{ border-color:var(--gold); background:rgba(201,168,76,.1); }
/* the token palette */
#tokPalette{ position:fixed; inset:0; z-index:70; display:none; align-items:center; justify-content:center; background:rgba(4,7,14,.72); }
.tp-box{ width:min(560px,90vw); max-height:82vh; overflow-y:auto; background:var(--panel); border:2px solid var(--gold); border-radius:12px; padding:16px 18px; }
.tp-head{ display:flex; align-items:center; justify-content:space-between; font-family:Cinzel,serif; letter-spacing:.1em; font-size:.8rem; color:var(--gold); text-transform:uppercase; margin-bottom:12px; }
.tp-sec{ margin-bottom:12px; }
.tp-lbl{ font-family:Cinzel,serif; font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ice); opacity:.85; margin-bottom:6px; }
.tp-row{ display:flex; flex-wrap:wrap; gap:8px; }
.tp-empty{ font-size:.74rem; color:var(--muted); }
.tp-chip{ display:flex; flex-direction:column; align-items:center; gap:5px; width:74px; padding:7px 5px; border:1px solid var(--line); border-radius:9px; background:var(--navy2,#0e1526); cursor:pointer; }
.tp-chip:hover{ border-color:var(--ice); }
.tp-face{ width:42px; height:42px; border-radius:50%; background-size:cover; background-position:center; display:flex; align-items:center; justify-content:center; font-family:Cinzel,serif; font-size:.86rem; color:#fff; border:2px solid rgba(0,0,0,.35); }
.tp-face.tp-foe{ background:var(--danger,#c96a5a); }
.tp-face.tp-p{ background:#37548d; }
.tp-face.tp-npc{ background:#5f5e5a; }
.tp-face.tp-up{ background:var(--navy3,#0c1424); border:1px dashed var(--gold); color:var(--gold); font-size:1.3rem; }
.tp-name{ font-size:.66rem; color:var(--silver); text-align:center; line-height:1.15; }
.tp-upload{ border-style:dashed; }
.tp-upload.drag{ border-color:var(--gold); background:rgba(201,168,76,.1); }
.lm-slot.left .lmcard, .lm-slot.right .lmcard{ overflow:hidden; }
/* compact foe card, the FateWell strip look */
.lmc-cname{ font-family:Cinzel,serif; font-size:.74rem; color:var(--silver); margin-bottom:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lmc-cbar{ height:4px; background:#0c1424; border-radius:3px; overflow:hidden; margin-bottom:5px; }
.lmc-cfill{ height:100%; background:var(--danger,#c96a5a); }
.lmc-cvit{ font-size:.72rem; color:var(--ice); margin-bottom:6px; }
.lmc-cpips{ display:flex; gap:5px; }
.lmc-cpip{ width:10px; height:10px; transform:rotate(45deg); border:1.5px solid var(--line2,#2a3550); background:#141d33; border-radius:2px; }
.lmc-cpip.lit{ background:var(--gold); border-color:var(--gold); box-shadow:0 0 6px rgba(201,168,76,.7); }
/* the tab row on the expanded card */
.lmc-tabs{ display:flex; gap:2px; margin:8px 0 10px; border-bottom:1px solid var(--line); }
.lmc-tab{ flex:1; font-family:Cinzel,serif; font-size:.58rem; letter-spacing:.06em; text-transform:uppercase; color:var(--ice); opacity:.6; padding:6px 2px; border-bottom:2px solid transparent; cursor:pointer; background:none; }
.lmc-tab.on{ opacity:1; color:var(--gold); border-bottom-color:var(--gold); }
.lmc-tabbody{ min-height:80px; }
.lmc-close{ background:none; border:none; color:var(--ice); font-size:1.1rem; cursor:pointer; line-height:1; padding:0 2px; }
.lmc-lbl{ font-family:Cinzel,serif; font-size:.58rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ice); opacity:.85; margin:9px 0 3px; }
.lmc-note{ font-size:.72rem; color:var(--muted); margin:2px 0 0; line-height:1.35; }
.lmc-attrs{ display:grid; grid-template-columns:1fr 1fr; gap:2px 14px; }
.lmc-arow{ display:flex; justify-content:space-between; font-size:.78rem; color:var(--ice); padding:2px 0; border-bottom:1px solid rgba(220,232,239,.08); }
.lmc-arow b{ color:var(--silver); }
.lmc-kit{ position:relative; padding:4px 8px; margin:3px 0; border:1px solid var(--line); border-radius:7px; background:var(--navy2,#0e1526); }
.lmc-kn{ font-weight:600; color:var(--silver); font-size:.82rem; }
.lmc-kt{ margin-left:7px; font-size:.68rem; color:var(--ice); }
.lmc-why{ float:right; font-family:Cinzel,serif; font-size:.54rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
.lmc-ke{ font-size:.74rem; color:var(--muted); margin-top:2px; line-height:1.35; }
.lmc-kit.gray{ opacity:.4; filter:grayscale(.7); }
.lmc-kit.gray .lmc-kn{ color:var(--ice); }
.lmc-to{ color:var(--gold); }
.lmc-reactrow{ display:flex; align-items:center; gap:6px; margin-top:9px; }
.lmc-rsel{ flex:1; min-width:0; background:#0b1020; border:1px solid var(--line); border-radius:5px; color:var(--silver); font:inherit; font-size:.76rem; padding:3px 6px; }
.lmc-reactspent{ font-size:.74rem; color:var(--ice); margin-top:9px; }
.lmc-ropts{ font-size:.72rem; color:var(--muted); margin-top:9px; line-height:1.35; }
.lmbtn.sm2{ font-size:.56rem; padding:4px 9px; white-space:nowrap; }
.lm-link{ color:var(--gold); text-decoration:underline; background:none; border:none; cursor:pointer; font:inherit; font-size:.72rem; }
/* spotlight members inside the gold box, stacked */
.lm-spotmember{ padding:9px 0; border-bottom:1px solid rgba(220,232,239,.1); }
.lm-spotmember:last-of-type{ border-bottom:none; }
.lm-spotmember.foe .lmc-name{ color:#e0b0a4; }
.lm-spotmember.fell .lmc-name{ color:#a9c2ea; }
/* foe dice */
.lmc-dicerow{ display:flex; align-items:center; gap:8px; margin-top:7px; }
.lmc-die{ width:30px; height:30px; border:1.5px solid var(--gold); border-radius:6px; background:var(--navy3,#0c1424); color:var(--gold); font-family:Cinzel,serif; font-size:.9rem; cursor:pointer; }
.lmc-die.fell{ background:var(--gold); color:var(--navy); box-shadow:0 0 10px rgba(201,168,76,.7); }
.lmc-die.strike{ background:var(--danger,#c96a5a); color:#fff; border-color:var(--danger,#c96a5a); }
.lmc-dieout{ font-size:.76rem; color:var(--ice); }
.lmc-eva{ font-size:.76rem; color:var(--ice); margin-top:5px; }
.lmc-wait{ color:var(--muted); font-style:italic; }
.lmc-hit{ color:var(--danger,#c96a5a); }
.lmc-miss{ color:var(--ice); }
/* manual grouping dot */
.lmc-mdot{ position:absolute; top:6px; right:6px; width:20px; height:20px; border:none; background:none; color:var(--muted); font-size:.9rem; cursor:pointer; padding:0; }
.lmc-mdot.on{ color:var(--gold); text-shadow:0 0 8px rgba(201,168,76,.8); }
.lmcard.compact{ position:relative; }
.lmc-mdot.inline{ position:static; width:auto; margin-right:6px; vertical-align:middle; }
.lmcard.beat.read{ border-left:3px solid var(--ice); }
.lmcard.beat.check{ border-left:3px solid var(--gold); }
.lmcard.beat.choice{ border-left:3px solid #ed93b1; }
.lmcard.foe{ border-color:rgba(201,106,90,.55); }
.lmcard.fell{ border-color:rgba(120,160,220,.6); }
.lmcard.locked{ opacity:.9; }
/* the Spotlight gold box, the group wrapper made literal */
.lmcard.spotbox{ border:2px solid var(--gold); box-shadow:0 0 0 1px rgba(201,168,76,.25), 0 6px 24px rgba(0,0,0,.5); }
.lmcard.spotbox.done{ opacity:.5; }
.lmc-tag{ font-family:Cinzel,serif; font-size:.56rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ice); opacity:.8; margin-bottom:5px; }
.lmc-spotnum{ font-family:Cinzel,serif; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
.lmc-title{ font-family:Cinzel,serif; font-size:.98rem; color:var(--silver); margin-bottom:6px; }
.lmc-body{ font-size:.9rem; color:var(--ice); line-height:1.45; }
.lmc-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.lmc-name{ font-family:Cinzel,serif; font-size:.92rem; color:var(--silver); }
.lmc-sd{ font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ice); opacity:.7; }
.lmc-vit{ font-family:Cinzel,serif; font-size:.84rem; color:var(--silver); display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.lmc-dmg{ font-family:Cinzel,serif; font-size:.98rem; color:var(--gold); margin:4px 0; }
.lmc-acc{ display:block; font-family:'Crimson Pro',serif; font-size:.72rem; color:var(--ice); letter-spacing:0; text-transform:none; }
.lmc-act{ font-size:.82rem; color:var(--silver); margin-top:6px; }
.lmc-act.commit{ display:flex; align-items:center; gap:6px; }
.lmc-alab{ font-family:Cinzel,serif; font-size:.56rem; letter-spacing:.1em; text-transform:uppercase; color:var(--ice); opacity:.7; margin-right:6px; }
.lmc-actin{ flex:1; min-width:0; background:#0b1020; border:1px solid var(--line); border-radius:5px; color:var(--silver); font:inherit; font-size:.8rem; padding:4px 7px; }
.lmc-pips{ display:inline-flex; align-items:center; gap:4px; }
.lmc-pip{ width:13px; height:13px; transform:rotate(45deg); border:1.5px solid var(--line2,#2a3550); background:#141d33; border-radius:2px; padding:0; cursor:pointer; }
.lmc-pip.lit{ background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px rgba(201,168,76,.75); }
.lmc-step{ width:20px; height:20px; border:1px solid var(--line2,#2a3550); border-radius:5px; background:var(--navy3); color:var(--silver); font-size:.9rem; line-height:1; cursor:pointer; padding:0; }
.lmc-step:active{ background:var(--gold); color:var(--navy); }
.lmc-nocharge{ font-size:.68rem; color:var(--muted); }
.lm-empty{ color:var(--muted); font-size:.86rem; padding:16px; background:rgba(10,14,26,.82); border-radius:9px; }
#lmbar{ position:fixed; left:16px; top:288px; z-index:60; width:212px; background:rgba(10,14,26,.94); border:1px solid var(--line); border-radius:8px; padding:9px 11px; }
#lmbar.hidden{ display:none; }
#lmbar .lmh{ font-family:Cinzel,serif; font-size:.66rem; letter-spacing:.14em; color:var(--gold); margin-bottom:7px; }
#lmbar .lmrow{ display:flex; align-items:center; gap:7px; margin:5px 0; font-size:.68rem; color:var(--ice); }
#lmbar .lmrow label{ width:44px; flex:none; }
#lmbar .lmrow input{ flex:1; min-width:0; height:3px; accent-color:var(--gold); }
#lmbar .lmrow span{ width:32px; flex:none; text-align:right; font-family:Cinzel,serif; color:var(--silver); }
#devbar{ position:fixed; left:16px; top:16px; display:flex; flex-direction:column; gap:6px; z-index:60; width:170px; background:rgba(10,14,26,.94); border:1px solid var(--gold); border-radius:8px; padding:9px 10px; }
#devbar .dvh{ font-family:Cinzel,serif; font-size:.6rem; letter-spacing:.14em; color:var(--gold); text-transform:uppercase; margin-bottom:2px; }
#devbar button{ background:#0b1220; border:1px solid var(--line); border-radius:6px; color:var(--ice); font-size:.72rem; padding:6px 9px; text-align:left; }
#devbar button:active{ background:var(--navy3); }

#mhud,#mrail{ display:none; }

@media (max-width:700px){
  #log,#rail,#hud,#devbar,#lmbar{ display:none; }
  #tray{ left:10px; bottom:68px; transition:bottom .22s ease; }
  #tray.drawerup{ bottom:calc(52vh + 68px); }
  #dieSlot{ width:54px; height:54px; }
  .dieflight{ width:54px; height:54px; margin:-27px 0 0 -27px; }
  .diefx{ width:54px; height:54px; margin:-27px 0 0 -27px; }
  .cube{ width:54px; height:54px; }
  .cube .f1{ transform:translateZ(27px); }
  .cube .f6{ transform:rotateY(180deg) translateZ(27px); }
  .cube .f2{ transform:rotateY(90deg) translateZ(27px); }
  .cube .f5{ transform:rotateY(-90deg) translateZ(27px); }
  .cube .f3{ transform:rotateX(90deg) translateZ(27px); }
  .cube .f4{ transform:rotateX(-90deg) translateZ(27px); }
  .tpick{ bottom:68px; }
  #flourish{ bottom:132px; left:10px; right:10px; transform:translate(0,16px); white-space:normal; flex-wrap:wrap; padding:8px 12px; font-size:.8rem; gap:7px; }
  #flourish.show{ transform:translate(0,0); }
  #flourish .fdie,#flourish .ftot{ font-size:1.2rem; }
  #win{ top:56px; bottom:60px; left:0; right:0; width:auto; border-left:none; border-right:none; border-radius:0; }
  #mhud{ position:fixed; top:0; left:0; right:0; height:56px; display:flex; align-items:center; gap:8px; padding:0 10px; background:rgba(10,14,26,.94); border-bottom:1px solid var(--gold); z-index:40; }
  #mhud .portrait{ width:38px; height:38px; border-radius:50%; border:2px solid var(--gold); background:#37548d; }
  #mhud .mid{ flex:1; min-width:0; }
  #mhud .pname{ font-family:Cinzel,serif; font-size:.78rem; }
  #mhud .psub{ font-size:.68rem; color:var(--ice); }
  #mhud .gem{ width:36px; height:36px; }
  #mhud .gem span{ font-size:.72rem; }
  #mhud #mlog{ border:1px solid var(--gold); border-radius:5px; color:var(--gold); font-family:Cinzel,serif; font-size:.6rem; letter-spacing:.1em; padding:5px 7px; flex:none; }
  #fellmark{ display:none; }
  #fellmarkM{ display:block; width:38px; height:38px; flex:none; }
  #mrail{ position:fixed; bottom:0; left:0; right:0; height:60px; display:grid; grid-template-columns:repeat(5,1fr); background:rgba(10,14,26,.96); border-top:1px solid var(--gold); z-index:40; }
  #mrail button{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:.62rem; color:var(--ice); letter-spacing:.04em; }
  #mrail .ico{ width:20px; height:20px; transform:rotate(45deg); border:1.5px solid var(--gold); border-radius:4px; background:#1c2b52; }
  #mrail button.lit{ color:#fff; } #mrail button.lit .ico{ background:#1e3f8f; border-color:#9fc3ff; box-shadow:0 0 10px rgba(60,110,220,.6); }
  #drawer{ display:block; position:fixed; left:0; right:0; bottom:60px; height:52vh; background:#141020; border-top:2px solid var(--danger); border-radius:14px 14px 0 0; transform:translateY(calc(100% - 44px)); transition:transform .22s ease; z-index:45; }
  #drawer.up{ transform:translateY(0); }
  #drawer.hidden{ display:none; }
  #drawer .handle{ width:44px; height:4px; border-radius:2px; background:var(--muted); margin:7px auto; }
  #drawer .dhead{ display:flex; justify-content:space-between; align-items:center; padding:0 14px 8px; font-size:.8rem; color:var(--ice); }
  #drawer .dbody{ padding:0 14px; overflow-y:auto; height:calc(100% - 60px); }
}
</style>
</head>
<body>
<button id="cleanExit" onclick="toggleClean()" title="Show the widgets">Show widgets</button>
<div id="stage">
  <div id="map">
    <div id="mapLayer">
      <div id="mapArt"></div>
  <input type="file" id="mapFileInput" accept="image/*" style="display:none" onchange="lmMapFilePicked(this)">
  <input type="file" id="tokFileInput" accept="image/*" style="display:none" onchange="lmTokenFilePicked(this)">
      <svg id="grid" xmlns="http://www.w3.org/2000/svg"></svg>

/* ---- the camera ----
   Local to this viewer and deliberately outside S. The LoreMaster decides what
   lives on the map, every viewer decides where they stand. applyRemoteState only
   ever writes into S, so sync physically cannot reach cam. That is the wall. */
var cam = { zoom:1, x:0, y:0 };
/* who you are touching is a fact about your screen, not about the board, so
   selection sits out here with the camera and never syncs either. */
var sel = null;
var ZMIN = 0.2, ZMAX = 4;
function clamp(v, a, b){ return v < a ? a : v > b ? b : v; }
function mapEl(){ return document.getElementById('map'); }
function applyCam(){
  document.getElementById('mapLayer').style.transform =
    'translate(' + cam.x + 'px,' + cam.y + 'px) scale(' + cam.zoom + ')';
  if (typeof placeTokMenu === 'function') placeTokMenu();
}
function clampCam(){
  var r = mapEl().getBoundingClientRect();
  var mw = S.map.w * cam.zoom, mh = S.map.h * cam.zoom;
  cam.x = mw <= r.width  ? (r.width - mw) / 2  : clamp(cam.x, r.width - mw, 0);
  cam.y = mh <= r.height ? (r.height - mh) / 2 : clamp(cam.y, r.height - mh, 0);
}
function toMap(sx, sy){
  var r = mapEl().getBoundingClientRect();
  return { x:(sx - r.left - cam.x) / cam.zoom, y:(sy - r.top - cam.y) / cam.zoom };
}
function zoomAt(sx, sy, factor){
  var r = mapEl().getBoundingClientRect(), px = sx - r.left, py = sy - r.top;
  var z = clamp(cam.zoom * factor, ZMIN, ZMAX), k = z / cam.zoom;
  cam.x = px - (px - cam.x) * k;
  cam.y = py - (py - cam.y) * k;
  cam.zoom = z;
  clampCam(); applyCam();
}
function fitCam(){
  var r = mapEl().getBoundingClientRect();
  cam.zoom = clamp(Math.min(r.width / S.map.w, r.height / S.map.h), ZMIN, ZMAX);
  clampCam(); applyCam();
}

/* ---- the stub rules engine ----
   Placeholder only. ThreadSpire never owns this math. The engine resolves a
   roll and returns the breakdown, the view renders what it is handed. Phase
   four wires the real bridge and this whole block is deleted, not extended.
   The numbers below are a fake sheet standing in for the real one. */
var STUB_MODS = {
  attack:  [['Precision',3], ['Finesse',2]],
  evade:   [['Precision',3], ['Movement',1]],
  skill:   [['Precision',3], ['Trickery',1]],
  generic: []
};
function stubResolve(rollType, n){
  var mods = (STUB_MODS[rollType] || []).map(function(m){ return { label:m[0], value:m[1] }; });
  var total = mods.reduce(function(a, m){ return a + m.value; }, n);
  return { kind:'roll', who:S.character.name, rollType:rollType, n:n, mods:mods, total:total,
    skin:skinKey(rollType, S.character.name) };
}

/* ---- the seam ---- */
/* ---- the adventure spine ----
   The portable module FateWell authors and hands over: Act, then Session, then Scene,
   the same shape FateWell holds. S.scene always points at the active scene, so the rest
   of the runtime keeps reading S.scene unchanged. Switching a scene repoints S.scene and
   restores that scene's board through its own private binding. Stages never live here. */
function tsMakeScene(id, name){
  return {
    name: name, id: id, combatPhase: null, background: null,
    maps: S.scene.maps,            /* the map pack is module content, shared across scenes */
    spotMode: 'auto', manual: {}, spotOrder: [], activeSpot: 0,
    beats: [], foes: [], fell: S.scene.fell, npcs: []
  };
}
S.adventure = {
  name: 'The Silent Beacon',
  activeSceneId: S.scene.id,
  acts: [
    { id:'act-1', name:'Act I, The Gathering Dark', sessions:[
      { id:'ses-1', name:'Session 1', scenes:[
        tsMakeScene('sc-approach', 'The Long Approach'),
        S.scene,                                  /* sc-beacon, the authored active scene */
        tsMakeScene('sc-undercroft', 'The Undercroft')
      ] }
    ] }
  ]
};
/* each scene keeps its own private binding, so its stages come back when you return */
S.instance.bindings['sc-approach']   = S.instance.bindings['sc-approach']   || { stageIds:[], activeStageId:null };
S.instance.bindings['sc-undercroft'] = S.instance.bindings['sc-undercroft'] || { stageIds:['st-undercroft'], activeStageId:'st-undercroft' };

function tsScenes(){
  var out=[];
  (S.adventure.acts||[]).forEach(function(a){ (a.sessions||[]).forEach(function(se){ (se.scenes||[]).forEach(function(sc){ out.push({ act:a, ses:se, scene:sc }); }); }); });
  return out;
}
function tsSceneById(id){ var r=null; tsScenes().forEach(function(x){ if(x.scene.id===id) r=x; }); return r; }
function setActiveScene(id){
  if (S.scene.id === id){ closeWin(); return; }
  if (isLM()) lmSaveCurrentStage();               /* the scene you leave keeps its board */
  var hit = tsSceneById(id); if (!hit) return;
  S.scene = hit.scene;
  S.adventure.activeSceneId = id;
  var bd = sceneBinding();
  var st = bd.activeStageId ? stageById(bd.activeStageId) : null;
  if (st) stageRestore(st);                        /* restore returns this scene's board and syncs */
  else applyRemoteState({ scene:S.scene, adventure:S.adventure, instance:S.instance });
  pushLog({ kind:'sys', html:'Scene set to <b>' + esc(S.scene.name) + '</b>.' });
  applyRemoteState({ log:S.log });
  closeWin();
}
/* the scene picker window, grouped down the spine */
function scenesBody(){
  var h = '<div class="win-note">The adventure\u2019s spine. Pick the scene you are running. Each scene keeps its own stages.</div>';
  (S.adventure.acts||[]).forEach(function(a){
    h += '<div class="nb-scene">' + esc(a.name) + '</div>';
    (a.sessions||[]).forEach(function(se){
      h += '<div style="font-family:Cinzel,serif;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted,#7e8a99);margin:6px 0 3px">' + esc(se.name) + '</div>';
      (se.scenes||[]).forEach(function(sc){
        var on = sc.id === S.scene.id;
        h += '<button onclick="setActiveScene(\'' + sc.id + '\')" style="display:block;width:100%;text-align:left;padding:9px 11px;margin:4px 0;border-radius:8px;border:1px solid ' + (on?'var(--gold)':'var(--line2,#2a3552)') + ';background:' + (on?'rgba(201,168,76,.12)':'transparent') + ';color:var(--silver);font:inherit;cursor:pointer">' + esc(sc.name) + (on?' <span style="color:var(--gold);font-size:.7rem;letter-spacing:.08em">running</span>':'') + '</button>';
      });
    });
  });
  return h;
}

function applyRemoteState(patch){
  Object.keys(patch).forEach(function(k){ S[k] = patch[k]; });
  render();
  var last = S.log[S.log.length - 1];
  if (last && last.kind === 'roll' && last.id !== flourishedId){
    flourishedId = last.id;
    throwFor(last);
    /* the readout spells out your own maths only, everyone else gets a name tag */
    if (last.who === S.character.name) flourish(last);
  }
}
function send(evt){
  /* stub transport, echoes shared state back as remote truth. Latency varies by
     kind for the same reason a real one would, a slider cannot wait on a round trip. */
  var live = evt.type === 'grid' || evt.type === 'inset' || evt.type === 'token-label';
  setTimeout(function(){
    if (evt.type === 'token-move'){
      S.tokens.forEach(function(t){ if (t.id === evt.id){ t.x = evt.x; t.y = evt.y; } });
      applyRemoteState({ tokens: S.tokens });
    }
    if (evt.type === 'token-size'){
      S.tokens.forEach(function(t){ if (t.id === evt.id){ t.cells = evt.cells; } });
      applyRemoteState({ tokens: S.tokens });
    }
    if (evt.type === 'token-label'){
      S.tokens.forEach(function(t){ if (t.id === evt.id){ t.label = evt.label; } });
      applyRemoteState({ tokens: S.tokens });
    }
    if (evt.type === 'token-remove'){
      S.tokens = S.tokens.filter(function(t){ return t.id !== evt.id; });
      applyRemoteState({ tokens: S.tokens });
      if (typeof lmSaveCurrentStage === 'function' && isLM()) lmSaveCurrentStage();
    }
    if (evt.type === 'grid'){ applyRemoteState({ grid: evt.grid }); }
    if (evt.type === 'inset'){ applyRemoteState({ inset: evt.inset }); }
    if (evt.type === 'declare'){ pushLog({ kind:'sys', html:'<b>' + esc(S.character.name) + '</b> declares ' + esc(evt.act) + '.' }); }
    if (evt.type === 'say'){ pushLog({ kind:'say', who:S.character.name, text:evt.text }); }
    if (evt.type === 'roll'){ pushLog(stubResolve(evt.rollType, evt.n)); }
    pushState();
  }, live ? 0 : 120);
}

var BEAT_TYPES = {
  readaloud:['Read-aloud','#6fc7c0'], dialogue:['Dialogue','#86c79b'], crucible:['Crucible','#d98a6a'],

function beatMeta(kind){ return BEAT_TYPES[kind] || ['Note','#8fa0b3']; }
function notesBody(){

function libraryBody(){
  var h = '<div class="win-note">The library: everything the adventure brings to the table.</div>';
  function group(title, list, line){

/* ---- dice ----
   Two layers, kept apart on purpose. rollFromTray owns the result and sends it

var ROLL_TYPES = { attack:'Attack', evade:'Evade', skill:'Skill', generic:'Generic' };
var PIPS = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
var REST = { 1:[0,0], 2:[0,-90], 3:[-90,0], 4:[90,0], 5:[0,90], 6:[0,180] };
/* A skin is a texture swap and nothing more. Skins are earned in game, so they
   live on the Fell and they travel. Every roll carries the skin it was thrown
   with, which is what lets the rest of the table see what you unlocked instead
   of taking your word for it. Placeholder names, Joel and Nate own the real ones. */
var DICE_SKINS = {
  emberglass: { bg:'linear-gradient(160deg,#3d1a22,#170a10)', pip:'#f0b49c' },
  frostvein:  { bg:'linear-gradient(160deg,#16304a,#081420)', pip:'#b8ccd8' },
  loamcut:    { bg:'linear-gradient(160deg,#271c3e,#0f0a1c)', pip:'#c6b2ea' },
  plainstone: { bg:'linear-gradient(160deg,#1b2440,#0b101f)', pip:'#dce8ef' },
  boneash:    { bg:'linear-gradient(160deg,#2a2622,#14110e)', pip:'#c9a84c' }
};
function skinFor(type, who){
  var owner = (!who || who === S.character.name) ? S.character : (S.party || {})[who];
  return DICE_SKINS[((owner || {}).diceSkins || {})[type]] || DICE_SKINS.plainstone;
}
function skinKey(type, who){
  var owner = (!who || who === S.character.name) ? S.character : (S.party || {})[who];
  return ((owner || {}).diceSkins || {})[type] || 'plainstone';
}
var spins = 0, tumbleEnds = 0;

function paintCube(c, skin){
  var h = '';
  c.style.setProperty('--pip', skin.pip);
  for (var n = 1; n <= 6; n++){
    var cells = '';
    for (var i = 0; i < 9; i++) cells += '<i' + (PIPS[n].indexOf(i) >= 0 ? ' class="on"' : '') + '></i>';
    h += '<div class="face f' + n + '" style="background:' + skin.bg + '">' + cells + '</div>';
  }

}
/* the socket die, which is only ever your own and only ever shows your skin */
function buildCube(type){
  paintCube(document.getElementById('restCube'), skinFor(type || S.rollType));
  aimCube(document.getElementById('restCube'), 1, true);
}
function aimCube(c, n, instant){
  var r = REST[n];
  if (instant){ c.style.transition = 'none'; }
  spins += 2;
  c.style.transform = 'rotateX(' + (spins*360 + r[0]) + 'deg) rotateY(' + (spins*360 + r[1]) + 'deg)';
  if (instant){ void c.offsetWidth; c.style.transition = ''; }
}
var flourishT = null, flourishedId = 0;
function flourish(e){

  clearTimeout(flourishT);

    var f = document.getElementById('flourish');

      + '<span class="fdie">' + e.n + '</span>' + mods + tot + note;
    void f.offsetWidth;
    f.classList.add('show');

/* ---- the throw ----
   Screen space, so it lands the same for everyone no matter where their camera is.
   Choreography only. The number is decided elsewhere and arrives as remote truth,
   this is only told what to carry. Nothing here may ever pick a face.
   Every roll at the table throws, not only your own. That is the point of earning
   a skin. Your die leaves your socket and returns to it, everyone else's arcs in
   from the edge and fades where it lands, wearing whatever they unlocked. */
var FLIGHT = 900, HOLD = 2000, HOME = 420;
var myDice = 0, dieHome = true, booted = false;

function slotCentre(){
  var r = document.getElementById('dieSlot').getBoundingClientRect();
  return { x:r.left + r.width / 2, y:r.top + r.height / 2 };
}
/* The table, minus the furniture. Two randoms averaged give a centre bias, so it
   scatters like a thrown die instead of drifting to the edges or repeating a spot. */
function landSpot(){
  var r = mapEl().getBoundingClientRect(), m = isMobile();
  var x0 = r.left + (m ? 30 : 250), x1 = r.left + r.width - (m ? 30 : 286);
  var y0 = r.top + (m ? 86 : 58), y1 = r.top + r.height - (m ? 116 : 152);
  if (x1 <= x0 || y1 <= y0) return { x:r.left + r.width / 2, y:r.top + r.height / 2 };
  function pick(a, b){ return a + (b - a) * ((Math.random() + Math.random()) / 2); }
  return { x:pick(x0, x1), y:pick(y0, y1) };
}
/* one long arc, then two decaying bounces off the table */
function hop(p){
  if (p < 0.70) return Math.sin((p / 0.70) * Math.PI) * 168;
  if (p < 0.89) return Math.sin(((p - 0.70) / 0.19) * Math.PI) * 38;
  return Math.sin(((p - 0.89) / 0.11) * Math.PI) * 10;
}
function easeOut(p){ return 1 - Math.pow(1 - p, 3); }
function makeDie(skin, tag){
  var el = document.createElement('div');
  el.className = 'dieflight';
  el.innerHTML = '<div class="diefx"><i></i><i></i><i></i><b></b></div>'
    + '<div class="dieshake"><div class="cube"></div></div>'
    + (tag ? '<div class="dietag">' + esc(tag) + '</div>' : '');

  document.getElementById('dieField').appendChild(el);
  return el;
}
function throwFor(e){
  var mine = e.who === S.character.name;
  var skin = DICE_SKINS[e.skin] || skinFor(e.rollType, e.who);
  /* work out the throw before anything reaches the DOM, so a bad measurement
     cannot strand a die on the table with nothing to animate it */
  var to = landSpot();
  var from = mine ? slotCentre() : { x:to.x, y:mapEl().getBoundingClientRect().top - 70 };
  var el = makeDie(skin, mine ? '' : e.who);
  var cube = el.querySelector('.cube');
  el.style.left = from.x + 'px'; el.style.top = from.y + 'px';
  el.style.opacity = '1'; el.style.transform = 'translate(0px,0px) scale(1)';
  if (mine){
    myDice++;
    dieHome = false;
    tumbleEnds = Date.now() + FLIGHT;
    document.getElementById('restCube').classList.add('away');
    document.getElementById('dieSlot').classList.add('empty');
  }
  aimCube(cube, e.n);
  var dx = to.x - from.x, dy = to.y - from.y, t0 = performance.now();
  (function frame(now){
    var p = Math.min(1, (now - t0) / FLIGHT), q = easeOut(p);
    el.style.transform = 'translate(' + (dx * q) + 'px,' + (dy * q - hop(p)) + 'px) scale('
      + (1 + 0.28 * Math.sin(p * Math.PI)) + ')';
    if (p < 1) requestAnimationFrame(frame);
  })(t0);

  setTimeout(function(){
    if (e.n === 6 || e.n === 1){
      var kind = e.n === 6 ? 'mark' : 'strike';
      el.querySelector('.diefx').className = 'diefx ' + kind;
      el.querySelector('.dieshake').className = 'dieshake ' + kind;
      cube.classList.add(kind);
      if (e.n === 6) cube.style.setProperty('--pip', '#f6e3a6');
    }
  }, FLIGHT);
  /* sit, then leave. Yours shrinks back into its socket, everyone else's lifts and fades. */
  setTimeout(function(){
    el.classList.add('home');
    el.style.transform = mine
      ? 'translate(' + (dx * 0.18) + 'px,' + (dy * 0.18 - 26) + 'px) scale(0.3)'
      : 'translate(' + dx + 'px,' + (dy - 26) + 'px) scale(0.85)';
    el.style.opacity = '0';
  }, FLIGHT + HOLD);
  setTimeout(function(){
    el.remove();
    if (mine && --myDice === 0){
      dieHome = true;
      document.getElementById('restCube').classList.remove('away');
      document.getElementById('dieSlot').classList.remove('empty');
      buildCube(S.rollType);
    }
  }, FLIGHT + HOLD + HOME);
}

/* ---- the LoreMaster card strip ----

function isLM(){ return S.role === 'lm'; }

var lmFocus = { scene:0, commit:0, resolve:0 };

function lmStripHtml(){

function foeDiceRow(f){

    + '<span class="lmc-dieout" id="tsDieOut-' + f.id + '">' + (f._roll ? foeRollTag(f) : '') + '</span></div>'

function foeRollTag(f){

/* auto evasion, matching fwEvaRow. Shows only when this foe's act targets a Fell.
   Before the die is thrown it waits; after, accuracy meets the Fell's Evasion. */
function evaRow(f){
  if (!(f.act && f.target)) return '';
  var tgt = null; S.scene.fell.forEach(function(p){ if(p.id===f.target) tgt=p; });
  if (!tgt) return '';
  var eva = (tgt.attrs && tgt.attrs.Evasion) || 0;

    + '<span class="lmc-wait">waiting on the roll vs ' + esc(tgt.name) + ' (Evasion ' + eva + ')</span></div>';
  var prec = (f.attrs && f.attrs.Precision) || 0;
  var acc = f._roll + prec;
  var hit = acc >= eva;

    + 'accuracy ' + acc + ' vs Evasion ' + eva + ' \u00b7 '
    + '<b class="' + (hit?'lmc-hit':'lmc-miss') + '">' + (hit?'Hit':'Evaded') + '</b></div>';

function lmFoeRoll(id){

    if (tgt){ var eva=(tgt.attrs&&tgt.attrs.Evasion)||0, acc=f._roll+prec;

/* the Spotlight gold box, matching the FateWell runner: compact cards side by side,

function spotGroupCard(it){

    var c = n.ref, isFoe = n.kind==='foe';
    if (lmExpanded === c.id){
      return '<div class="lm-spotslot open">' + (isFoe ? foeCardOpen(c) : fellCardOpen(c)) + '</div>';
    }
    var mtog = manual ? '<button class="lmc-mdot' + (S.scene.manual[n.key]?' on':'') + '" onclick="event.stopPropagation();lmToggleManual(\'' + n.key + '\')" title="Group into the spotlight">\u25c9</button>' : '';
    var mini = isFoe ? foeCardCompact(c) : fellCardCompact(c);
    /* a small die on the compact face so a foe can roll without opening */
    var die = isFoe ? '<div class="lm-minidie">' + foeDiceRow(c) + '</div>' : '';
    return '<div class="lm-spotslot">' + mtog + mini + die + '</div>';
  }).join('');
  return '<div class="lmcard spotbox' + (done?' done':'') + '">'
    + '<div class="lmc-spothead"><span class="lmc-spotnum">' + esc(it.label) + '</span>'
    + '<button class="lmbtn sm2" onclick="lmResolveGroup(\'' + it.id + '\')">' + (done?'Resolved':'Resolve') + '</button></div>'
    + '<div class="lm-spotrow">' + inner + '</div></div>';
}
function lmResolveGroup(id){
  var it = buildSpotlights().filter(function(x){ return x.id===id; })[0];
  if (!it) return;
  var done = spotResolved(it);
  it.nodes.forEach(function(n){ n.ref.spot = done ? null : 'done'; });
  applyRemoteState({ scene:S.scene });
}
function cardFor(item){
  if (item.kind === 'beat') return beatCard(item.data);
  if (item.kind === 'foe') return foeCard(item.data);
  if (item.kind === 'fell') return fellCard(item.data);
  if (item.kind === 'spotgroup') return spotGroupCard(item.data);
  return '';
}
function lmStep(d){
  var f = lmFace(), deck = lmDeck();
  lmFocus[f] = Math.max(0, Math.min((lmFocus[f] || 0) + d, deck.length - 1));
  paintLmStrip();
}
function lmGoTo(i){ lmFocus[lmFace()] = i; paintLmStrip(); }
window.addEventListener('keydown', function(e){
  if (!isLM()) return;
  if (e.key === 'ArrowLeft') lmStep(-1);
  if (e.key === 'ArrowRight') lmStep(1);

function tsRating(sr){ return TS_RATING[sr] || TS_RATING.Elite; }

function foeTabBody(f, tab){

  if (tab === 'attack'){
    return '<div class="lmc-dmg">' + d.base + ' + ' + d.bonus + ' ' + d.type
      + '<span class="lmc-acc">' + esc(d.acc) + ' to hit</span></div>'

      + (minion ? '' : ' Landing it charges the first tier.') + '</div>';

  if (tab === 'acts'){
    var h = '', acts = (f.acts || []).slice().sort(function(a,b){ return (a.tier||0)-(b.tier||0); });

    if (minion) h += '<div class="lmc-note">A Minion brings only its Standard Attack.</div>';
    if (!acts.length && !minion) h += '<div class="lmc-note">No Acts forged.</div>';
    acts.forEach(function(a){
      var t = a.tier || 0, beyond = t > ceil, locked = !beyond && !minion && t > ch;
      var gray = beyond || locked || (minion && t > 0);
      var why = (beyond || minion) ? 'beyond rating' : (locked ? 'needs charge ' + t : '');
      h += '<div class="lmc-kit' + (gray ? ' gray' : '') + '"><span class="lmc-kn">' + esc(a.name) + '</span>'
         + '<span class="lmc-kt">Tier ' + t + '</span>' + (why ? '<span class="lmc-why">' + why + '</span>' : '')

    if (f.stance) h += '<div class="lmc-lbl">Stance</div><div class="lmc-kit"><span class="lmc-kn">' + esc(f.stance) + '</span></div>';
    if (f.sig) h += '<div class="lmc-lbl">Afflictions</div><div class="lmc-kit"><span class="lmc-kn">' + esc(f.sig) + '</span><span class="lmc-kt">on Fellmark, signature</span></div>';

/* once acts lock, each committed act becomes a Spotlight, wrapped in a gold box.
   The LM swipes through them and resolves one at a time. */
function battleNodes(){
  return S.scene.foes.map(function(c){ return { key:'f:'+c.id, kind:'foe', ref:c }; })
    .concat(S.scene.fell.map(function(c){ return { key:'p:'+c.id, kind:'fell', ref:c }; }));
}
function focusGraph(){
  var nodes = battleNodes(), byKey = {};
  nodes.forEach(function(n){ byKey[n.key]=n; n.focus=0; });
  var edges = [];
  nodes.forEach(function(n){
    var tgt = n.ref.target;
    var tk = tgt ? (S.scene.foes.some(function(f){return f.id===tgt;}) ? 'f:'+tgt : 'p:'+tgt) : null;
    if (n.ref.act && tk && byKey[tk]){ edges.push([n.key, tk]); byKey[n.key].focus++; byKey[tk].focus++; }
  });
  var inEdge = {}; edges.forEach(function(e){ inEdge[e[0]]=true; inEdge[e[1]]=true; });
  var parent = {}; nodes.forEach(function(n){ parent[n.key]=n.key; });
  function find(k){ while(parent[k]!==k){ parent[k]=parent[parent[k]]; k=parent[k]; } return k; }
  edges.forEach(function(e){ var a=find(e[0]), b=find(e[1]); if(a!==b) parent[a]=b; });
  var clusters = {};
  nodes.forEach(function(n){
    if (inEdge[n.key]){ var root=find(n.key);
      if(!clusters[root]) clusters[root]={ nodes:[], heat:0 };
      clusters[root].nodes.push(n); clusters[root].heat+=n.focus; }
  });
  var list = Object.keys(clusters).map(function(k){ return clusters[k]; });
  list.sort(function(a,b){ return b.heat-a.heat; });
  var loose = nodes.filter(function(n){ return !inEdge[n.key]; });
  return { clusters:list, loose:loose, nodes:nodes };
}
function buildSpotlights(){
  var raw = [], fg = focusGraph();
  if (S.scene.spotMode === 'auto'){
    fg.clusters.forEach(function(cl){
      var keys = cl.nodes.map(function(n){ return n.key; });
      raw.push({ type:'cluster', id:'cl:'+keys.slice().sort().join('|'), nodes:cl.nodes });
    });
    fg.loose.forEach(function(n){ raw.push({ type:'solo', id:'solo:'+n.key, nodes:[n] }); });
  } else {
    var nodes = battleNodes();
    var lit = nodes.filter(function(n){ return S.scene.manual[n.key]; });
    if (lit.length) raw.push({ type:'manual', id:'manual:'+lit.map(function(n){return n.key;}).sort().join('|'), nodes:lit });
    nodes.filter(function(n){ return !S.scene.manual[n.key]; }).forEach(function(n){
      raw.push({ type:'solo', id:'solo:'+n.key, nodes:[n] });
    });
  }
  var byId={}; raw.forEach(function(r){ byId[r.id]=r; });
  var ordered=[];
  (S.scene.spotOrder||[]).forEach(function(id){ if(byId[id]){ ordered.push(byId[id]); delete byId[id]; } });
  raw.forEach(function(r){ if(byId[r.id]) ordered.push(r); });
  var unresolved = ordered.filter(function(it){ return !spotResolved(it); });
  var resolved = ordered.filter(function(it){ return spotResolved(it); });
  var finalList = unresolved.concat(resolved);
  var n=0;
  finalList.forEach(function(it){
    if(it.type==='cluster'||it.type==='manual'){ n++; it.label='Spotlight '+n; }
    else it.label='Unengaged: '+it.nodes[0].ref.name;
  });
  S.scene.spotOrder = finalList.map(function(it){ return it.id; });
  return finalList;
}
function spotResolved(it){
  return it.nodes.every(function(n){ return n.ref.spot==='done' || (n.ref.curVit||0)<=0 || !n.ref.act; });
}
function lmSpotDeck(){
  return buildSpotlights().filter(function(it){ return it.type!=='solo' || it.nodes[0].ref.act; })
    .map(function(it){ return { kind:'spotgroup', data:it }; });
}
function spotCard(c, n){
  var isFoe = S.scene.foes.indexOf(c) >= 0;
  return '<div class="lmcard spotbox ' + (isFoe ? 'foe' : 'fell') + (c.spot === 'done' ? ' done' : '') + '">'
    + '<div class="lmc-spotnum">Spotlight ' + n + '</div>'
    + '<div class="lmc-top"><span class="lmc-name">' + esc(c.name) + '</span>'
    + '<span class="lmc-sd">' + (isFoe ? 'Foe' : 'Fell') + '</span></div>'
    + '<div class="lmc-vit">' + c.curVit + ' / ' + c.maxVit + chargePips(c, isFoe ? 'foe' : 'fell') + '</div>'
    + '<div class="lmc-act"><span class="lmc-alab">Act</span>' + esc(c.act) + (c.target ? ' \u2192 ' + esc(targetName(c.target)) : '') + '</div>'
    + (isFoe && c.dmg ? '<div class="lmc-dmg">' + c.dmg.base + ' + ' + c.dmg.bonus + ' ' + c.dmg.type + '</div>' : '')
    + '<button class="lmbtn sm" onclick="lmResolveSpot(\'' + c.id + '\')">' + (c.spot === 'done' ? 'Resolved' : 'Resolve') + '</button></div>';
}

/* ---- LM intent, all through send() or local scene edits echoed as remote truth ---- */
/* ---- the scene deck ----
   A scene is a saved bundle of the table: the map, every token's position and
   footprint, and the grid. The deck belongs to the campaign and outlives the
   session. Switching scenes snapshots the live table into the scene being left and
   restores the one being entered, so the party stands where you left them. */
var _stageStore = [];   /* stands in for the Scenes collection rows */
function stubSaveStage(sc){
  var i=-1; _stageStore.forEach(function(x,k){ if(x.stageId===sc.stageId) i=k; });
  if(i>=0) _stageStore[i]=Object.assign({},_stageStore[i],sc); else _stageStore.push(Object.assign({},sc));
  return Promise.resolve({ ok:true });

function wireDrag(el, t){
  el.addEventListener('pointerdown', function(e){

    function mv(ev){
      var p = toMap(ev.clientX, ev.clientY);
      t.x = clamp(p.x + ox, 0, S.map.w); t.y = clamp(p.y + oy, 0, S.map.h);
      moved = true; place(el, t);
    }
    function upfn(){
      el.removeEventListener('pointermove', mv); el.removeEventListener('pointerup', upfn);
      if (!moved){ selectToken(t.id); return; }

      t.y = clamp(snapAxis(t.y, S.grid.offY, c), 0, S.map.h);
      place(el, t);

  svg.setAttribute('viewBox', '0 0 ' + S.map.w + ' ' + S.map.h);
  for (var x = g.offX % g.size; x <= S.map.w; x += g.size)
    out += '<line x1="' + x + '" y1="0" x2="' + x + '" y2="' + S.map.h + '"/>';
  for (var y = g.offY % g.size; y <= S.map.h; y += g.size)
    out += '<line x1="0" y1="' + y + '" x2="' + S.map.w + '" y2="' + y + '"/>';
  svg.innerHTML = '<g stroke="#55677a" stroke-width="1" vector-effect="non-scaling-stroke">' + out + '</g>';
  svg.style.opacity = g.opacity;
  document.getElementById('mapArt').style.width = S.map.w + 'px';
  document.getElementById('mapArt').style.height = S.map.h + 'px';
}

/* ---- token menu ----
   Anchored to the token but drawn in screen space, so it stays legible at any
   zoom. Selection highlights for anyone, the menu only opens for the LoreMaster,
   since a player resizing their own creature is not a thing the game allows. */
function tokById(id){ var f = null; S.tokens.forEach(function(t){ if (t.id === id) f = t; }); return f; }
function selectToken(id){ sel = (sel === id) ? null : id; renderTokens(); paintTokMenu(); }
function tokScreen(t){
  var r = mapEl().getBoundingClientRect();
  return { x:r.left + cam.x + t.x * cam.zoom, y:r.top + cam.y + t.y * cam.zoom };
}
function placeTokMenu(){
  var m = document.getElementById('tokmenu');
  if (!m.classList.contains('open')) return;
  var t = tokById(sel);
  if (!t) return;
  var p = tokScreen(t), h = m.offsetHeight || 104, w = 184;
  m.style.left = clamp(p.x - w / 2, 8, window.innerWidth - w - 8) + 'px';
  m.style.top  = clamp(p.y - (tokenPx(t) * cam.zoom) / 2 - h - 10, 8, window.innerHeight - h - 8) + 'px';
}
function paintTokMenu(){
  var m = document.getElementById('tokmenu'), t = sel ? tokById(sel) : null;
  var show = !!t && S.role === 'lm';
  m.classList.toggle('open', show);
  if (!show) return;
  var lab = document.getElementById('tmLabel');
  if (document.activeElement !== lab) lab.value = t.label;
  var sz = document.getElementById('tmSize');
  sz.innerHTML = '';
  [1, 2, 3].forEach(function(c){
    var b = document.createElement('button');
    b.className = (t.cells || 1) === c ? 'on' : '';
    b.textContent = c + 'x' + c;
    b.onclick = function(){ send({ type:'token-size', id:t.id, cells:c }); };
    sz.appendChild(b);
  });
  placeTokMenu();
}
(function wireTokMenu(){
  document.getElementById('tmDelete').addEventListener('click', function(){
    if (!sel) return;
    send({ type:'token-remove', id:sel });
    sel = null; paintTokMenu();
  });
  document.getElementById('tmLabel').addEventListener('input', function(){
    if (sel) send({ type:'token-label', id:sel, label:this.value });
  });
})();

/* ---- gestures ----
   One finger on empty map pans, one finger on a token you hold moves it, two
   fingers pinch. Wheel zooms to the cursor, never to the centre, because
   centre anchored zoom is useless the moment you look at a corner. */
var pts = new Map(), pan = null, pinch = null;
function pv(){ var a = []; pts.forEach(function(p){ a.push(p); }); return a; }
function dist(a, b){ return Math.hypot(a.x - b.x, a.y - b.y); }
function mid(a, b){ return { x:(a.x + b.x) / 2, y:(a.y + b.y) / 2 }; }
(function wireCamera(){
  var m = mapEl();
  m.addEventListener('pointerdown', function(e){
    if (e.target.closest && e.target.closest('.token')) return;
    m.setPointerCapture(e.pointerId);
    pts.set(e.pointerId, { x:e.clientX, y:e.clientY });
    if (pts.size === 1){
      pan = { x:e.clientX, y:e.clientY, cx:cam.x, cy:cam.y, moved:false };
      pinch = null; m.classList.add('panning');
    } else if (pts.size === 2){
      var a = pv();
      pan = null;
      pinch = { d:dist(a[0], a[1]), mid:mid(a[0], a[1]), zoom:cam.zoom, cx:cam.x, cy:cam.y };
    }
  });
  m.addEventListener('pointermove', function(e){
    if (!pts.has(e.pointerId)) return;
    pts.set(e.pointerId, { x:e.clientX, y:e.clientY });
    if (pinch && pts.size >= 2){
      var a = pv(), d = dist(a[0], a[1]), c = mid(a[0], a[1]);
      var r = m.getBoundingClientRect();
      var z = clamp(pinch.zoom * (d / (pinch.d || 1)), ZMIN, ZMAX), k = z / pinch.zoom;
      var px = pinch.mid.x - r.left, py = pinch.mid.y - r.top;
      cam.zoom = z;
      cam.x = px - (px - pinch.cx) * k + (c.x - pinch.mid.x);
      cam.y = py - (py - pinch.cy) * k + (c.y - pinch.mid.y);
      clampCam(); applyCam();
    } else if (pan){
      cam.x = pan.cx + (e.clientX - pan.x);
      cam.y = pan.cy + (e.clientY - pan.y);
      if (Math.abs(e.clientX - pan.x) > 4 || Math.abs(e.clientY - pan.y) > 4) pan.moved = true;
      clampCam(); applyCam();
    }
  });
  function release(e){
    pts.delete(e.pointerId);
    if (pts.size < 2) pinch = null;
    if (pts.size === 1){
      var a = pv()[0];
      pan = { x:a.x, y:a.y, cx:cam.x, cy:cam.y, moved:true };
    }
    if (pts.size === 0){
      m.classList.remove('panning');
      /* a click, not a pan, drops the selection and closes the open window */
      if (pan && !pan.moved){
        if (sel){ sel = null; renderTokens(); paintTokMenu(); }
        if (!isMobile() && S.openSection) closeWin();
      }
      pan = null;
    }
  }
  m.addEventListener('pointerup', release);
  m.addEventListener('pointercancel', release);
  m.addEventListener('wheel', function(e){
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, Math.pow(0.999, e.deltaY));
  }, { passive:false });
})();

/* ---- the LoreMaster's map knobs ---- */
var GRID_CTL = [
  ['gSize',  'size',    function(v){ return +v; },       function(v){ return v; }],
  ['gOffX',  'offX',    function(v){ return +v; },       function(v){ return v; }],
  ['gOffY',  'offY',    function(v){ return +v; },       function(v){ return v; }],
  ['gOpac',  'opacity', function(v){ return +v / 100; }, function(v){ return Math.round(v * 100); }]
];
function paintLmbar(){
  var bar = document.getElementById('lmbar');
  bar.classList.toggle('hidden', S.role !== 'lm' || !lmGridOpen);
  GRID_CTL.forEach(function(c){
    var el = document.getElementById(c[0]);
    el.value = c[3](S.grid[c[1]]);
    document.getElementById(c[0] + 'V').textContent = el.value;
  });
  var i = document.getElementById('gInset');
  i.value = Math.round(S.inset * 100);
  document.getElementById('gInsetV').textContent = i.value;
}
(function wireLmbar(){
  GRID_CTL.forEach(function(c){
    document.getElementById(c[0]).addEventListener('input', function(){
      var g = { size:S.grid.size, offX:S.grid.offX, offY:S.grid.offY, opacity:S.grid.opacity };
      g[c[1]] = c[2](this.value);
      send({ type:'grid', grid:g });
    });
  });
  document.getElementById('gInset').addEventListener('input', function(){
    send({ type:'inset', inset:+this.value / 100 });
  });
})();

/* ---- log ----
   One stream. Chat, rolls, and effects are entry kinds on it, newest first.
   Every surface renders the same array, so the panel and the full log overlay
   cannot drift. */
function esc(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}
function chatRow(id){
  return '<div class="lchat"><input id="' + id + '" maxlength="240" placeholder="Say something" '
    + 'onkeydown="if(event.key===\'Enter\')sayFrom(\'' + id + '\')">'
    + '<button onclick="sayFrom(\'' + id + '\')">Say</button></div>';
}
function sayFrom(id){
  var el = document.getElementById(id);
  if (!el) return;
  var text = el.value.trim();
  if (!text) return;
  el.value = '';
  send({ type:'say', text:text });
}
var logSeq = 0;
function mkId(){ return ++logSeq; }
function pushLog(e){ e.id = mkId(); S.log.push(e); applyRemoteState({ log:S.log }); }
function entryHtml(e){
  if (e.kind === 'say') return '<div class="le say"><b>' + esc(e.who) + '</b> ' + esc(e.text) + '</div>';
  if (e.kind === 'roll'){
    var m = e.n === 6 ? ' <span class="mark">Fellmark</span>'
          : e.n === 1 ? ' <span class="strike">Fellstrike</span>' : '';
    var sum = (e.mods || []).map(function(x){ return ' + ' + esc(x.label) + ' ' + x.value; }).join('');
    var tot = (e.mods && e.mods.length) ? ' = <span class="num">' + e.total + '</span>' : '';
    return '<div class="le roll"><b>' + esc(e.who) + '</b> rolled <span class="num">' + e.n + '</span>'
      + sum + tot + ' on ' + esc(ROLL_TYPES[e.rollType] || e.rollType) + m + '</div>';
  }
  return '<div class="le sys">\u00b7 ' + e.html + '</div>';
}
function toggleLog(){ var l=document.getElementById('log'); if(!l) return; var m=l.classList.toggle('min'); var x=l.querySelector('.log-x'); if(x) x.textContent = m ? '+' : '−'; }
function renderLog(){
  /* newest sits directly under the chat box and older work downward off the
     panel. The chat box and the newest line are the two things always in view,
     so the stream never has to be chased. */
  var h = S.log.slice().reverse().map(entryHtml).join('');
  document.querySelectorAll('.logstream').forEach(function(n){
    n.innerHTML = h;
    n.scrollTop = 0;
  });
  var l = document.getElementById('log');
  if (l) l.scrollTop = 0;
}

/* ---- render ---- */
function render(){
  var combat = S.mode === 'combat';
  ['fellmark','fellmarkM'].forEach(function(id){
    var f = document.getElementById(id);
    f.classList.toggle('combat', combat);
    f.onclick = combat ? function(){ isMobile() ? toggleDrawer() : openWin('battle'); } : null;
  });
  if (!combat){
    document.getElementById('drawer').classList.add('hidden');
    if (S.openSection === 'battle') closeWin();
  } else if (isMobile()){
    toggleDrawer(false);
  }
  document.getElementById('vitVal').textContent = S.character.vit;
  document.getElementById('vitValM').textContent = S.character.vit;
  paintRails(); drawGrid(); renderTokens(); renderLog(); paintLmbar(); paintTokMenu(); paintLmStrip(); paintMapPicker(); paintMapArt(); paintTokenPalette(); paintHud();
}
window.addEventListener('resize', function(){ clampCam(); applyCam(); });
(function buildFellmarks(){

applyRemoteState({ log:S.log });
