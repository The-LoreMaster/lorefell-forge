<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ShardForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;600&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>

  :root{--navy:#0a0e1a;--panel:#10162a;--panel2:#141b30;--silver:#dce8ef;--ice:#b8ccd8;--gold:#c9a84c;--muted:#7e8a99;
    --line:rgba(184,204,216,.14);--steel:#9fb0c0;--ok:#7fcf9f;--warn:#d6b35a;}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--navy);color:var(--silver);font-family:"Crimson Pro",Georgia,serif;font-size:18px;line-height:1.5;-webkit-font-smoothing:antialiased;padding:18px 14px 64px}
  .shell{max-width:1120px;margin:0 auto}
  header.masthead{text-align:center;padding:6px 0 14px}
  .eyebrow{font-family:"Cinzel",serif;letter-spacing:.32em;text-transform:uppercase;font-size:11px;color:var(--muted)}
  h1{font-family:"Cinzel Decorative",serif;font-weight:700;font-size:30px;letter-spacing:.04em;margin:8px 0 6px}
  h1.app-title .ember{color:var(--gold)}
  .section{font-family:"Cinzel",serif;letter-spacing:.3em;text-transform:uppercase;font-size:12px;color:var(--muted);margin:2px 0 0}
  .lede{color:var(--ice);max-width:54ch;margin:0 auto;font-size:16px}
  .seg{display:flex;gap:8px;margin:18px auto 0;max-width:520px}
  .seg button{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ice);font-family:"Cinzel",serif;font-size:12.5px;letter-spacing:.07em;text-transform:uppercase;padding:12px 8px;cursor:pointer;min-height:46px}
  .seg button[aria-selected="true"]{border-color:rgba(201,168,76,.55);color:var(--silver);background:var(--panel2)}
  .panes{margin-top:18px}
  .pane{display:none}
  .pane.active{display:block}
  .panehead{display:flex;align-items:baseline;gap:10px;border-bottom:1px solid var(--line);padding-bottom:9px;margin-bottom:4px}
  .panehead .pe{font-family:"Cinzel",serif;letter-spacing:.18em;text-transform:uppercase;font-size:10.5px;color:var(--muted)}
  .panehead .pt{font-family:"Cinzel",serif;font-weight:600;letter-spacing:.06em;font-size:17px;color:var(--silver)}
  .panehead .rule{width:8px;height:8px;border:1px solid var(--gold);transform:rotate(45deg);opacity:.8;margin-left:auto}

  .search{position:relative;margin-top:14px}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--silver);font-family:inherit;font-size:16px;padding:13px 14px 13px 40px;outline:none}
  .search input::placeholder{color:var(--muted)}.search input:focus{border-color:rgba(201,168,76,.55)}
  .search .glass{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;opacity:.6}
  .filterbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
  .filterbar select{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ice);font-family:"Cinzel",serif;font-size:12.5px;letter-spacing:.04em;padding:9px 10px;outline:none;flex:1 1 calc(50% - 4px);min-width:0}
  .filterbar select:focus{border-color:rgba(201,168,76,.55)}
  .clear{background:none;border:none;color:var(--muted);font-family:"Cinzel",serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;padding:6px 2px}
  .clear:hover{color:var(--ice)}
  .count{font-family:"Cinzel",serif;font-size:12px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin:14px 2px 2px}
  .secthead{display:flex;align-items:center;gap:10px;padding-bottom:8px;border-bottom:1px solid var(--line);margin-top:18px}
  .secthead .nm{font-family:"Cinzel",serif;font-weight:600;letter-spacing:.16em;text-transform:uppercase;font-size:14px}
  .secthead .toggle{margin-left:auto;background:none;border:1px solid var(--line);border-radius:999px;color:var(--ice);font-family:"Cinzel",serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;cursor:pointer}
  .secthead .toggle:hover{border-color:rgba(201,168,76,.5)}
  .card{display:flex;gap:13px;padding:15px 4px;border-bottom:1px solid var(--line)}
  .sigil{flex:0 0 40px;width:40px;height:40px;margin-top:2px}
  .cbody{flex:1 1 auto;min-width:0}
  .row1{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .cnm{font-family:"Cinzel",serif;font-weight:600;font-size:18px;letter-spacing:.02em;color:var(--silver)}
  .badge{font-family:"Cinzel",serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:2px 7px}
  .badge.core{color:var(--gold);border-color:rgba(201,168,76,.5)}
  .crules{margin:7px 0 0;color:var(--silver);font-size:15.5px}
  .cmeta{margin:8px 0 0}
  .cmeta span{font-family:"Cinzel",serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:2px 7px}
  .empty{text-align:center;color:var(--muted);padding:40px 12px;font-size:16px}
  .empty b{color:var(--ice);font-style:normal}

  .canonintro{background:var(--panel2);border:1px solid var(--line);border-left:2px solid var(--gold);border-radius:8px;padding:12px 14px;font-size:14.5px;color:var(--ice);margin-top:14px;line-height:1.5}
  .canonintro strong{display:block;color:var(--silver);font-family:"Cinzel",serif;font-weight:600;font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
  label.fld{display:block;margin-top:13px}
  label.fld>span{display:block;font-family:"Cinzel",serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  label.fld>span em{color:var(--muted);font-style:normal;text-transform:none;letter-spacing:0;font-size:13px}
  input,textarea,select.cat{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--silver);font-family:inherit;font-size:16px;padding:12px 13px;outline:none}
  select.cat{font-family:"Cinzel",serif;font-size:14px;color:var(--ice)}
  input::placeholder,textarea::placeholder{color:var(--muted)}
  input:focus,textarea:focus,select.cat:focus{border-color:rgba(201,168,76,.55)}
  .softnote{display:none;margin-top:9px;font-size:14px;color:var(--warn);align-items:flex-start;gap:7px}
  .softnote.show{display:flex}
  .softnote .d{flex:0 0 8px;width:8px;height:8px;border-radius:50%;background:var(--warn);margin-top:6px}
  .submit{width:100%;margin-top:16px;background:var(--ice);border:1px solid var(--ice);border-radius:11px;color:var(--navy);font-family:"Cinzel",serif;font-weight:600;font-size:15px;letter-spacing:.08em;text-transform:uppercase;padding:15px;cursor:pointer;min-height:52px}
  .submit:disabled{opacity:.4;cursor:not-allowed}
  .note{color:var(--muted);font-size:13px;text-align:center;margin-top:9px}
  .done-card{background:var(--panel2);border:1px solid rgba(201,168,76,.4);border-radius:12px;padding:18px;margin-top:16px;text-align:center}
  .done-card h3{font-family:"Cinzel",serif;font-size:16px;letter-spacing:.06em;margin:0 0 6px;color:var(--silver)}
  .done-card p{color:var(--ice);font-size:15px;margin:0 0 12px}
  .done-card button{background:none;border:1px solid var(--line);border-radius:9px;color:var(--ice);font-family:"Cinzel",serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:10px 16px;cursor:pointer}

  *:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  /* side toggle */
  .sideToggle{display:flex;gap:8px;max-width:520px;margin:16px auto 0}
  .sideToggle button{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ice);font-family:"Cinzel",serif;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;padding:11px 8px;cursor:pointer;min-height:46px;line-height:1.2}
  .sideToggle button em{display:block;font-style:normal;font-size:9.5px;letter-spacing:.12em;color:var(--muted);margin-top:3px}
  .sideToggle button[aria-selected="true"]{border-color:rgba(201,168,76,.6);background:var(--panel2);color:var(--silver)}
  .sideToggle button[aria-selected="true"] em{color:var(--gold)}
  /* ledger */
  .lgfilters{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .lgf{background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--ice);font-family:"Cinzel",serif;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:9px 14px;cursor:pointer;min-height:40px}
  .lgf.active{border-color:rgba(201,168,76,.55);color:var(--silver);background:var(--panel2)}
  .lgf.reload{margin-left:auto;color:var(--muted)}
  .lgcard{padding:15px 4px;border-bottom:1px solid var(--line)}
  .lgrow{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .lgnm{font-family:"Cinzel",serif;font-weight:600;font-size:18px;color:var(--silver)}
  .lgby{margin-left:auto;font-family:"Cinzel",serif;font-size:11px;letter-spacing:.06em;color:var(--muted)}
  .lgbadge{font-family:"Cinzel",serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.4);border-radius:5px;padding:2px 7px}
  .lgbadge.plain{color:var(--muted);border-color:var(--line)}
  .lgtag{font-family:"Cinzel",serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:2px 7px}
  .lgeffect{margin:7px 0 0;color:var(--silver);font-size:15.5px}
  .lglore{margin:6px 0 0;color:var(--ice);font-size:14px;font-style:italic}
  .lggate{margin:6px 0 0;color:var(--muted);font-size:13px}
  .lgactions{display:flex;align-items:center;gap:10px;margin-top:10px}
  .lgvote{display:inline-flex;align-items:center;gap:7px;font-family:"Cinzel",serif;font-size:12px;letter-spacing:.06em;color:var(--ice);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:9px 13px;cursor:pointer}
  .lgvote:hover{background:var(--panel2)}
  .lgvote .ar{font-size:10px;color:var(--muted)}
  .lgvote .vc{color:var(--silver);font-variant-numeric:tabular-nums}
  .lgvote.voted{color:var(--gold);border-color:rgba(201,168,76,.5)}
  .lgvote.voted .ar{color:var(--gold)}
  .lgvote:disabled{cursor:default}
  /* desktop: keep tabs reachable, ledger full width when active */
  @media (min-width:860px){
    .seg{display:flex}
    .panes{display:grid;grid-template-columns:1fr;gap:26px;align-items:start}
    .pane{display:none}
    .pane.active{display:block}
    .panes.show-canon{grid-template-columns:1.05fr .95fr}
    .panes.show-canon .pane.catalog,.panes.show-canon .pane.canonize{display:block}
    .panes.show-canon .pane.canonize{position:sticky;top:14px}
  }
  .sfpager{display:flex;justify-content:center;align-items:center;gap:6px;flex-wrap:wrap;margin:16px 0 2px}
  .sfpg{min-width:34px;padding:7px 10px;border:1px solid var(--line);background:transparent;color:var(--ice);border-radius:6px;font-family:"Cinzel",serif;font-size:13px;cursor:pointer}
  .sfpg[aria-current="true"]{background:var(--ice);color:var(--navy);border-color:var(--ice)}
  .sfpg:disabled{opacity:.4;cursor:default}
  .sfpg.dots{border:0;cursor:default;color:var(--muted)}

  .finfo{ position:relative; display:inline-flex; align-items:center; justify-content:center;
    width:15px; height:15px; margin-left:7px; border:1px solid var(--gold,#c9a84c); border-radius:50%;
    color:var(--gold,#c9a84c); font-family:'Crimson Pro',serif; font-size:10px; font-style:italic; line-height:1;
    letter-spacing:0; text-transform:none; cursor:pointer; vertical-align:middle; user-select:none; }
  .finfo:hover, .finfo.open{ background:rgba(201,168,76,.12); }
  .finfo .tip{ position:absolute; left:50%; top:150%; transform:translateX(-50%);
    width:min(260px,72vw); z-index:60; display:none;
    background:var(--panel,#10162a); border:1px solid rgba(201,168,76,.4); border-radius:9px;
    padding:9px 11px; color:var(--silver,#dce8ef); font-family:'Crimson Pro',serif; font-size:.86rem;
    font-style:normal; letter-spacing:0; text-transform:none; line-height:1.4; text-align:left;
    box-shadow:0 6px 20px rgba(0,0,0,.4); }
  .finfo .tip::before{ content:''; position:absolute; left:50%; top:-5px; transform:translateX(-50%) rotate(45deg);
    width:8px; height:8px; background:var(--panel,#10162a); border-left:1px solid rgba(201,168,76,.4); border-top:1px solid rgba(201,168,76,.4); }
  .finfo:hover .tip, .finfo.open .tip{ display:block; }
</style>
</head>
<body>
<div class="shell">
  <header class="masthead">
    <h1 class="app-title">Shard<span class="ember">Forge</span></h1>
    <div class="section" id="sfH1">Infusions</div>
  </header>

  <div class="sideToggle" role="tablist" aria-label="Shard type">
    <button id="side-infusion" type="button" aria-selected="true">Infusions <em>Weapons</em></button>
    <button id="side-augmentation" type="button" aria-selected="false">Augmentations <em>Armor</em></button>
  </div>

  <div class="seg" role="tablist">
    <button role="tab" id="seg-catalog" aria-selected="true">Catalog</button>
    <button role="tab" id="seg-canon" aria-selected="false">Canonize</button>
    <button role="tab" id="seg-ledger" aria-selected="false">Ledger</button>
  </div>

  <div class="panes">
    <section class="pane catalog active" id="pane-catalog">
      <div class="panehead"><div><div class="pe" id="catPe">The Lapidary</div><div class="pt">Catalog</div></div><span class="rule"></span></div>
      <p class="count" id="catNote" style="margin-top:10px"></p>
      <div class="search">
        <svg class="glass" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="q" type="search" placeholder="Search name or text" autocomplete="off" aria-label="Search the catalog">
      </div>
      <div class="filterbar">
        <select id="fCat" aria-label="Filter by category"></select>
        <select id="fCore" aria-label="Filter by core"></select>
        <button class="clear" id="clear" type="button">Reset</button>
      </div>
      <div class="count" id="count"></div>
      <div id="list" aria-live="polite"></div>
    </section>

    <section class="pane canonize" id="pane-canon">
      <div class="panehead"><div><div class="pe" id="canonPe">The Assay</div><div class="pt">Canonize a customization</div></div><span class="rule"></span></div>
      <div id="canon"></div>
    </section>

    <section class="pane ledger" id="pane-ledger">
      <div class="panehead"><div><div class="pe">The Vault</div><div class="pt">Ledger</div></div><span class="rule"></span></div>
      <p class="count" style="margin-top:10px">Every custom shard put forward. Read one, lend it your voice, or check on your own.</p>
      <div class="lgfilters">
        <button class="lgf active" data-scope="all" type="button">All</button>
        <button class="lgf" data-scope="canon" type="button">Canon</button>
        <button class="lgf" data-scope="mine" type="button">Mine</button>
        <button class="lgf reload" id="lgReload" type="button">Reload</button>
      </div>
      <div id="ledger" aria-live="polite"></div>
    </section>
  </div>
</div>

<script>

const SIDES={
  infusion:{
    side:"infusion",noun:"infusion",catLabel:"Attribute",core:false,
    eyebrow:"ShardForge \u00B7 Infusions",h1:"Infusions",
    catPe:"The Lapidary",canonPe:"The Assay",
    note:"A weapon holds three infusions, matched to its attribute. Search or filter by attribute to find what fits yours.",
    catOptions:["Precision", "Power", "Magic"],
    data:[{"name": "Targeted", "cat": "Precision", "desc": "Attacks with this weapon ignore Evasion equal to your Precision."}, {"name": "Sharp", "cat": "Precision", "desc": "Add your Precision to this weapon's Base Damage."}, {"name": "Wounding", "cat": "Precision", "desc": "Add your Precision to this weapon's Bonus Damage."}, {"name": "Rebounding", "cat": "Precision", "desc": "When this weapon deals damage, deal its Base Damage again. The second instance cannot be reduced."}, {"name": "Hunting", "cat": "Precision", "desc": "Attacks with this weapon are Lucky Rolls."}, {"name": "Rooting", "cat": "Precision", "desc": "When this weapon deals damage, the target cannot move until the end of the round."}, {"name": "Guarding", "cat": "Precision", "desc": "When an attack targeting you misses, deal this weapon's standard damage to the attacker."}, {"name": "Agile", "cat": "Precision", "desc": "While wielding this weapon, you may use a free movement during your Act. This does not remove your ability to move during your React."}, {"name": "Vorpal", "cat": "Precision", "desc": "When this weapon deals damage, the target loses two Charges."}, {"name": "Reprieve", "cat": "Precision", "desc": "When this weapon reduces a target to 0, remove one Affliction from yourself."}, {"name": "Swift", "cat": "Precision", "desc": "When you make a standard attack, immediately make one more standard attack against the same target. The extra attack does not trigger this effect again."}, {"name": "Powerful", "cat": "Power", "desc": "Attacks with this weapon ignore Durability equal to your Power."}, {"name": "Brutal", "cat": "Power", "desc": "Add your Power to this weapon's Base Damage."}, {"name": "Mauling", "cat": "Power", "desc": "Add your Power to this weapon's Bonus Damage."}, {"name": "Sweeping", "cat": "Power", "desc": "When this weapon deals damage, the nearest other enemy takes this weapon's Base Damage."}, {"name": "Merciless", "cat": "Power", "desc": "Fellmark effects with this weapon are doubled."}, {"name": "Hooking", "cat": "Power", "desc": "When this weapon deals damage, pull the target one space toward you. If its movement is prevented, deal this weapon's Base Damage."}, {"name": "Vengeful", "cat": "Power", "desc": "When an enemy hits you, deal this weapon's standard damage to it."}, {"name": "Goring", "cat": "Power", "desc": "Attacks with this weapon ignore the target's Armor Stance entirely."}, {"name": "Siphoning", "cat": "Power", "desc": "When this weapon deals damage, take one of the target's Charges for yourself."}, {"name": "Emboldening", "cat": "Power", "desc": "When this weapon reduces a target to 0, gain temporary Vitality equal to your Power."}, {"name": "Afflicted", "cat": "Power", "desc": "When you inflict a Fellmark with this weapon, apply an Affliction of your choice. It replaces the weapon's innate Fellmark Affliction."}, {"name": "Ethereal", "cat": "Magic", "desc": "Attacks with this weapon ignore Resistance equal to your Magic."}, {"name": "Potent", "cat": "Magic", "desc": "Add your Magic to this weapon's Base Damage."}, {"name": "Blighting", "cat": "Magic", "desc": "Add your Magic to this weapon's Bonus Damage."}, {"name": "Coursing", "cat": "Magic", "desc": "When you successfully cast a spell, each enemy adjacent to you takes this weapon's Base Damage."}, {"name": "Honed", "cat": "Magic", "desc": "Rolls of 5 also count as Fellmarks with this weapon."}, {"name": "Forceful", "cat": "Magic", "desc": "When this weapon deals damage, push the target one space away from you. If its movement is prevented, deal this weapon's Base Damage."}, {"name": "Backlash", "cat": "Magic", "desc": "When an enemy hits or misses you, the attacker takes this weapon's Base Damage."}, {"name": "Unflagging", "cat": "Magic", "desc": "Treat your Fatigue as one rank lower while wielding this weapon."}, {"name": "Welling", "cat": "Magic", "desc": "When this weapon deals damage, charge one additional tier."}, {"name": "Devouring", "cat": "Magic", "desc": "When this weapon reduces a target to 0, restore Vitality equal to your Magic."}, {"name": "Blinking", "cat": "Magic", "desc": "This weapon's Range becomes In Sight."}]
  },
  augmentation:{
    side:"augmentation",noun:"augmentation",catLabel:"Domain",core:true,
    eyebrow:"ShardForge \u00B7 Augmentations",h1:"Augmentations",
    catPe:"The Mantle",canonPe:"The Temper",
    note:"A suit holds two augmentations, active in every stance. Core is the starting set of six.",
    catOptions:["Affliction Ward", "Anti-burst", "Anti-lethal", "Concealment", "Fortune", "Guardian", "Intercept", "Last Stand", "Mobility", "Negation", "Reactive Move", "Recovery", "Resilience", "Senses", "Stability", "Targeting denial", "Terrain", "Ward", "Ward Vitality", "Something new"],
    data:[{"name": "Mistform", "cat": "Negation", "core": true, "desc": "Once each round, you may negate one attack against you."}, {"name": "Nullward", "cat": "Ward", "core": false, "desc": "Once each round, you may negate one spell that targets you."}, {"name": "Driftstep", "cat": "Reactive Move", "core": false, "desc": "When an attack hits you, you may immediately move one space."}, {"name": "Phantomfield", "cat": "Mobility", "core": true, "desc": "You may move through enemies, allies, and obstacles. You may not end your movement inside one."}, {"name": "Treadlight", "cat": "Terrain", "core": false, "desc": "You ignore the movement and damage payloads of Pales you stand in or move through."}, {"name": "Shadowmeld", "cat": "Concealment", "core": false, "desc": "While wielding this, if you deal no damage this round you become Obscured at the end of the round."}, {"name": "Echosight", "cat": "Senses", "core": false, "desc": "You can see through darkness and concealment, and you cannot be hidden from or ambushed."}, {"name": "Afterimage", "cat": "Fortune", "core": false, "desc": "Your first Evasion roll each round is a Lucky Roll."}, {"name": "Deathsong", "cat": "Fortune", "core": false, "desc": "After you take damage, the attacker takes Base damage equal to your highest defensive attribute."}, {"name": "Oakspine", "cat": "Stability", "core": true, "desc": "You cannot be forcibly moved from your space."}, {"name": "Threshold", "cat": "Anti-burst", "core": true, "desc": "No single hit can reduce your Vitality by more than half your current Vitality."}, {"name": "Emberhold", "cat": "Anti-lethal", "core": false, "desc": "Each time a hit would reduce you to 0 Vitality, you remain at 1 instead. Each time this happens, there is an even chance you die."}, {"name": "Mendseam", "cat": "Recovery", "core": true, "desc": "At the start of each round, recover Vitality equal to your highest defensive attribute."}, {"name": "Scarweave", "cat": "Ward Vitality", "core": false, "desc": "At the start of each round, gain Temporary Vitality equal to your highest defensive attribute."}, {"name": "Runeguard", "cat": "Guardian", "core": true, "desc": "Once each round, when an ally within your Mobility range is hit, reduce the damage they take by your highest defensive attribute."}, {"name": "Bulwark", "cat": "Intercept", "core": false, "desc": "Once each round, when an ally within your Mobility range is targeted by an attack, you may make yourself the target instead."}, {"name": "Unbowed", "cat": "Resilience", "core": false, "desc": "The highest Fatigue rank you can reach is 3."}, {"name": "Lastlight", "cat": "Last Stand", "core": false, "desc": "While below 25 Vitality, the first attack against you each round misses."}, {"name": "Ironroot", "cat": "Targeting denial", "core": false, "desc": "Spells and abilities may target you, but they may not target the space you occupy."}, {"name": "Hexward", "cat": "Affliction Ward", "core": false, "desc": "The first Affliction applied to you each round is prevented."}]
  }
};
let SIDE="infusion";
const catLoaded={infusion:false,augmentation:false};
function loadCatalog(side){post({type:"CATALOG_LOAD",payload:{side:side}});}
function sc(){return SIDES[SIDE];}

/* ---------- catalog ---------- */
function gem(){return `<svg class="sigil" viewBox="0 0 44 44" aria-hidden="true"><g fill="none" stroke="var(--gold)" stroke-width="1" stroke-opacity=".7"><path d="M14 8 H30 L38 18 L22 40 L6 18 Z" fill="var(--steel)" fill-opacity=".14"/><path d="M6 18 H38" stroke-opacity=".4"/><path d="M14 8 L18 18 M30 8 L26 18 M18 18 H26" stroke-opacity=".4"/><path d="M18 18 L22 40 M26 18 L22 40" stroke-opacity=".4"/></g><circle cx="22" cy="12" r="1.6" fill="var(--gold)" fill-opacity=".9"/></svg>`;}
function sigil(){return `<svg class="sigil" viewBox="0 0 44 44" aria-hidden="true"><g fill="none" stroke="var(--gold)" stroke-width="1" stroke-opacity=".7"><path d="M22 3 L38 10 V24 C38 33 31 39 22 42 C13 39 6 33 6 24 V10 Z" fill="var(--steel)" fill-opacity=".14"/><path d="M22 3 V42" stroke-opacity=".4"/><path d="M6 18 H38" stroke-opacity=".4"/></g><circle cx="22" cy="18" r="2" fill="var(--gold)" fill-opacity=".9"/></svg>`;}
const cstate={q:"",cat:"",core:"",expanded:false,page:0};
const uniq=a=>[...new Set(a)].filter(Boolean);
function buildFilters(){
  const S=sc();
  const cats=S.core?uniq(S.data.map(d=>d.cat)).sort():S.catOptions.slice();
  document.getElementById("fCat").innerHTML=`<option value="">${S.catLabel}: all</option>`+cats.map(c=>`<option value="${c}">${c}</option>`).join("");
  const fc=document.getElementById("fCore");
  if(S.core){fc.style.display="";fc.innerHTML=`<option value="">Core: all</option><option value="core">Core only</option>`;}
  else{fc.style.display="none";fc.innerHTML="";}
}
const cfiltering=()=>cstate.q||cstate.cat||cstate.core;
function cmatch(d){
  if(cstate.cat&&d.cat!==cstate.cat)return false;
  if(sc().core&&cstate.core==="core"&&!d.core)return false;
  if(cstate.q){const h=(d.name+" "+d.desc+" "+d.cat).toLowerCase();if(!h.includes(cstate.q.toLowerCase()))return false;}
  return true;
}
function ccard(d){return `<article class="card">${sc().side==="infusion"?gem():sigil()}<div class="cbody"><div class="row1"><span class="cnm">${esc(d.name)}</span>${d.core?'<span class="badge core">Core</span>':''}</div><p class="crules">${esc(d.desc)}</p><div class="cmeta"><span>${esc(d.cat)}</span></div></div></article>`;}
const SF_PAGE=12;
function sfPagerHTML(page,pages){
  if(pages<=1)return "";
  let h='<div class="sfpager"><button class="sfpg" data-pg="'+(page-1)+'"'+(page<=0?' disabled':'')+'>Prev</button>';
  const nums=[];for(let i=0;i<pages;i++){if(i===0||i===pages-1||Math.abs(i-page)<=1)nums.push(i);else if(nums[nums.length-1]!==-1)nums.push(-1);}
  nums.forEach(i=>{h+= i===-1?'<span class="sfpg dots">\u2026</span>':'<button class="sfpg" data-pg="'+i+'" aria-current="'+(i===page?'true':'false')+'">'+(i+1)+'</button>';});
  return h+'<button class="sfpg" data-pg="'+(page+1)+'"'+(page>=pages-1?' disabled':'')+'>Next</button></div>';
}
function sfWirePager(){
  document.querySelectorAll("#list .sfpg[data-pg]").forEach(b=>b.addEventListener("click",()=>{const n=+b.getAttribute("data-pg");if(n!==cstate.page){cstate.page=n;renderCatalog();const l=document.getElementById("list");if(l&&l.scrollIntoView)l.scrollIntoView({block:"start"});}}));
}
function sfPaginate(arr){const pages=Math.max(1,Math.ceil(arr.length/SF_PAGE));if(cstate.page>=pages)cstate.page=pages-1;if(cstate.page<0)cstate.page=0;return {pages,slice:arr.slice(cstate.page*SF_PAGE,cstate.page*SF_PAGE+SF_PAGE)};}
function renderCatalog(){
  const S=sc();
  const list=document.getElementById("list"),counter=document.getElementById("count");
  const flt=cfiltering();
  const all=S.data.filter(cmatch);
  if(!S.core){
    if(!all.length){list.innerHTML=`<div class="empty"><b>Nothing matches.</b><br>Loosen a filter or clear the search.</div>`;}
    else{const pg=sfPaginate(all);list.innerHTML=`<div class="secthead"><span class="nm">${flt?'Results':'The set'}</span></div>`+pg.slice.map(ccard).join("")+sfPagerHTML(cstate.page,pg.pages);}
    counter.textContent=flt?`${all.length} matching`:`${S.data.length} in the catalog`;
    sfWirePager();reportHeight();return;
  }
  const core=all.filter(d=>d.core);
  const open=flt||cstate.expanded;
  const visible=flt?all:(open?all:core);
  let html="";
  if(!visible.length){html=`<div class="empty"><b>Nothing matches.</b><br>Loosen a filter or clear the search.</div>`;}
  else{
    let toggle="";
    if(!flt&&all.length>core.length)toggle=`<button class="toggle" id="toggle" type="button">${open?'Show Core only':('Show all '+all.length)}</button>`;
    const pg=sfPaginate(visible);
    html=`<div class="secthead"><span class="nm">${flt?'Results':'The set'}</span>${toggle}</div>`+pg.slice.map(ccard).join("")+sfPagerHTML(cstate.page,pg.pages);
  }
  list.innerHTML=html;
  counter.textContent=flt?`${visible.length} matching`:`Showing Core. ${S.data.length} in the full catalog.`;
  const tg=document.getElementById("toggle");if(tg)tg.onclick=()=>{cstate.expanded=!cstate.expanded;cstate.page=0;renderCatalog();};
  sfWirePager();reportHeight();
}
document.getElementById("q").addEventListener("input",e=>{cstate.q=e.target.value;cstate.page=0;renderCatalog();});
document.getElementById("fCat").addEventListener("change",e=>{cstate.cat=e.target.value;cstate.page=0;renderCatalog();});
document.getElementById("fCore").addEventListener("change",e=>{cstate.core=e.target.value;cstate.page=0;renderCatalog();});
document.getElementById("clear").addEventListener("click",()=>{cstate.q="";cstate.cat="";cstate.core="";cstate.expanded=false;cstate.page=0;document.getElementById("q").value="";document.getElementById("fCat").value="";document.getElementById("fCore").value="";renderCatalog();});

/* ---------- canonize ---------- */
const C={name:"",effect:"",cat:"",lore:"",by:"",submitted:false};
const EMDASH=/\u2014/;
const AIPHRASE=/(indistinguishable from|endure where others fade|extraordinary amounts of)/i;
function softCheck(){
  const all=[C.name,C.effect,C.lore].join(" ");
  if(EMDASH.test(all))return "Found an em dash. House style keeps copy free of them.";
  if(AIPHRASE.test(all))return "That phrasing reads as filler. State what it does plainly.";
  return "";
}
function renderCanon(){
  const S=sc();
  const root=document.getElementById("canon");
  if(C.submitted){
    root.innerHTML=`<div class="done-card"><h3>Sent for canonization</h3><p>Your ${S.noun} is in the queue for the community vote. If it passes, the team folds it into the catalog. Thank you for adding to the world.</p><button id="again">Submit another</button></div>`;
    root.querySelector("#again").onclick=()=>{C.name="";C.effect="";C.cat="";C.lore="";C.by="";C.submitted=false;renderCanon();};
    reportHeight();return;
  }
  root.innerHTML=`<div class="canonintro"><strong>How this works</strong>Made a custom ${S.noun} at your table that you think belongs in the world? Put it forward. The community votes, and the team checks it against the rules before it becomes canon. Describe what it does in plain terms.</div>
    <label class="fld"><span>Name</span><input id="cName" value="${esc(C.name)}" placeholder="A short, plain name"></label>
    <label class="fld"><span>What it does<span class='finfo' tabindex='0' role='button' aria-label='What is this'>i<span class='tip'>The plain rules text for this creation, worded the way it will read in the catalog.</span></span></span><textarea id="cEffect" rows="4" placeholder="Plain rules text, the way it reads in the catalog.">${esc(C.effect)}</textarea></label>
    <label class="fld"><span>${S.catLabel}<span class='finfo' tabindex='0' role='button' aria-label='What is this'>i<span class='tip'>Which family or class this creation belongs to. Sets where it lands and how it is grouped.</span></span></span><select class="cat" id="cCat">${S.catOptions.map(o=>`<option value="${esc(o)}" ${C.cat===o?"selected":""}>${esc(o)}</option>`).join("")}</select></label>
    <label class="fld"><span>Lore <em>(one line, optional)</em></span><input id="cLore" value="${esc(C.lore)}" placeholder="One grounded line."></label>
    <div class="softnote" id="soft"><span class="d"></span><span id="softtext"></span></div>
    <button class="submit" id="cSubmit" disabled>Put forward for the vote</button>
    <p class="note">Anyone can submit. The vote and the team decide what becomes canon.</p>`;
  const g=s=>root.querySelector(s);
  g("#cName").oninput=e=>{C.name=e.target.value;upd();};
  g("#cEffect").oninput=e=>{C.effect=e.target.value;upd();};
  g("#cCat").onchange=e=>{C.cat=e.target.value;upd();};
  g("#cLore").oninput=e=>{C.lore=e.target.value;upd();};
  g("#cSubmit").onclick=submit;
  if(!C.cat){C.cat=S.catOptions[0];}
  upd();reportHeight();
}
function upd(){
  const root=document.getElementById("canon");
  const msg=softCheck();
  const sn=root.querySelector("#soft");
  if(sn){sn.classList.toggle("show",!!msg);root.querySelector("#softtext").textContent=msg;}
  const btn=root.querySelector("#cSubmit");
  if(btn)btn.disabled=!(C.name.trim()&&C.effect.trim());
}
function submit(){
  post({type:"SHARD_SUBMIT",payload:{
    side:SIDE, name:C.name.trim(), effect:C.effect.trim(), category:C.cat||sc().catOptions[0], lore:C.lore.trim(), submittedBy:C.by.trim()
  }});
  C.submitted=true;renderCanon();
}

/* ---------- ledger ---------- */
let lgScope="all", lgLoaded=false, lgItems=[];
function loadLedger(){
  const root=document.getElementById("ledger");
  if(root)root.innerHTML=`<div class="empty">Loading the ledger.</div>`;
  post({type:"SHARD_LOAD_LEDGER",payload:{scope:lgScope,side:SIDE}});
}
function badgeOf(st){return ({canon:["Canon","Folded into the catalog."],voting:["In Vote","The community is weighing in."],submitted:["Submitted","Waiting for the vote."],declined:["Declined","Set aside for now."]})[st]||["Draft","A work in progress."];}
function renderLedger(items){
  lgItems=items||[];
  const root=document.getElementById("ledger"); if(!root)return;
  if(!lgItems.length){root.innerHTML=`<div class="empty"><b>Nothing here yet.</b><br>${lgScope==="mine"?"You have not put one forward.":"Be the first to put one forward."}</div>`;reportHeight();return;}
  root.innerHTML=lgItems.map(it=>{
    let meta={}; try{meta=(JSON.parse(it.payload||"{}").meta)||{};}catch(e){}
    const b=badgeOf(it.canonStatus); const canon=it.canonStatus==="canon";
    return `<article class="lgcard">`
      +`<div class="lgrow"><span class="lgnm">${esc(it.creationName)}</span>${it.creatorName?`<span class="lgby">by ${esc(it.creatorName)}</span>`:""}</div>`
      +`<div class="lgrow" style="margin-top:6px"><span class="lgbadge${canon?"":" plain"}">${b[0]}</span>${meta.category?`<span class="lgtag">${esc(meta.category)}</span>`:""}<span class="lgtag">${esc(it.kind||SIDE)}</span></div>`
      +`<p class="lgeffect">${esc(it.shorthand||"")}</p>`
      +(meta.lore?`<p class="lglore">${esc(meta.lore)}</p>`:"")
      +`<div class="lggate">${b[1]}</div>`
      +`<div class="lgactions"><button type="button" class="lgvote" data-id="${esc(it.creationId)}"><span class="ar">&#9650;</span> Vote <span class="vc">${it.voteCount||0}</span></button></div>`
      +`</article>`;
  }).join("");
  root.querySelectorAll(".lgvote").forEach(bn=>bn.addEventListener("click",()=>castVote(bn)));
  reportHeight();
}
function castVote(btn){
  if(!btn||btn.disabled)return;
  const id=btn.getAttribute("data-id"); if(!id)return;
  btn.disabled=true;
  post({type:"SHARD_VOTE",payload:{creationId:id}});
}
function applyVoteResult(m){
  if(!m||!m.creationId)return;
  let btn=null; document.querySelectorAll(".lgvote").forEach(b=>{if(b.getAttribute("data-id")===m.creationId)btn=b;});
  if(m.ok){
    if(btn){ if(m.voteCount!=null){const c=btn.querySelector(".vc");if(c)c.textContent=m.voteCount;} btn.classList.add("voted");btn.disabled=true; }
    lgItems.forEach(it=>{if(it.creationId===m.creationId&&m.voteCount!=null)it.voteCount=m.voteCount;});
  } else if(btn){ btn.disabled=false; }
}
(function(){
  const fs=document.querySelectorAll(".lgf[data-scope]");
  fs.forEach(b=>b.addEventListener("click",()=>{
    lgScope=b.getAttribute("data-scope");
    fs.forEach(x=>x.classList.toggle("active",x===b));
    loadLedger();
  }));
  const r=document.getElementById("lgReload"); if(r)r.addEventListener("click",loadLedger);
})();

/* ---------- shared ---------- */
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function post(msg){try{if(window.parent)window.parent.postMessage(msg,"*");}catch(e){}}
function reportHeight(){try{if(window.parent)window.parent.postMessage({type:"FORGE_HEIGHT",height:document.body.scrollHeight},"*");}catch(e){}}
new ResizeObserver(reportHeight).observe(document.body);
function setPane(p){
  ["catalog","canon","ledger"].forEach(x=>{
    const seg=document.getElementById("seg-"+x); if(seg)seg.setAttribute("aria-selected",p===x);
    const pane=document.getElementById("pane-"+x); if(pane)pane.classList.toggle("active",p===x);
  });
  const panes=document.querySelector(".panes"); if(panes)panes.classList.toggle("show-canon",p==="canon");
  if(p==="ledger"&&!lgLoaded){lgLoaded=true;loadLedger();}
  reportHeight();
}
document.getElementById("seg-catalog").onclick=()=>setPane("catalog");
document.getElementById("seg-canon").onclick=()=>setPane("canon");
document.getElementById("seg-ledger").onclick=()=>setPane("ledger");

function applySide(ns){
  if(ns!==SIDE){SIDE=ns;C.name="";C.effect="";C.cat="";C.lore="";C.by="";C.submitted=false;cstate.q="";cstate.cat="";cstate.core="";cstate.expanded=false;cstate.page=0;}
  const S=sc();
  document.getElementById("side-infusion").setAttribute("aria-selected",SIDE==="infusion");
  document.getElementById("side-augmentation").setAttribute("aria-selected",SIDE==="augmentation");
  document.getElementById("sfH1").textContent=S.h1;
  document.getElementById("catPe").textContent=S.catPe;
  document.getElementById("canonPe").textContent=S.canonPe;
  document.getElementById("catNote").textContent=S.note;
  const q=document.getElementById("q"); if(q)q.value="";
  buildFilters();renderCatalog();renderCanon();
  if(!catLoaded[SIDE]){catLoaded[SIDE]=true;loadCatalog(SIDE);}
  if(lgLoaded)loadLedger();
  reportHeight();
}
document.getElementById("side-infusion").onclick=()=>applySide("infusion");
document.getElementById("side-augmentation").onclick=()=>applySide("augmentation");

window.onmessage=function(e){
  const m=e&&e.data; if(!m||typeof m!=="object")return;
  if(m.type==="CATALOG_RESULT"){const side=m.side||"infusion";const items=Array.isArray(m.items)?m.items:[];if(items.length)SIDES[side].data=items;if(side===SIDE){buildFilters();renderCatalog();}return;}
  if(m.type==="SHARD_LEDGER_RESULT"){renderLedger(m.items||[]);return;}
  if(m.type==="SHARD_VOTE_RESULT"){applyVoteResult(m);return;}
  if(m.type==="SHARD_SUBMIT_RESULT"){
    if(!m.ok){C.submitted=false;renderCanon();const note=document.querySelector("#pane-canon .note");if(note){note.textContent=(m.errors&&m.errors[0])||"That did not save. Try again.";note.style.color="var(--warn)";}}
    else{lgLoaded=false;}
    return;
  }
};

applySide("infusion");

</script>

<script>
(function(){
  document.addEventListener('click', function(e){
    var t=e.target.closest ? e.target.closest('.finfo') : null;
    document.querySelectorAll('.finfo.open').forEach(function(x){ if(x!==t) x.classList.remove('open'); });
    if(t){ e.preventDefault(); e.stopPropagation(); t.classList.toggle('open'); }
  });
})();
</script>
