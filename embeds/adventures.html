<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LoreFell Adventure Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0a0e1a; --navy-2:#10162a; --navy-3:#161e33;
    --silver:#dce8ef; --silver-dim:#9fb0bd; --ice:#b8ccd8;
    --gold:#c9a84c; --muted:#7e8a99; --line:#243049;
    --disp:'Cinzel Decorative',serif; --head:'Cinzel',serif; --body:'Crimson Pro',Georgia,serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:transparent;color:var(--silver);font-family:var(--body)}
  .wrap{max-width:720px;margin:0 auto;padding:14px 14px calc(20px + env(safe-area-inset-bottom))}
  .intro{font-size:15px;color:var(--silver-dim);line-height:1.5;margin:2px 0 16px}
  .state{color:var(--muted);font-style:italic;padding:20px 4px;text-align:center}
  .card{background:var(--navy-2);border:1px solid var(--line);border-radius:12px;padding:16px 16px 14px;margin:0 0 14px}
  .card .ttl{font-family:var(--head);font-size:19px;font-weight:600;color:var(--silver);letter-spacing:.01em}
  .card .by{font-family:var(--head);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--ice);margin:5px 0 9px}
  .card .blurb{font-size:16px;line-height:1.5;color:var(--silver-dim);white-space:pre-wrap;margin:0 0 14px}
  .imp{width:100%;font-family:var(--head);font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--silver);background:transparent;border:1px solid var(--ice);border-radius:8px;padding:11px 14px;cursor:pointer;transition:border-color .15s,color .15s}
  .imp:hover{border-color:var(--gold);color:var(--gold)}
  .imp:disabled{opacity:.6;cursor:default;border-color:var(--line);color:var(--muted)}
  .hint{font-size:13px;color:var(--muted);font-style:italic;margin-top:8px;text-align:center;min-height:18px}
</style>
</head>
<body>
<div class="wrap">
  <div class="intro">Adventures charted by other LoreMasters. Import a copy to make it your own. The copy is yours to edit; the original stays untouched.</div>
  <div class="state" id="state">Gathering the charted adventures.</div>
  <div id="list"></div>
  <div class="hint" id="hint"></div>
</div>
<script>
  var $=function(id){return document.getElementById(id);};
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"})[c];});}
  function post(m){try{if(window.parent)window.parent.postMessage(m,"*");}catch(e){}}
  function reportHeight(){post({type:"adv-height",height:document.body.scrollHeight});}

  var ITEMS=[];
  function render(){
    var list=$("list"), st=$("state");
    if(!ITEMS.length){
      list.innerHTML="";
      st.style.display=""; st.textContent="No adventures have been charted yet. Be the first to publish one.";
      reportHeight(); return;
    }
    st.style.display="none";
    list.innerHTML=ITEMS.map(function(a){
      var by=a.author?("Charted by "+esc(a.author)):"Charted by an unknown hand";
      return '<div class="card">'
        +'<div class="ttl">'+esc(a.title||"Adventure")+'</div>'
        +'<div class="by">'+by+'</div>'
        +(a.blurb?'<div class="blurb">'+esc(a.blurb)+'</div>':'')
        +'<button type="button" class="imp" data-id="'+esc(a.id)+'">Import a copy</button>'
        +'</div>';
    }).join("");
    list.querySelectorAll(".imp").forEach(function(b){
      b.addEventListener("click",function(){
        var id=b.getAttribute("data-id");
        list.querySelectorAll(".imp").forEach(function(x){x.disabled=true;});
        b.textContent="Opening your copy";
        $("hint").textContent="Carrying a copy into FateWell.";
        post({type:"adv-import",id:id});
      });
    });
    reportHeight();
  }

  window.onmessage=function(ev){
    var d=ev&&ev.data;
    if(!d||typeof d!=="object"||!d.type)return;
    if(d.type==="adv-list"){ ITEMS=Array.isArray(d.items)?d.items:[]; render(); }
  };

  post({type:"adv-ready"});
  window.addEventListener("load",reportHeight);
  window.addEventListener("resize",reportHeight);
</script>
</body>
</html>
