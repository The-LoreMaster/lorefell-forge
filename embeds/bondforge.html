<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>BondForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;600&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
 :root{--navy:#0a0e1a;--panel:#10162a;--panel2:#0d1322;--silver:#dce8ef;--ice:#b8ccd8;--gold:#c9a84c;--muted:#7e8a99;
  --line:rgba(201,168,76,.28);--bad:#d77;--good:#7fb98a;--warn:#cdb05a}
 *{box-sizing:border-box}
 html,body{margin:0;background:var(--navy);color:var(--silver);font-family:"Crimson Pro",Georgia,serif;font-size:17px;line-height:1.5}
 /* FIXED TOP BAR: tabs + step buttons, always visible */
 .topbar{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--navy);border-bottom:1px solid rgba(201,168,76,.18);box-shadow:0 6px 18px rgba(0,0,0,.5)}
 .topinner{max-width:1040px;margin:0 auto;padding:9px 16px 9px}
 .tabs{display:flex;gap:8px;justify-content:center}
 .tab{font-family:"Cinzel",serif;letter-spacing:1px;text-transform:uppercase;font-size:12px;cursor:pointer;
  border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:20px;padding:8px 20px;transition:.2s}
 .tab:hover{color:var(--ice);border-color:rgba(201,168,76,.55)}
 .tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.6);font-weight:600}
 .stepbar{display:flex;gap:5px;margin:9px 0 0}
 .pip{flex:1 1 0;min-width:0;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:"Cinzel",serif;font-size:10px;letter-spacing:0;color:var(--muted);border:1px solid var(--line);border-radius:16px;padding:7px 4px;background:var(--panel2);user-select:none}
 .pip.active{color:var(--navy);background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,.5)} .pip.done{color:var(--ice);border-color:rgba(201,168,76,.5)}
 .pip.nav{cursor:pointer} .pip.nav:hover{border-color:var(--gold);color:var(--silver)} .pip.active.nav:hover{color:var(--navy)}
 .wrap{max-width:1040px;margin:0 auto;padding:0 16px 110px}
 header.top{text-align:center;padding:14px 0 0}
 .title{font-family:"Cinzel Decorative",serif;font-size:28px;letter-spacing:1px;margin:0}
 .title .ember{color:var(--gold)}
 .sub{font-family:"Cinzel",serif;color:var(--muted);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:6px}
 .track{display:flex;align-items:center;justify-content:center;margin:14px auto 4px;max-width:430px;min-height:42px}
 .node{display:flex;flex-direction:column;align-items:center;gap:6px;width:104px}
 .dot{width:16px;height:16px;border-radius:50%;border:1px solid var(--line);background:var(--panel2);transition:.35s}
 .node.on .dot{background:radial-gradient(circle at 50% 40%,#f0d27a,var(--gold));border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,.55)}
 .node small{font-family:"Cinzel",serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
 .node.on small{color:var(--ice)}
 .seg{height:1px;flex:1;background:var(--line);margin-top:-18px}
 .seg.on{background:linear-gradient(90deg,var(--gold),var(--line))}
 main{display:grid;grid-template-columns:1fr;gap:18px;margin-top:14px}
 main.forge{grid-template-columns:1fr}
 @media(min-width:860px){main.forge{grid-template-columns:1fr 380px}}
 .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
 .explain{font-size:14px;color:var(--ice);background:var(--panel2);border:1px solid var(--line);border-left:2px solid var(--gold);border-radius:8px;padding:10px 12px;margin-bottom:14px}
 h2.step{font-family:"Cinzel",serif;font-weight:600;font-size:18px;margin:2px 0 4px}
 .hint{color:var(--muted);font-size:14px;margin:0 0 14px}
 .grid{display:grid;gap:10px;grid-template-columns:1fr}
 @media(min-width:520px){.grid.two{grid-template-columns:1fr 1fr}}
 .card{border:1px solid var(--line);background:var(--panel2);border-radius:8px;padding:12px 13px;cursor:pointer;transition:.18s}
 .card:hover{border-color:rgba(201,168,76,.6)}
 .card .nm{font-family:"Cinzel",serif;font-size:15px}
 .card .ef{color:var(--ice);font-size:14px;margin-top:3px}
 .card .meta{color:var(--muted);font-size:12px;margin-top:6px}
 .card.sel{border-color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold),0 0 14px rgba(201,168,76,.25);background:#131a2e}
 .card.disabled{opacity:.4;cursor:not-allowed} .card.disabled:hover{border-color:var(--line)}
 .pickcount{font-family:"Cinzel",serif;font-size:12px;color:var(--muted);float:right} .pickcount b{color:var(--gold)}
 .tag{display:inline-block;font-family:"Cinzel",serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--navy);background:var(--ice);border-radius:3px;padding:1px 6px;margin-left:6px;vertical-align:middle}
 .tag.track{background:#9ec4a3} .tag.warn{background:var(--warn)} .tag.flag{background:#c4a98a}
 .empty{color:var(--muted);font-style:italic;font-size:14px;padding:6px 2px}
 .trigfixed{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:10px;font-size:15px;color:var(--ice)}
 .trigfixed b{color:var(--silver)}
 select,input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--silver);font-family:"Crimson Pro",serif;font-size:16px;border-radius:7px;padding:10px}
 select:disabled{opacity:.45}
 label.fld{display:block;font-family:"Cinzel",serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:12px 0 4px}
 .uploader{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;width:100%;min-height:120px;border:1px dashed var(--line);border-radius:8px;padding:16px;text-align:center;color:var(--muted);font-size:14px;cursor:pointer;background:var(--panel2)}
 .uploader:hover{border-color:var(--gold);color:var(--ice)} .uploader input{display:none}
 .uploader img{width:104px;height:104px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
 .preview .seal{font-family:"Cinzel",serif;letter-spacing:1px;color:var(--muted);font-size:11px;text-transform:uppercase;text-align:center;border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:10px}
 .pv-portrait{display:block;width:104px;height:104px;object-fit:cover;border-radius:8px;border:1px solid var(--line);margin:0 auto 8px;cursor:zoom-in}
 .pv-name{font-family:"Cinzel Decorative",serif;font-size:20px;text-align:center}
 .pv-arch{text-align:center;color:var(--gold);font-family:"Cinzel",serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
 .pv-role{text-align:center;font-style:italic;color:var(--ice);margin:8px 0 14px;font-size:15px}
 .pv-h{font-family:"Cinzel",serif;font-size:13px;color:var(--gold);letter-spacing:1px;margin:12px 0 4px;border-left:2px solid var(--line);padding-left:8px}
 .pv-h .pv-sub{color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:none;font-family:"Crimson Pro",serif;font-style:italic}
 .pv-line{font-size:15px;margin:3px 0}
 .pv-opt{color:var(--ice);font-size:14px;margin:2px 0;padding-left:14px;position:relative}
 .pv-opt:before{content:"\25C7";color:var(--gold);position:absolute;left:0;font-size:10px;top:5px}
 .pv-or{color:var(--muted);font-size:11px;font-style:italic;margin:1px 0 1px 14px}
 .pv-empty{color:var(--muted);font-style:italic;font-size:14px}
 .charge{font-size:12px;color:var(--muted);margin-top:14px;border-top:1px solid var(--line);padding-top:10px;line-height:1.7}
 .charge b{color:var(--ice);font-weight:500}
 .verdict{margin-top:12px;border-radius:8px;padding:10px 12px;font-size:14px;border:1px solid var(--line);background:var(--panel2)}
 .verdict.ok{border-color:rgba(127,185,138,.5)} .verdict.ok .vh{color:var(--good)}
 .verdict.no{border-color:rgba(221,119,119,.5)} .verdict.no .vh{color:var(--bad)}
 .vh{font-family:"Cinzel",serif;letter-spacing:1px;text-transform:uppercase;font-size:12px}
 .verdict ul{margin:6px 0 0;padding-left:18px} .verdict li{margin:2px 0} .verdict li.warn{color:var(--warn)}
 .nav{position:fixed;left:0;right:0;bottom:0;z-index:50;background:linear-gradient(0deg,var(--navy),rgba(10,14,26,.92));border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:center}
 .nav .inner{max-width:1040px;width:100%;display:flex;gap:10px;justify-content:space-between}
 button.btn{font-family:"Cinzel",serif;letter-spacing:1px;font-size:13px;text-transform:uppercase;border-radius:8px;padding:11px 20px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--silver)}
 button.btn:hover{border-color:rgba(201,168,76,.6)} button.btn.go{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
 button.btn:disabled{opacity:.4;cursor:not-allowed}
 @keyframes forged{0%{box-shadow:0 0 0 rgba(201,168,76,0)}45%{box-shadow:0 0 26px rgba(201,168,76,.85)}100%{box-shadow:0 0 0 rgba(127,185,138,0)}}
 button.btn.go.submitted{background:var(--good);border-color:var(--good);color:var(--navy);animation:forged 1.3s ease}
 .payload{white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--ice);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px;margin-top:12px;max-height:220px;overflow:auto}
 .catitem{border:1px solid var(--line);background:var(--panel2);border-radius:9px;padding:14px 15px;margin-bottom:12px;display:flex;gap:14px}
 .catimg{flex:0 0 72px;width:72px;height:72px;border-radius:8px;border:1px solid var(--line);background:#0c1120;display:flex;align-items:center;justify-content:center;font-family:"Cinzel Decorative",serif;font-size:26px;color:var(--gold);overflow:hidden}
 .catimg.has{cursor:zoom-in} .catimg img{width:100%;height:100%;object-fit:cover}
 .catbody{flex:1;min-width:0}
 .catbody .cn{font-family:"Cinzel Decorative",serif;font-size:18px} .catbody .cw{color:var(--muted);font-size:13px}
 .catbody .cr{font-style:italic;color:var(--ice);margin:4px 0 8px}
 @media(max-width:560px){.catitem{flex-direction:column}.catimg{flex-basis:auto;width:100%;height:180px;font-size:44px}}
 #lightbox{display:none;position:fixed;inset:0;background:rgba(5,8,16,.92);z-index:100;align-items:center;justify-content:center;padding:24px;cursor:zoom-out}
 #lightbox img{max-width:90vw;max-height:90vh;border-radius:10px;border:1px solid var(--line)}

 textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--silver);font-family:"Crimson Pro",serif;font-size:16px;border-radius:7px;padding:10px;min-height:62px;resize:vertical;line-height:1.45}
 .pv-aspectname{font-family:"Cinzel",serif;color:var(--gold);text-align:center;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin:2px 0 10px}
 .catbody .pv-aspectname{text-align:left;margin:6px 0 8px}
 .preview{align-self:start;position:sticky;top:80px}
 .lgfilters{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
 .lgf{font-family:"Cinzel",serif;letter-spacing:1px;text-transform:uppercase;font-size:11px;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:20px;padding:8px 16px}
 .lgf.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:600}
 .lgf.reload{margin-left:auto;color:var(--muted)}
 .lgmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:5px}
 .lgbadge{font-family:"Cinzel",serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.4);border-radius:5px;padding:2px 7px}
 .lgbadge.plain{color:var(--muted);border-color:var(--line)}
 .lgby{color:var(--muted);font-family:"Cinzel",serif;font-size:11px;letter-spacing:.5px}
 .lgactions{margin-top:10px}
 .lgvote{display:inline-flex;align-items:center;gap:7px;font-family:"Cinzel",serif;font-size:12px;letter-spacing:.5px;color:var(--ice);background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 13px;cursor:pointer}
 .lgvote:hover{border-color:rgba(201,168,76,.55)}
 .lgvote .ar{font-size:10px;color:var(--muted)}
 .lgvote .vc{color:var(--silver)}
 .lgvote.voted{color:var(--gold);border-color:rgba(201,168,76,.5)}
 .lgvote.voted .ar{color:var(--gold)}
 .lgvote:disabled{cursor:default}
</style></head>
<body>
<div class="topbar" id="topbar"><div class="topinner">
   <div class="tabs" id="tabs">
     <button class="tab" data-t="catalog">Catalog</button>
     <button class="tab" data-t="forge">Forge</button>
     <button class="tab" data-t="ledger">Ledger</button>
   </div>
</div></div>
<div class="wrap" id="wrap">
 <header class="top"><h1 class="title">Bond<span class="ember">Forge</span></h1>
 <div class="sub">Lorebound Aspects</div></header>
 <div id="view"></div>
</div>
<div id="lightbox" onclick="this.style.display='none'"><img id="lbimg" alt=""></div>
<script>
const DATA={"catalog": [{"name": "The Aerostrix", "world": "Sellenia", "role": "Bends fortune so a Fell's strike lands true.", "archetype": "control", "image": "", "aspectName": "Augury", "initial": "When a Fell makes an attack, that attack is a Lucky Roll.", "branches": ["The target's Evasion becomes 0 against that attack.", "The Fell adds the lorebound owner's Precision to its own for that attack."], "crowns": ["Add a second Lucky die to that attack.", "The target's Evade against that attack is an Unlucky Roll."]}, {"name": "The Alkagoo", "world": "Akkoroka", "role": "Distills a spent spell or ability into a potion or tablet to use later.", "archetype": "negation", "image": "", "aspectName": "Distillation", "initial": "When a target's Tier 1 spell or ability resolves, copy it into the lorebound owner's inventory as a potion for a spell or a tablet for an ability.", "branches": ["Upgrade the capture to any spell or ability of your choosing in the next highest Tier.", "Create a second copy."], "crowns": ["Upgrade the capture to any spell or ability of your choosing in the next highest Tier.", "Create a second copy."]}, {"name": "The Aquafin", "world": "Neriad", "role": "Robs a foe of the Charge its attack would earn.", "archetype": "empower", "image": "", "aspectName": "Siphon", "initial": "When a target lands an attack, prevent it from gaining a Charge.", "branches": ["Give the prevented Charge to the Fell that was attacked.", "Give the prevented Charge to the lorebound owner."], "crowns": ["Remove all additional Charges from the target.", "Restore the lorebound owner to maximum Charges."]}, {"name": "The Boreal", "world": "Mortavia", "role": "Softens a physical blow and turns what it spares into vitality.", "archetype": "mitigation", "image": "", "aspectName": "Succor", "initial": "When a physical attack hits a Fell, prevent Base damage equal to the lorebound owner's Vigor.", "branches": ["Convert the prevented damage into Temporary Vitality for the lorebound owner.", "Convert the prevented damage into Temporary Vitality for the Fell that was hit."], "crowns": ["The prevented damage restores Current Vitality first, and overflow is converted to Temporary Vitality.", "Prevent and convert double the Base damage."]}, {"name": "The Cawmarch", "world": "Mortavia", "role": "Scours an Affliction from a Fell before it sets in.", "archetype": "control", "image": "", "aspectName": "Scour", "initial": "When a Fell gains an Affliction, negate it.", "branches": ["Apply the negated Affliction to the attacker.", "Store the Affliction as a Glyph in the lorebound owner's inventory."], "crowns": ["Apply a copy of the Affliction to every enemy in the lorebound's Mobility range.", "Remove every Affliction from that Fell."]}, {"name": "The Drakelith", "world": "Burhallow", "role": "Turns any roll a Fell makes into a stroke of luck.", "archetype": "control", "image": "", "aspectName": "Boon", "initial": "When a Fell makes any roll, that roll is a Lucky Roll.", "branches": ["Add a second Lucky die to the roll.", "If that roll is a Fellmark, double its effect."], "crowns": ["Every Fell in the lorebound's Mobility range becomes Lucky (its rolls are Lucky Rolls until it takes damage).", "At the end of the battle, every Fell in the lorebound's Mobility range adds a Lucky die to their treasure rolls."]}, {"name": "The Felionis", "world": "Shervinaw", "role": "Sours hostile magic aimed at a Fell so it falters.", "archetype": "mitigation", "image": "", "aspectName": "Aegis", "initial": "When an enemy's spell targets a Fell, the spell is an Unlucky Roll.", "branches": ["If the spell still succeeds, prevent Bonus damage equal to the lorebound owner's Resistance.", "If the spell fails, it resolves on the caster instead."], "crowns": ["If the spell fails, the caster gains the Disrupted Affliction (its spells automatically fail unless a Fellmark is rolled).", "Every enemy in the lorebound's Mobility range gains the Unlucky Affliction (all its rolls become Unlucky)."]}, {"name": "The Grimgrit", "world": "Kwuhara", "role": "Answers a blow against a Fell with one of its own.", "archetype": "retort", "image": "", "aspectName": "Reprisal", "initial": "When a Fell is hit, deal Base damage to the attacker.", "branches": ["Also apply a Combat Effect of your choice to the attacker.", "Deal Bonus damage to the attacker as well."], "crowns": ["Deal the damage to every enemy in the lorebound's Mobility range.", "Double all damage dealt."]}, {"name": "The Hexarach", "world": "Vyrathis", "role": "Makes a Fell's spell take hold without fail.", "archetype": "empower", "image": "", "aspectName": "Weave", "initial": "When a Fell casts a spell, it automatically succeeds.", "branches": ["Swap the spell for another spell of your choosing in the same Tier.", "Duplicate the spell's effect onto another target."], "crowns": ["A second spell of your choosing in the same Tier is also cast and automatically succeeds.", "Spread the spell's effect to any targets you choose within the lorebound's Mobility range."]}, {"name": "The Lumitoad", "world": "Mireth", "role": "Strips a foe of its React the moment it commits to an Act.", "archetype": "control", "image": "", "aspectName": "Forfeit", "initial": "When an enemy uses its Act, it loses its React.", "branches": ["The enemy also gains a Combat Effect at random.", "Give the lost React to a Fell within the lorebound's Mobility range."], "crowns": ["The enemy's Act is negated entirely.", "Apply an Affliction at random to the enemy."]}, {"name": "The Mordel", "world": "Thaloryn", "role": "Shrugs off a blow's bite and sends it back at the striker.", "archetype": "mitigation", "image": "", "aspectName": "Adamant", "initial": "When a physical attack hits a Fell, prevent Bonus damage equal to the lorebound owner's Durability.", "branches": ["Deal the prevented damage to the attacker.", "After the Bonus is prevented, also prevent the Base damage."], "crowns": ["Deal the prevented damage to every enemy in the lorebound's Mobility range.", "Prevent all of the incoming damage instead."]}, {"name": "The Runesteed", "world": "Valoria", "role": "Breaks a Combat Effect off a Fell and wards what comes next.", "archetype": "restoration", "image": "", "aspectName": "Unbind", "initial": "When a Fell gains a Combat Effect, negate it.", "branches": ["Apply the negated Combat Effect to the one who added it.", "Heal the targeted Fell's Vitality equal to the lorebound owner's Vigor."], "crowns": ["Apply Manifested (create a temporary barrier) in an empty space adjacent to the target.", "The targeted Fell may move up to its Mobility."]}, {"name": "The Slipfang", "world": "Avemriol", "role": "Slips a Fell out of an attack's path.", "archetype": "negation", "image": "", "aspectName": "Elude", "initial": "When a Fell rolls to Evade, that roll is a Lucky Roll.", "branches": ["The attacker's Precision becomes 0 for that attack.", "The Fell adds the lorebound owner's Evasion to its own for that attack."], "crowns": ["Add a second Lucky die to that Evade.", "The attacker's attack roll against that Fell is an Unlucky Roll."]}, {"name": "The Solmera", "world": "Oroniel", "role": "Burns any foe that dares strike a Fell.", "archetype": "control", "image": "", "aspectName": "Pyre", "initial": "When an enemy attacks a Fell, deal 1d6 Base damage to the attacker.", "branches": ["Apply a Combat Effect at random to the attacker.", "Deal 1d6 Base damage again."], "crowns": ["Apply the Ignited Affliction to the attacker.", "Apply the Frozen Affliction to the attacker."]}, {"name": "The Thistlewing", "world": "Sylvanoth", "role": "Snares a spent spell or ability into a rune or trap.", "archetype": "retort", "image": "", "aspectName": "Snare", "initial": "When a target's Tier 1 spell or ability resolves, create a rune for the spell or a trap for the ability in the lorebound owner's inventory.", "branches": ["Upgrade the capture to any spell or ability of your choosing in the next highest Tier.", "Create a second copy of the rune or trap."], "crowns": ["Upgrade the capture to any spell or ability of your choosing in the next highest Tier.", "Create a second copy of the rune or trap."]}, {"name": "The Vixel", "world": "Wildermire", "role": "Shifts a targeted Fell out of harm's way.", "archetype": "control", "image": "", "aspectName": "Veer", "initial": "When a Fell is targeted, apply a Movement Combat Effect of your choice to that Fell.", "branches": ["Also apply the Combat Effect to one other target within range.", "That Fell is Restored (gains 1 Charge)."], "crowns": ["Apply a second Combat Effect at random to the enemy targeting the Fell.", "Remove an Affliction at random from the targeted Fell."]}, {"name": "The Worgar", "world": "Elysara", "role": "Reaps a Skyvault Shard from every wound a Fell takes.", "archetype": "restoration", "image": "", "aspectName": "Reap", "initial": "When a Fell takes damage from an attack or spell, manifest a Skyvault Shard in the lorebound owner's inventory.", "branches": ["Heal that Fell's Vitality equal to the lorebound owner's Renewal.", "Manifest a second shard in the targeted Fell's inventory."], "crowns": ["Double the number of shards manifested.", "Destroy any number of Skyvault Shards and deal Base damage to the attacker for each one destroyed."]}, {"name": "The Xenophis", "world": "Crixalis", "role": "Wraps a wounded Fell in shadow, beyond an enemy's sight.", "archetype": "control", "image": "", "aspectName": "Umbra", "initial": "When a Fell takes damage from any source, it becomes Obscured (enemies cannot see or target it until it deals damage or the end of its next round).", "branches": ["Apply a Movement Combat Effect of your choice to that Fell.", "Deal the damage taken back to the source."], "crowns": ["Also apply Obscured to another Fell within the lorebound's Mobility range.", "Apply a second Movement Combat Effect to the Fell."]}]};

const $=id=>document.getElementById(id);
const S={tab:"catalog"};
const F={name:"",world:"",role:"",aspectName:"",initial:"",b1:"",b2:"",c1:"",c2:"",creator:"",image:""};
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const av=s=>(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;");
function openImg(src){if(!src)return;$("lbimg").src=src;$("lightbox").style.display="flex";}
function fitTop(){const tb=$("topbar");if(tb)$("wrap").style.paddingTop=(tb.offsetHeight+12)+"px";}
window.addEventListener("resize",fitTop);
function tabBtns(){document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.t===S.tab));}
function optsHTML(a,b){if(a||b){let h="";if(a)h+='<div class="pv-opt">'+esc(a)+'</div>';if(a&&b)h+='<div class="pv-or">or</div>';if(b)h+='<div class="pv-opt">'+esc(b)+'</div>';return h;}return '<div class="pv-empty">Two options.</div>';}

function renderCatalog(){
 S.tab="catalog";tabBtns();
 let h='<main><section class="panel"><div class="explain">The canon lorebounds. Each carries one named Aspect: an always-active Initial, two Branch options, and two Crown options. Whoever bonds the creature keeps one Branch at Companion and one Crown at Corsair, never both. Tap a portrait to enlarge it.</div>';
 DATA.catalog.forEach(c=>{
  const thumb=c.image?'<img src="'+c.image+'" alt="" onclick="openImg(this.src)">':(c.name.replace("The ","").charAt(0));
  h+='<div class="catitem"><div class="catimg'+(c.image?' has':'')+'">'+thumb+'</div><div class="catbody">';
  h+='<div class="cn">'+esc(c.name)+' <span class="cw">'+esc(c.world||"")+'</span></div>';
  h+='<div class="cr">'+esc(c.role||"")+'</div>';
  if(c.aspectName)h+='<div class="pv-aspectname">Aspect \u00B7 '+esc(c.aspectName)+'</div>';
  h+='<div class="pv-h">Initial <span class="pv-sub">always active</span></div><div class="pv-line">'+esc(c.initial)+'</div>';
  h+='<div class="pv-h">Branching <span class="pv-sub">keep one</span></div>'+optsHTML(c.branches[0],c.branches[1]);
  h+='<div class="pv-h">Crown <span class="pv-sub">keep one</span></div>'+optsHTML(c.crowns[0],c.crowns[1]);
  h+='</div></div>';
 });
 h+='</section></main>';$("view").innerHTML=h;fitTop();
}

function fld(label,id,val,ph,area){
 const inp=area?('<textarea id="'+id+'" placeholder="'+av(ph)+'">'+esc(val)+'</textarea>'):('<input type="text" id="'+id+'" placeholder="'+av(ph)+'" value="'+av(val)+'">');
 return '<label class="fld">'+label+'</label>'+inp;
}
function renderForge(){
 S.tab="forge";tabBtns();
 let h='<main class="forge"><section class="panel">';
 h+='<div class="explain">Author your own lorebound. Write its always-active <b>Initial Aspect</b>, then <b>two Branch options</b> and <b>two Crown options</b>. Whoever bonds the creature keeps one Branch and one Crown as it grows, never both. Submitting routes it to LoreForge for the canon vote.</div>';
 h+=fld("Lorebound name","f_name",F.name,"The ...");
 h+=fld("World","f_world",F.world,"Home world");
 h+=fld("Role line","f_role",F.role,"One line on what it does for the party");
 h+='<label class="fld">Portrait</label><label class="uploader" id="f_up">'+(F.image?'<img src="'+F.image+'" alt=""><div>Change image</div>':'<div>Tap to upload an image</div>')+'<input type="file" id="f_img" accept="image/*"></label>';
 h+=fld("Aspect name","f_aspect",F.aspectName,"Name this React");
 h+=fld("Initial Aspect","f_initial",F.initial,"Always active. When ..., ...",true);
 h+=fld("Branching Aspect, option one","f_b1",F.b1,"A player may keep this",true);
 h+=fld("Branching Aspect, option two","f_b2",F.b2,"or this",true);
 h+=fld("Crown Aspect, option one","f_c1",F.c1,"A player may keep this",true);
 h+=fld("Crown Aspect, option two","f_c2",F.c2,"or this",true);
 h+=fld("Your name","f_creator",F.creator,"Credited as the author");
 h+='<button class="btn go" id="f_submit" style="width:100%;margin-top:16px">Submit for canon</button><div id="f_out"></div>';
 h+='</section><aside class="panel preview" id="preview"></aside></main>';
 $("view").innerHTML=h;
 const bind=(id,key,prev)=>{const el=$(id);if(el)el.oninput=e=>{F[key]=e.target.value;if(prev)$("preview").innerHTML=formPreview();};};
 bind("f_name","name",1);bind("f_world","world",1);bind("f_role","role",1);bind("f_aspect","aspectName",1);
 bind("f_initial","initial",1);bind("f_b1","b1",1);bind("f_b2","b2",1);bind("f_c1","c1",1);bind("f_c2","c2",1);bind("f_creator","creator",0);
 $("f_img").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{F.image=ev.target.result;renderForge();};r.readAsDataURL(f);};
 $("f_submit").onclick=submitForge;
 $("preview").innerHTML=formPreview();fitTop();
}
function formPreview(){
 let h='<div class="seal">Your Lorebound</div>';
 if(F.image)h+='<img class="pv-portrait" src="'+F.image+'" alt="" onclick="openImg(this.src)">';
 h+='<div class="pv-name">'+(esc(F.name)||"Unnamed lorebound")+'</div>';
 h+='<div class="cw" style="text-align:center;display:block">'+(esc(F.world)||"&nbsp;")+'</div>';
 h+='<div class="pv-role">'+(esc(F.role)||"a support React")+'</div>';
 if(F.aspectName)h+='<div class="pv-aspectname">Aspect \u00B7 '+esc(F.aspectName)+'</div>';
 h+='<div class="pv-h">Initial <span class="pv-sub">always active</span></div>';
 h+=F.initial?'<div class="pv-line">'+esc(F.initial)+'</div>':'<div class="pv-empty">Describe the always-active React.</div>';
 h+='<div class="pv-h">Branching <span class="pv-sub">a player keeps one</span></div>'+optsHTML(F.b1,F.b2);
 h+='<div class="pv-h">Crown <span class="pv-sub">a player keeps one</span></div>'+optsHTML(F.c1,F.c2);
 h+='<div class="charge"><b>Charge 1</b> Initial only \u00B7 <b>Charge 2</b> Initial plus the kept Branch \u00B7 <b>Charge 3</b> plus the kept Crown</div>';
 return h;
}
function submitForge(){
 if(!(F.name||"").trim()||!(F.initial||"").trim()){const o=$("f_out");if(o)o.innerHTML='<div class="payload" style="color:var(--warn)">A name and an Initial Aspect are needed.</div>';return;}
 post({type:"BOND_SUBMIT",payload:{name:F.name||"",world:F.world||"",role:F.role||"",aspectName:F.aspectName||"",initial:F.initial||"",branches:[F.b1||"",F.b2||""],crowns:[F.c1||"",F.c2||""],creator:F.creator||"",image:F.image||""}});
 const b=$("f_submit");if(b){b.classList.add("submitted");b.textContent="Submitted to LoreForge \u2713";b.disabled=true;}
 const o=$("f_out");if(o)o.innerHTML='<div class="payload">Sent to LoreForge for the canon vote.</div>';
}
/* ---------- ledger ---------- */
let lgScope="all", lgLoaded=false, lgItems=[];
function loadLedger(){const el=$("lglist");if(el)el.innerHTML='<div class="empty">Loading the ledger.</div>';post({type:"BOND_LOAD_LEDGER",payload:{scope:lgScope}});}
function badgeOf(st){return ({canon:["Canon","Folded into the lorebounds."],voting:["In Vote","The community is weighing in."],submitted:["Submitted","Waiting for the vote."],declined:["Declined","Set aside for now."]})[st]||["Draft","A work in progress."];}
function renderLedger(){
 S.tab="ledger";tabBtns();
 let h='<main><section class="panel"><div class="explain">Every lorebound put forward. Read one, lend it your voice, or check on your own.</div>';
 h+='<div class="lgfilters"><button class="lgf'+(lgScope==="all"?" active":"")+'" data-scope="all">All</button><button class="lgf'+(lgScope==="canon"?" active":"")+'" data-scope="canon">Canon</button><button class="lgf'+(lgScope==="mine"?" active":"")+'" data-scope="mine">Mine</button><button class="lgf reload" id="lgReload">Reload</button></div>';
 h+='<div id="lglist"></div></section></main>';$("view").innerHTML=h;
 document.querySelectorAll(".lgf[data-scope]").forEach(b=>b.onclick=()=>{lgScope=b.dataset.scope;document.querySelectorAll(".lgf[data-scope]").forEach(x=>x.classList.toggle("active",x===b));loadLedger();});
 const r=$("lgReload");if(r)r.onclick=loadLedger;
 if(!lgLoaded){lgLoaded=true;loadLedger();}else renderLgList(lgItems);
 fitTop();
}
function renderLgList(items){
 lgItems=items||[];const el=$("lglist");if(!el)return;
 if(!lgItems.length){el.innerHTML='<div class="empty">'+(lgScope==="mine"?"You have not put one forward.":"Be the first to put one forward.")+'</div>';fitTop();return;}
 el.innerHTML=lgItems.map(it=>{
  let m={};try{m=(JSON.parse(it.payload||"{}").meta)||{};}catch(e){}
  const b=badgeOf(it.canonStatus),canon=it.canonStatus==="canon";
  const br=m.branches||[],cr=m.crowns||[];const by=m.creator||it.creatorName||"";
  const thumb=it.imageUrl?'<img src="'+av(it.imageUrl)+'" alt="" onclick="openImg(this.src)">':esc((it.creationName||"").replace("The ","").charAt(0));
  return '<div class="catitem"><div class="catimg'+(it.imageUrl?" has":"")+'">'+thumb+'</div><div class="catbody">'
   +'<div class="cn">'+esc(it.creationName)+' <span class="cw">'+esc(m.world||"")+'</span></div>'
   +'<div class="lgmeta"><span class="lgbadge'+(canon?"":" plain")+'">'+b[0]+'</span>'+(by?'<span class="lgby">by '+esc(by)+'</span>':"")+'</div>'
   +(m.role?'<div class="cr">'+esc(m.role)+'</div>':"")
   +(m.aspectName?'<div class="pv-aspectname">Aspect \u00B7 '+esc(m.aspectName)+'</div>':"")
   +'<div class="pv-h">Initial <span class="pv-sub">always active</span></div><div class="pv-line">'+esc(it.shorthand||m.initial||"")+'</div>'
   +'<div class="pv-h">Branching <span class="pv-sub">keep one</span></div>'+optsHTML(br[0],br[1])
   +'<div class="pv-h">Crown <span class="pv-sub">keep one</span></div>'+optsHTML(cr[0],cr[1])
   +'<div class="lgactions"><button type="button" class="lgvote" data-id="'+av(it.creationId)+'"><span class="ar">\u25B2</span> Vote <span class="vc">'+(it.voteCount||0)+'</span></button></div>'
   +'</div></div>';
 }).join("");
 el.querySelectorAll(".lgvote").forEach(bn=>bn.addEventListener("click",()=>castVote(bn)));fitTop();
}
function castVote(btn){if(!btn||btn.disabled)return;const id=btn.getAttribute("data-id");if(!id)return;btn.disabled=true;post({type:"BOND_VOTE",payload:{creationId:id}});}
function applyVoteResult(m){
 if(!m||!m.creationId)return;let btn=null;document.querySelectorAll(".lgvote").forEach(b=>{if(b.getAttribute("data-id")===m.creationId)btn=b;});
 if(m.ok){if(btn){if(m.voteCount!=null){const c=btn.querySelector(".vc");if(c)c.textContent=m.voteCount;}btn.classList.add("voted");btn.disabled=true;}lgItems.forEach(it=>{if(it.creationId===m.creationId&&m.voteCount!=null)it.voteCount=m.voteCount;});}
 else if(btn){btn.disabled=false;}
}
/* ---------- bridge ---------- */
function post(msg){try{if(window.parent)window.parent.postMessage(msg,"*");}catch(e){}}
function reportHeight(){try{if(window.parent)window.parent.postMessage({type:"FORGE_HEIGHT",height:document.body.scrollHeight},"*");}catch(e){}}
try{new ResizeObserver(reportHeight).observe(document.body);}catch(e){}
window.onmessage=function(e){
 const m=e&&e.data;if(!m||typeof m!=="object")return;
 if(m.type==="BOND_LEDGER_RESULT"){renderLgList(m.items||[]);return;}
 if(m.type==="BOND_VOTE_RESULT"){applyVoteResult(m);return;}
 if(m.type==="BOND_SUBMIT_RESULT"){
  if(!m.ok){const b=$("f_submit");if(b){b.classList.remove("submitted");b.disabled=false;b.textContent="Submit for canon";}const o=$("f_out");if(o)o.innerHTML='<div class="payload" style="color:var(--warn)">'+esc((m.errors&&m.errors[0])||"That did not save. Try again.")+'</div>';}
  else{lgLoaded=false;}
  return;
 }
};
function render(){if(S.tab==="forge")renderForge();else if(S.tab==="ledger")renderLedger();else renderCatalog();}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;render();});
render();window.addEventListener("load",fitTop);
</script></body></html>
