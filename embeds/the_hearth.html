<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Hearth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@500;600;700&family=Crimson+Pro:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a0e1a; --panel:#10162a; --panel2:#0c1120;
  --silver:#dce8ef; --ice:#b8ccd8; --gold:#c9a84c; --muted:#7e8a99;
  --ember:#d98a5f; --coal:#c96a5a;
  --line:rgba(184,204,216,.15); --goldline:rgba(201,168,76,.38);
  --emberline:rgba(217,138,95,.35);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--navy); color:var(--silver); font-family:'Crimson Pro',serif; }
button{ font:inherit; color:inherit; background:none; border:none; cursor:pointer; text-align:left; }

.wrap{ max-width:900px; margin:0 auto; padding:22px 16px 46px; position:relative; }

/* ---------- mast ---------- */
.mast{ text-align:center; margin-bottom:4px; }
.mast h1{ font-family:'Cinzel Decorative',serif; font-weight:700; font-size:1.9rem; letter-spacing:.06em; }
.mast h1 .h{ color:var(--gold); }
.mast .sub{ color:var(--ice); font-size:1rem; margin-top:2px; }

/* ---------- the fire ---------- */
.fire{ position:relative; margin:22px auto 8px; padding:26px 16px 20px; border:1px solid var(--goldline); border-radius:16px;
  background:linear-gradient(180deg, rgba(217,138,95,.05), rgba(10,14,26,0) 55%), linear-gradient(180deg, var(--panel), var(--panel2));
  overflow:hidden; }
.fire::before{ content:''; position:absolute; left:50%; top:-40px; width:340px; height:180px; transform:translateX(-50%);
  background:radial-gradient(closest-side, rgba(217,138,95,.22), rgba(217,138,95,0) 70%);
  pointer-events:none; }
@media (prefers-reduced-motion: no-preference){
  .fire::before{ animation:breathe 7s ease-in-out infinite; }
  @keyframes breathe{ 50%{ opacity:.55; transform:translateX(-50%) scale(1.08); } }
}
.fire-k{ position:relative; text-align:center; font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.26em; text-transform:uppercase; color:var(--ember); margin-bottom:14px; }
.crown{ position:relative; display:grid; grid-template-columns:1fr; gap:10px; }
@media (min-width:560px){ .crown{ grid-template-columns:1fr 1fr; } }

/* embers drifting from the fire */
.mote{ position:absolute; bottom:8px; width:4px; height:4px; border-radius:50%; background:var(--ember); opacity:0; pointer-events:none; }
@media (prefers-reduced-motion: no-preference){
  .mote{ animation:rise linear infinite; }
  .m1{ left:30%; animation-duration:11s; animation-delay:1s; }
  .m2{ left:52%; animation-duration:14s; animation-delay:5s; }
  .m3{ left:68%; animation-duration:12s; animation-delay:9s; }
  @keyframes rise{
    0%{ transform:translateY(0); opacity:0; }
    8%{ opacity:.5; }
    60%{ opacity:.22; }
    100%{ transform:translateY(-150px); opacity:0; }
  }
}

/* ---------- tool tiles ---------- */
.tool{ position:relative; display:flex; align-items:center; gap:13px; width:100%;
  border:1px solid var(--line); border-radius:12px; padding:13px 14px;
  background:linear-gradient(180deg, rgba(16,22,42,.9), rgba(12,17,32,.9));
  transition:border-color .25s ease, transform .18s ease, box-shadow .25s ease; }
.tool:hover{ border-color:var(--emberline); transform:translateY(-1px); box-shadow:0 4px 18px rgba(0,0,0,.35); }
.tool:active{ transform:translateY(0); }
.tool.firing{ border-color:var(--ember); box-shadow:0 0 0 1px rgba(217,138,95,.35), 0 0 22px rgba(217,138,95,.22); }

/* the touchmark: a smith's stamp per tool */
.mark{ flex:none; width:44px; height:44px; display:grid; place-items:center;
  border:1px solid var(--goldline); border-radius:9px; color:var(--gold);
  background:radial-gradient(circle at 35% 30%, rgba(201,168,76,.12), transparent 65%); }
.mark svg{ width:100%; height:100%; display:block; }
.crown .mark{ width:52px; height:52px; border-color:var(--emberline); color:var(--ember);
  background:radial-gradient(circle at 35% 30%, rgba(217,138,95,.16), transparent 65%); }
.t-name{ font-family:'Cinzel',serif; font-weight:600; font-size:1.02rem; color:var(--silver); display:block; }
.t-desc{ font-size:.88rem; color:var(--ice); display:block; margin-top:1px; }
.t-go{ margin-left:auto; flex:none; color:var(--muted); font-size:1.05rem; transition:color .2s ease, transform .2s ease; }
.tool:hover .t-go{ color:var(--ember); transform:translateX(2px); }

/* ---------- racks ---------- */
.rack{ margin-top:22px; }
.rack-k{ display:flex; align-items:center; gap:10px; font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.22em; text-transform:uppercase; color:var(--ice); margin-bottom:9px; }
.rack-k::after{ content:''; flex:1; height:1px; background:var(--line); }
.rack .grid{ display:grid; grid-template-columns:1fr; gap:9px; }
@media (min-width:640px){ .rack .grid{ grid-template-columns:1fr 1fr; } }

/* entry: sections settle in once */
@media (prefers-reduced-motion: no-preference){
  .settle{ animation:settle .5s ease both; }
  .settle.d1{ animation-delay:.08s; } .settle.d2{ animation-delay:.16s; } .settle.d3{ animation-delay:.24s; }
  @keyframes settle{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:none; } }
}

.status{ position:fixed; left:50%; bottom:16px; transform:translateX(-50%);
  background:rgba(10,14,26,.95); border:1px solid var(--emberline); color:var(--silver);
  border-radius:9px; padding:8px 16px; font-size:.9rem; opacity:0; transition:opacity .25s ease; pointer-events:none; }
.status.show{ opacity:1; }

.foot{ text-align:center; color:var(--muted); font-size:.82rem; margin-top:26px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="mast settle">
    <h1>The <span class="h">Hearth</span></h1>
    <div class="sub">The fires are lit. Choose your work.</div>
  </div>

  <div class="fire settle d1" id="fire">
    <span class="mote m1"></span><span class="mote m2"></span><span class="mote m3"></span>
    <div class="fire-k">At the fire</div>
    <div class="crown" id="crown"></div>
  </div>

  <div class="rack settle d2">
    <div class="rack-k">The bench, for players</div>
    <div class="grid" id="benchGrid"></div>
  </div>

  <div class="rack settle d3">
    <div class="rack-k">The wall, for LoreMasters</div>
    <div class="grid" id="wallGrid"></div>
  </div>

  <div class="foot">Every tool bears its maker&#8217;s mark. Strike one to begin.</div>
</div>
<div class="status" id="status"></div>

<script>
var CUT = "#10162a";
var ICONS = {
  FellGlass: '<svg viewBox="0 0 96 96" aria-hidden="true"><rect x="32" y="14" width="32" height="62" rx="2" fill="currentColor"/><path d="M48 12 L42 36 L54 51 L45 80" fill="none" stroke="'+"#10162a"+'" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  ThreadSpire: '<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M48 14 L60 40 L48 34 L36 40 Z" fill="currentColor"/><path d="M48 30 L66 62 L48 52 L30 62 Z" fill="currentColor"/><path d="M48 48 L72 82 L48 70 L24 82 Z" fill="currentColor"/><circle cx="48" cy="22" r="3" fill="'+"#10162a"+'"/></svg>',
  FateWell: '<svg viewBox="0 0 96 96" aria-hidden="true"><circle cx="48" cy="48" r="26" fill="currentColor"/><circle cx="48" cy="48" r="17" fill="none" stroke="'+"#10162a"+'" stroke-width="3"/><circle cx="48" cy="48" r="8.5" fill="none" stroke="'+"#10162a"+'" stroke-width="3"/><circle cx="48" cy="48" r="2.6" fill="'+"#10162a"+'"/></svg>',
  FellForge: '<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M24 32 H62 Q77 34 73 44 L57 46 L60 55 H36 L39 46 L27 43 Z" fill="currentColor"/><path d="M32 60 H64 L70 70 H26 Z" fill="currentColor"/></svg>',
  SigilForge: '<svg viewBox="0 0 96 96" aria-hidden="true"><circle cx="48" cy="48" r="26" fill="currentColor"/><path d="M41 30 L59 43 L38 54 L56 68" fill="none" stroke="'+"#10162a"+'" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  ShardForge: '<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M33 22 H63 L74 35 L48 76 L22 35 Z" fill="currentColor"/><g fill="none" stroke="'+"#10162a"+'" stroke-width="2"><path d="M22 35 H74"/><path d="M33 22 L40 35 M63 22 L56 35"/><path d="M40 35 L48 76 M56 35 L48 76"/></g></svg>',
  BondForge: '<svg viewBox="0 0 96 96" aria-hidden="true"><circle cx="39" cy="48" r="15" fill="none" stroke="currentColor" stroke-width="6"/><circle cx="57" cy="48" r="15" fill="none" stroke="currentColor" stroke-width="6"/><path d="M45 38 A15 15 0 0 1 51 38" fill="none" stroke="'+"#10162a"+'" stroke-width="8"/><path d="M45 38 A15 15 0 0 1 49 36.4" fill="none" stroke="currentColor" stroke-width="6"/></svg>',
  BrandForge: '<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M48 14 Q60 28 48 42 Q36 28 48 14 Z" fill="currentColor"/><circle cx="48" cy="60" r="14" fill="currentColor"/><circle cx="48" cy="60" r="4.6" fill="'+"#10162a"+'"/></svg>',
  LoreForge: '<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M47 32 Q32 23 21 31 V63 Q33 57 47 66 Z" fill="currentColor"/><path d="M49 32 Q64 23 75 31 V63 Q63 57 49 66 Z" fill="currentColor"/></svg>',
  FoeForge: '<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M34 52 Q34 27 48 27 Q62 27 62 52 Q62 61 56 63 L54 70 H42 L40 63 Q34 61 34 52 Z" fill="currentColor"/><path d="M35 41 Q22 34 24 20 Q31 30 38 34 Z" fill="currentColor"/><path d="M61 41 Q74 34 72 20 Q65 30 58 34 Z" fill="currentColor"/><circle cx="42.5" cy="47" r="3.8" fill="'+"#10162a"+'"/><circle cx="53.5" cy="47" r="3.8" fill="'+"#10162a"+'"/><path d="M48 54 L45.5 60 H50.5 Z" fill="'+"#10162a"+'"/></svg>',
  RelicForge: '<svg viewBox="0 0 96 96" aria-hidden="true"><path d="M48 24 L62 48 L48 72 L34 48 Z" fill="currentColor"/><path d="M48 24 V72 M34 48 H62" stroke="'+"#10162a"+'" stroke-width="2.2" fill="none"/><path d="M34 48 Q22 48 24 35" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/><path d="M62 48 Q74 48 72 35" fill="none" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/></svg>',
  SagaForge: '<svg viewBox="0 0 96 96" aria-hidden="true"><rect x="34" y="20" width="4.5" height="56" rx="2" fill="currentColor"/><path d="M38.5 24 H68 L60 34 L68 44 H38.5 Z" fill="currentColor"/><path d="M45 30.5 H58 M45 37 H54" stroke="'+"#10162a"+'" stroke-width="2.4" stroke-linecap="round"/><path d="M31 76 Q36 71 41 76" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/></svg>'
};

var CROWN = [
  { label:"FellGlass",  desc:"Your characters, your table", mark:"FG", route:"/the-fellglass" },
  { label:"ThreadSpire", desc:"Where your saga sits in the Sphere", mark:"TS", route:"/the-threadspire" },
  { label:"FateWell",   desc:"Your sagas, your foes",       mark:"FW", route:"/the-fatewell" }
];
var BENCH = [
  { label:"FellForge",  desc:"Forge a Fell",          mark:"F", route:"/the-fellforge" },
  { label:"SigilForge", desc:"Abilities and spells",  mark:"S", route:"/the-sigilforge" },
  { label:"ShardForge", desc:"Infuse and augment",    mark:"Sh", route:"/the-shardforge" },
  { label:"BondForge",  desc:"Shape a Lorebound",     mark:"B", route:"/the-bondforge" },
  { label:"BrandForge", desc:"Author a lineage",      mark:"Br", route:"/the-brandforge" },
  { label:"LoreForge",  desc:"Vote the canon",        mark:"L", route:"/the-loreforge" }
];
var WALL = [
  { label:"FoeForge",   desc:"Build adversaries",     mark:"Fo", route:"/the-foeforge" },
  { label:"RelicForge", desc:"Items and remnants",    mark:"R", route:"/the-relicforge" },
  { label:"SagaForge",  desc:"Forge an adventure",    mark:"Sa", route:"/the-sagaforge" }
];

var statusTimer;
function setStatus(label){
  var el=document.getElementById("status");
  el.textContent="Stoking "+label;
  el.classList.add("show");
  clearTimeout(statusTimer);
  statusTimer=setTimeout(function(){ el.classList.remove("show"); }, 1500);
}

function go(btn, item){
  btn.classList.add("firing");
  setTimeout(function(){ btn.classList.remove("firing"); }, 450);
  setStatus(item.label);
  if(window.parent && window.parent!==window){
    window.parent.postMessage({ type:"HEARTH_NAV", route:item.route, label:item.label }, "*");
  }
}

function tool(item){
  var b=document.createElement("button");
  b.className="tool";
  b.setAttribute("aria-label","Open "+item.label);
  b.innerHTML='<span class="mark">'+(ICONS[item.label]||item.mark)+'</span>'
    +'<span><span class="t-name">'+item.label+'</span>'
    +'<span class="t-desc">'+item.desc+'</span></span>'
    +'<span class="t-go">&#8250;</span>';
  b.addEventListener("click", function(){ go(b, item); });
  return b;
}

function fill(id, list){
  var host=document.getElementById(id);
  list.forEach(function(item){ host.appendChild(tool(item)); });
}
fill("crown", CROWN);
fill("benchGrid", BENCH);
fill("wallGrid", WALL);
</script>
</body>
</html>
