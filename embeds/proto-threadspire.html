<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ThreadSpire Shell</title>
<style>
:root{ --navy:#0a0e1a; --panel:#10162a; --panel2:#141b33; --line:#2a3352; --gold:#c9a84c; --silver:#dce8ef; --ice:#b8ccd8; --muted:#7e8a99; --danger:#a32d2d; --pink:#d4537e; }
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{ background:var(--navy); color:var(--silver); font-family:'Crimson Pro',Georgia,serif; overflow:hidden; }
button{ font:inherit; color:inherit; background:none; border:none; cursor:pointer; }

#stage{ position:fixed; inset:0; }
#map{ position:absolute; inset:0; background:var(--navy); overflow:hidden; touch-action:none; cursor:grab; }
#map.panning{ cursor:grabbing; }
#mapLayer{ position:absolute; left:0; top:0; transform-origin:0 0; will-change:transform; }
#mapArt{ position:absolute; left:0; top:0; background:
  radial-gradient(circle at 28% 34%, #7d90a4 0 16%, transparent 16.4%),
  radial-gradient(circle at 72% 66%, #5a6a7b 0 20%, transparent 20.4%),
  radial-gradient(circle at 54% 18%, #6f8296 0 11%, transparent 11.4%), #66788a; }
#mapArt video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
#grid{ position:absolute; left:0; top:0; pointer-events:none; }
.token{ position:absolute; border-radius:50%; border:2px solid rgba(0,0,0,.4); display:flex; align-items:center;
  justify-content:center; font-family:Cinzel,serif; color:#fff; user-select:none; touch-action:none; }
.token.mine{ border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,.6); cursor:grab; }
.token.sel{ box-shadow:0 0 0 3px rgba(255,255,255,.85), 0 0 22px 7px rgba(201,168,76,.65); z-index:5; }
#tokmenu{ position:fixed; z-index:58; width:184px; background:rgba(10,14,26,.96); border:1.5px solid var(--gold); border-radius:8px; padding:9px; display:none; }
#tokmenu.open{ display:block; }
#tokmenu .tmh{ font-family:Cinzel,serif; font-size:.62rem; letter-spacing:.14em; color:var(--gold); margin-bottom:7px; }
#tokmenu input{ width:100%; background:#0b1020; border:1px solid var(--line); border-radius:5px; color:var(--silver); font:inherit; font-size:.78rem; padding:5px 7px; margin-bottom:7px; }
#tokmenu input:focus{ outline:none; border-color:var(--gold); }
#tokmenu .tmsz{ display:flex; gap:5px; }
#tokmenu .tmsz button{ flex:1; border:1px solid var(--line); border-radius:5px; font-family:Cinzel,serif; font-size:.68rem; color:var(--ice); padding:6px 0; }
#tokmenu .tmsz button.on{ background:#1e3f8f; border-color:#9fc3ff; color:#fff; }
.token.lm-drag{ cursor:grab; }
.token.p{ background:#37548d; } .token.foe{ background:var(--danger); } .token.npc{ background:#5f5e5a; } .token.asset{ background:#3d6b58; }

.frame{ position:fixed; inset:0; pointer-events:none; border:14px solid transparent; border-image:linear-gradient(160deg,#171208,#57431a,#171208) 1; }

#log{ position:fixed; top:16px; right:16px; width:250px; max-height:220px; overflow-y:auto; background:rgba(10,14,26,.92); border:1px solid var(--gold); border-radius:8px; padding:8px 10px; font-size:.82rem; line-height:1.45; }
#log div{ color:var(--gold); } #log div b{ color:var(--ice); font-weight:600; }

#rail{ position:fixed; right:16px; top:250px; display:flex; flex-direction:column; gap:10px; width:200px; }
.plaque{ background:var(--panel); border:1.5px solid var(--gold); border-radius:6px; padding:11px 14px; font-family:Cinzel,serif; letter-spacing:.1em; font-size:.85rem; color:var(--silver); text-align:left; transition:background .15s; }
.plaque .ico{ display:none; }
.plaque:hover{ background:var(--panel2); }
.plaque.lit{ background:#1e3f8f; border-color:#9fc3ff; color:#fff; box-shadow:0 0 14px rgba(60,110,220,.55); }

#hud{ position:fixed; right:16px; bottom:96px; width:200px; background:var(--panel); border:1.5px solid var(--gold); border-radius:8px; padding:10px; }
#hud .prow{ display:flex; align-items:center; gap:10px; cursor:pointer; }
#hud .portrait{ width:56px; height:56px; border-radius:8px; border:2px solid var(--gold); background:#37548d center/cover; flex:none; }
#hud .pname{ font-family:Cinzel,serif; font-size:.9rem; }
#hud .psub{ font-size:.78rem; color:var(--ice); }
#hud .gems{ display:flex; gap:10px; margin-top:10px; align-items:center; }
.gem{ width:44px; height:44px; transform:rotate(45deg); border:2px solid var(--gold); background:#1c4f8f; display:flex; align-items:center; justify-content:center; border-radius:6px; flex:none; }
.gem span{ transform:rotate(-45deg); font-family:Cinzel,serif; font-size:.85rem; color:#fff; }
.gem.lp{ background:#26215c; }
@keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(212,83,126,.7);} 50%{ box-shadow:0 0 16px 5px rgba(212,83,126,.45);} }

/* placeholder Fellmark. Joel's symbol drops in here as art, the behaviour stays. */
.fmark{ position:fixed; right:16px; bottom:16px; width:66px; height:66px; border-radius:50%; }
.fmark .fmshape{ fill:var(--panel); stroke:var(--gold); stroke-width:2.5; }
.fmark .fmrune{ fill:none; stroke:var(--gold); stroke-width:2.5; stroke-linecap:round; }
.fmark.combat{ animation:pulse 1.1s ease-in-out infinite; cursor:pointer; }
.fmark.combat .fmshape{ fill:var(--pink); stroke:#ed93b1; }
.fmark.combat .fmrune{ stroke:#fff; }
#fellmarkM{ display:none; }

#win{ position:fixed; top:60px; right:250px; width:min(720px,55vw); bottom:60px; background:var(--panel); border:2px solid var(--gold); border-radius:10px; display:none; flex-direction:column; }
#win.open{ display:flex; }
#win .whead{ display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid var(--line); }
#win .wx{ width:28px; height:28px; border:1.5px solid var(--gold); border-radius:50%; color:var(--gold); font-size:1rem; line-height:1; flex:none; }
#win .wtitle{ font-family:Cinzel,serif; letter-spacing:.14em; font-size:.95rem; }
#win .wbody{ flex:1; overflow-y:auto; padding:16px; font-size:.95rem; line-height:1.6; }
.stub{ height:12px; background:var(--panel2); border-radius:4px; margin:10px 0; }
.pill{ display:inline-block; border:1px solid var(--gold); border-radius:14px; padding:3px 12px; font-size:.82rem; margin:0 6px 6px 0; }
.pill.dim{ border-color:var(--line); color:var(--ice); }
.sendbtn{ display:block; width:100%; background:#1e3f8f; border:1px solid #9fc3ff; border-radius:8px; color:#fff; font-family:Cinzel,serif; letter-spacing:.08em; padding:10px 0; margin-top:14px; }

.lchat{ display:flex; gap:6px; align-items:center; padding-bottom:7px; border-bottom:1px solid var(--line); margin-bottom:7px; }
.lchat input{ flex:1; min-width:0; background:#0b1020; border:1px solid var(--line); border-radius:5px; color:var(--silver); font:inherit; font-size:.8rem; padding:5px 7px; }
.lchat input:focus{ outline:none; border-color:var(--gold); }
.lchat button{ border:1px solid var(--gold); border-radius:5px; color:var(--gold); font-family:Cinzel,serif; font-size:.66rem; letter-spacing:.08em; padding:5px 7px; flex:none; }
.logstream .le{ margin:3px 0; }
.logstream .le.sys{ color:var(--gold); }
.logstream .le.say{ color:var(--silver); }
.logstream .le.roll{ color:var(--ice); }
.logstream b{ color:var(--ice); font-weight:600; }
.logstream .say b{ color:var(--gold); }
.logstream .num{ font-family:Cinzel,serif; color:var(--silver); }
.logstream .mark{ color:var(--gold); font-family:Cinzel,serif; font-size:.72rem; letter-spacing:.08em; }
.logstream .strike{ color:#f09595; font-family:Cinzel,serif; font-size:.72rem; letter-spacing:.08em; }

#tray{ position:fixed; left:16px; bottom:16px; z-index:50; display:flex; align-items:center; gap:10px; }
#cube{ width:64px; height:64px; position:relative; transform-style:preserve-3d; transition:transform 900ms cubic-bezier(.2,.75,.25,1); cursor:pointer; --pip:#dce8ef; }
#cube.rolling{ pointer-events:none; }
#cube .face{ position:absolute; inset:0; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); gap:2px; padding:7px; border:1px solid var(--gold); border-radius:9px; backface-visibility:hidden; }
#cube .face i{ border-radius:50%; opacity:0; }
#cube .face i.on{ opacity:1; background:var(--pip); box-shadow:0 0 5px var(--pip); }
#cube .f1{ transform:translateZ(32px); }
#cube .f6{ transform:rotateY(180deg) translateZ(32px); }
#cube .f2{ transform:rotateY(90deg) translateZ(32px); }
#cube .f5{ transform:rotateY(-90deg) translateZ(32px); }
#cube .f3{ transform:rotateX(90deg) translateZ(32px); }
#cube .f4{ transform:rotateX(-90deg) translateZ(32px); }
.tchip{ background:var(--panel); border:1.5px solid var(--gold); border-radius:6px; font-family:Cinzel,serif; font-size:.72rem; letter-spacing:.1em; color:var(--silver); padding:7px 10px; }
.tpick{ position:absolute; left:0; bottom:78px; display:none; flex-direction:column; background:var(--panel); border:1.5px solid var(--gold); border-radius:6px; overflow:hidden; min-width:118px; }
.tpick.open{ display:flex; }
.tpick button{ font-family:Cinzel,serif; font-size:.72rem; letter-spacing:.08em; color:var(--ice); text-align:left; padding:8px 11px; }
.tpick button:hover{ background:var(--panel2); }
.tpick button.on{ color:#fff; background:#1e3f8f; }

#flourish{ position:fixed; left:50%; bottom:26px; z-index:55; opacity:0; transform:translate(-50%,16px); pointer-events:none;
  transition:opacity .3s ease, transform .3s ease; background:rgba(10,14,26,.94); border:1px solid var(--gold); border-radius:9px;
  padding:10px 18px; font-family:Cinzel,serif; font-size:.92rem; letter-spacing:.06em; display:flex; align-items:baseline; gap:9px; white-space:nowrap; }
#flourish.show{ opacity:1; transform:translate(-50%,0); }
#flourish .ftype{ font-size:.68rem; letter-spacing:.14em; color:var(--muted); }
#flourish .fdie{ font-size:1.5rem; color:var(--silver); }
#flourish .fmod{ font-size:.8rem; color:var(--ice); }
#flourish .ftot{ font-size:1.5rem; color:var(--gold); }
#flourish.mark{ border-color:var(--gold); box-shadow:0 0 20px rgba(201,168,76,.45); }
#flourish.mark .fdie{ color:var(--gold); }
#flourish.strike{ border-color:#a32d2d; box-shadow:0 0 20px rgba(163,45,45,.4); }
#flourish.strike .fdie{ color:#f09595; }
#flourish .fnote{ font-size:.68rem; letter-spacing:.14em; }
#flourish.mark .fnote{ color:var(--gold); }
#flourish.strike .fnote{ color:#f09595; }

#drawer{ display:none; }
#lmbar{ position:fixed; left:16px; bottom:140px; z-index:60; width:212px; background:rgba(10,14,26,.94); border:1px solid var(--line); border-radius:8px; padding:9px 11px; }
#lmbar.hidden{ display:none; }
#lmbar .lmh{ font-family:Cinzel,serif; font-size:.66rem; letter-spacing:.14em; color:var(--gold); margin-bottom:7px; }
#lmbar .lmrow{ display:flex; align-items:center; gap:7px; margin:5px 0; font-size:.68rem; color:var(--ice); }
#lmbar .lmrow label{ width:44px; flex:none; }
#lmbar .lmrow input{ flex:1; min-width:0; height:3px; accent-color:var(--gold); }
#lmbar .lmrow span{ width:32px; flex:none; text-align:right; font-family:Cinzel,serif; color:var(--silver); }
#devbar{ position:fixed; left:16px; bottom:104px; display:flex; gap:8px; z-index:60; }
#devbar button{ background:#000a; border:1px solid var(--line); border-radius:6px; color:var(--ice); font-size:.72rem; padding:5px 9px; }

#mhud,#mrail{ display:none; }

@media (max-width:700px){
  #log,#rail,#hud,#devbar,#lmbar{ display:none; }
  #tray{ left:10px; bottom:68px; transition:bottom .22s ease; }
  #tray.drawerup{ bottom:calc(52vh + 68px); }
  #cube{ width:54px; height:54px; }
  #cube .f1{ transform:translateZ(27px); }
  #cube .f6{ transform:rotateY(180deg) translateZ(27px); }
  #cube .f2{ transform:rotateY(90deg) translateZ(27px); }
  #cube .f5{ transform:rotateY(-90deg) translateZ(27px); }
  #cube .f3{ transform:rotateX(90deg) translateZ(27px); }
  #cube .f4{ transform:rotateX(-90deg) translateZ(27px); }
  .tpick{ bottom:68px; }
  #flourish{ bottom:132px; left:10px; right:10px; transform:translate(0,16px); white-space:normal; flex-wrap:wrap; padding:8px 12px; font-size:.8rem; gap:7px; }
  #flourish.show{ transform:translate(0,0); }
  #flourish .fdie,#flourish .ftot{ font-size:1.2rem; }
  #win{ top:56px; bottom:60px; left:0; right:0; width:auto; border-left:none; border-right:none; border-radius:0; }
  #mhud{ position:fixed; top:0; left:0; right:0; height:56px; display:flex; align-items:center; gap:8px; padding:0 10px; background:rgba(10,14,26,.94); border-bottom:1px solid var(--gold); z-index:40; }
  #mhud .portrait{ width:38px; height:38px; border-radius:50%; border:2px solid var(--gold); background:#37548d; }
  #mhud .mid{ flex:1; min-width:0; }
  #mhud .pname{ font-family:Cinzel,serif; font-size:.78rem; }
  #mhud .psub{ font-size:.68rem; color:var(--ice); }
  #mhud .gem{ width:36px; height:36px; }
  #mhud .gem span{ font-size:.72rem; }
  #mhud #mlog{ border:1px solid var(--gold); border-radius:5px; color:var(--gold); font-family:Cinzel,serif; font-size:.6rem; letter-spacing:.1em; padding:5px 7px; flex:none; }
  #fellmark{ display:none; }
  #fellmarkM{ display:block; position:static; width:38px; height:38px; flex:none; }
  #mrail{ position:fixed; bottom:0; left:0; right:0; height:60px; display:grid; grid-template-columns:repeat(5,1fr); background:rgba(10,14,26,.96); border-top:1px solid var(--gold); z-index:40; }
  #mrail button{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:.62rem; color:var(--ice); letter-spacing:.04em; }
  #mrail .ico{ width:20px; height:20px; transform:rotate(45deg); border:1.5px solid var(--gold); border-radius:4px; background:#1c2b52; }
  #mrail button.lit{ color:#fff; } #mrail button.lit .ico{ background:#1e3f8f; border-color:#9fc3ff; box-shadow:0 0 10px rgba(60,110,220,.6); }
  #drawer{ display:block; position:fixed; left:0; right:0; bottom:60px; height:52vh; background:#141020; border-top:2px solid var(--danger); border-radius:14px 14px 0 0; transform:translateY(calc(100% - 44px)); transition:transform .22s ease; z-index:45; }
  #drawer.up{ transform:translateY(0); }
  #drawer.hidden{ display:none; }
  #drawer .handle{ width:44px; height:4px; border-radius:2px; background:var(--muted); margin:7px auto; }
  #drawer .dhead{ display:flex; justify-content:space-between; align-items:center; padding:0 14px 8px; font-size:.8rem; color:var(--ice); }
  #drawer .dbody{ padding:0 14px; overflow-y:auto; height:calc(100% - 60px); }
}
</style>
</head>
<body>
<div id="stage">
  <div id="map">
    <div id="mapLayer">
      <div id="mapArt"></div>
      <svg id="grid" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
  <div class="frame"></div>
  <div id="log">
    <div class="lchat">
      <input id="chatPanel" maxlength="240" placeholder="Say something" onkeydown="if(event.key==='Enter')sayFrom('chatPanel')">
      <button onclick="sayFrom('chatPanel')">Say</button>
      <button onclick="openWin('log')" title="Open the full log">Full</button>
    </div>
    <div class="logstream" aria-live="polite"></div>
  </div>
  <div id="rail"></div>
  <div id="hud">
    <div class="prow" onclick="openWin('identity')">
      <div class="portrait"></div>
      <div><div class="pname" id="hudName">Acantha</div><div class="psub" id="hudSub">Level 12</div></div>
    </div>
    <div class="gems">
      <div class="gem" id="vitGem" title="Vitality"><span id="vitVal">70</span></div>
      <div class="gem lp"><span>LP 9</span></div>
    </div>
  </div>
  <div id="mhud">
    <div class="portrait" onclick="openWin('identity')"></div>
    <div class="mid" onclick="openWin('identity')"><div class="pname">Acantha</div><div class="psub" id="mhudSub">Level 12</div></div>
    <button id="mlog" onclick="openWin('log')" aria-label="Session log">Log</button>
    <div class="gem" id="vitGemM"><span id="vitValM">70</span></div>
    <div class="fmark" id="fellmarkM" role="button" aria-label="Fellmark"></div>
  </div>
  <div id="win">
    <div class="whead"><button class="wx" onclick="closeWin()" aria-label="Close">&times;</button><span class="wtitle" id="winTitle"></span></div>
    <div class="wbody" id="winBody"></div>
  </div>
  <div id="drawer" class="hidden">
    <div class="handle" id="drawerHandle"></div>
    <div class="dhead"><span id="drawHead">Combat</span><span id="drawMeta"></span></div>
    <div class="dbody" id="drawBody"></div>
  </div>
  <div id="mrail"></div>
  <div class="fmark" id="fellmark" role="button" aria-label="Fellmark"></div>
  <div id="flourish"></div>
  <div id="tray">
    <div id="cube" onclick="rollFromTray()"></div>
    <button class="tchip" id="typeChip" onclick="toggleTypePicker()">Attack</button>
    <div class="tpick" id="typePick"></div>
  </div>
  <div id="tokmenu">
    <div class="tmh">TOKEN</div>
    <input id="tmLabel" maxlength="4" aria-label="Token label">
    <div class="tmsz" id="tmSize"></div>
  </div>
  <div id="lmbar" class="hidden">
    <div class="lmh">MAP</div>
    <div class="lmrow"><label>Cell</label><input type="range" id="gSize" min="20" max="220" step="2"><span id="gSizeV"></span></div>
    <div class="lmrow"><label>Off X</label><input type="range" id="gOffX" min="0" max="219" step="1"><span id="gOffXV"></span></div>
    <div class="lmrow"><label>Off Y</label><input type="range" id="gOffY" min="0" max="219" step="1"><span id="gOffYV"></span></div>
    <div class="lmrow"><label>Fade</label><input type="range" id="gOpac" min="0" max="100" step="1"><span id="gOpacV"></span></div>
    <div class="lmrow"><label>Inset</label><input type="range" id="gInset" min="60" max="100" step="1"><span id="gInsetV"></span></div>
  </div>
  <div id="devbar">
    <button onclick="devCombat()">Toggle combat</button>
    <button onclick="devRole()">Toggle LM role</button>
    <button onclick="devToken()">Add foe token</button>
    <button onclick="fitCam()">Fit map</button>
  </div>
</div>
<script>
"use strict";
/* ThreadSpire shell, phase one. Placeholder art, stub transport, real layout and interactions.
   The state seam is binding: applyRemoteState is the only writer of shared state into the
   view, and send is the only sender of player intent outward. Polling feeds these now, a
   live transport later replaces the feed and touches nothing else. */

var S = {
  role: 'player',
  mode: 'explore',
  round: 2,
  charge: 1,
  fatigue: 0,
  openSection: null,
  rollType: 'attack',
  log: [],
  character: { name:'Acantha', level:12, vit:70, maxVit:70, lp:9, diceSkin:'emberglass' },
  /* map space. The art is the truth, the grid is an overlay onto it. */
  map: { w:2400, h:1600 },
  /* the LoreMaster owns all three knobs. Cell size and offset are the coordinate
     system itself, so they cannot be per viewer or nobody agrees where anything is. */
  grid: { size:100, offX:0, offY:0, opacity:0.5 },
  /* cosmetic. How much air sits between token art and the cell edge. */
  inset: 0.9,
  /* x and y are map pixels at the token centre, never screen percentages, and
     never cell indices. Cell indices would teleport every token the moment the
     LoreMaster recalibrates the grid. Size is derived from cells at render. */
  tokens: [
    { id:'t1', kind:'p',   label:'AC', x:700,  y:800,  cells:1, mine:true },
    { id:'t2', kind:'npc', label:'N',  x:1300, y:1100, cells:1, mine:false }
  ]
};

/* ---- the camera ----
   Local to this viewer and deliberately outside S. The LoreMaster decides what
   lives on the map, every viewer decides where they stand. applyRemoteState only
   ever writes into S, so sync physically cannot reach cam. That is the wall. */
var cam = { zoom:1, x:0, y:0 };
/* who you are touching is a fact about your screen, not about the board, so
   selection sits out here with the camera and never syncs either. */
var sel = null;
var ZMIN = 0.2, ZMAX = 4;
function clamp(v, a, b){ return v < a ? a : v > b ? b : v; }
function mapEl(){ return document.getElementById('map'); }
function applyCam(){
  document.getElementById('mapLayer').style.transform =
    'translate(' + cam.x + 'px,' + cam.y + 'px) scale(' + cam.zoom + ')';
  if (typeof placeTokMenu === 'function') placeTokMenu();
}
function clampCam(){
  var r = mapEl().getBoundingClientRect();
  var mw = S.map.w * cam.zoom, mh = S.map.h * cam.zoom;
  cam.x = mw <= r.width  ? (r.width - mw) / 2  : clamp(cam.x, r.width - mw, 0);
  cam.y = mh <= r.height ? (r.height - mh) / 2 : clamp(cam.y, r.height - mh, 0);
}
function toMap(sx, sy){
  var r = mapEl().getBoundingClientRect();
  return { x:(sx - r.left - cam.x) / cam.zoom, y:(sy - r.top - cam.y) / cam.zoom };
}
function zoomAt(sx, sy, factor){
  var r = mapEl().getBoundingClientRect(), px = sx - r.left, py = sy - r.top;
  var z = clamp(cam.zoom * factor, ZMIN, ZMAX), k = z / cam.zoom;
  cam.x = px - (px - cam.x) * k;
  cam.y = py - (py - cam.y) * k;
  cam.zoom = z;
  clampCam(); applyCam();
}
function fitCam(){
  var r = mapEl().getBoundingClientRect();
  cam.zoom = clamp(Math.min(r.width / S.map.w, r.height / S.map.h), ZMIN, ZMAX);
  clampCam(); applyCam();
}

/* ---- the stub rules engine ----
   Placeholder only. ThreadSpire never owns this math. The engine resolves a
   roll and returns the breakdown, the view renders what it is handed. Phase
   four wires the real bridge and this whole block is deleted, not extended.
   The numbers below are a fake sheet standing in for the real one. */
var STUB_MODS = {
  attack:  [['Precision',3], ['Finesse',2]],
  evade:   [['Precision',3], ['Movement',1]],
  skill:   [['Precision',3], ['Trickery',1]],
  generic: []
};
function stubResolve(rollType, n){
  var mods = (STUB_MODS[rollType] || []).map(function(m){ return { label:m[0], value:m[1] }; });
  var total = mods.reduce(function(a, m){ return a + m.value; }, n);
  return { kind:'roll', who:S.character.name, rollType:rollType, n:n, mods:mods, total:total };
}

/* ---- the seam ---- */
function applyRemoteState(patch){
  Object.keys(patch).forEach(function(k){ S[k] = patch[k]; });
  render();
  var last = S.log[S.log.length - 1];
  if (last && last.kind === 'roll' && last.who === S.character.name && last.id !== flourishedId){
    flourishedId = last.id;
    flourish(last);
  }
}
function send(evt){
  /* stub transport, echoes shared state back as remote truth. Latency varies by
     kind for the same reason a real one would, a slider cannot wait on a round trip. */
  var live = evt.type === 'grid' || evt.type === 'inset' || evt.type === 'token-label';
  setTimeout(function(){
    if (evt.type === 'token-move'){
      S.tokens.forEach(function(t){ if (t.id === evt.id){ t.x = evt.x; t.y = evt.y; } });
      applyRemoteState({ tokens: S.tokens });
    }
    if (evt.type === 'token-size'){
      S.tokens.forEach(function(t){ if (t.id === evt.id){ t.cells = evt.cells; } });
      applyRemoteState({ tokens: S.tokens });
    }
    if (evt.type === 'token-label'){
      S.tokens.forEach(function(t){ if (t.id === evt.id){ t.label = evt.label; } });
      applyRemoteState({ tokens: S.tokens });
    }
    if (evt.type === 'grid'){ applyRemoteState({ grid: evt.grid }); }
    if (evt.type === 'inset'){ applyRemoteState({ inset: evt.inset }); }
    if (evt.type === 'declare'){ pushLog({ kind:'sys', html:'<b>' + esc(S.character.name) + '</b> declares ' + esc(evt.act) + '.' }); }
    if (evt.type === 'say'){ pushLog({ kind:'say', who:S.character.name, text:evt.text }); }
    if (evt.type === 'roll'){ pushLog(stubResolve(evt.rollType, evt.n)); }
  }, live ? 0 : 120);
}

/* ---- dice ----
   Two layers, kept apart on purpose. rollFromTray owns the result and sends it
   through the seam. animateDie owns the visual and is told what landed. A
   physics layer can replace animateDie later without touching the result. */
var ROLL_TYPES = { attack:'Attack', evade:'Evade', skill:'Skill', generic:'Generic' };
var PIPS = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] };
var REST = { 1:[0,0], 2:[0,-90], 3:[-90,0], 4:[90,0], 5:[0,90], 6:[0,180] };
/* A skin is a texture swap and nothing more. Per character through diceSkin. */
var DICE_SKINS = {
  emberglass: { bg:'linear-gradient(160deg,#1b2440,#0b101f)', pip:'#dce8ef' },
  boneash:    { bg:'linear-gradient(160deg,#2a2622,#14110e)', pip:'#c9a84c' }
};
var spins = 0;

function buildCube(){
  var skin = DICE_SKINS[S.character.diceSkin] || DICE_SKINS.emberglass;
  var c = document.getElementById('cube'), h = '';
  c.style.setProperty('--pip', skin.pip);
  for (var n = 1; n <= 6; n++){
    var cells = '';
    for (var i = 0; i < 9; i++) cells += '<i' + (PIPS[n].indexOf(i) >= 0 ? ' class="on"' : '') + '></i>';
    h += '<div class="face f' + n + '" style="background:' + skin.bg + '">' + cells + '</div>';
  }
  c.innerHTML = h;
  animateDie(1, true);
}
function animateDie(n, instant){
  var c = document.getElementById('cube'), r = REST[n];
  if (instant){ c.style.transition = 'none'; }
  spins += 2;
  c.style.transform = 'rotateX(' + (spins*360 + r[0]) + 'deg) rotateY(' + (spins*360 + r[1]) + 'deg)';
  if (instant){ void c.offsetWidth; c.style.transition = ''; return; }
  tumbleEnds = Date.now() + 900;
  c.classList.add('rolling');
  setTimeout(function(){ c.classList.remove('rolling'); }, 900);
}
var tumbleEnds = 0, flourishT = null, flourishedId = 0;
function flourish(e){
  /* wait out the tumble so the readout and the face agree, then hold and fade */
  clearTimeout(flourishT);
  flourishT = setTimeout(function(){
    var f = document.getElementById('flourish');
    var note = e.n === 6 ? '<span class="fnote">Fellmark</span>'
             : e.n === 1 ? '<span class="fnote">Fellstrike</span>' : '';

    }).join('');
    var tot = (e.mods && e.mods.length) ? '<span class="ftot">= ' + e.total + '</span>' : '';
    f.className = e.n === 6 ? 'mark' : e.n === 1 ? 'strike' : '';
    f.innerHTML = '<span class="ftype">' + esc(ROLL_TYPES[e.rollType] || e.rollType) + '</span>'
      + '<span class="fdie">' + e.n + '</span>' + mods + tot + note;
    void f.offsetWidth;
    f.classList.add('show');
    flourishT = setTimeout(function(){ f.classList.remove('show'); }, 2800);
  }, Math.max(0, tumbleEnds - Date.now()));
}

/* ---- tokens ----
   A token is one cell unless the LoreMaster says otherwise. Footprint is a game
   fact, an Epic owning 2x2 is something a player reads off the board. Inset is
   only air, so the grid stays visible and neighbours do not fuse. */
function tokenPx(t){ return S.grid.size * (t.cells || 1) * S.inset; }
function place(el, t){
  var px = tokenPx(t);
  el.style.width = el.style.height = px + 'px';
  el.style.left = (t.x - px / 2) + 'px';
  el.style.top  = (t.y - px / 2) + 'px';
  el.style.fontSize = Math.max(8, px * 0.26) + 'px';
  el.style.borderWidth = Math.max(2, px * 0.055) + 'px';
}
function renderTokens(){
  var layer = document.getElementById('mapLayer');
  layer.querySelectorAll('.token').forEach(function(n){ n.remove(); });
  S.tokens.forEach(function(t){
    var el = document.createElement('div');
    var draggable = t.mine || S.role === 'lm';
    el.className = 'token ' + t.kind + (t.mine ? ' mine' : '') + (draggable && !t.mine ? ' lm-drag' : '')
      + (sel === t.id ? ' sel' : '');
    el.textContent = t.label;
    place(el, t);
    if (draggable) wireDrag(el, t);
    layer.appendChild(el);
  });
}
/* Odd footprints centre on a cell, even footprints centre on an intersection,
   otherwise a 2x2 straddles four half cells and covers none of them. */
function snapAxis(v, off, cells){
  var g = S.grid.size, half = (cells % 2) ? g / 2 : 0;
  return Math.round((v - off - half) / g) * g + off + half;
}
function wireDrag(el, t){
  el.addEventListener('pointerdown', function(e){
    e.preventDefault(); e.stopPropagation();
    el.setPointerCapture(e.pointerId);
    var m = toMap(e.clientX, e.clientY), ox = t.x - m.x, oy = t.y - m.y, moved = false;
    function mv(ev){
      var p = toMap(ev.clientX, ev.clientY);
      t.x = clamp(p.x + ox, 0, S.map.w); t.y = clamp(p.y + oy, 0, S.map.h);
      moved = true; place(el, t);
    }
    function upfn(){
      el.removeEventListener('pointermove', mv); el.removeEventListener('pointerup', upfn);
      if (!moved){ selectToken(t.id); return; }
      var c = t.cells || 1;
      t.x = clamp(snapAxis(t.x, S.grid.offX, c), 0, S.map.w);
      t.y = clamp(snapAxis(t.y, S.grid.offY, c), 0, S.map.h);
      place(el, t);
      send({ type:'token-move', id:t.id, x:t.x, y:t.y });
    }
    el.addEventListener('pointermove', mv); el.addEventListener('pointerup', upfn);
  });
}
/* ---- grid ----
   Drawn in map space, so it rides the camera and stays welded to the art.
   non-scaling-stroke keeps the lines hairlines instead of ropes at 4x. */
function drawGrid(){
  var svg = document.getElementById('grid'), g = S.grid, out = '';
  svg.setAttribute('width', S.map.w); svg.setAttribute('height', S.map.h);
  svg.setAttribute('viewBox', '0 0 ' + S.map.w + ' ' + S.map.h);
  for (var x = g.offX % g.size; x <= S.map.w; x += g.size)
    out += '<line x1="' + x + '" y1="0" x2="' + x + '" y2="' + S.map.h + '"/>';
  for (var y = g.offY % g.size; y <= S.map.h; y += g.size)
    out += '<line x1="0" y1="' + y + '" x2="' + S.map.w + '" y2="' + y + '"/>';
  svg.innerHTML = '<g stroke="#55677a" stroke-width="1" vector-effect="non-scaling-stroke">' + out + '</g>';
  svg.style.opacity = g.opacity;
  document.getElementById('mapArt').style.width = S.map.w + 'px';
  document.getElementById('mapArt').style.height = S.map.h + 'px';
}

function tokById(id){ var f = null; S.tokens.forEach(function(t){ if (t.id === id) f = t; }); return f; }
function selectToken(id){ sel = (sel === id) ? null : id; renderTokens(); paintTokMenu(); }
function tokScreen(t){

}

  m.style.top  = clamp(p.y - (tokenPx(t) * cam.zoom) / 2 - h - 10, 8, window.innerHeight - h - 8) + 'px';

(function wireTokMenu(){

/* ---- gestures ----
   One finger on empty map pans, one finger on a token you hold moves it, two
   fingers pinch. Wheel zooms to the cursor, never to the centre, because
   centre anchored zoom is useless the moment you look at a corner. */
var pts = new Map(), pan = null, pinch = null;
function pv(){ var a = []; pts.forEach(function(p){ a.push(p); }); return a; }
function dist(a, b){ return Math.hypot(a.x - b.x, a.y - b.y); }
function mid(a, b){ return { x:(a.x + b.x) / 2, y:(a.y + b.y) / 2 }; }
(function wireCamera(){
  var m = mapEl();
  m.addEventListener('pointerdown', function(e){
    if (e.target.closest && e.target.closest('.token')) return;
    m.setPointerCapture(e.pointerId);
    pts.set(e.pointerId, { x:e.clientX, y:e.clientY });
    if (pts.size === 1){
      pan = { x:e.clientX, y:e.clientY, cx:cam.x, cy:cam.y, moved:false };
      pinch = null; m.classList.add('panning');
    } else if (pts.size === 2){
      var a = pv();
      pan = null;
      pinch = { d:dist(a[0], a[1]), mid:mid(a[0], a[1]), zoom:cam.zoom, cx:cam.x, cy:cam.y };
    }
  });
  m.addEventListener('pointermove', function(e){
    if (!pts.has(e.pointerId)) return;
    pts.set(e.pointerId, { x:e.clientX, y:e.clientY });
    if (pinch && pts.size >= 2){
      var a = pv(), d = dist(a[0], a[1]), c = mid(a[0], a[1]);
      var r = m.getBoundingClientRect();
      var z = clamp(pinch.zoom * (d / (pinch.d || 1)), ZMIN, ZMAX), k = z / pinch.zoom;
      var px = pinch.mid.x - r.left, py = pinch.mid.y - r.top;
      cam.zoom = z;
      cam.x = px - (px - pinch.cx) * k + (c.x - pinch.mid.x);
      cam.y = py - (py - pinch.cy) * k + (c.y - pinch.mid.y);
      clampCam(); applyCam();
    } else if (pan){
      cam.x = pan.cx + (e.clientX - pan.x);
      cam.y = pan.cy + (e.clientY - pan.y);
      if (Math.abs(e.clientX - pan.x) > 4 || Math.abs(e.clientY - pan.y) > 4) pan.moved = true;
      clampCam(); applyCam();
    }
  });
  function release(e){
    pts.delete(e.pointerId);
    if (pts.size < 2) pinch = null;
    if (pts.size === 1){
      var a = pv()[0];
      pan = { x:a.x, y:a.y, cx:cam.x, cy:cam.y, moved:true };
    }
    if (pts.size === 0){
      m.classList.remove('panning');
      /* a click, not a pan, drops the selection and closes the open window */
      if (pan && !pan.moved){
        if (sel){ sel = null; renderTokens(); paintTokMenu(); }
        if (!isMobile() && S.openSection) closeWin();
      }
      pan = null;
    }
  }
  m.addEventListener('pointerup', release);
  m.addEventListener('pointercancel', release);
  m.addEventListener('wheel', function(e){
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, Math.pow(0.999, e.deltaY));
  }, { passive:false });
})();

/* ---- log ----
   One stream. Chat, rolls, and effects are entry kinds on it, newest first.
   Every surface renders the same array, so the panel and the full log overlay
   cannot drift. */
function esc(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}
function chatRow(id){

  if (!text) return;
  el.value = '';
  send({ type:'say', text:text });

var logSeq = 0;
function mkId(){ return ++logSeq; }
function pushLog(e){ e.id = mkId(); S.log.push(e); applyRemoteState({ log:S.log }); }
function entryHtml(e){
  if (e.kind === 'say') return '<div class="le say"><b>' + esc(e.who) + '</b> ' + esc(e.text) + '</div>';
  if (e.kind === 'roll'){
    var m = e.n === 6 ? ' <span class="mark">Fellmark</span>'
          : e.n === 1 ? ' <span class="strike">Fellstrike</span>' : '';
    var sum = (e.mods || []).map(function(x){ return ' + ' + esc(x.label) + ' ' + x.value; }).join('');
    var tot = (e.mods && e.mods.length) ? ' = <span class="num">' + e.total + '</span>' : '';
    return '<div class="le roll"><b>' + esc(e.who) + '</b> rolled <span class="num">' + e.n + '</span>'
      + sum + tot + ' on ' + esc(ROLL_TYPES[e.rollType] || e.rollType) + m + '</div>';
  }
  return '<div class="le sys">\u00b7 ' + e.html + '</div>';
}
function renderLog(){
  /* newest sits directly under the chat box and older work downward off the
     panel. The chat box and the newest line are the two things always in view,
     so the stream never has to be chased. */
  var h = S.log.slice().reverse().map(entryHtml).join('');
  document.querySelectorAll('.logstream').forEach(function(n){
    n.innerHTML = h;
    n.scrollTop = 0;
  });
  var l = document.getElementById('log');
  if (l) l.scrollTop = 0;
}

/* ---- render ---- */
function render(){
  var combat = S.mode === 'combat';
  ['fellmark','fellmarkM'].forEach(function(id){
    var f = document.getElementById(id);
    f.classList.toggle('combat', combat);
    f.onclick = combat ? function(){ isMobile() ? toggleDrawer() : openWin('battle'); } : null;
  });
  if (!combat){
    document.getElementById('drawer').classList.add('hidden');
    if (S.openSection === 'battle') closeWin();
  } else if (isMobile()){
    toggleDrawer(false);
  }
  document.getElementById('vitVal').textContent = S.character.vit;
  document.getElementById('vitValM').textContent = S.character.vit;
  paintRails(); drawGrid(); renderTokens(); renderLog(); paintLmbar(); paintTokMenu();
}
window.addEventListener('resize', function(){ clampCam(); applyCam(); });
(function buildFellmarks(){
  var svg = '<svg viewBox="0 0 66 66" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">'
    + '<rect class="fmshape" x="12" y="12" width="42" height="42" rx="5" transform="rotate(45 33 33)"/>'
    + '<path class="fmrune" d="M33 20 V46 M24 29 L33 20 L42 29 M24 37 L33 46 L42 37"/></svg>';
  ['fellmark','fellmarkM'].forEach(function(id){ document.getElementById(id).innerHTML = svg; });
})();
buildCube(); paintTypePicker(); setRollType(S.rollType);
render(); fitCam();

S.log.push({ id:mkId(), kind:'roll', who:'Kaelo', rollType:'attack', n:5,
  mods:[{ label:'Power', value:2 }, { label:'Might', value:1 }], total:8 });
S.log.push({ id:mkId(), kind:'say', who:'Kaelo', text:'The door is barred from the far side.' });
applyRemoteState({ log:S.log });
</script>
