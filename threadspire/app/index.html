<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreadSpire</title>
<style>
:root{
  --navy:#0a0e1a; --panel:#10162a; --panel2:#0d1322;
  --silver:#dce8ef; --silver-dim:#93a3b1; --ice:#b8ccd8; --gold:#c9a84c;
  --muted:#7e8a99; --line:rgba(184,204,216,.16); --goldline:rgba(201,168,76,.45);
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{ background:var(--navy); color:var(--silver); font-family:Georgia,'Times New Roman',serif; overflow-x:hidden; }
#sky{ position:fixed; inset:0; z-index:0; }
#stageWrap{ position:relative; z-index:1; min-height:100%; max-width:640px; margin:0 auto; padding:12px; }
.crumbs{ display:flex; flex-wrap:wrap; gap:4px; align-items:center; font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); min-height:26px; margin-bottom:10px; }
.crumb{ background:none; border:1px solid var(--line); border-radius:99px; color:var(--ice); padding:4px 10px; font:inherit; cursor:pointer; }
.crumb.on{ border-color:var(--goldline); color:var(--gold); }
.crumb-sep{ color:var(--muted); }

/* character token */
.token-wrap{ text-align:center; padding:32px 0; }
.char-token{ display:inline-flex; flex-direction:column; align-items:center; gap:10px; background:none; border:none; cursor:pointer; font:inherit; color:var(--silver); }
.tok-img{ width:132px; height:132px; border-radius:50%; background-size:cover; background-position:center; border:2px solid var(--goldline); box-shadow:0 0 40px rgba(201,168,76,.2); display:block; }
.tok-img.empty{ display:flex; align-items:center; justify-content:center; font-size:3rem; color:var(--gold); background:var(--panel); font-family:'Cinzel',serif; }
.tok-name{ font-size:1.25rem; font-family:'Cinzel',serif; letter-spacing:.03em; }
.tok-hint{ color:var(--muted); font-size:.82rem; margin-top:14px; }

/* layer card */
.layer-card{ background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
.layer-map{ width:100%; aspect-ratio:16/10; background-size:cover; background-position:center; }
.layer-map.placeholder{ display:flex; align-items:center; justify-content:center; background:
  repeating-linear-gradient(45deg,var(--panel2),var(--panel2) 14px,#0b1120 14px,#0b1120 28px); color:var(--muted); font-size:.85rem; letter-spacing:.1em; }
.layer-type{ font-size:.6rem; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); padding:12px 14px 0; }
.layer-title{ font-size:1.3rem; font-family:'Cinzel',serif; padding:2px 14px 0; }
.layer-lore{ color:var(--silver-dim); font-size:.92rem; line-height:1.5; padding:8px 14px 14px; }

.goals,.issues,.party{ border-top:1px solid var(--line); padding:12px 14px; }
.goals-h{ font-size:.6rem; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.goal{ display:flex; align-items:center; gap:8px; padding:4px 0; font-size:.9rem; color:var(--ice); }
.goal.done{ color:var(--muted); text-decoration:line-through; }
.goal-box{ width:18px; height:18px; border:1px solid var(--goldline); border-radius:4px; display:inline-flex; align-items:center; justify-content:center; color:var(--gold); font-size:.7rem; flex:0 0 auto; }
.issue{ font-size:.9rem; color:var(--ice); padding:4px 0; border-left:2px solid var(--goldline); padding-left:10px; margin:4px 0; }
.party{ display:block; }
.party-tok{ display:inline-flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; cursor:pointer; color:var(--silver); font:inherit; margin:4px 10px 4px 0; }
.pt-img{ width:52px; height:52px; border-radius:50%; background-size:cover; background-position:center; border:1px solid var(--line); }
.pt-img.empty{ display:flex; align-items:center; justify-content:center; color:var(--gold); background:var(--panel2); font-family:'Cinzel',serif; }
.pt-name{ font-size:.72rem; color:var(--ice); }

.zoom-row{ display:flex; gap:8px; margin-top:14px; }
.zoom{ flex:1; font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:var(--silver); background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:12px; cursor:pointer; min-height:46px; }
.zoom:disabled{ opacity:.35; cursor:default; }
.gate{ color:var(--muted); font-size:.82rem; text-align:center; margin-top:10px; }

/* card popover */
.veil{ position:fixed; inset:0; background:rgba(4,6,12,.72); z-index:4; }
.pop{ position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:5; width:340px; max-width:90vw; max-height:88vh; overflow-y:auto; background:var(--panel); border:1px solid var(--goldline); border-radius:14px; padding:16px; }
.char-card{ text-align:center; }
.card-portrait{ width:110px; height:110px; border-radius:50%; margin:0 auto 10px; background-size:cover; background-position:center; border:2px solid var(--goldline); }
.card-portrait.empty{ display:flex; align-items:center; justify-content:center; font-size:2.4rem; color:var(--gold); background:var(--panel2); font-family:'Cinzel',serif; }
.cc-name{ font-size:1.3rem; font-family:'Cinzel',serif; }
.cc-player{ color:var(--muted); font-size:.8rem; margin-top:2px; }
.cc-line{ color:var(--gold); font-size:.82rem; margin:6px 0 10px; }
.cc-blurb{ color:var(--silver-dim); font-size:.9rem; line-height:1.5; text-align:left; padding:10px; background:var(--panel2); border-radius:8px; margin-bottom:10px; }
.cc-sec{ text-align:left; font-size:.86rem; color:var(--ice); padding:5px 0; border-top:1px solid var(--line); }
.cc-h{ color:var(--muted); font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; display:block; }
.ts-sheet{ width:100%; margin-top:12px; background:var(--panel2); border:1px solid var(--goldline); color:var(--gold); border-radius:9px; padding:12px; font:inherit; font-size:.78rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; }
.ts-close{ width:100%; margin-top:8px; background:none; border:1px solid var(--line); color:var(--silver); border-radius:9px; padding:10px; font:inherit; cursor:pointer; }
.wait{ text-align:center; color:var(--muted); padding:30px; }
.hidden{ display:none !important; }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="topAnchor"></div>
<div id="stageWrap">
  <nav class="crumbs" id="crumbs"></nav>
  <section id="stage"></section>
</div>
<div id="veil" class="veil hidden"></div>
<div id="pop" class="pop hidden"></div>
<script>
/*__STORAGE__*/
/*__GRAPH__*/
/*__APP__*/
</script>
</body>
</html>
