<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreadSpire</title>
<style>
:root{
  --navy:#0a0e1a; --panel:#10162a; --panel2:#0d1322;
  --silver:#dce8ef; --silver-dim:#93a3b1; --ice:#b8ccd8; --gold:#c9a84c;
  --muted:#7e8a99; --line:rgba(184,204,216,.16); --goldline:rgba(201,168,76,.45);
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; }
body{ background:var(--navy); color:var(--silver); font-family:Georgia,'Times New Roman',serif; overflow:hidden; }
#sky{ position:fixed; inset:0; z-index:0; }
#stage{ position:relative; z-index:1; height:100%; display:flex; flex-direction:column; padding:12px; max-width:640px; margin:0 auto; }
.crumbs{ display:flex; flex-wrap:wrap; gap:6px; align-items:center; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); min-height:28px; }
.crumb{ background:none; border:1px solid var(--line); border-radius:99px; color:var(--ice); padding:4px 10px; font:inherit; cursor:pointer; }
.crumb:last-child{ border-color:var(--goldline); color:var(--gold); }
#focusCard{ background:var(--panel); border:1px solid var(--goldline); border-radius:14px; padding:16px; margin:10px 0; transition:opacity .28s ease, transform .28s ease; }
#focusCard.swap{ opacity:0; transform:scale(.96); }
.f-type{ font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); }
.f-title{ font-size:1.3rem; margin:4px 0 8px; }
.f-sum{ color:var(--silver-dim); font-size:.95rem; line-height:1.5; max-height:32vh; overflow-y:auto; }
.f-meta{ margin-top:8px; color:var(--ice); font-size:.85rem; }
.badge{ display:inline-block; border:1px solid var(--goldline); color:var(--gold); border-radius:99px; padding:2px 9px; font-size:.72rem; margin-left:8px; }
.rowbtns{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
button.act{ font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color:var(--silver); background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:10px 14px; cursor:pointer; min-height:44px; }
button.act.gold{ border-color:var(--goldline); color:var(--gold); }
#childrenWrap{ flex:1; overflow-y:auto; padding-bottom:24px; }
.kids-h{ font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin:8px 2px; }
.kid{ display:block; width:100%; text-align:left; background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin:8px 0; color:var(--silver); font:inherit; cursor:pointer; min-height:52px; }
.kid .k-type{ font-size:.6rem; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); }
.kid .k-title{ font-size:1rem; margin-top:2px; }
.kid .k-sum{ color:var(--muted); font-size:.82rem; margin-top:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.kid.fog{ opacity:.45; cursor:default; border-style:dashed; }
.kid.fog .k-title{ color:var(--muted); font-style:italic; }
.kid.memorial{ border-color:var(--goldline); }
.pin{ background:var(--panel2); border:1px solid var(--line); border-left:3px solid var(--gold); border-radius:8px; padding:8px 10px; margin:6px 0; font-size:.88rem; color:var(--ice); }
textarea{ width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--silver); padding:9px; font:inherit; font-size:.9rem; min-height:56px; }
.pop{ position:fixed; left:50%; top:40%; transform:translate(-50%,-50%); z-index:5; background:var(--panel); border:1px solid var(--goldline); border-radius:12px; padding:16px; max-width:88vw; width:340px; }
.pop .f-sum{ max-height:40vh; }
.veil{ position:fixed; inset:0; background:rgba(4,6,12,.7); z-index:4; }
.hidden{ display:none !important; }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="stage">
  <nav class="crumbs" id="crumbs" aria-label="Path to the Sphere"></nav>
  <section id="focusCard"></section>
  <div id="childrenWrap"><div id="children"></div></div>
</div>
<div id="veil" class="veil hidden"></div>
<div id="pop" class="pop hidden"></div>

<script>
/*__STORAGE__*/
/*__GRAPH__*/
/*__APP__*/
</script>
</body>
</html>
